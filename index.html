<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>DNL雅思机经</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #ebe4d9;
    --panel: #f7f1e7;
    --text: #3d362e;
    --muted: #8c8175;
    --border: #d7cdbe;
    --accent: #8fa394;
    --accent-hover: #748a7a;
    --high: #d8c1ac;
    --high-text: #6b4a36;
    --low: #b9c3cb;
    --low-text: #4d5862;
    --good: #7d9282;
    --bad: #b58575;
    --shadow: 0 4px 16px rgba(60,52,44,.07);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .btn {
    background: var(--accent); color: #fff; border: 0; padding: 8px 14px; border-radius: 8px;
    cursor: pointer; font-size: .9em; font-weight: 500; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn.ghost:hover { background: var(--bg); }

  /* ===== Auth pane ===== */
  .auth-wrap {
    max-width: 380px; margin: 80px auto; background: var(--panel);
    border-radius: 16px; padding: 32px; box-shadow: var(--shadow);
  }
  .auth-wrap h2 { margin: 0 0 8px; font-size: 1.4em; }
  .auth-wrap p.lead { color: var(--muted); margin: 0 0 20px; font-size: .9em; }
  .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .auth-tab {
    flex: 1; padding: 10px; border: 0; background: transparent; cursor: pointer;
    color: var(--muted); font-weight: 500; border-bottom: 2px solid transparent;
  }
  .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .auth-form label { display: block; font-size: .85em; color: var(--muted); margin: 12px 0 6px; }
  .auth-form input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 1em; background: var(--bg); color: var(--text);
  }
  .auth-form input:focus { outline: none; border-color: var(--accent); }
  .auth-form button[type=submit] { width: 100%; margin-top: 18px; padding: 11px; }
  .auth-msg { margin-top: 14px; padding: 10px 12px; border-radius: 8px; font-size: .9em; display: none; }
  .auth-msg.error { background: #e8d6cc; color: var(--bad); display: block; }
  .auth-msg.ok    { background: #d6e3d8; color: var(--good); display: block; }

  /* ===== Home (我的) ===== */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .page-title { font-size: 1.4em; font-weight: 600; margin: 0 0 18px; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--panel); padding: 16px; border-radius: 12px; box-shadow: var(--shadow); }
  .stat-card .label { font-size: .8em; color: var(--muted); margin-bottom: 6px; }
  .stat-card .value { font-size: 1.6em; font-weight: 600; }
  .stat-card .sub   { font-size: .75em; color: var(--muted); margin-top: 4px; }

  .section-title {
    font-size: 1em; font-weight: 600; color: var(--muted);
    margin: 22px 0 10px;
  }

  .subjects {
    background: var(--panel); border-radius: 12px; padding: 16px 20px;
    box-shadow: var(--shadow); margin-bottom: 22px;
  }
  .subject-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .subject-row:last-child { border-bottom: 0; }
  .subject-name { flex: 0 0 90px; font-weight: 500; font-size: .95em; }
  .subject-bar { flex-grow: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; position: relative; }
  .subject-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s; }
  .subject-meta { flex-shrink: 0; font-size: .85em; color: var(--muted); min-width: 110px; text-align: right; }
  .subject-meta.no-data { font-style: italic; }
  .subject-row a.go {
    flex-shrink: 0; padding: 4px 12px; border-radius: 6px; background: var(--bg);
    color: var(--text); text-decoration: none; font-size: .8em; border: 1px solid var(--border);
  }
  .subject-row a.go:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .tabs { display: flex; gap: 4px; margin-bottom: 14px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 16px; background: transparent; border: 0; cursor: pointer;
    color: var(--muted); font-weight: 500; border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  table.list {
    width: 100%; border-collapse: collapse; background: var(--panel);
    border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);
  }
  table.list th, table.list td { padding: 12px 14px; text-align: left; font-size: .92em; }
  table.list thead { background: var(--bg); }
  table.list th { font-weight: 500; color: var(--muted); font-size: .85em; }
  table.list tbody tr { border-top: 1px solid var(--border); cursor: pointer; }
  table.list tbody tr:hover { background: var(--bg); }
  table.list .test-id { color: var(--muted); font-variant-numeric: tabular-nums; }
  table.list .score-cell { font-weight: 600; }
  table.list .score-cell.good { color: var(--good); }
  table.list .score-cell.bad  { color: var(--bad); }
  table.list .badge {
    font-size: .72em; padding: 2px 8px; border-radius: 999px;
    background: var(--bg); color: var(--muted); border: 1px solid var(--border);
  }
  table.list .badge.high { background: var(--high); color: var(--high-text); border-color: transparent; }

  .notes-list { display: grid; gap: 10px; }
  .note-item { background: var(--panel); border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .note-item .meta { display: flex; gap: 8px; font-size: .78em; color: var(--muted); margin-bottom: 8px; }
  .note-item .quote { background: var(--high); color: var(--high-text); padding: 6px 10px; border-radius: 6px; font-size: .95em; margin-bottom: 8px; display: inline-block; }
  .note-item .text { font-size: .92em; line-height: 1.5; white-space: pre-wrap; }
  .note-item .text:empty::before { content: '(无文字笔记)'; color: var(--muted); font-style: italic; }

  .empty { text-align: center; padding: 48px; color: var(--muted); }
  .loading { padding: 24px; color: var(--muted); text-align: center; }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .container { padding: 14px; }
    .subject-row { flex-wrap: wrap; }
    .subject-name { flex-basis: 100%; }
    table.list .col-time { display: none; }
  }
</style>
<link rel="stylesheet" href="/lib/nav.css">
</head>
<body>

<!-- =================== Login pane =================== -->
<div id="auth-view" style="display:none">
  <div class="auth-wrap">
    <h2>DNL雅思机经</h2>
    <p class="lead">登录或注册以保存你的成绩、笔记、答题进度。</p>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-tab="login">登录</button>
      <button type="button" class="auth-tab" data-tab="signup">注册</button>
    </div>

    <form class="auth-form" id="form-login">
      <label>邮箱</label>
      <input type="email" name="email" required autocomplete="email">
      <label>密码</label>
      <input type="password" name="password" required autocomplete="current-password">
      <button type="submit" class="btn">登录</button>
      <div class="auth-msg" data-msg="login"></div>
    </form>

    <form class="auth-form" id="form-signup" style="display:none">
      <label>姓名 / 昵称</label>
      <input type="text" name="display_name" required maxlength="40">
      <label>邮箱</label>
      <input type="email" name="email" required autocomplete="email">
      <label>密码 (至少 6 位)</label>
      <input type="password" name="password" required minlength="6" autocomplete="new-password">
      <button type="submit" class="btn">创建账号</button>
      <div class="auth-msg" data-msg="signup"></div>
    </form>
  </div>
</div>

<!-- =================== Home (我的) =================== -->
<div id="app-view" style="display:none">
  <div class="container">
    <div class="stats-row">
      <div class="stat-card"><div class="label">已完成测试</div><div class="value" id="stat-done">—</div><div class="sub">不同题目数</div></div>
      <div class="stat-card"><div class="label">平均正确率</div><div class="value" id="stat-avg">—</div><div class="sub">取每题最佳成绩</div></div>
      <div class="stat-card"><div class="label">总练习时长</div><div class="value" id="stat-time">—</div><div class="sub">累计</div></div>
      <div class="stat-card"><div class="label">笔记数</div><div class="value" id="stat-notes">—</div><div class="sub">条</div></div>
    </div>

    <div class="section-title">各科进度</div>
    <div class="subjects" id="subjects-box">
      <div class="loading">加载中…</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="scores">成绩记录</button>
      <button class="tab" data-tab="notes">笔记</button>
    </div>
    <div id="tab-scores"><div class="loading">加载中…</div></div>
    <div id="tab-notes" style="display:none"><div class="loading">加载中…</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/lib/config.js"></script>
<script src="/lib/catalog.js"></script>
<script src="/lib/supabase.js"></script>
<script src="/lib/nav.js"></script>
<script>
const $  = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const catalogById = Object.fromEntries(TEST_CATALOG.map(t => [t.id, t]));

function fmtTime(secs) {
  if (!secs) return '0m';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h ? `${h}h ${m}m` : `${m}m`;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(ts) {
  return new Date(ts).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

// ---- Auth tabs ----
$$('.auth-tab').forEach(t => t.addEventListener('click', () => {
  $$('.auth-tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  $('#form-login').style.display  = t.dataset.tab === 'login'  ? '' : 'none';
  $('#form-signup').style.display = t.dataset.tab === 'signup' ? '' : 'none';
}));
function showMsg(form, type, text) {
  const el = $(`[data-msg="${form}"]`);
  el.className = 'auth-msg ' + type;
  el.textContent = text;
}
$('#form-login').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  showMsg('login', 'ok', '登录中…');
  const { error } = await IELTS.signIn(fd.get('email'), fd.get('password'));
  if (error) return showMsg('login', 'error', error.message || '登录失败');
  location.reload();
});
$('#form-signup').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  showMsg('signup', 'ok', '创建中…');
  const { error } = await IELTS.signUp(fd.get('email'), fd.get('password'), fd.get('display_name'));
  if (error) return showMsg('signup', 'error', error.message || '注册失败');
  showMsg('signup', 'ok', '注册成功!现在切到登录 tab 即可登录。');
});

// ---- Boot ----
(async function () {
  const user = await IELTS.getUser();
  if (!user) {
    $('#auth-view').style.display = '';
    return;
  }
  $('#app-view').style.display = '';
  await IELTS_NAV.mount('me');
  await renderHome();
})();

async function renderHome() {
  const [{ data: scores }, { data: notes }] = await Promise.all([
    sb.from('scores').select('*').order('finished_at', { ascending: false }),
    sb.from('notes').select('*').order('updated_at', { ascending: false })
  ]);
  const S = scores || [], N = notes || [];

  // ---- Stats ----
  const bestByTest = {};
  S.forEach(s => { if (!bestByTest[s.test_id] || s.score > bestByTest[s.test_id].score) bestByTest[s.test_id] = s; });
  const completed = Object.keys(bestByTest).length;
  const totalCorrect = Object.values(bestByTest).reduce((sum, s) => sum + s.score, 0);
  const totalQs      = Object.values(bestByTest).reduce((sum, s) => sum + s.total, 0);
  const totalTime    = S.reduce((sum, s) => sum + (s.duration_secs || 0), 0);
  $('#stat-done').textContent  = completed;
  $('#stat-avg').textContent   = totalQs ? `${Math.round((totalCorrect/totalQs)*100)}%` : '—';
  $('#stat-time').textContent  = fmtTime(totalTime);
  $('#stat-notes').textContent = N.length;

  // ---- Subjects ----
  const subjectsBox = $('#subjects-box');
  subjectsBox.innerHTML = '';
  const SUBJECTS = [
    { id: 'listening', label: '雅思听力', total: TEST_CATALOG.length, done: completed, href: '/listening.html' },
    { id: 'reading',   label: '雅思阅读', total: 0, done: 0, href: '/reading.html' },
    { id: 'writing',   label: '雅思写作', total: 0, done: 0, href: '/writing.html' },
    { id: 'speaking',  label: '雅思口语', total: 0, done: 0, href: '/speaking.html' }
  ];
  SUBJECTS.forEach(sub => {
    const row = document.createElement('div');
    row.className = 'subject-row';
    if (sub.total === 0) {
      row.innerHTML = `
        <div class="subject-name">${sub.label}</div>
        <div class="subject-bar"></div>
        <div class="subject-meta no-data">敬请期待</div>
        <a class="go" href="${sub.href}">查看 →</a>`;
    } else {
      const pct = Math.round((sub.done / sub.total) * 100);
      row.innerHTML = `
        <div class="subject-name">${sub.label}</div>
        <div class="subject-bar"><div class="subject-bar-fill" style="width:${pct}%"></div></div>
        <div class="subject-meta">${sub.done}/${sub.total} (${pct}%)</div>
        <a class="go" href="${sub.href}">练习 →</a>`;
    }
    subjectsBox.appendChild(row);
  });

  // ---- Tabs ----
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    $('#tab-scores').style.display = t.dataset.tab === 'scores' ? '' : 'none';
    $('#tab-notes').style.display  = t.dataset.tab === 'notes'  ? '' : 'none';
  }));

  renderScoresTab(S);
  renderNotesTab(N);
}

function renderScoresTab(scores) {
  const root = $('#tab-scores');
  if (scores.length === 0) {
    root.innerHTML = '<div class="empty">还没有完成任何测试。<br><br><a href="/listening.html" class="btn">去做雅思听力 →</a></div>';
    return;
  }
  const byTest = {};
  scores.forEach(s => {
    if (!byTest[s.test_id]) byTest[s.test_id] = { best: s, attempts: 0, all: [] };
    const g = byTest[s.test_id];
    g.attempts++; g.all.push(s);
    if (s.score > g.best.score) g.best = s;
  });
  const rows = Object.values(byTest).sort((a,b) => new Date(b.best.finished_at) - new Date(a.best.finished_at));
  let html = `<table class="list"><thead><tr>
    <th>编号</th><th>题目</th><th>分组</th><th>最佳成绩</th><th>正确率</th><th>次数</th><th class="col-time">最近提交</th>
  </tr></thead><tbody>`;
  for (const r of rows) {
    const t = catalogById[r.best.test_id] || { title: '(未知)', section: '', frequency: '' };
    const pct = Math.round((r.best.score / r.best.total) * 100);
    const cls = pct >= 60 ? 'good' : 'bad';
    html += `<tr data-test-id="${r.best.test_id}">
      <td class="test-id">${r.best.test_id}</td>
      <td>${escapeHtml(t.title)}</td>
      <td><span class="badge ${t.frequency === 'high' ? 'high' : ''}">${t.section} ${t.frequency === 'high' ? '高频' : '非高频'}</span></td>
      <td class="score-cell ${cls}">${r.best.score}/${r.best.total}</td>
      <td class="score-cell ${cls}">${pct}%</td>
      <td>${r.attempts}</td>
      <td class="col-time">${fmtDate(r.best.finished_at)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  root.innerHTML = html;
  root.querySelectorAll('tbody tr').forEach(tr => {
    tr.addEventListener('click', () => location.href = `/listening.html#test=${tr.dataset.testId}`);
  });
}

function renderNotesTab(notes) {
  const root = $('#tab-notes');
  if (notes.length === 0) {
    root.innerHTML = '<div class="empty">还没有任何笔记。在做题页选中文字 → Note 即可保存。</div>';
    return;
  }
  const byTest = {};
  notes.forEach(n => { (byTest[n.test_id] = byTest[n.test_id] || []).push(n); });
  let html = '<div class="notes-list">';
  Object.keys(byTest).map(Number).sort((a,b) => a-b).forEach(tid => {
    const t = catalogById[tid] || { title: '(未知)', section: '' };
    html += `<div style="margin-top:14px;font-weight:600;font-size:.95em;color:var(--muted)">${tid}. ${t.section} · ${escapeHtml(t.title)}</div>`;
    byTest[tid].forEach(n => {
      html += `<div class="note-item">
        <div class="meta"><span>${fmtDate(n.updated_at)}</span></div>
        <div class="quote">${escapeHtml(n.quote)}</div>
        <div class="text">${escapeHtml(n.note_text)}</div>
      </div>`;
    });
  });
  html += '</div>';
  root.innerHTML = html;
}
</script>
</body>
</html>
