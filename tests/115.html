F","stronger bones"],["G","weight red"]],"questions":[["27","walking with thin-soled footwear"],["28","walking in the mountains"],["29","walking for the elderly"],["30","walking long distances"]]}],"answerKey":{"text":{},"single":{"q21":"B","q22":"A","q23":"B","q24":"A","q25":"C","q26":"B"},"multiple":{},"multipleMap":{},"matching":{"q27":"F","q28":"C","q29":"E","q30":"B"},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:10,440","html":"Section 3 You will hear two psychology students","cn":"第三部分。你将听到两名心理学学生","analysis":""},{"time":"00:00:10,440 --> 00:00:16,560","html":"called Katie and Daniel discussing how taking a walk can affect people's creativity and","cn":"Katie 和 Daniel 讨论散步如何影响人的创造力和","analysis":""},{"time":"00:00:16,560 --> 00:00:19,160","html":"physical well-being.","cn":"身体健康。","analysis":""},{"time":"00:00:19,160 --> 00:00:26,160","html":"First, you have some time to look at questions 21 to 26 on page 5.","cn":"首先，你有一些时间查看第5页的第21至第26题。","analysis":""},{"time":"00:00:49,160 --> 00:01:16,160","html":"Now listen carefully and answer questions 21 to 26.","cn":"现在请仔细听，并回答第21至第26题。","analysis":""},{"time":"00:01:19,160 --> 00:01:21,160","html":"Katie: Hi Daniel.","cn":"Katie：嗨，Daniel。","analysis":""},{"time":"00:01:21,160 --> 00:01:24,160","html":"Daniel: Katie, you look as if you're off somewhere.","cn":"Daniel：Katie，你看起来像是要去哪儿。","analysis":""},{"time":"00:01:24,160 --> 00:01:27,160","html":"Katie: Yes, I was just heading out for a walk.","cn":"Katie：是的，我正准备出去散步。","analysis":""},{"time":"00:01:27,160 --> 00:01:32,400","html":"Daniel: Funny, I was just reading an article about some research that's been done on the effects","cn":"Daniel：真巧，我刚读了一篇文章，讲的是关于散步对创造力影响的研究。","analysis":""},{"time":"00:01:32,400 --> 00:01:35,160","html":"of walking on creativity.","cn":"关于散步对创造力的影响。","analysis":"<strong>答案解析：<\/strong>第21题问 Daniel 为什么向 Katie 提到关于散步和创造力的研究。Katie 正好说要出去散步，这让 Daniel 想起刚读到的文章，所以答案是 <strong>B. what she says reminds him of it<\/strong>。"},{"time":"00:01:35,160 --> 00:01:37,160","html":"Katie: Sounds interesting.","cn":"Katie：听起来很有意思。","analysis":""},{"time":"00:01:37,160 --> 00:01:42,840","html":"Daniel: I've always found walking helped me think, but this article confirms that everybody can","cn":"Daniel：我一直觉得散步能帮助我思考，但这篇文章证实每个人都能","analysis":""},{"time":"00:01:42,840 --> 00:01:43,840","html":"benefit.","cn":"从中受益。","analysis":""},{"time":"00:01:43,840 --> 00:01:45,840","html":"Katie: Oh, tell me more.","cn":"Katie：哦，多说说。","analysis":""},{"time":"00:01:45,840 --> 00:01:51,840","html":"Daniel: OK, but I may even do some more research on it at some point, so don't pinch my idea.","cn":"Daniel：好，不过我以后可能还会对这个做更多研究，所以别抢我的想法。","analysis":""},{"time":"00:01:51,840 --> 00:01:52,840","html":"Katie: Promise.","cn":"Katie：保证不抢。","analysis":""},{"time":"00:01:52,840 --> 00:02:00,320","html":"Daniel: Well, in the experiments, the researchers tested participants' creativity by comparing how","cn":"Daniel：嗯，在实验中，研究人员通过比较参与者在散步时","analysis":""},{"time":"00:02:00,320 --> 00:02:05,760","html":"many ideas they thought of while they were walking compared to while they were doing","cn":"想出的点子数量，以及他们做其他活动时想出的点子数量，来测试创造力。","analysis":""},{"time":"00:02:05,760 --> 00:02:06,760","html":"other activities.","cn":"其他活动。","analysis":""},{"time":"00:02:06,760 --> 00:02:09,680","html":"Katie: What, like <mark style=\"background-color: #fecaca;\">listening to music<\/mark>?","cn":"Katie：什么，比如听音乐？","analysis":""},{"time":"00:02:09,680 --> 00:02:11,840","html":"Daniel: Nothing like that.","cn":"Daniel：不是那样的。","analysis":""},{"time":"00:02:11,840 --> 00:02:17,960","html":"But they did analyse the ideas participants came up with when <mark style=\"background-color: #bbf7d0;\">sitting<\/mark>, both outdoors and","cn":"不过他们确实分析了参与者坐着时想出的点子，包括在户外坐着和","analysis":""},{"time":"00:02:17,960 --> 00:02:19,800","html":"inside.","cn":"室内坐着。","analysis":""},{"time":"00:02:19,800 --> 00:02:25,280","html":"What I found surprising was that they didn't compare walking to other forms of exercise,","cn":"让我惊讶的是，他们没有把散步和其他运动形式进行比较，","analysis":""},{"time":"00:02:25,280 --> 00:02:27,600","html":"like <mark style=\"background-color: #fecaca;\">running<\/mark>, for example.","cn":"比如跑步。","analysis":"<strong>答案解析：<\/strong>第22题问实验中研究人员比较了参与者散步时和什么状态下的创造力。原文说 analysed ideas when <strong>sitting<\/strong>，所以答案是 <strong>A. sitting<\/strong>。"},{"time":"00:02:27,600 --> 00:02:28,600","html":"Katie: Right.","cn":"Katie：明白。","analysis":""},{"time":"00:02:28,600 --> 00:02:31,960","html":"So what was the difference between the experiments?","cn":"那这些实验之间有什么不同？","analysis":""},{"time":"00:02:31,960 --> 00:02:37,800","html":"Daniel: Well, in each one, the <mark style=\"background-color: #bbf7d0;\">activities were put together in different ways<\/mark>.","cn":"Daniel：嗯，在每个实验中，活动都是以不同方式组合的。","analysis":""},{"time":"00:02:37,800 --> 00:02:42,760","html":"All of the experiments specifically focused on the ability of participants to come up","cn":"所有实验都特别关注参与者提出","analysis":""},{"time":"00:02:42,760 --> 00:02:44,760","html":"with new ideas.","cn":"新想法的能力。","analysis":""},{"time":"00:02:44,760 --> 00:02:48,880","html":"Then the final experiment was a control test of sorts.","cn":"最后一个实验某种程度上是一个控制测试。","analysis":"<strong>答案解析：<\/strong>第23题问 Daniel 说每个实验有什么不同。原文说 activities were put together in <strong>different ways<\/strong>，所以答案是 <strong>B. pattern of activities<\/strong>。"},{"time":"00:02:48,880 --> 00:02:50,480","html":"Katie: Oh, right.","cn":"Katie：哦，明白。","analysis":""},{"time":"00:02:50,480 --> 00:02:56,760","html":"Daniel: In one experiment, participants had to think of unusual uses for three everyday objects","cn":"Daniel：在一个实验中，参与者必须在限定时间内想出三种日常物品的非常规用途。","analysis":""},{"time":"00:02:56,760 --> 00:02:58,240","html":"within a time limit.","cn":"在限定时间内。","analysis":""},{"time":"00:02:58,240 --> 00:02:59,720","html":"Katie: OK.","cn":"Katie：好的。","analysis":""},{"time":"00:02:59,720 --> 00:03:03,160","html":"Daniel: And then there was an experiment with words.","cn":"Daniel: 然后还有一个关于词语的实验。","analysis":""},{"time":"00:03:03,160 --> 00:03:05,360","html":"Katie: What did they ask them to do?","cn":"Katie: 他们让参与者做什么？","analysis":""},{"time":"00:03:05,360 --> 00:03:08,400","html":"Daniel: Pair words in unusual ways.","cn":"Daniel：以不同寻常的方式搭配词语。","analysis":""},{"time":"00:03:08,400 --> 00:03:11,480","html":"For example, the word sweet.","cn":"比如 sweet 这个词。","analysis":""},{"time":"00:03:11,480 --> 00:03:17,320","html":"If participants simply said sweet as sugar, that wasn't creative.","cn":"如果参与者只是说 sweet as sugar，那不算有创造力。","analysis":""},{"time":"00:03:17,320 --> 00:03:21,680","html":"But an answer like sweet as a cat with honey on its paws was.","cn":"但像 sweet as a cat with honey on its paws 这样的回答就算。","analysis":""},{"time":"00:03:21,680 --> 00:03:22,680","html":"Katie: OK.","cn":"Katie：好的。","analysis":""},{"time":"00:03:22,680 --> 00:03:25,640","html":"I can see why they'd ask them to do that.","cn":"我能理解为什么他们让参与者这么做。","analysis":""},{"time":"00:03:25,640 --> 00:03:26,640","html":"Daniel: Really?","cn":"Daniel：真的吗？","analysis":""},{"time":"00:03:26,640 --> 00:03:29,960","html":"I just don't see how the experiment is fair.","cn":"我只是看不出这个实验怎么公平。","analysis":""},{"time":"00:03:29,960 --> 00:03:31,240","html":"Katie: Why?","cn":"Katie：为什么？","analysis":""},{"time":"00:03:31,240 --> 00:03:34,800","html":"Because the conclusions are based only on the researchers' <mark style=\"background-color: #fecaca;\">opinion<\/mark>.","cn":"因为结论只是基于研究人员的意见。","analysis":""},{"time":"00:03:34,800 --> 00:03:40,080","html":"Daniel: I think it's more that anyone who'd studied <mark style=\"background-color: #bbf7d0;\">language<\/mark> would be at an advantage.","cn":"Daniel：我觉得更大的问题是，学过语言的人会占优势。","analysis":""},{"time":"00:03:40,080 --> 00:03:41,080","html":"Katie: OK.","cn":"Katie：好吧。","analysis":"<strong>答案解析：<\/strong>第24题问 Daniel 如何看待词语实验。原文中 Daniel 说学过 <strong>language<\/strong> 的人会有优势，说明实验偏向某些人，所以答案是 <strong>A. biased in favour of certain people<\/strong>。"},{"time":"00:03:41,080 --> 00:03:45,280","html":"Was there an experiment about focused thinking?","cn":"有没有关于集中思维的实验？","analysis":""},{"time":"00:03:45,280 --> 00:03:47,280","html":"Daniel: Yeah, there was.","cn":"Daniel：有。","analysis":""},{"time":"00:03:47,280 --> 00:03:51,480","html":"It aimed to find out if walking helped focused thinking.","cn":"它旨在弄清散步是否有助于集中思维。","analysis":""},{"time":"00:03:51,480 --> 00:03:57,480","html":"Though I wasn't sure that I agreed with their findings, they decided that walking doesn't","cn":"虽然我不确定自己是否同意他们的发现，但他们认为散步","analysis":""},{"time":"00:03:57,480 --> 00:03:59,680","html":"help this type of thinking.","cn":"对这种思维没有帮助。","analysis":""},{"time":"00:03:59,680 --> 00:04:01,280","html":"Katie: What evidence did they have?","cn":"Katie：他们有什么证据？","analysis":""},{"time":"00:04:01,280 --> 00:04:02,880","html":"Daniel: Well, that's it.","cn":"Daniel：问题就在这。","analysis":""},{"time":"00:04:02,920 --> 00:04:07,960","html":"I don't think there was enough <mark style=\"background-color: #bbf7d0;\">evidence<\/mark> to support their conclusions, even if their methods","cn":"我认为没有足够证据支持他们的结论，即使他们的方法","analysis":""},{"time":"00:04:07,960 --> 00:04:08,960","html":"were sound.","cn":"是合理的。","analysis":""},{"time":"00:04:08,960 --> 00:04:13,800","html":"Katie: Well, I'd certainly hesitate before making such a bold statement.","cn":"Katie：嗯，在做出这么大胆的结论前，我肯定会犹豫。","analysis":""},{"time":"00:04:13,800 --> 00:04:16,840","html":"Still, it's a first step, isn't it?","cn":"不过，这至少是第一步，对吧？","analysis":"<strong>答案解析：<\/strong>第25题问 Katie 和 Daniel 对集中思维实验的态度。Daniel 说证据不足，Katie 说会谨慎作出这样的大胆结论，所以答案是 <strong>C. they are cautious about its conclusions<\/strong>。"},{"time":"00:04:16,840 --> 00:04:22,440","html":"Daniel: I suppose to move forward with this, they'll need to test other ways people keep fit,","cn":"Daniel：我想要推进这项研究，他们需要测试人们保持健康的其他方式，","analysis":""},{"time":"00:04:22,440 --> 00:04:23,960","html":"like <mark style=\"background-color: #fecaca;\">swimming<\/mark>.","cn":"比如游泳。","analysis":""},{"time":"00:04:23,960 --> 00:04:29,560","html":"Katie: That would be useful, but personally, I'd like to know more about the <mark style=\"background-color: #bbf7d0;\">fundamental reason<\/mark>","cn":"Katie：那会有用，但就我个人而言，我更想了解它影响人们创造力的根本原因。","analysis":""},{"time":"00:04:29,560 --> 00:04:32,440","html":"for the effect on people's creativity.","cn":"对人们创造力产生影响的根本原因。","analysis":""},{"time":"00:04:32,440 --> 00:04:33,920","html":"Daniel: That would be good.","cn":"Daniel：那会很好。","analysis":""},{"time":"00:04:33,920 --> 00:04:37,960","html":"Then it could be applied more widely in work, for example.","cn":"比如那样就可以更广泛地应用到工作中。","analysis":""},{"time":"00:04:37,960 --> 00:04:43,920","html":"Katie: Again, that's secondary, really.","cn":"Katie：不过，那其实还是次要的。","analysis":"<strong>答案解析：<\/strong>第26题问 Katie 认为下一步最好考虑什么。原文说 she would like to know more about the <strong>fundamental reason<\/strong> for the effect on creativity，所以答案是 <strong>B. the cause of the improvement in creativity<\/strong>。"},{"time":"00:04:43,920 --> 00:04:50,840","html":"Before you hear the rest of the discussion, you have some time to look at questions 27-30","cn":"在听讨论剩余部分之前，你有一些时间查看第27至第30题，","analysis":""},{"time":"00:04:50,840 --> 00:04:51,760","html":"on page 6.","cn":"在第6页。","analysis":""},{"time":"00:05:02,440 --> 00:05:20,120","html":"Now listen and answer questions 27-30.","cn":"现在请听，并回答第27至第30题。","analysis":""},{"time":"00:05:20,120 --> 00:05:25,520","html":"Daniel: But how would you test walking if you wanted to assess its physical benefits?","cn":"Daniel：不过，如果你想评估散步的身体益处，你会如何测试？","analysis":""},{"time":"00:05:25,520 --> 00:05:31,520","html":"Katie: Well, firstly, I'd like to know more about the benefits of different situations.","cn":"Katie：嗯，首先，我想更多了解不同情境下的益处。","analysis":""},{"time":"00:05:31,520 --> 00:05:33,520","html":"Daniel: What about the effect of footwear?","cn":"Daniel：鞋子的影响怎么样？","analysis":""},{"time":"00:05:33,520 --> 00:05:35,200","html":"Katie: Hmm, hadn't thought of that.","cn":"Katie：嗯，我还没想到这一点。","analysis":""},{"time":"00:05:35,200 --> 00:05:40,160","html":"Daniel: Well, I've read that shoes with thinner soles were found to be better for people's","cn":"Daniel: 嗯，我读到过，鞋底较薄的鞋被发现对人的","analysis":""},{"time":"00:05:40,160 --> 00:05:41,160","html":"joints.","cn":"关节更好。","analysis":""},{"time":"00:05:41,160 --> 00:05:44,360","html":"It even made the <mark style=\"background-color: #bbf7d0;\">skeletal structure tougher<\/mark>.","cn":"它甚至会让骨骼结构更坚固。","analysis":""},{"time":"00:05:44,360 --> 00:05:45,360","html":"Katie: Interesting.","cn":"Katie: 有意思。","analysis":""},{"time":"00:05:45,360 --> 00:05:47,960","html":"Was that because they lost <mark style=\"background-color: #fecaca;\">weight<\/mark>?","cn":"是因为他们减重了吗？","analysis":""},{"time":"00:05:47,960 --> 00:05:50,280","html":"Daniel: Not as far as I'm aware.","cn":"Daniel: 据我所知不是。","analysis":"<strong>答案解析：<\/strong>第27题问穿薄底鞋散步的主要身体益处。原文说 made the skeletal structure tougher，即骨骼结构更强壮，所以答案是 <strong>F. stronger bones<\/strong>。"},{"time":"00:05:50,280 --> 00:05:52,880","html":"And then there's walking in the mountains.","cn":"然后还有山地散步。","analysis":""},{"time":"00:05:52,880 --> 00:05:54,880","html":"Katie: Walking in the mountains.","cn":"Katie: 山地散步。","analysis":""},{"time":"00:05:54,880 --> 00:05:58,360","html":"Hmm, I think I've read something about that.","cn":"嗯，我好像读过一些相关内容。","analysis":""},{"time":"00:05:58,360 --> 00:06:02,880","html":"Doesn't altitude help people regulate their <mark style=\"background-color: #fecaca;\">sleep patterns<\/mark>?","cn":"海拔不是能帮助人们调节睡眠模式吗？","analysis":""},{"time":"00:06:02,880 --> 00:06:05,560","html":"Daniel: It's more that it improves your <mark style=\"background-color: #bbf7d0;\">vision<\/mark>.","cn":"Daniel: 更准确地说，它能改善视力。","analysis":""},{"time":"00:06:05,560 --> 00:06:07,760","html":"Katie: It must be those breathtaking views.","cn":"Katie: 一定是因为那些令人惊叹的景色。","analysis":"<strong>答案解析：<\/strong>第28题问在山里散步的主要身体益处。原文说 it improves your <strong>vision<\/strong>，所以答案是 <strong>C. better eyesight<\/strong>。"},{"time":"00:06:07,760 --> 00:06:08,760","html":"Daniel: Yeah.","cn":"Daniel：是的。","analysis":""},{"time":"00:06:08,760 --> 00:06:13,040","html":"Katie: And what about the effect that walking has for elderly people?","cn":"Katie: 那散步对老年人的影响呢？","analysis":""},{"time":"00:06:13,040 --> 00:06:15,520","html":"Daniel: Better <mark style=\"background-color: #fecaca;\">balance<\/mark> by any chance?","cn":"Daniel: 会不会是更好的平衡能力？","analysis":""},{"time":"00:06:15,520 --> 00:06:17,120","html":"Katie: More than that.","cn":"Katie：不止这个。","analysis":""},{"time":"00:06:17,120 --> 00:06:22,440","html":"It had a positive effect by helping them maintain their body clocks' natural rhythm, both","cn":"它有积极影响，能帮助他们维持生物钟的自然节律，","analysis":""},{"time":"00:06:22,440 --> 00:06:25,360","html":"when going to bed and waking up.","cn":"包括入睡和醒来时。","analysis":""},{"time":"00:06:25,360 --> 00:06:26,680","html":"Daniel: Right.","cn":"Daniel：明白。","analysis":"<strong>答案解析：<\/strong>第29题问老年人散步的主要身体益处。原文说 maintain their body clocks' natural rhythm when going to bed and waking up，所以答案是 <strong>E. regular sleeping pattern<\/strong>。"},{"time":"00:06:26,680 --> 00:06:29,760","html":"And what about the effect of walking long distances?","cn":"那长距离散步的影响呢？","analysis":""},{"time":"00:06:29,760 --> 00:06:35,840","html":"Katie: Well, a person needs to find the balance between their optimum speed and their natural breathing","cn":"Katie：嗯，一个人需要在最佳速度和自然呼吸模式之间找到平衡。","analysis":""},{"time":"00:06:35,840 --> 00:06:37,160","html":"pattern.","cn":"呼吸模式。","analysis":""},{"time":"00:06:37,160 --> 00:06:41,920","html":"Once they're synchronized, they can just keep on going for <mark style=\"background-color: #bbf7d0;\">much longer periods<\/mark> than they","cn":"一旦二者同步，他们就能比以前持续走更长时间。","analysis":""},{"time":"00:06:41,920 --> 00:06:42,920","html":"could before.","cn":"比以前更久。","analysis":""},{"time":"00:06:42,920 --> 00:06:43,920","html":"Daniel: Hmm.","cn":"Daniel：嗯。","analysis":""},{"time":"00:06:43,920 --> 00:06:46,120","html":"I can see how that would work.","cn":"我能理解这为什么有效。","analysis":"<strong>答案解析：<\/strong>第30题问长距离散步的主要身体益处。原文说可以 keep on going for <strong>much longer periods<\/strong>，说明耐力增强，所以答案是 <strong>B. greater stamina<\/strong>。"},{"time":"00:06:46,120 --> 00:06:47,840","html":"But anyway.","cn":"不过，无论如何。","analysis":""},{"time":"00:06:47,840 --> 00:06:53,480","html":"That is the end of section three.","cn":"第三部分到此结束。","analysis":""},{"time":"00:06:53,480 --> 00:06:56,560","html":"You now have half a minute to check your answers.","cn":"现在你有半分钟检查答案。","analysis":""},{"time":"00:07:23,480 --> 00:07:29,960","html":"Now turn to section four on page seven.","cn":"现在请翻到第7页第四部分。","analysis":""}],"transcriptHighlights":[{"qid":"21","text":"what she says reminds him of it.","answer":"B"},{"qid":"22","text":"sitting.","answer":"A"},{"qid":"23","text":"pattern of activities.","answer":"B"},{"qid":"24","text":"biased in favour of certain people.","answer":"A"},{"qid":"25","text":"they are cautious about its conclusions.","answer":"C"},{"qid":"26","text":"the cause of the improvement in creativity.","answer":"B"},{"qid":"27","text":"stronger bones","answer":"F"},{"qid":"28","text":"better eyesight","answer":"C"},{"qid":"29","text":"regular sleeping pat","answer":"E"},{"qid":"30","text":"greater stamina","answer":"B"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

function norm(s){return String(s).normalize('NFKC').trim().toLowerCase().replace(/[‘’`´]/g,"'").replace(/'/g,'').replace(/\s+/g,' ')}function answerVariants(s){return String(s||'').split(/\s*\/\s*/).map(x=>x.trim()).filter(Boolean)}function rangeIds(id){let [a,b]=id.split('-').map(Number),out=[];for(let n=a;n<=b;n++)out.push(String(n));return out}function isCorrect(q){let user=norm(getAnswer(q));return answerVariants(correctAnswer(q)).some(ans=>user===norm(ans))}

window.finishTest=function(){if(!review)finish()};window.toggleFinishMode=finish;window.resetTest=function(){review=false;currentCue=-1;dictationMode=false;showOriginal=true;showCn=true;showAnalysis=true;dictationAnswers={};$('#finish').textContent='Finish';$('#main').classList.remove('split');document.body.classList.remove('notes-open');$$('.review').forEach(r=>r.remove());$$('.choice').forEach(c=>c.classList.remove('selected','disabled'));$$('input').forEach(i=>{i.disabled=false;i.value='';i.defaultValue=''});$$('.slot').forEach(s=>s.innerHTML='');$$('#nav [data-q]').forEach(n=>n.className='');clearUserHighlights();$('#notesList').innerHTML='';resetAppearance(false);if(audio){audio.pause();audio.currentTime=0;$('#fillbar').style.width='0%';$('#time').textContent='00:00 / 00:00'}secs=0;drawTimer();clearInterval(timer);timer=setInterval(()=>{secs++;drawTimer();if(secs%5===0)save(false)},1000);refreshPool();restoreDragging();updateNav();clearAllProgress()};window.App={state:{get isReviewing(){return review},get review(){return review}},config:{answerKey:CONFIG_DATA.answerKey,questionList:CONFIG_DATA.questionList},finishTest:window.finishTest,toggleFinishMode:window.toggleFinishMode,resetTest:window.resetTest,generateResultsTable};
function highlightTerms(){let terms=[];for(let item of DATA.transcriptHighlights||[]){let text=typeof item==='string'?item:item.text;if(text){terms.push(String(text));String(text).split(/\s+/).map(w=>w.replace(/[^A-Za-z0-9'-]/g,'')).filter(w=>w.length>=5&&!/^(which|three|answer|letter|about|their|there|would|could|should)$/i.test(w)).forEach(w=>terms.push(w))}}return [...new Set(terms.map(t=>t.trim()).filter(t=>t.length>1))].sort((a,b)=>b.length-a.length)}
function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',g.instruction||'',g.questionText||'',(g.options||[]),(g.questions||[]).map(q=>JSON.stringify(q))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}

const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;

function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}

$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
