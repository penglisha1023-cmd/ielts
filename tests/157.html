______","list":false,"level":0},{"text":"Step 2. 28. ______ further on the topic","list":false,"level":0},{"text":"Step 3. Put a 29. ______ for every picture and support it","list":false,"level":0},{"text":"Step 4. Every slide illustrates a thought, all the thoughts link together","list":false,"level":0},{"text":"Step 5. Write 30. ______","list":false,"level":0}]}],"answerKey":{"text":{},"single":{"q21":"A","q22":"A","q23":"C","q24":"B","q25":"A","q26":"C"},"multiple":{},"multipleMap":{},"matching":{"q27":"D","q28":"G","q29":"E","q30":"A"},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:16,000","html":"You will hear two students named Mona and Ted talking about a presentation on design development.","cn":"你将听到两名学生 Mona 和 Ted 讨论一个关于设计发展的展示。","analysis":""},{"time":"00:00:16,000 --> 00:00:21,000","html":"First, you have some time to look at questions 21 to 26.","cn":"首先，你有一些时间浏览第21到26题。","analysis":""},{"time":"00:00:30,000 --> 00:00:57,000","html":"Now listen carefully and answer questions 21 to 26.","cn":"现在请仔细听，并回答第21到26题。","analysis":""},{"time":"00:00:57,000 --> 00:01:02,000","html":"Mona: Ted, you've looked at my presentation, haven't you? What do you think of it?","cn":"Mona：Ted，你已经看过我的展示了，对吧？你觉得怎么样？","analysis":""},{"time":"00:01:02,000 --> 00:01:08,000","html":"Ted: Hey, Mona. Yes, I have. Before giving you some advice, I have a question.","cn":"Ted：嘿，Mona。是的，我看过了。在给你一些建议之前，我有个问题。","analysis":""},{"time":"00:01:08,000 --> 00:01:15,000","html":"Why didn't you write about the development of design and its influence or connection with <mark style=\"background-color: #fecaca;\">social advancement<\/mark> or even <mark style=\"background-color: #fecaca;\">art movement<\/mark>?","cn":"你为什么没有写设计的发展及其与社会进步甚至艺术运动的影响或联系呢？","analysis":""},{"time":"00:01:15,000 --> 00:01:19,000","html":"In my opinion, this direction would have more significance.","cn":"在我看来，这个方向会更有意义。","analysis":""},{"time":"00:01:19,000 --> 00:01:29,000","html":"Mona: Actually, I just want to focus on the history of design. I'm particularly interested in its history <mark style=\"background-color: #bbf7d0;\">from the 1800s<\/mark>. That's why I wrote about it.","cn":"Mona：实际上，我只是想专注于设计史。我尤其对19世纪以来的设计史感兴趣。所以我才写了这个。","analysis":"<strong>答案解析：<\/strong>第21题问 Mona 的展示主题是什么。Mona 说自己想聚焦 design history，并且 particularly interested in its history from the 1800s，对应 A “design development from 1800s”。social advancement 和 art movement 是 Ted 建议但 Mona 没写的方向。"},{"time":"00:01:29,000 --> 00:01:32,000","html":"Ted: I see. It could save some effort.","cn":"Ted：我明白了。这样可能会省些力气。","analysis":""},{"time":"00:01:32,000 --> 00:01:41,000","html":"Mona: Not really. I've covered different areas of design such as building, clothing and products. It's a lot of work.","cn":"Mona：并不是。我涵盖了设计的不同领域，比如建筑、服装和产品。这工作量很大。","analysis":""},{"time":"00:01:41,000 --> 00:01:45,000","html":"Ted: Right. Is it because you want to give a <mark style=\"background-color: #fecaca;\">comprehensive talk<\/mark>?","cn":"Ted：明白。是因为你想做一个全面的展示吗？","analysis":""},{"time":"00:01:45,000 --> 00:01:53,000","html":"Mona: To be honest, I was worried about my <mark style=\"background-color: #bbf7d0;\">teacher's reaction<\/mark>. If I only talk about one area, she might think I've been lazy.","cn":"Mona：说实话，我担心老师的反应。如果我只讲一个领域，她可能会觉得我偷懒。","analysis":"<strong>答案解析：<\/strong>第22题问 Mona 为什么不只讲一个主题。她说 worried about my teacher's reaction，担心只讲一个领域会被认为懒，对应 A。comprehensive talk 是 Ted 的猜测，被 Mona 纠正。"},{"time":"00:01:53,000 --> 00:02:04,000","html":"Ted: You know what? Even though it's okay to talk about different aspects, I think the topic is <mark style=\"background-color: #bbf7d0;\">too broad<\/mark>. It would be hard for the listeners to focus on any specific area.","cn":"Ted：你知道吗？虽然讲不同方面没问题，但我觉得这个主题太宽泛了。听众很难集中在某个具体领域上。","analysis":""},{"time":"00:02:05,000 --> 00:02:12,000","html":"Mona: You are right. I only have about 45 minutes for the talk. Maybe I should narrow the range.","cn":"Mona：你说得对。我只有大约45分钟来讲。也许我应该缩小范围。","analysis":"<strong>答案解析：<\/strong>第23题问 Ted 如何评价 Mona 的主题。Ted 明确说 the topic is too broad，对应 C。"},{"time":"00:02:12,000 --> 00:02:21,000","html":"Ted: That would be much better. And you can use <mark style=\"background-color: #fecaca;\">computer technology<\/mark> to assist you in your presentation, like using the CAD or other computer software.","cn":"Ted：那会好很多。你还可以用计算机技术辅助展示，比如使用 CAD 或其他计算机软件。","analysis":""},{"time":"00:02:21,000 --> 00:02:31,000","html":"Mona: I'm not sure. Although computer technology can <mark style=\"background-color: #fecaca;\">improve the visual effects<\/mark> of my presentation, I'd rather use the traditional way since I'm talking about the history of design.","cn":"Mona：我不确定。虽然计算机技术可以提升展示的视觉效果，但既然我讲的是设计史，我更愿意使用传统方式。","analysis":""},{"time":"00:02:31,000 --> 00:02:37,000","html":"I guess <mark style=\"background-color: #bbf7d0;\">traditional media is more affected by computers<\/mark>, rather than designing industry.","cn":"我认为传统媒体受计算机影响更大，而不是设计行业。","analysis":"<strong>答案解析：<\/strong>第24题问 Mona 对电脑的看法。她说 traditional media is more affected by computers，对应 B “They have influenced traditional media”。improve visual effects 是展示效果，不是她对电脑影响的观点。"},{"time":"00:02:37,000 --> 00:02:45,000","html":"Ted: That makes sense. You could do it your own way. As for the content, you mentioned purism, and you said it can <mark style=\"background-color: #fecaca;\">save people's effort<\/mark>.","cn":"Ted：有道理。你可以按自己的方式来。至于内容，你提到了纯粹主义，并说它可以节省人们的精力。","analysis":""},{"time":"00:02:45,000 --> 00:02:49,000","html":"I don't really agree with that. I think it's not really easy to achieve.","cn":"我不太同意。我认为它其实并不容易实现。","analysis":""},{"time":"00:02:49,000 --> 00:02:56,000","html":"On the other hand, I do think it's important to apply this concept in <mark style=\"background-color: #bbf7d0;\">architecture<\/mark>. I mean the building should look simple and elegant.","cn":"另一方面，我确实认为把这个概念应用到建筑中很重要。我的意思是，建筑应该看起来简洁而优雅。","analysis":"<strong>答案解析：<\/strong>第25题问 Ted 对 purism 的看法。他不同意它能省力，但认为它在 architecture 中很重要，对应 A。"},{"time":"00:02:56,000 --> 00:03:01,000","html":"Mona: That's a good point. Ted, what do you think I should do to further improve my talk?","cn":"Mona：这是个好观点。Ted，你觉得我还应该怎么进一步改进我的展示？","analysis":""},{"time":"00:03:01,000 --> 00:03:09,000","html":"Ted: Well, I think you have read enough books about it. So it's not the theories that you lack. Why don't you visit the <mark style=\"background-color: #bbf7d0;\">design museum<\/mark> in the north of the city?","cn":"Ted：嗯，我觉得你已经读了足够多关于这个主题的书。所以你缺的不是理论。为什么不去城北的设计博物馆看看呢？","analysis":""},{"time":"00:03:09,000 --> 00:03:17,000","html":"One of my friends went there last month, and he said it was worth it. I'm sure it can give you some inspiration.","cn":"我的一个朋友上个月去了那里，他说很值得。我相信它能给你一些灵感。","analysis":"<strong>答案解析：<\/strong>第26题问 Ted 建议 Mona 做什么。他说 Why don't you visit the design museum，对应 C “visit a museum”。他提到朋友只是提供评价，不是建议 Mona 去见朋友；books 已经读够，不需要再读更多。"},{"time":"00:03:17,000 --> 00:03:24,000","html":"Before you hear the rest of the discussion, you have some time to look at questions 27-30.","cn":"在你听讨论剩余部分之前，你有一些时间浏览第27到30题。","analysis":""},{"time":"00:03:24,000 --> 00:03:47,000","html":"Now listen and answer questions 27-30.","cn":"现在请听，并回答第27到30题。","analysis":""},{"time":"00:03:48,000 --> 00:03:54,000","html":"Mona: How do you usually prepare for a presentation? You have done it many times, right?","cn":"Mona：你通常怎么准备展示？你已经做过很多次了，对吧？","analysis":""},{"time":"00:03:54,000 --> 00:04:02,000","html":"Ted: You can say that. When I prepare for a presentation, I would first try to come up with an <mark style=\"background-color: #bbf7d0;\">introduction<\/mark> telling the audience what my topic is.","cn":"Ted：可以这么说。当我准备展示时，我首先会想出一个介绍，告诉听众我的主题是什么。","analysis":""},{"time":"00:04:02,000 --> 00:04:07,000","html":"It's very important to grasp people's attention and let them know what you want to talk about.","cn":"抓住听众的注意力，并让他们知道你想讲什么，这非常重要。","analysis":""},{"time":"00:04:07,000 --> 00:04:12,000","html":"Mona: Okay, I think so. A good beginning can mean everything.","cn":"Mona：好的，我也这么认为。一个好的开头可能意味着一切。","analysis":"<strong>答案解析：<\/strong>第27题对应 Step 1。Ted 说首先写 introduction，告诉听众主题，对应 D “an introduction”。"},{"time":"00:04:12,000 --> 00:04:22,000","html":"Ted: Exactly. Maybe you could use a story to start. Step two, I would <mark style=\"background-color: #bbf7d0;\">research deeper into the topic<\/mark> and give the audience something new.","cn":"Ted：没错。也许你可以用一个故事开头。第二步，我会对主题进行更深入的研究，并给听众一些新的内容。","analysis":""},{"time":"00:04:22,000 --> 00:04:31,000","html":"Mona: Yeah, that's what I've been working on. I always try to look for more related information online. I want them to learn something from my presentation.","cn":"Mona：是的，这正是我一直在做的。我总是努力在网上寻找更多相关信息。我希望他们能从我的展示中学到东西。","analysis":"<strong>答案解析：<\/strong>第28题对应 Step 2。Ted 说 research deeper into the topic，对应 G “research”。"},{"time":"00:04:31,000 --> 00:04:38,000","html":"Ted: Since you work so hard, they will like it. I noticed that you use a lot of pictures in your slides.","cn":"Ted：既然你这么努力，他们会喜欢的。我注意到你的幻灯片里用了很多图片。","analysis":""},{"time":"00:04:38,000 --> 00:04:45,000","html":"What I would do is put a <mark style=\"background-color: #bbf7d0;\">statement<\/mark> under each picture so the audience would know what exactly the pictures are about.","cn":"我会在每张图片下放一句说明，这样听众就会知道这些图片具体讲的是什么。","analysis":""},{"time":"00:04:45,000 --> 00:04:52,000","html":"Mona: I just thought it would be more impressive to use only pictures. All right, I will add that.","cn":"Mona：我原以为只用图片会更有冲击力。好吧，我会加上说明。","analysis":"<strong>答案解析：<\/strong>第29题对应 Step 3。Ted 建议在每张图片下放 statement，对应 E “statement”。"},{"time":"00:04:52,000 --> 00:05:02,000","html":"Ted: In the next step, you should try illustrating slide by slide. Each slide should only contain one thought or idea so all of these thoughts will link together in your illustration.","cn":"Ted：下一步，你应该尝试逐张幻灯片进行说明。每张幻灯片只包含一个想法或观点，这样所有想法就能在你的说明中连接起来。","analysis":""},{"time":"00:05:02,000 --> 00:05:05,000","html":"Mona：This step would need a lot of practice.","cn":"Mona：这一步需要大量练习。","analysis":""},{"time":"00:05:05,000 --> 00:05:12,000","html":"Ted：Exactly. A lot of practices needed before you stand in front of the real audience is one final step you should not forget.","cn":"Ted：没错。在真正面对观众之前需要大量练习，这是你不应忘记的最后步骤之一。","analysis":""},{"time":"00:05:12,000 --> 00:05:17,000","html":"I suggest you prepare some <mark style=\"background-color: #bbf7d0;\">text handouts<\/mark> with important details.","cn":"我建议你准备一些包含重要细节的文字讲义。","analysis":""},{"time":"00:05:17,000 --> 00:05:19,000","html":"Mona: What are they for?","cn":"Mona：它们是做什么用的？","analysis":""},{"time":"00:05:19,000 --> 00:05:23,000","html":"Ted: The audience can reflect on what you talk about in and after your presentation.","cn":"Ted：听众可以在展示中和展示后回顾你讲的内容。","analysis":""},{"time":"00:05:23,000 --> 00:05:29,000","html":"Mona: I've never thought about that. Thank you so much. Ted, you're a great help.","cn":"Mona：我从没想过这一点。非常感谢你。Ted，你帮了大忙。","analysis":"<strong>答案解析：<\/strong>第30题对应 Step 5。Ted 建议准备 text handouts with important details，方便听众回顾，所以答案是 A “text handouts”。"},{"time":"00:05:29,000 --> 00:05:32,000","html":"Ted: No problem, Mona.","cn":"Ted：不客气，Mona。","analysis":""},{"time":"00:05:32,000 --> 00:05:39,000","html":"That is the end of section 3. You now have half a minute to check your answers.","cn":"第三部分到此结束。现在你有半分钟时间检查答案。","analysis":""},{"time":"00:06:02,000 --> 00:06:04,000","html":"Thank you.","cn":"谢谢。","analysis":""}],"transcriptHighlights":[{"qid":"21","text":"design development from 1800s","answer":"A"},{"qid":"22","text":"She is afraid of her tutor's response","answer":"A"},{"qid":"23","text":"Too broad","answer":"C"},{"qid":"24","text":"They have influenced traditional media","answer":"B"},{"qid":"25","text":"It's important for architecture","answer":"A"},{"qid":"26","text":"visit a museum","answer":"C"},{"qid":"27","text":"an introduction","answer":"D"},{"qid":"28","text":"research","answer":"G"},{"qid":"29","text":"statement","answer":"E"},{"qid":"30","text":"text handouts","answer":"A"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>
<script>
const DATA=JSON.parse(document.getElementById('test-data').textContent);const $=s=>document.querySelector(s);const $$=s=>[...document.querySelectorAll(s)];const RENDER_VERSION=8;
let secs=0,review=false,timer=setInterval(()=>{secs++;drawTimer();if(secs%5===0)save(false)},1000),drag=null,currentCue=-1,loopCue=false,slowCue=false,showCn=true,showAnalysis=true,dictationMode=false,showOriginal=true,dictationAnswers={};const storeKey='ielts_v4_'+DATA.title.replace(/\W+/g,'_');
const CONFIG_DATA={answerKey:DATA.answerKey,questionList:DATA.questionIds.map(q=>Number(q)||q),localStorageKey:storeKey};window.localStorageKey=storeKey;window.DATA=DATA;window.CONFIG_DATA=CONFIG_DATA;
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function matchingRepeatAttr(g){return (g.questions||[]).length>(g.options||[]).length?' data-repeat="true"':''}
function flowQuestionMap(g){let map={};(g.questions||[]).forEach(q=>map[q[0]]=q[1]);return map}
function renderFlowText(raw,qid){let html=esc(String(raw||'')).replace(new RegExp(`(?<!\\d)${qid}(?!\\d)`),`<span class="flow-num">${qid}</span>`);html=html.replace(/(?:_{2,}|…{2,}|\.{4,})/,`<span class="slot" data-q="${qid}"></span>`);if(!/<span class="slot"/.test(html))html+=` <span class="slot" data-q="${qid}"></span>`;return html}
function renderFlowSteps(g){let qmap=flowQuestionMap(g),used=new Set(),lines=(g.bodyLines&&g.bodyLines.length?g.bodyLines:[]);if(lines.length){return lines.map(line=>{let raw=String((typeof line==='object'&&line?line.text:line)||''),qid=Object.keys(qmap).find(id=>new RegExp(`(?<!\\d)${id}(?!\\d)`).test(raw));if(qid){used.add(qid);return `<div class="flow-step flow-step-full"><div class="flow-text">${renderFlowText(raw,qid)}</div></div>`}return `<div class="flow-note">${esc(raw)}</div>`}).join('')+(g.questions||[]).filter(q=>!used.has(q[0])).map(q=>`<div class="flow-step"><div class="flow-num">${q[0]}</div><div class="flow-text">${esc(q[1])}</div><span class="slot" data-q="${q[0]}"></span></div>`).join('')}return g.questions.map((q,idx)=>`<div class="flow-step"><div class="flow-num">${q[0]}</div><div class="flow-text">${esc(q[1])}</div><span class="slot" data-q="${q[0]}"></span></div>${idx<g.questions.length-1?'<div class="flow-arrow">↓</div>':''}`).join('')}
function groupHTML(g){if(g.type==='matching'&&g.layout==='flow')return `<section class="group"${matchingRepeatAttr(g)}><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="flow-layout"><div class="flow-steps">${renderFlowSteps(g)}</div><div><strong>${esc(g.optionsTitle||'Options')}</strong><div class="pool">${g.options.map(o=>`<div class="drag" draggable="true" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</div></div></div></section>`;
if(g.type==='matching'&&g.layout==='diagram')return `<section class="group"${matchingRepeatAttr(g)}><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="map-layout"><div class="map-image"><img src="${esc(g.image||'diagram.png')}" alt="Diagram"></div><div class="matching"><div>${g.questions.map(q=>`<div class="match-row"><strong>${q[0]}</strong><span>${esc(q[1])}</span><span class="slot" data-q="${q[0]}"></span></div>`).join('')}</div><div><strong>${esc(g.optionsTitle||'Options')}</strong><div class="pool">${g.options.map(o=>`<div class="drag" draggable="true" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</div></div></div></div></section>`;
if(g.type==='matching')return `<section class="group"${matchingRepeatAttr(g)}><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="matching"><div>${g.questions.map(q=>`<div class="match-row"><strong>${q[0]}</strong><span>${esc(q[1])}</span><span class="slot" data-q="${q[0]}"></span></div>`).join('')}</div><div><strong>${esc(g.optionsTitle||'Options')}</strong><div class="pool">${g.options.map(o=>`<div class="drag" draggable="true" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</div></div></div></section>`;
if(g.type==='map')return `<section class="group"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="map-layout"><div class="map-image"><img src="${esc(g.image||'map.png')}" alt="Map"></div><div class="map-grid"><div class="map-answer-list">${g.questions.map(q=>`<div class="map-row"><div class="map-row-label"><strong>${q[0]}</strong> ${esc(q[1]||'')}</div><div class="map-options">${(g.options||['A','B','C','D','E','F','G','H','I']).map(o=>`<div class="choice map-choice" data-name="q${q[0]}" data-value="${o}">${o}</div>`).join('')}</div></div>`).join('')}</div></div></div></section>`;
if(g.type==='single')return `<section class="group"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div>${g.questions.map(q=>`<p><strong>${q.id}</strong> ${esc(q.text)}</p>${q.options.map(o=>`<div class="choice single-choice" data-name="q${q.id}" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}`).join('')}</section>`;
if(g.type==='multiple')return `<section class="group" data-limit="${g.limit}" data-id="${g.id}"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><p><strong>${esc(g.id)}</strong> ${esc(g.questionText)}</p>${g.options.map(o=>`<div class="choice multi-choice" data-name="q${g.id.replace('-','_')}" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</section>`;
return `<section class="group"><h3>${esc(g.title)}</h3>${renderFillGroup(g)}</section>`}
function renderFillGroup(g){let qids=(g.questions||[]).map(q=>String(q.id));let used=new Set();let lines=(g.bodyLines&&g.bodyLines.length?g.bodyLines:g.questions.map(q=>`${q.id} ${q.text} _____`));let html='',i=0;while(i<lines.length){let meta=typeof lines[i]==='object'&&lines[i]?lines[i]:{};if(meta.table){let table=meta.table,chunk=[];while(i<lines.length){let m=typeof lines[i]==='object'&&lines[i]?lines[i]:{};if(m.table!==table)break;chunk.push(lines[i++])}html+=renderFillTable(chunk,qids,used);continue}html+=renderFillLine(lines[i++],qids,used)}return html||`<div class="instruction">${esc(g.instruction||'Complete the notes below.')}</div>`}

function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',(g.questions||[]).map(q=>String(q.id||q[0]||''))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}
function clearUserHighlights(){$$('.hl-brown,.hl-rose,.hl-blue').forEach(unwrap)}
function createNote(span){let id=span.dataset.hid;if($(`.note-card[data-hid="${id}"]`))return;let card=document.createElement('div');card.className='note-card';card.dataset.hid=id;card.innerHTML=`<div class="note-quote">${esc(span.textContent.slice(0,120))}</div><textarea placeholder="Write note here..."></textarea><button class="delete-note" type="button">Delete</button>`;$('#notesList').prepend(card);bindNoteDeletes()}
function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}
function removeNote(id){if(!id)return;$(`.note-card[data-hid="${id}"]`)?.remove()}
function drawTimer(){let m=Math.floor(secs/60),s=secs%60;$('#timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}
function adjustFontSize(delta){setFontSize(currentFontSize()+delta,true)}
function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}
function resetAppearance(persist=true){document.body.classList.remove('dark');setFontSize(DEFAULT_FONT_SIZE,false);updateSizeButtons();if(persist)save(false)}
function clearAllProgress(){localStorage.removeItem(storeKey)}
$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
const audio=$('#audio');$('#play').onclick=()=>audio.paused?audio.play():audio.pause();audio.onplay=()=>$('#play').textContent='⏸';audio.onpause=()=>$('#play').textContent='▶';audio.ontimeupdate=()=>{if(audio.duration)$('#fillbar').style.width=(audio.currentTime/audio.duration*100)+'%';$('#time').textContent=`${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${audio.duration?Math.floor(audio.duration/60):'00'}:${audio.duration?String(Math.floor(audio.duration%60)).padStart(2,'0'):'00'}`;maintainCueLoop()};$('#speed').onchange=e=>{slowCue=false;audio.playbackRate=+e.target.value;save(false)};$('#bar').onclick=e=>{if(audio.duration){let r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;save(false)}};
bindGlobal();render();
</script>
