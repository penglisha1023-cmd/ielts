esearch for a presentation on a new building.","cn":"他们叫 John 和 Debbie，正在讨论一场关于一栋新建筑的展示所需的研究内容。","analysis":""},{"time":"00:00:17,000 --> 00:00:24,000","html":"First, you have some time to look at questions 21 to 26 on page 5.","cn":"首先，你有一些时间查看第5页的问题21到26。","analysis":""},{"time":"00:00:30,000 --> 00:00:59,000","html":"Now listen carefully and answer questions 21 to 26.","cn":"现在请仔细听，并回答问题21到26。","analysis":""},{"time":"00:01:01,000 --> 00:01:03,000","html":"Debbie: Hi, John.","cn":"Debbie：嗨，John。","analysis":""},{"time":"00:01:03,000 --> 00:01:06,000","html":"John: Hi, Debbie. Should we get ready for our presentation?","cn":"John：嗨，Debbie。我们该准备一下展示了吗？","analysis":""},{"time":"00:01:06,000 --> 00:01:12,000","html":"Debbie: Yes. Well, we have to give a presentation to our seminar group about Education House,","cn":"Debbie：是的。我们要给研讨小组做一个关于 Education House 的展示，","analysis":""},{"time":"00:01:12,000 --> 00:01:17,000","html":"the new government building that uses cooling, heating and water in an environmentally friendly way.","cn":"这是一栋新的政府建筑，它以环保的方式使用制冷、供暖和水资源。","analysis":""},{"time":"00:01:17,000 --> 00:01:22,000","html":"John：Let's start with a diagram of the building so the other students can see what it looks like.","cn":"John：我们先从这栋建筑的图示开始，这样其他学生就能看到它的样子。","analysis":""},{"time":"00:01:22,000 --> 00:01:29,000","html":"Debbie：Well, here's a very simplified diagram with symbols to represent key areas of the design.","cn":"Debbie：这里有一张非常简化的图，用符号表示设计中的关键区域。","analysis":""},{"time":"00:01:29,000 --> 00:01:32,000","html":"John：Shall we look at it and see if we can explain the different processes?","cn":"John：我们看一下它，看看能不能解释不同的过程吧？","analysis":""},{"time":"00:01:32,000 --> 00:01:37,000","html":"Debbie: Yes, firstly, on the left-hand side of the roof, there's a cooling tower.","cn":"Debbie：好，首先，屋顶左侧有一个冷却塔。","analysis":""},{"time":"00:01:37,000 --> 00:01:42,000","html":"John: Yes, this is where <mark style=\"background-color: #bbf7d0;\">hot stale air from inside the building rises naturally up a chimney<\/mark>.","cn":"John：是的，这里是<mark style=\"background-color: #bbf7d0;\">建筑内部又热又不新鲜的空气自然沿烟囱上升<\/mark>的地方。","analysis":"<strong>答案解析：<\/strong>第21题对应屋顶左侧的 cooling tower。原文说建筑内部的旧空气从这里上升排出，所以答案是 <strong>F. old air is removed<\/strong>。"},{"time":"00:01:42,000 --> 00:01:46,000","html":"Are there exhaust fans mounted on the roof that push the air out?","cn":"屋顶上是不是装有排风扇把空气推出去？","analysis":""},{"time":"00:01:46,000 --> 00:01:52,000","html":"Debbie: Okay, moving along the top of the roof to the right-hand side, we have the weather station.","cn":"Debbie：好，沿着屋顶顶部往右侧看，是气象站。","analysis":""},{"time":"00:01:52,000 --> 00:01:55,000","html":"This <mark style=\"background-color: #bbf7d0;\">monitors how cool the outside air is<\/mark>.","cn":"它<mark style=\"background-color: #bbf7d0;\">监测外部空气有多凉<\/mark>。","analysis":"<strong>答案解析：<\/strong>第22题对应 weather station。原文说它监测外部空气温度，所以答案是 <strong>G. temperature is checked<\/strong>。"},{"time":"00:01:55,000 --> 00:02:02,000","html":"Once this is assessed, then the information is fed to computers and these activate the necessary heating or cooling processes.","cn":"一旦完成评估，信息就会传送到电脑，电脑再启动必要的供暖或制冷过程。","analysis":""},{"time":"00:02:02,000 --> 00:02:06,000","html":"John: Okay. Let's talk now about the cooling processes.","cn":"John：好。现在我们来谈谈制冷过程。","analysis":""},{"time":"00:02:06,000 --> 00:02:12,000","html":"Debbie: On the right-hand side of the building below the timber shutters is the part they call the shower tower.","cn":"Debbie: 在建筑右侧、木百叶窗下方，是他们称为 shower tower 的部分。","analysis":""},{"time":"00:02:12,000 --> 00:02:18,000","html":"John: This is where <mark style=\"background-color: #bbf7d0;\">water falls through a three-story tube sucking in air from outside as it falls<\/mark>.","cn":"John: 这里是<mark style=\"background-color: #bbf7d0;\">水从三层楼高的管道中落下，并在下落时把外部空气吸进来<\/mark>的地方。","analysis":"<strong>答案解析：<\/strong>第23题对应 shower tower。原文说水下落时会把外部空气吸入，所以答案是 <strong>B. fresh air is pulled in<\/strong>。"},{"time":"00:02:18,000 --> 00:02:22,000","html":"The unusual thing about it is this fresh air actually helps to cool the building.","cn":"特别之处在于，这些新鲜空气实际上有助于给建筑降温。","analysis":""},{"time":"00:02:22,000 --> 00:02:24,000","html":"Debbie: Yes, it's amazing, really.","cn":"Debbie：是的，真的很神奇。","analysis":""},{"time":"00:02:24,000 --> 00:02:32,000","html":"Okay, below ground level in the basement on the right-hand side is a tank which forms another part of the cooling process.","cn":"好，在地面以下、地下室右侧有一个水箱，它构成了制冷过程的另一部分。","analysis":""},{"time":"00:02:32,000 --> 00:02:35,000","html":"The tank is full of small metal balls.","cn":"这个水箱里装满了小金属球。","analysis":""},{"time":"00:02:35,000 --> 00:02:43,000","html":"Water passes through this tank. Each time it does this, <mark style=\"background-color: #bbf7d0;\">the balls absorb the heat from the water making it cooler<\/mark> without using any energy.","cn":"水会流经这个水箱。每次流过时，<mark style=\"background-color: #bbf7d0;\">这些金属球都会吸收水中的热量，使水温降低<\/mark>，而且不消耗能源。","analysis":"<strong>答案解析：<\/strong>第24题对应地下室右侧的 tank。原文说金属球吸收水的热量，让水变凉，所以答案是 <strong>H. water temperature is reduced<\/strong>。"},{"time":"00:02:43,000 --> 00:02:45,000","html":"John: What should we talk about next?","cn":"John：接下来我们该讲什么？","analysis":""},{"time":"00:02:45,000 --> 00:02:48,000","html":"Debbie: Well, you see the balcony below the light shelf.","cn":"Debbie:你看 light shelf 下面的阳台。","analysis":""},{"time":"00:02:48,000 --> 00:02:49,000","html":"John: What happens there?","cn":"John: 那里发生什么？","analysis":""},{"time":"00:02:49,000 --> 00:02:56,000","html":"Debbie: <mark style=\"background-color: #bbf7d0;\">Rainwater is fed down from the roof and this is where it's used to water the plants<\/mark> that cover the outside wall.","cn":"Debbie: <mark style=\"background-color: #bbf7d0;\">雨水从屋顶引下来，并在这里被用来浇灌植物<\/mark>，这些植物覆盖着外墙。","analysis":"<strong>答案解析：<\/strong>第25题对应 light shelf 下方的 balcony。原文说雨水在这里被用来浇灌植物，所以答案是 <strong>E. rainwater is used<\/strong>。"},{"time":"00:02:56,000 --> 00:03:00,000","html":"John: What about the square above the light shelf? It represents a window, doesn't it?","cn":"John：那 light shelf 上方的方块呢？它代表窗户，对吗？","analysis":""},{"time":"00:03:00,000 --> 00:03:06,000","html":"Debbie: Yes, that's important to point out because the upper floor windows get more daylight than the lower floor ones.","cn":"Debbie: 对，这一点很重要，因为高层窗户获得的日光比低层窗户更多。","analysis":""},{"time":"00:03:06,000 --> 00:03:10,000","html":"The windows at the top of the building are smaller than those at the bottom.","cn":"建筑顶部的窗户比底部的窗户小。","analysis":""},{"time":"00:03:10,000 --> 00:03:18,000","html":"This means <mark style=\"background-color: #bbf7d0;\">energy is saved higher up in the building because not as much heat is wasted through large windows<\/mark>.","cn":"这意味着<mark style=\"background-color: #bbf7d0;\">建筑高处可以节省能源，因为不会有那么多热量通过大窗户流失<\/mark>。","analysis":"<strong>答案解析：<\/strong>第26题对应 light shelf 上方的 window。原文说较小的窗户减少热量流失，所以答案是 <strong>C. heat loss is reduced<\/strong>。"},{"time":"00:03:18,000 --> 00:03:27,000","html":"Before you hear the rest of the discussion, you have some time to look at questions 27-30 on page 6.","cn":"在你听剩下的讨论之前，你有一些时间查看第6页的问题27到30。","analysis":""},{"time":"00:03:49,000 --> 00:04:02,000","html":"Now listen and answer questions 27-30.","cn":"现在请听并回答问题27到30。","analysis":""},{"time":"00:04:05,000 --> 00:04:10,000","html":"John: Let's continue the presentation by giving our opinions on some of the features of the building.","cn":"John：我们继续展示吧，谈谈我们对这栋建筑一些特点的看法。","analysis":""},{"time":"00:04:10,000 --> 00:04:13,000","html":"Let's talk about what we thought was surprising about the building.","cn":"我们来说说这栋建筑让我们觉得惊讶的地方。","analysis":""},{"time":"00:04:13,000 --> 00:04:17,000","html":"Debbie: Yes, it's <mark style=\"background-color: #fecaca;\">not out of the ordinary in terms of size<\/mark>.","cn":"Debbie: 是的，它<mark style=\"background-color: #fecaca;\">在大小方面并不特别<\/mark>。","analysis":""},{"time":"00:04:17,000 --> 00:04:20,000","html":"I mean, it's well under the height of the surrounding buildings.","cn":"我的意思是，它比周围建筑低很多。","analysis":""},{"time":"00:04:20,000 --> 00:04:25,000","html":"Also, in the past, I think people would have been surprised by the <mark style=\"background-color: #fecaca;\">vegetation on the facades<\/mark>.","cn":"另外，在过去，我觉得人们可能会对<mark style=\"background-color: #fecaca;\">外墙上的植物<\/mark>感到惊讶。","analysis":""},{"time":"00:04:25,000 --> 00:04:27,000","html":"But that's become quite common now.","cn":"但现在这已经相当常见了。","analysis":""},{"time":"00:04:27,000 --> 00:04:32,000","html":"John: That's right, but we both agreed that <mark style=\"background-color: #bbf7d0;\">the access to the building through a shopping arcade is quite unusual<\/mark>.","cn":"John：没错，但我们都同意，<mark style=\"background-color: #bbf7d0;\">通过购物廊进入这栋建筑是相当不寻常的<\/mark>。","analysis":"<strong>答案解析：<\/strong>第27题问 John 和 Debbie 认为游客会对 Education House 的什么感到惊讶。原文排除了高度和外墙植物，强调入口通过购物廊很不寻常，所以答案是 <strong>B. where the main entrance is<\/strong>。"},{"time":"00:04:32,000 --> 00:04:37,000","html":"Debbie: Yes, the way in is behind a small cafe, which is not what you'd expect.","cn":"Debbie: 是的，入口在一家小咖啡馆后面，这不是你会预料到的。","analysis":""},{"time":"00:04:37,000 --> 00:04:41,000","html":"Now, should we mention the findings on staff productivity in the building?","cn":"现在，我们要不要提一下关于这栋建筑里员工工作效率的研究结果？","analysis":""},{"time":"00:04:41,000 --> 00:04:47,000","html":"According to one article, the access to greenery in vegetation is increasing productivity by relieving stress.","cn":"根据一篇文章，接触绿色植物通过缓解压力提高了工作效率。","analysis":""},{"time":"00:04:47,000 --> 00:04:49,000","html":"John: Yes, I remember that article.","cn":"John：是的，我记得那篇文章。","analysis":""},{"time":"00:04:49,000 --> 00:04:54,000","html":"Debbie: Researchers have been monitoring this for a couple of years now, so <mark style=\"background-color: #fecaca;\">the results are clear<\/mark>.","cn":"Debbie: 研究人员已经对此监测了几年，所以<mark style=\"background-color: #fecaca;\">结果很清楚<\/mark>。","analysis":""},{"time":"00:04:54,000 --> 00:04:58,000","html":"But to be honest, I think <mark style=\"background-color: #bbf7d0;\">it's pretty obvious that you feel calmer seeing greenery around you<\/mark>.","cn":"但说实话，我觉得<mark style=\"background-color: #bbf7d0;\">看到周围有绿色植物会让人更平静，这是相当明显的<\/mark>。","analysis":"<strong>答案解析：<\/strong>第28题问他们对员工效率研究结果的反应。原文说这个结果“pretty obvious”，也就是他们觉得可以预料，所以答案是 <strong>A. They think the findings are predictable<\/strong>。"},{"time":"00:04:58,000 --> 00:05:01,000","html":"John: Yes, we've been reading that in newspapers for ages, haven't we?","cn":"John：是的，我们已经在报纸上读到这种说法很久了，不是吗？","analysis":""},{"time":"00:05:01,000 --> 00:05:03,000","html":"So I wouldn't bother to mention it.","cn":"所以我觉得没必要提它。","analysis":""},{"time":"00:05:03,000 --> 00:05:07,000","html":"Debbie: Okay, so we haven't mentioned the edge space yet.","cn":"Debbie：好，那我们还没有提到 edge space。","analysis":""},{"time":"00:05:07,000 --> 00:05:13,000","html":"You know, the place that's been marked for social interaction between workers, where you can have a coffee and a chat.","cn":"就是那个被划出来供员工社交互动的地方，大家可以在那里喝咖啡、聊天。","analysis":""},{"time":"00:05:13,000 --> 00:05:14,000","html":"What are your thoughts about it?","cn":"你怎么看？","analysis":""},{"time":"00:05:14,000 --> 00:05:17,000","html":"John: Well, I'm just <mark style=\"background-color: #bbf7d0;\">amazed the management allowed it<\/mark>.","cn":"John：嗯，我只是<mark style=\"background-color: #bbf7d0;\">很惊讶管理层竟然允许这样的空间存在<\/mark>。","analysis":"<strong>答案解析：<\/strong>第29题问他们怎么看 edge space。John 说他惊讶管理层允许这个空间，说明这是设计中令人意外的一部分，所以答案是 <strong>B. It is a surprising part of the design<\/strong>。"},{"time":"00:05:17,000 --> 00:05:20,000","html":"I'm sure all the staff love to get away from their desks, I would.","cn":"我相信所有员工都会喜欢离开自己的办公桌，我肯定会喜欢。","analysis":""},{"time":"00:05:20,000 --> 00:05:24,000","html":"I'm just not sure how much work I'd get done if I had an edge space to go to.","cn":"我只是不确定如果我有这样一个地方可以去，我还能完成多少工作。","analysis":""},{"time":"00:05:24,000 --> 00:05:26,000","html":"Debbie: I agree.","cn":"Debbie：我同意。","analysis":""},{"time":"00:05:26,000 --> 00:05:29,000","html":"Okay, let's think about the water system now.","cn":"好，现在我们想想水系统。","analysis":""},{"time":"00:05:29,000 --> 00:05:34,000","html":"They want to supply 100% of their own non-drinking water needs by recycling water.","cn":"他们想通过循环用水来满足自己100%的非饮用水需求。","analysis":""},{"time":"00:05:34,000 --> 00:05:39,000","html":"And it looks like they are <mark style=\"background-color: #fecaca;\">on target to complete the stage of the project by early next year<\/mark>.","cn":"而且看起来他们<mark style=\"background-color: #fecaca;\">有望在明年初按计划完成这个阶段的项目<\/mark>。","analysis":""},{"time":"00:05:39,000 --> 00:05:43,000","html":"But you know, I don't think <mark style=\"background-color: #bbf7d0;\">the staff are going to respond well to this<\/mark>.","cn":"但你知道，我觉得<mark style=\"background-color: #bbf7d0;\">员工不会对此有很好的反应<\/mark>。","analysis":"<strong>答案解析：<\/strong>第30题问这栋建筑的水系统可能有什么问题。原文说员工可能不会很好地接受这个系统，所以答案是 <strong>A. the reaction of the staff<\/strong>。"},{"time":"00:05:43,000 --> 00:05:44,000","html":"John: I agree.","cn":"John：我同意。","analysis":""},{"time":"00:05:44,000 --> 00:05:51,000","html":"People just don't like using too much recycled water, even though <mark style=\"background-color: #fecaca;\">it's been proven to pose no health risks whatsoever<\/mark>.","cn":"人们就是不喜欢使用太多循环水，尽管<mark style=\"background-color: #fecaca;\">已经证明它完全不会造成健康风险<\/mark>。","analysis":""},{"time":"00:05:51,000 --> 00:05:54,000","html":"Debbie: Well, I've really enjoyed researching this building.","cn":"Debbie：嗯，我真的很喜欢研究这栋建筑。","analysis":""},{"time":"00:05:57,000 --> 00:05:59,000","html":"That is the end of section 3.","cn":"第3部分到此结束。","analysis":""},{"time":"00:05:59,000 --> 00:06:03,000","html":"You now have half a minute to check your answers.","cn":"现在你有半分钟时间检查你的答案。","analysis":""},{"time":"00:06:29,000 --> 00:06:36,000","html":"Now turn to section 4 on page 7.","cn":"现在请翻到第7页第4部分。","analysis":""},{"time":"00:06:59,000 --> 00:07:02,000","html":"You","cn":"你","analysis":""}],"transcriptHighlights":[{"qid":"21","text":"F","answer":"F"},{"qid":"22","text":"G","answer":"G"},{"qid":"23","text":"B","answer":"B"},{"qid":"24","text":"H","answer":"H"},{"qid":"25","text":"E","answer":"E"},{"qid":"26","text":"C","answer":"C"},{"qid":"27","text":"where the main entrance is","answer":"B"},{"qid":"28","text":"They think the findings are predictable.","answer":"A"},{"qid":"29","text":"It is a surprising part of the design.","answer":"B"},{"qid":"30","text":"the reaction of the staff","answer":"A"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function matchingRepeatAttr(g){return (g.questions||[]).length>(g.options||[]).length?' data-repeat="true"':''}
function flowQuestionMap(g){let map={};(g.questions||[]).forEach(q=>map[q[0]]=q[1]);return map}
function renderFlowText(raw,qid){let html=esc(String(raw||'')).replace(new RegExp(`(?<!\\d)${qid}(?!\\d)`),`<span class="flow-num">${qid}</span>`);html=html.replace(/(?:_{2,}|…{2,}|\.{4,})/,`<span class="slot" data-q="${qid}"></span>`);if(!/<span class="slot"/.test(html))html+=` <span class="slot" data-q="${qid}"></span>`;return html}

function renderFlowLine(line,qmap,used){let raw=String((typeof line==='object'&&line?line.text:line)||''),qid=flowQidInText(raw,qmap);if(qid){used.add(qid);return `<div class="flow-step flow-step-full"><div class="flow-text">${renderFlowText(raw,qid)}</div></div>`}return `<div class="flow-note">${esc(raw)}</div>`}

function highlightTerms(){let terms=[];for(let item of DATA.transcriptHighlights||[]){let text=typeof item==='string'?item:item.text;if(text){terms.push(String(text));String(text).split(/\s+/).map(w=>w.replace(/[^A-Za-z0-9'-]/g,'')).filter(w=>w.length>=5&&!/^(which|three|answer|letter|about|their|there|would|could|should)$/i.test(w)).forEach(w=>terms.push(w))}}return [...new Set(terms.map(t=>t.trim()).filter(t=>t.length>1))].sort((a,b)=>b.length-a.length)}
function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',g.instruction||'',g.questionText||'',(g.options||[]),(g.questions||[]).map(q=>JSON.stringify(q))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}

function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}

const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;

$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
