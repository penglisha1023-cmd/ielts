w Zealand in 1960s","list":false,"level":0},{"text":"Traditional architecture","list":false,"level":0},{"text":"The climate was an important consideration for the 31. ______ design.","list":true,"level":0},{"text":"The primary building material was 32. ______","list":true,"level":0},{"text":"Most buildings had a 33. ______ shape.","list":true,"level":0},{"text":"Changes in the 1960s","list":false,"level":0},{"text":"A transition to 34. ______ as a material","list":true,"level":0},{"text":"Paid closer attention to the building 35. ______","list":true,"level":0},{"text":"Examples","list":false,"level":0},{"text":"Sir Miles Warren incorporated brutalism and gave up the use of 36. ______","list":true,"level":0},{"text":"Every new house has a 37. ______","list":true,"level":0},{"text":"Lockwood houses were criticised for having the same 38. ______","list":true,"level":0},{"text":"Value of architecture in 1960s","list":false,"level":0},{"text":"Industrial or business buildings look like 39. ______","list":true,"level":0},{"text":"Apart from colours, designers also focused on 40. ______ to make buildings visually attractive.","list":true,"level":0}]}],"answerKey":{"text":{"q31":"roof","q32":"wood","q33":"square","q34":"concrete","q35":"cost","q36":"stone","q37":"garage","q38":"layout","q39":"towers","q40":"shadow"},"single":{},"multiple":{},"multipleMap":{},"matching":{},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:06,000","html":"Architects in New Zealand in the early 20th century were big fans of traditional styles.","cn":"20世纪初，新西兰的建筑师们是传统风格的忠实拥护者。","analysis":""},{"time":"00:00:07,000 --> 00:00:11,000","html":"At that time, they often looked to European models for inspiration","cn":"那时，他们常从欧洲模式中寻求灵感，","analysis":""},{"time":"00:00:11,000 --> 00:00:15,000","html":"and perceived building design from a traditional perspective.","cn":"并从传统的视角看待建筑设计。","analysis":""},{"time":"00:00:15,000 --> 00:00:21,000","html":"The climate, for example, was the top concern when designing the <mark style=\"background-color: #bbf7d0;\">roof<\/mark>.","cn":"例如，气候是设计屋顶时的首要考虑因素。","analysis":"<strong>答案解析：<\/strong> 问题31询问传统建筑中气候是设计哪一部分的重要考量。原文提到“The climate, for example, was the top concern when designing the roof.”（例如，气候是设计屋顶时的首要考虑因素。），因此正确答案是“roof”。"},{"time":"00:00:21,000 --> 00:00:25,000","html":"Weather conditions across the country can vary significantly","cn":"全国各地的天气条件差异很大，","analysis":""},{"time":"00:00:25,000 --> 00:00:29,000","html":"and regions with frequent rain needed special attention.","cn":"多雨地区需要特别关注。","analysis":""},{"time":"00:00:29,000 --> 00:00:34,000","html":"In areas where the annual precipitation is high, ensuring water could drain efficiently","cn":"在年降水量大的地区，确保水能有效排出","analysis":""},{"time":"00:00:34,000 --> 00:00:39,000","html":"was essential for protecting the structure and longevity of the building.","cn":"对于保护建筑结构和延长使用寿命至关重要。","analysis":""},{"time":"00:00:39,000 --> 00:00:43,000","html":"Therefore, proper drainage systems had to be considered.","cn":"因此，必须考虑适当的排水系统。","analysis":""},{"time":"00:00:43,000 --> 00:00:48,000","html":"<mark style=\"background-color: #bbf7d0;\">Wood<\/mark> was the most popular choice for house building, mainly due to its availability,","cn":"木材是房屋建造最受欢迎的选择，主要因为它易于获取、","analysis":"<strong>答案解析：<\/strong> 问题32询问主要的建筑材料是什么。原文提到“Wood was the most popular choice for house building, mainly due to its availability”（木材是房屋建造最受欢迎的选择，主要因为它易于获取），因此正确答案是“wood”。"},{"time":"00:00:48,000 --> 00:00:51,000","html":"cost effectiveness and ease of use.","cn":"成本效益高且易于使用。","analysis":""},{"time":"00:00:51,000 --> 00:00:55,000","html":"Other materials either weren't affordable or simply weren't accessible","cn":"其他材料要么价格昂贵，要么根本无法获得，","analysis":""},{"time":"00:00:55,000 --> 00:00:59,000","html":"in rural parts of the country at the time.","cn":"当时在该国的农村地区。","analysis":""},{"time":"00:00:59,000 --> 00:01:04,000","html":"The majority of traditional buildings are <mark style=\"background-color: #bbf7d0;\">square<\/mark> in shape and this wasn't by accident.","cn":"大多数传统建筑都是方形的，这并非偶然。","analysis":"<strong>答案解析：<\/strong> 问题33询问大多数建筑的形状。原文提到“The majority of traditional buildings are square in shape”（大多数传统建筑都是方形的），因此正确答案是“square”。"},{"time":"00:01:04,000 --> 00:01:07,000","html":"It was a strategic choice.","cn":"这是一个战略性选择。","analysis":""},{"time":"00:01:07,000 --> 00:01:13,000","html":"Straight lines and right angles are easier to construct and more space efficient.","cn":"直线和直角更易于建造，且空间利用效率更高。","analysis":""},{"time":"00:01:13,000 --> 00:01:18,000","html":"Architects believed this approach helped to maximize utilization of interior space,","cn":"建筑师们认为这种方法有助于最大限度地利用室内空间，","analysis":""},{"time":"00:01:18,000 --> 00:01:23,000","html":"especially in areas where plots of land were relatively small.","cn":"尤其是在地块相对较小的地区。","analysis":""},{"time":"00:01:23,000 --> 00:01:28,000","html":"Additionally, avoiding unusual shapes like curves and diagonal corners","cn":"此外，避免使用曲线和斜角等不寻常的形状，","analysis":""},{"time":"00:01:28,000 --> 00:01:33,000","html":"made furnishing the interiors much more straightforward.","cn":"使得室内布置更加简单。","analysis":""},{"time":"00:01:33,000 --> 00:01:38,000","html":"Complex forms not only wasted valuable room but also posed problems","cn":"复杂的形状不仅浪费宝贵的空间，还会带来问题，","analysis":""},{"time":"00:01:38,000 --> 00:01:42,000","html":"when arranging furniture or installing fixtures.","cn":"例如在布置家具或安装固定装置时。","analysis":""},{"time":"00:01:42,000 --> 00:01:49,000","html":"As the country progressed, there were several changes New Zealand architects embraced in the 1960s.","cn":"随着国家的发展，新西兰建筑师在20世纪60年代接受了几项变革。","analysis":""},{"time":"00:01:49,000 --> 00:01:56,000","html":"These changes reflected not only a shift in design philosophy but also improvements in technology","cn":"这些变化不仅反映了设计理念的转变，也反映了技术进步","analysis":""},{"time":"00:01:56,000 --> 00:01:59,000","html":"and construction methods.","cn":"和施工方法的改进。","analysis":""},{"time":"00:01:59,000 --> 00:02:04,000","html":"The first was a shift to <mark style=\"background-color: #bbf7d0;\">concrete<\/mark> as a material which gradually replaced timber","cn":"首先是向混凝土材料的转变，它逐渐取代了许多现代建筑中的木材。","analysis":"<strong>答案解析：<\/strong> 问题34询问20世纪60年代建筑材料的转变。原文提到“The first was a shift to concrete as a material which gradually replaced timber”（首先是向混凝土材料的转变，它逐渐取代了许多现代建筑中的木材。），因此正确答案是“concrete”。"},{"time":"00:02:04,000 --> 00:02:07,000","html":"in many modern buildings.","cn":"在许多现代建筑中。","analysis":""},{"time":"00:02:07,000 --> 00:02:12,000","html":"This transition was made possible by construction techniques introduced by immigrants","cn":"这一转变得益于移民引入的建筑技术，","analysis":""},{"time":"00:02:12,000 --> 00:02:18,000","html":"from Europe and Japan who brought with them advanced machinery and engineering knowledge.","cn":"他们来自欧洲和日本，带来了先进的机械和工程知识。","analysis":""},{"time":"00:02:18,000 --> 00:02:25,000","html":"At the same time, New Zealand, like many other nations, was dealing with financial constraints","cn":"与此同时，新西兰和许多其他国家一样，正面临全球事件后","analysis":""},{"time":"00:02:25,000 --> 00:02:28,000","html":"following global events.","cn":"的财政限制。","analysis":""},{"time":"00:02:28,000 --> 00:02:35,000","html":"Because of the economic impact of the Second World War, resources had to be used wisely.","cn":"由于第二次世界大战的经济影响，资源必须明智地使用。","analysis":""},{"time":"00:02:35,000 --> 00:02:40,000","html":"As a result, both private developers and government-backed construction projects","cn":"因此，私人开发商和政府支持的建设项目","analysis":""},{"time":"00:02:40,000 --> 00:02:44,000","html":"were focused on the <mark style=\"background-color: #bbf7d0;\">cost<\/mark> of construction.","cn":"都关注于建筑成本。","analysis":"<strong>答案解析：<\/strong> 问题35询问在20世纪60年代，建筑商更关注什么。原文提到“both private developers and government-backed construction projects were focused on the cost of construction.”（私人开发商和政府支持的建设项目都关注于建筑成本。），因此正确答案是“cost”。"},{"time":"00:02:44,000 --> 00:02:51,000","html":"Minimizing expense while maximizing utility became the dominant goal during this period.","cn":"在这一时期，最小化开支同时最大化效用成为主导目标。","analysis":""},{"time":"00:02:51,000 --> 00:02:54,000","html":"That's one of the key factors they considered.","cn":"这是他们考虑的关键因素之一。","analysis":""},{"time":"00:02:54,000 --> 00:02:58,000","html":"They pursued economical designs.","cn":"他们追求经济型设计。","analysis":""},{"time":"00:02:58,000 --> 00:03:06,000","html":"Somiles Warren's architecture offers a classic example of this country's architectural styles at that time.","cn":"索迈尔斯·沃伦的建筑风格是当时该国建筑风格的经典范例。","analysis":""},{"time":"00:03:06,000 --> 00:03:15,000","html":"He became well known for modernizing the traditional aesthetic and for using geometric forms in innovative ways.","cn":"他以现代化传统美学和创新性地使用几何形状而闻名。","analysis":""},{"time":"00:03:15,000 --> 00:03:24,000","html":"In many of his works, he integrated repetitive block-like shapes into his works, a feature that became a hallmark of his style.","cn":"在他的许多作品中，他将重复的块状结构融入其中，这一特点成为他风格的标志。","analysis":""},{"time":"00:03:24,000 --> 00:03:30,000","html":"This approach came to be associated with a trend in architecture called brutalism,","cn":"这种方法与一种被称为粗野主义的建筑趋势联系在一起，","analysis":""},{"time":"00:03:30,000 --> 00:03:35,000","html":"which emphasized raw materials and strong bold structures.","cn":"它强调原始材料和坚固大胆的结构。","analysis":""},{"time":"00:03:35,000 --> 00:03:39,000","html":"At the same time, the use of natural materials was changing.","cn":"与此同时，天然材料的使用也在发生变化。","analysis":""},{"time":"00:03:39,000 --> 00:03:49,000","html":"He, like others, abandoned some expensive materials such as <mark style=\"background-color: #bbf7d0;\">stone<\/mark>, not just for economic reasons, but also for practicality and mass construction.","cn":"他和其他人一样，放弃了一些昂贵的材料，如石头，这不仅出于经济原因，也为了实用性和大规模建造。","analysis":"<strong>答案解析：<\/strong> 问题36询问Sir Miles Warren放弃了使用哪种材料。原文提到“He, like others, abandoned some expensive materials such as stone, not just for economic reasons, but also for practicality and mass construction.”（他和其他人一样，放弃了一些昂贵的材料，如石头，这不仅出于经济原因，也为了实用性和大规模建造。），因此正确答案是“stone”。"},{"time":"00:03:49,000 --> 00:03:58,000","html":"Meanwhile, car ownership was on the rise, and families were becoming increasingly reliant on private vehicles for commuting and daily tasks.","cn":"与此同时，汽车拥有量不断增加，家庭越来越依赖私家车通勤和处理日常事务。","analysis":""},{"time":"00:03:58,000 --> 00:04:04,000","html":"As a result, equipping each new house with a <mark style=\"background-color: #bbf7d0;\">garage<\/mark> gradually became trendy.","cn":"因此，为每栋新房子配备车库逐渐成为一种趋势。","analysis":"<strong>答案解析：<\/strong> 问题37询问每栋新房子都配有什么。原文提到“As a result, equipping each new house with a garage gradually became trendy.”（因此，为每栋新房子配备车库逐渐成为一种趋势。），因此正确答案是“garage”。"},{"time":"00:04:04,000 --> 00:04:14,000","html":"This change was seen not just as a convenience, but as a necessity that architects needed to incorporate into every design for suburban homes.","cn":"这一变化不仅被视为一种便利，更被视为建筑师需要融入郊区住宅设计的必需品。","analysis":""},{"time":"00:04:14,000 --> 00:04:24,000","html":"Among other modern housing styles, Lockwood Homes, which featured identical walls, stood out for their uniformity and efficient production.","cn":"在其他现代住宅风格中，Lockwood住宅以其相同的墙壁、统一性和高效生产而脱颖而出。","analysis":""},{"time":"00:04:24,000 --> 00:04:31,000","html":"These homes were mass-produced and became popular for their quick assembly and affordability.","cn":"这些房屋大规模生产，因其快速组装和经济实惠而广受欢迎。","analysis":""},{"time":"00:04:31,000 --> 00:04:36,000","html":"They also gained in popularity, especially among working-class families.","cn":"它们也越来越受欢迎，尤其是在工薪阶层家庭中。","analysis":""},{"time":"00:04:36,000 --> 00:04:40,000","html":"However, the design was not without its critics.","cn":"然而，这种设计并非没有批评者。","analysis":""},{"time":"00:04:40,000 --> 00:04:50,000","html":"Some architects and homeowners felt it lacked variety and personal expression, and the buildings were also criticised for this characteristic.","cn":"一些建筑师和房主认为它缺乏多样性和个性表达，建筑也因此特点受到批评。","analysis":""},{"time":"00:04:50,000 --> 00:04:57,000","html":"A sameness that didn't allow much room for individuality or creativity in <mark style=\"background-color: #bbf7d0;\">layout<\/mark>.","cn":"这种千篇一律的特点，没有给个性和布局创意留下太多空间。","analysis":"<strong>答案解析：<\/strong> 问题38询问Lockwood住宅因什么特点受到批评。原文提到“A sameness that didn't allow much room for individuality or creativity in layout.”（这种千篇一律的特点，没有给个性和布局创意留下太多空间。），因此正确答案是“layout”。"},{"time":"00:04:57,000 --> 00:05:09,000","html":"Still, few people would have doubts about the architectural changes of this era, especially considering how widespread and influential they became.","cn":"尽管如此，很少有人会怀疑这个时代的建筑变革，特别是考虑到它们变得多么普遍和有影响力。","analysis":""},{"time":"00:05:10,000 --> 00:05:20,000","html":"In urban centres, industrial or business complexes have been designed to resemble <mark style=\"background-color: #bbf7d0;\">towers<\/mark>, a departure from earlier, more horizontal layouts.","cn":"在城市中心，工业或商业综合体被设计成塔楼状，这与早期更水平的布局有所不同。","analysis":"<strong>答案解析：<\/strong> 问题39询问工业或商业建筑看起来像什么。原文提到“In urban centres, industrial or business complexes have been designed to resemble towers”（在城市中心，工业或商业综合体被设计成塔楼状），因此正确答案是“towers”。"},{"time":"00:05:20,000 --> 00:05:28,000","html":"These tall structures helped maximise space in crowded city districts and symbolised economic development.","cn":"这些高层建筑有助于在拥挤的城市区域最大化利用空间，并象征着经济发展。","analysis":""},{"time":"00:05:28,000 --> 00:05:38,000","html":"This has happened elsewhere in some industrialised countries, following similar trends seen in places like the UK and Japan.","cn":"在其他一些工业化国家也发生了这种情况，与英国和日本等地出现的类似趋势相符。","analysis":""},{"time":"00:05:39,000 --> 00:05:50,000","html":"In addition to the overall shape, which served a functional purpose, architects also concentrated on the visual appeal of some tall designs, such as <mark style=\"background-color: #bbf7d0;\">shadow<\/mark> and colours.","cn":"除了具有功能性目的的整体形状外，建筑师们还注重一些高层设计的视觉吸引力，例如阴影和色彩。","analysis":"<strong>答案解析：<\/strong> 问题40询问除了颜色，设计师还关注什么使建筑具有视觉吸引力。原文提到“architects also concentrated on the visual appeal of some tall designs, such as shadow and colours.”（建筑师们还注重一些高层设计的视觉吸引力，例如阴影和色彩。），因此正确答案是“shadow”。"},{"time":"00:05:50,000 --> 00:06:03,000","html":"These finer aesthetic elements helped modern buildings feel less sterile and more engaging to the eye, improving both their beauty and their emotional impact on residents and visitors alike.","cn":"这些更精细的美学元素使现代建筑不那么单调乏味，更具视觉吸引力，提升了它们的美感以及对居民和游客的情感影响。","analysis":""},{"time":"00:06:08,000 --> 00:06:10,000","html":"Thank you for your time.","cn":"谢谢您的时间。","analysis":""},{"time":"00:06:38,000 --> 00:06:40,000","html":"Thank you.","cn":"谢谢。","analysis":""},{"time":"00:07:08,000 --> 00:07:10,000","html":"Thank you.","cn":"谢谢。","analysis":""},{"time":"00:07:38,000 --> 00:07:40,000","html":"Thank you.","cn":"谢谢。","analysis":""},{"time":"00:08:08,000 --> 00:08:10,000","html":"Thank you.","cn":"谢谢。","analysis":""}],"transcriptHighlights":[{"qid":"31","text":"roof","answer":"roof"},{"qid":"32","text":"wood","answer":"wood"},{"qid":"33","text":"square","answer":"square"},{"qid":"34","text":"concrete","answer":"concrete"},{"qid":"35","text":"cost","answer":"cost"},{"qid":"36","text":"stone","answer":"stone"},{"qid":"37","text":"garage","answer":"garage"},{"qid":"38","text":"layout","answer":"layout"},{"qid":"39","text":"towers","answer":"towers"},{"qid":"40","text":"shadow","answer":"shadow"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

function groupHTML(g){if(g.type==='matching'&&g.layout==='flow')return `<section class="group"${matchingRepeatAttr(g)}><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="flow-layout"><div class="flow-steps">${renderFlowSteps(g)}</div><div><strong>${esc(g.optionsTitle||'Options')}</strong><div class="pool">${g.options.map(o=>`<div class="drag" draggable="true" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</div></div></div></section>`;

function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',(g.questions||[]).map(q=>String(q.id||q[0]||''))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}
function clearUserHighlights(){$$('.hl-brown,.hl-rose,.hl-blue').forEach(unwrap)}
function createNote(span){let id=span.dataset.hid;if($(`.note-card[data-hid="${id}"]`))return;let card=document.createElement('div');card.className='note-card';card.dataset.hid=id;card.innerHTML=`<div class="note-quote">${esc(span.textContent.slice(0,120))}</div><textarea placeholder="Write note here..."></textarea><button class="delete-note" type="button">Delete</button>`;$('#notesList').prepend(card);bindNoteDeletes()}
function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}
function removeNote(id){if(!id)return;$(`.note-card[data-hid="${id}"]`)?.remove()}
function drawTimer(){let m=Math.floor(secs/60),s=secs%60;$('#timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}
function adjustFontSize(delta){setFontSize(currentFontSize()+delta,true)}
function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}
function resetAppearance(persist=true){document.body.classList.remove('dark');setFontSize(DEFAULT_FONT_SIZE,false);updateSizeButtons();if(persist)save(false)}
function clearAllProgress(){localStorage.removeItem(storeKey)}
$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
const audio=$('#audio');$('#play').onclick=()=>audio.paused?audio.play():audio.pause();audio.onplay=()=>$('#play').textContent='⏸';audio.onpause=()=>$('#play').textContent='▶';audio.ontimeupdate=()=>{if(audio.duration)$('#fillbar').style.width=(audio.currentTime/audio.duration*100)+'%';$('#time').textContent=`${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${audio.duration?Math.floor(audio.duration/60):'00'}:${audio.duration?String(Math.floor(audio.duration%60)).padStart(2,'0'):'00'}`;maintainCueLoop()};$('#speed').onchange=e=>{slowCue=false;audio.playbackRate=+e.target.value;save(false)};$('#bar').onclick=e=>{if(audio.duration){let r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;save(false)}};
bindGlobal();render();
