-> 00:00:12,480","html":"First, you have some time to look at questions 31 to 40.","cn":"首先，你有一些时间来查看问题31到40。","analysis":""},{"time":"00:00:30,000 --> 00:00:58,000","html":"Now, listen carefully and answer questions 31 to 40.","cn":"现在，请仔细听并回答问题31到40。","analysis":""},{"time":"00:00:58,000 --> 00:01:06,000","html":"So, what I'm going to talk about to you today is something called aquaculture.","cn":"那么，我今天要和大家谈论的是水产养殖。","analysis":""},{"time":"00:01:06,000 --> 00:01:12,000","html":"It has been responsible for the impressive growth in the supply of fish for human consumption.","cn":"它促成了供人类食用的鱼类供应的显著增长。","analysis":""},{"time":"00:01:12,000 --> 00:01:19,000","html":"There's also been a slight improvement in the state of certain fish stocks due to improved fishery management.","cn":"由于渔业管理的改善，某些鱼类种群的状况也略有改善。","analysis":""},{"time":"00:01:19,000 --> 00:01:26,000","html":"Aquatic food production has transitioned from being primarily based on the capturing of wild fish","cn":"水生食物生产已从主要依靠捕捞野生鱼类","analysis":""},{"time":"00:01:26,000 --> 00:01:30,000","html":"to the culture of increasing numbers of farmed species.","cn":"转变为养殖越来越多的养殖品种。","analysis":""},{"time":"00:01:30,000 --> 00:01:37,000","html":"In recent years, a type of genetically modified salmon has been farmed in the New England region,","cn":"近年来，一种转基因三文鱼在新英格兰地区养殖，","analysis":""},{"time":"00:01:37,000 --> 00:01:40,000","html":"produced by a Massachusetts-based biotech firm.","cn":"由一家位于马萨诸塞州的生物科技公司生产。","analysis":""},{"time":"00:01:40,000 --> 00:01:47,000","html":"This type of fish is engineered to grow twice as fast as its conventional farm-raised counterpart.","cn":"这种鱼被设计成比传统养殖的同类生长速度快一倍。","analysis":""},{"time":"00:01:47,000 --> 00:01:54,000","html":"As a result, this increases the speed of the local aquaculture industry development.","cn":"因此，这加快了当地水产养殖业的发展速度。","analysis":""},{"time":"00:01:54,000 --> 00:01:58,000","html":"And thus reduces the fishing pressure on wild stock.","cn":"从而减轻了对野生鱼类的捕捞压力。","analysis":""},{"time":"00:01:58,000 --> 00:02:08,000","html":"But local residents have expressed their concerns on the potential negative effects on the ecosystem should those GM fish ever <mark style=\"background-color: #bbf7d0;\">escape<\/mark> into the sea.","cn":"但当地居民对这些转基因鱼一旦<mark style=\"background-color: #bbf7d0;\">逃逸<\/mark>到海里可能对生态系统造成的负面影响表达了担忧。","analysis":"<strong>答案解析：<\/strong>问题31询问当地渔民担心转基因鱼会怎样。原文提到“当地居民对这些转基因鱼一旦逃逸到海里可能对生态系统造成的负面影响表达了担忧。”，其中“escape”与问题中的31空位“escape into the sea”直接对应，表示逃逸。"},{"time":"00:02:08,000 --> 00:02:17,000","html":"Stronger, healthier and faster growing, these fish might <mark style=\"background-color: #fecaca;\">cannibalise others or out-compete wild-type fish for food<\/mark>.","cn":"这些鱼更强壮、更健康、生长更快，它们可能会<mark style=\"background-color: #fecaca;\">同类相食或与野生鱼类争夺食物<\/mark>。","analysis":"<strong>答案解析：<\/strong>问题31询问转基因鱼“逃逸”到海里。原文中“cannibalise others or out-compete wild-type fish for food”描述的是转基因鱼逃逸后可能造成的具体负面影响，是“escape”的结果，而不是鱼的逃逸行为本身，因此是干扰项。"},{"time":"00:02:17,000 --> 00:02:26,000","html":"Local decision-makers and regulators have thus pushed forward a number of measures making it impossible for most GM fish to mate.","cn":"因此，当地决策者和监管机构推行了多项措施，使大多数转基因鱼无法繁殖。","analysis":""},{"time":"00:02:26,000 --> 00:02:32,000","html":"A small percentage is able to breed only within confined pools.","cn":"只有一小部分能够在封闭的水池中繁殖。","analysis":""},{"time":"00:02:32,000 --> 00:02:36,000","html":"Despite the economic boom of genetically engineered fish,","cn":"尽管基因工程鱼带来了经济繁荣，","analysis":""},{"time":"00:02:36,000 --> 00:02:41,000","html":"culturing traditional types of fish is still mainstream among fish farmers.","cn":"养殖传统鱼类在渔民中仍然是主流。","analysis":""},{"time":"00:02:41,000 --> 00:02:46,000","html":"Most of them prefer fish with special features, such as <mark style=\"background-color: #bbf7d0;\">tuna<\/mark>.","cn":"他们大多喜欢具有特殊特征的鱼类，例如<mark style=\"background-color: #bbf7d0;\">金枪鱼<\/mark>。","analysis":"<strong>答案解析：<\/strong>问题32询问渔民喜欢养殖具有特殊特征的鱼，例如什么。原文提到“他们大多喜欢具有特殊特征的鱼类，例如金枪鱼。”，其中“tuna”直接回答了问题。"},{"time":"00:02:46,000 --> 00:02:50,000","html":"It has a source of high-quality protein with almost no fat.","cn":"它富含优质蛋白质，几乎不含脂肪。","analysis":""},{"time":"00:02:50,000 --> 00:02:59,000","html":"It also contains all essential amino acids required by the body for growth and maintenance of lean muscle tissue.","cn":"它还含有身体生长和维持精瘦肌肉组织所需的所有必需氨基酸。","analysis":""},{"time":"00:02:59,000 --> 00:03:05,000","html":"With high nutritional value, this kind of fish will always be popular in the fish market.","cn":"凭借高营养价值，这种鱼在鱼类市场将永远受欢迎。","analysis":""},{"time":"00:03:05,000 --> 00:03:13,000","html":"For the fish farming industry, incidents of fish escaping the farms has been a troubling issue over the years.","cn":"对于渔业养殖业来说，多年来鱼类逃逸农场一直是一个令人困扰的问题。","analysis":""},{"time":"00:03:13,000 --> 00:03:18,000","html":"Due to bad weather, nets that used to hold the fish were often destroyed.","cn":"由于恶劣天气，过去用来网住鱼的渔网经常被摧毁。","analysis":""},{"time":"00:03:18,000 --> 00:03:28,000","html":"Thousands of salmon, worth nearly 220,000 euros, escaped from a fish farm in the Norwegian region in July,","cn":"7月，价值近22万欧元的数千条三文鱼从挪威地区的一个渔场逃逸，","analysis":""},{"time":"00:03:28,000 --> 00:03:32,000","html":"raising fear that they would breed with wild fish stocks.","cn":"引发了它们可能与野生鱼类种群繁殖的担忧。","analysis":""},{"time":"00:03:32,000 --> 00:03:36,000","html":"<mark style=\"background-color: #bbf7d0;\">Cages were thus built to withstand storms<\/mark>.","cn":"因此，建造了<mark style=\"background-color: #bbf7d0;\">能够抵御风暴的渔笼<\/mark>。","analysis":"<strong>答案解析：<\/strong>问题33询问建造渔笼是为了防止鱼类遭受什么。原文描述了鱼类逃逸是由于“bad weather”和“nets that used to hold the fish were often destroyed”，随后提到“Cages were thus built to withstand storms.”，明确指出渔笼是为了抵御风暴。因此，“storms”是正确答案。"},{"time":"00:03:36,000 --> 00:03:41,000","html":"The frames of the cages are made of <mark style=\"background-color: #fecaca;\">PE<\/mark>, which is dedicated to marine use.","cn":"渔笼的框架由<mark style=\"background-color: #fecaca;\">聚乙烯（PE）<\/mark>制成，专用于海洋环境。","analysis":"<strong>答案解析：<\/strong>问题34询问使用“___ nets”来支撑渔笼框架。原文提到“To further strengthen it, strong nets without knots are used to support the cylindrical frame.”，而“PE”是框架的材料，不是渔网的特性，因此是干扰项。"},{"time":"00:03:41,000 --> 00:03:46,000","html":"This material has trustable strength, resilience and tenacity.","cn":"这种材料具有可靠的强度、弹性和韧性。","analysis":""},{"time":"00:03:46,000 --> 00:03:57,000","html":"To further strengthen it, <mark style=\"background-color: #bbf7d0;\">strong<\/mark> nets without knots are used to support the cylindrical frame.","cn":"为了进一步加强，使用<mark style=\"background-color: #bbf7d0;\">坚固<\/mark>的无结网来支撑圆柱形框架。","analysis":"<strong>答案解析：<\/strong>问题34询问使用什么渔网来支撑渔笼框架。原文明确指出“为了进一步加强，使用坚固的无结网来支撑圆柱形框架。”，其中“strong”描述了渔网的特性，直接回答了问题。"},{"time":"00:03:57,000 --> 00:04:03,000","html":"A group of small villages on the island of Zanzibar off the coast of East Africa","cn":"东非海岸桑给巴尔岛上的一群小村庄","analysis":""},{"time":"00:04:03,000 --> 00:04:08,000","html":"have been trying to develop a local aquaculture industry sustainably.","cn":"一直在努力可持续地发展当地的水产养殖业。","analysis":""},{"time":"00:04:08,000 --> 00:04:15,000","html":"They use a land-based production system that is both economically and ecologically sound.","cn":"他们采用一种既经济又生态的陆基生产系统。","analysis":""},{"time":"00:04:15,000 --> 00:04:23,000","html":"Land-based recirculation can control ocean temperature and optimize growth for the fish that are used to warmer water.","cn":"陆基循环系统可以控制海水温度，优化习惯温暖水域的鱼类的生长。","analysis":""},{"time":"00:04:23,000 --> 00:04:28,000","html":"All organic waste from the fish is held on land.","cn":"所有鱼类的有机废物都留在陆地上。","analysis":""},{"time":"00:04:28,000 --> 00:04:35,000","html":"With incoming water sterilized to avoid disease, which has historically plagued ocean-based farms,","cn":"进水经过消毒以避免疾病，这在历史上一直困扰着海洋养殖场，","analysis":""},{"time":"00:04:35,000 --> 00:04:40,000","html":"the lack of disease means that no drugs are administered to the fish.","cn":"没有疾病意味着不对鱼施用药物。","analysis":""},{"time":"00:04:40,000 --> 00:04:47,000","html":"However, one problem facing the villages is lack of suitable land on the <mark style=\"background-color: #bbf7d0;\">coast<\/mark> for this system.","cn":"然而，这些村庄面临的一个问题是，在<mark style=\"background-color: #bbf7d0;\">海岸<\/mark>线上缺乏适合这种系统的土地。","analysis":"<strong>答案解析：<\/strong>问题35询问当地渔民面临的问题之一是缺乏在“___”上的土地。原文明确指出“这些村庄面临的一个问题是，在海岸线上缺乏适合这种系统的土地。”，其中“coast”直接回答了问题。"},{"time":"00:04:47,000 --> 00:04:53,000","html":"<mark style=\"background-color: #fecaca;\">Hotels and beaches<\/mark> open to tourists take up most of the coastal area.","cn":"向游客开放的<mark style=\"background-color: #fecaca;\">酒店和海滩<\/mark>占据了大部分沿海区域。","analysis":"<strong>答案解析：<\/strong>问题35询问缺乏在“海岸”上的土地。原文中“Hotels and beaches”描述的是占据海岸土地的具体事物，是导致缺乏土地的原因，而不是缺乏土地的地点，因此是干扰项。"},{"time":"00:04:53,000 --> 00:05:00,000","html":"Another problem facing local fishermen is the scarcity of <mark style=\"background-color: #bbf7d0;\">young<\/mark> fish used to breed the species.","cn":"当地渔民面临的另一个问题是用于繁殖物种的<mark style=\"background-color: #bbf7d0;\">幼鱼<\/mark>稀缺。","analysis":"<strong>答案解析：<\/strong>问题36询问当地渔民面临的另一个问题是缺乏什么鱼。原文明确指出“当地渔民面临的另一个问题是用于繁殖物种的幼鱼稀缺。”，其中“young”直接回答了问题。"},{"time":"00:05:00,000 --> 00:05:05,000","html":"This predicament stems from overfishing during the previous decades.","cn":"这种困境源于过去几十年的过度捕捞。","analysis":""},{"time":"00:05:05,000 --> 00:05:10,000","html":"The local commercial fishing industry has been reduced by 50% for this reason,","cn":"因此，当地的商业渔业已经减少了50%，","analysis":""},{"time":"00:05:10,000 --> 00:05:14,000","html":"and the aquaculture industry has yet to thrive.","cn":"而水产养殖业尚未繁荣起来。","analysis":""},{"time":"00:05:14,000 --> 00:05:21,000","html":"The government has taken a set of initiatives to safeguard native aquaculture and the fishing industry.","cn":"政府已采取一系列举措来保护当地的水产养殖和渔业。","analysis":""},{"time":"00:05:21,000 --> 00:05:25,000","html":"An open-air seafood market has been launched.","cn":"一个露天海鲜市场已经启动。","analysis":""},{"time":"00:05:25,000 --> 00:05:32,000","html":"Residents are encouraged to <mark style=\"background-color: #bbf7d0;\">support<\/mark> local fish farming businesses by purchasing marine products.","cn":"鼓励居民通过购买海洋产品来<mark style=\"background-color: #bbf7d0;\">支持<\/mark>当地的渔业养殖企业。","analysis":"<strong>答案解析：<\/strong>问题37询问政府鼓励公众做什么来支持当地渔业。原文提到“鼓励居民通过购买海洋产品来支持当地的渔业养殖企业。”，其中“support”直接回答了问题。"},{"time":"00:05:32,000 --> 00:05:40,000","html":"As it turns out, there is a public demand for access to locally produced sustainable sources of fresh seafood.","cn":"事实证明，公众对获取当地生产的可持续新鲜海鲜有需求。","analysis":""},{"time":"00:05:40,000 --> 00:05:49,000","html":"Moreover, local fish farmers are aided to <mark style=\"background-color: #fecaca;\">market seaweed and oysters<\/mark>, both of which have additional economic values.","cn":"此外，当地渔民还得到了帮助，<mark style=\"background-color: #fecaca;\">销售海藻和牡蛎<\/mark>，这两种产品都具有额外的经济价值。","analysis":"<strong>答案解析：<\/strong>问题37询问政府鼓励公众“支持”当地渔业。原文中“market seaweed and oysters”是政府帮助渔民进行销售的行为，而不是公众支持渔业的行为，因此是干扰项。"},{"time":"00:05:49,000 --> 00:05:53,000","html":"<mark style=\"background-color: #bbf7d0;\">Seaweed is used in various ways in cosmetics<\/mark>.","cn":"<mark style=\"background-color: #bbf7d0;\">海藻在化妆品中有多种用途<\/mark>。","analysis":"<strong>答案解析：<\/strong>问题38询问海藻可以用来制造什么。原文提到“海藻在化妆品中有多种用途。”，其中“cosmetics”直接回答了问题。"},{"time":"00:05:53,000 --> 00:06:00,000","html":"Seaweed extract is often found on the list of ingredients, constituting <mark style=\"background-color: #fecaca;\">creams, soaps<\/mark>,","cn":"海藻提取物常出现在成分列表中，构成<mark style=\"background-color: #fecaca;\">面霜、肥皂<\/mark>、","analysis":"<strong>答案解析：<\/strong>问题38询问海藻可以用来制造“化妆品”。原文中“creams, soaps”是化妆品的具体产品，而不是总称，因此是干扰项。"},{"time":"00:06:00,000 --> 00:06:03,000","html":"<mark style=\"background-color: #fecaca;\">shampoos, powders and sprays<\/mark>.","cn":"<mark style=\"background-color: #fecaca;\">洗发水、粉末和喷雾剂<\/mark>。","analysis":"<strong>答案解析：<\/strong>问题38询问海藻可以用来制造“化妆品”。原文中“shampoos, powders and sprays”是化妆品的具体产品，而不是总称，因此是干扰项。"},{"time":"00:06:03,000 --> 00:06:11,000","html":"It is said to be useful in various ways, including the <mark style=\"background-color: #fecaca;\">relief of romantic pain and the removal of cellulite<\/mark>.","cn":"据说它在许多方面都有用，包括<mark style=\"background-color: #fecaca;\">缓解风湿性疼痛和去除脂肪团<\/mark>。","analysis":"<strong>答案解析：<\/strong>问题38询问海藻可以用来制造“化妆品”。原文中“relief of romantic pain and the removal of cellulite”是海藻的一些功用，而不是其制成的产品类型，因此是干扰项。"},{"time":"00:06:11,000 --> 00:06:17,000","html":"Oyster is a source of seafood popular among the local <mark style=\"background-color: #bbf7d0;\">hospitality<\/mark> industry.","cn":"牡蛎是当地<mark style=\"background-color: #bbf7d0;\">酒店服务业<\/mark>中受欢迎的海鲜来源。","analysis":"<strong>答案解析：<\/strong>问题39询问牡蛎是哪种地方产业的海鲜来源。原文明确指出“牡蛎是当地酒店服务业中受欢迎的海鲜来源。”，其中“hospitality”直接回答了问题。"},{"time":"00:06:17,000 --> 00:06:22,000","html":"Served with caviar and champagne, it is one of the world's ultimate luxury foods,","cn":"配鱼子酱和香槟，它是世界上极致的奢华美食之一，","analysis":""},{"time":"00:06:22,000 --> 00:06:26,000","html":"appealing to gourmets with its succulent and delicate flavour.","cn":"以其多汁而精致的口味吸引着美食家。","analysis":""},{"time":"00:06:26,000 --> 00:06:31,000","html":"It thus appears to have the greatest potential for <mark style=\"background-color: #fecaca;\">commercial culture<\/mark>,","cn":"因此，它似乎具有最大的<mark style=\"background-color: #fecaca;\">商业养殖<\/mark>潜力，","analysis":"<strong>答案解析：<\/strong>问题39询问牡蛎供应给地方“酒店服务业”。原文中“commercial culture”描述的是牡蛎的商业养殖潜力，而不是它所供应的行业，因此是干扰项。"},{"time":"00:06:31,000 --> 00:06:38,000","html":"even though the <mark style=\"background-color: #fecaca;\">national and international market<\/mark> has shown demand for marine products in Zanzibar.","cn":"尽管<mark style=\"background-color: #fecaca;\">国内和国际市场<\/mark>已显示出对桑给巴尔海洋产品的需求。","analysis":"<strong>答案解析：<\/strong>问题39询问牡蛎供应给“local hospitality industry”。原文中“national and international market”指的是更广阔的市场，而不是问题所指的“local”产业，因此是干扰项。"},{"time":"00:06:38,000 --> 00:06:43,000","html":"It is still challenging to survive in the competitive modern fishing industry.","cn":"在竞争激烈的现代渔业中生存仍然充满挑战。","analysis":""},{"time":"00:06:43,000 --> 00:06:49,000","html":"The government ought to restore the business by encouraging aquaculture, recreation and <mark style=\"background-color: #bbf7d0;\">shipping<\/mark>.","cn":"政府应该通过鼓励水产养殖、休闲娱乐和<mark style=\"background-color: #bbf7d0;\">航运<\/mark>来恢复这项业务。","analysis":"<strong>答案解析：<\/strong>问题40询问政府通过鼓励水产养殖、休闲娱乐和什么来拯救当地渔业。原文明确指出“政府应该通过鼓励水产养殖、休闲娱乐和航运来恢复这项业务。”，其中“shipping”直接回答了问题。"},{"time":"00:06:49,000 --> 00:06:56,000","html":"First, it could utilise <mark style=\"background-color: #fecaca;\">modern fish farming technology<\/mark> to supply more high quality marine products.","cn":"首先，它可以利用<mark style=\"background-color: #fecaca;\">现代渔业养殖技术<\/mark>来供应更多高质量的海洋产品。","analysis":"<strong>答案解析：<\/strong>问题40询问政府通过鼓励“水产养殖、休闲娱乐和航运”来拯救渔业。原文中“modern fish farming technology”是实现目标的一种手段或方式，而不是与水产养殖、休闲娱乐并列的鼓励领域，因此是干扰项。"},{"time":"00:06:56,000 --> 00:07:02,000","html":"<mark style=\"background-color: #fecaca;\">Tourism<\/mark> is an effective stimulus to boost its sales and with better shipping capability,","cn":"<mark style=\"background-color: #fecaca;\">旅游业<\/mark>是促进销售的有效刺激因素，而且通过更好的航运能力，","analysis":"<strong>答案解析：<\/strong>问题40询问政府通过鼓励“水产养殖、休闲娱乐和航运”来拯救渔业。原文中“Tourism”被描述为“an effective stimulus to boost its sales”，是促进销售的刺激因素，而不是与“aquaculture, recreation and shipping”并列的政府鼓励的业务领域，因此是干扰项。"},{"time":"00:07:02,000 --> 00:07:07,000","html":"more products can be delivered abroad.","cn":"更多产品可以运往国外。","analysis":""},{"time":"00:07:07,000 --> 00:07:10,000","html":"That is the end of section 4.","cn":"第四部分到此结束。","analysis":""},{"time":"00:07:10,000 --> 00:07:15,000","html":"You now have half a minute to check your answers.","cn":"你现在有半分钟时间检查你的答案。","analysis":""}],"transcriptHighlights":[{"qid":"31","text":"escape","answer":"escape"},{"qid":"32","text":"tuna","answer":"tuna"},{"qid":"33","text":"storms","answer":"storms"},{"qid":"34","text":"strong","answer":"strong"},{"qid":"35","text":"coast","answer":"coast"},{"qid":"36","text":"young","answer":"young"},{"qid":"37","text":"support","answer":"support"},{"qid":"38","text":"cosmetics","answer":"cosmetics"},{"qid":"39","text":"hospitality","answer":"hospitality"},{"qid":"40","text":"shipping","answer":"shipping"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>
<script>
const DATA=JSON.parse(document.getElementById('test-data').textContent);const $=s=>document.querySelector(s);const $$=s=>[...document.querySelectorAll(s)];const RENDER_VERSION=7;
let secs=0,review=false,timer=setInterval(()=>{secs++;drawTimer();if(secs%5===0)save(false)},1000),drag=null,currentCue=-1,loopCue=false,slowCue=false,showCn=true,showAnalysis=true,dictationMode=false,showOriginal=true,dictationAnswers={};const storeKey='ielts_v4_'+DATA.title.replace(/\W+/g,'_');
const CONFIG_DATA={answerKey:DATA.answerKey,questionList:DATA.questionIds.map(q=>Number(q)||q),localStorageKey:storeKey};window.localStorageKey=storeKey;window.DATA=DATA;window.CONFIG_DATA=CONFIG_DATA;
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function matchingRepeatAttr(g){return (g.questions||[]).length>(g.options||[]).length?' data-repeat="true"':''}
function flowQuestionMap(g){let map={};(g.questions||[]).forEach(q=>map[q[0]]=q[1]);return map}
function renderFlowText(raw,qid){let html=esc(String(raw||'')).replace(new RegExp(`(?<!\\d)${qid}(?!\\d)`),`<span class="flow-num">${qid}</span>`);html=html.replace(/(?:_{2,}|…{2,}|\.{4,})/,`<span class="slot" data-q="${qid}"></span>`);if(!/<span class="slot"/.test(html))html+=` <span class="slot" data-q="${qid}"></span>`;return html}
function renderFlowSteps(g){let qmap=flowQuestionMap(g),used=new Set(),lines=(g.bodyLines&&g.bodyLines.length?g.bodyLines:[]);if(lines.length){return lines.map(line=>{let raw=String((typeof line==='object'&&line?line.text:line)||''),qid=Object.keys(qmap).find(id=>new RegExp(`(?<!\\d)${id}(?!\\d)`).test(raw));if(qid){used.add(qid);return `<div class="flow-step flow-step-full"><div class="flow-text">${renderFlowText(raw,qid)}</div></div>`}return `<div class="flow-note">${esc(raw)}</div>`}).join('')+(g.questions||[]).filter(q=>!used.has(q[0])).map(q=>`<div class="flow-step"><div class="flow-num">${q[0]}</div><div class="flow-text">${esc(q[1])}</div><span class="slot" data-q="${q[0]}"></span></div>`).join('')}return g.questions.map((q,idx)=>`<div class="flow-step"><div class="flow-num">${q[0]}</div><div class="flow-text">${esc(q[1])}</div><span class="slot" data-q="${q[0]}"></span></div>${idx<g.questions.length-1?'<div class="flow-arrow">↓</div>':''}`).join('')}
function groupHTML(g){if(g.type==='matching'&&g.layout==='flow')return `<section class="group"${matchingRepeatAttr(g)}><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="flow-layout"><div class="flow-steps">${renderFlowSteps(g)}</div><div><strong>${esc(g.optionsTitle||'Options')}</strong><div class="pool">${g.options.map(o=>`<div class="drag" draggable="true" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</div></div></div></section>`;
if(g.type==='matching')return `<section class="group"${matchingRepeatAttr(g)}><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="matching"><div>${g.questions.map(q=>`<div class="match-row"><strong>${q[0]}</strong><span>${esc(q[1])}</span><span class="slot" data-q="${q[0]}"></span></div>`).join('')}</div><div><strong>${esc(g.optionsTitle||'Options')}</strong><div class="pool">${g.options.map(o=>`<div class="drag" draggable="true" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</div></div></div></section>`;
if(g.type==='map')return `<section class="group"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="map-layout"><div class="map-image"><img src="${esc(g.image||'map.png')}" alt="Map"></div><div class="map-grid"><div class="map-answer-list">${g.questions.map(q=>`<div class="map-row"><div class="map-row-label"><strong>${q[0]}</strong> ${esc(q[1]||'')}</div><div class="map-options">${(g.options||['A','B','C','D','E','F','G','H','I']).map(o=>`<div class="choice map-choice" data-name="q${q[0]}" data-value="${o}">${o}</div>`).join('')}</div></div>`).join('')}</div></div></div></section>`;
if(g.type==='single')return `<section class="group"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div>${g.questions.map(q=>`<p><strong>${q.id}</strong> ${esc(q.text)}</p>${q.options.map(o=>`<div class="choice single-choice" data-name="q${q.id}" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}`).join('')}</section>`;
if(g.type==='multiple')return `<section class="group" data-limit="${g.limit}" data-id="${g.id}"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><p><strong>${esc(g.id)}</strong> ${esc(g.questionText)}</p>${g.options.map(o=>`<div class="choice multi-choice" data-name="q${g.id.replace('-','_')}" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</section>`;
return `<section class="group"><h3>${esc(g.title)}</h3>${renderFillGroup(g)}</section>`}
function renderFillGroup(g){let qids=(g.questions||[]).map(q=>String(q.id));let used=new Set();let lines=(g.bodyLines&&g.bodyLines.length?g.bodyLines:g.questions.map(q=>`${q.id} ${q.text} _____`));let html='',i=0;while(i<lines.length){let meta=typeof lines[i]==='object'&&lines[i]?lines[i]:{};if(meta.table){let table=meta.table,chunk=[];while(i<lines.length){let m=typeof lines[i]==='object'&&lines[i]?lines[i]:{};if(m.table!==table)break;chunk.push(lines[i++])}html+=renderFillTable(chunk,qids,used);continue}html+=renderFillLine(lines[i++],qids,used)}return html||`<div class="instruction">${esc(g.instruction||'Complete the notes below.')}</div>`}
function renderFillTable(lines,qids,used){let rows=[],maxCols=1;lines.forEach(line=>{let meta=typeof line==='object'&&line?line:{},row=Number(meta.row)||0,col=Number(meta.col)||0,cols=Number(meta.cols)||1;maxCols=Math.max(maxCols,cols,col+1);if(!rows[row])rows[row]=[];if(!rows[row][col])rows[row][col]=[];rows[row][col].push(`<div class="fill-table-line">${renderFillLine(line,qids,used,true)}</div>`)});return `<div class="fill-table-wrap"><table class="fill-table">${rows.map((cells,idx)=>{let filled=(cells||[]).map((parts,col)=>parts?{col,html:parts.join('')}:null).filter(Boolean);return `<tr>${filled.map(cell=>{let tag=idx===0?'th':'td',span=filled.length===1&&maxCols>1?` colspan="${maxCols}"`:'';return `<${tag}${span}>${cell.html}</${tag}>`}).join('')}</tr>`}).join('')}</table></div>`}
function fillInput(qid,lead=''){return `<span class="blank-q">${esc(qid)}</span>${esc(lead)}<input class="blank" name="q${esc(qid)}" type="text" autocomplete="off" inputmode="text">`}
function fillLineAttrs(meta,isHeading){let cls=['doc-line'];if(isHeading)cls.push('fill-heading');if(meta.list)cls.push('is-list');let rawLevel=Math.max(0,Math.min(6,Number(meta.level)||0)),level=rawLevel>0?rawLevel+1:rawLevel;let style=meta.list?` style="--indent:${level*30}px"`:'';return `class="${cls.join(' ')}"${style}`}
function fillLineContent(meta,body){let level=Math.max(0,Number(meta.level)||0),bullet=level>0?'◦':'•';return meta.list?`<span class="doc-bullet">${bullet}</span><span class="doc-line-content">${body}</span>`:body}
function isFillHeading(raw,meta,hit){return !hit&&!meta.list&&!/(?:_{2,}|…{2,}|\.{4,})/.test(raw)&&!/^\d+\.?\s+/.test(raw)&&!/^(?:Complete|Write|Choose)\b/i.test(raw)}
function renderFillLine(line,qids,used,inner=false){let meta=typeof line==='object'&&line?line:{},raw=String(meta.text??line),html=esc(raw),hit=false;html=html.replace(/(^|[^\d])(\d{1,2})\.?\s*((?:£\s*)?)(?:_{2,}|…{2,}|\.{4,})/g,(m,prefix,qid,lead)=>{if(!qids.includes(qid))return m;used.add(qid);hit=true;return prefix+fillInput(qid,lead)});let m=raw.match(/^(\d+)\.?\s+(.+)$/);if(!hit&&m&&qids.includes(m[1])){used.add(m[1]);let body=esc(m[2]);let input=fillInput(m[1]);body=/(?:_+|…{2,}|\.{4,})/.test(body)?body.replace(/(?:_+|…{2,}|\.{4,})/,input):`${body} ${input}`;return inner?fillLineContent(meta,body):`<p ${fillLineAttrs(meta,false)}>${fillLineContent(meta,body)}</p>`}return inner?html:`<p ${fillLineAttrs(meta,isFillHeading(raw,meta,hit))}>${fillLineContent(meta,html)}</p>`}
function hardResetAnswers(){$$('input').forEach(i=>{i.value='';i.defaultValue=''});$$('.choice').forEach(c=>c.classList.remove('selected'));$$('.slot').forEach(s=>s.innerHTML='');refreshPool();updateNav()}
function render(){document.title=DATA.title;$('#ownerMeta').textContent=DATA.ownerInfo||'';$('#audio').src=DATA.audio||'https://qyccvyyigtjhzunumbqf.supabase.co/storage/v1/object/public/audio/105.mp3';$('#content').innerHTML=DATA.groups.map(groupHTML).join('');$('#nav').innerHTML=DATA.questionIds.map(q=>`<div data-q="${q}">${q}</div>`).join('');bindDynamic();hardResetAnswers();load();updateNav()}
function bindDynamic(){
  $$('#content input').forEach(i=>{i.oninput=()=>{updateNav();save(false)};i.onchange=()=>{updateNav();save(false)}});
  $$('.single-choice').forEach(btn=>btn.onclick=e=>{if(review||window.getSelection().toString())return;$$(`.single-choice[data-name="${btn.dataset.name}"]`).forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');updateNav();save(false)});
  $$('.map-choice').forEach(btn=>btn.onclick=e=>{if(review||window.getSelection().toString())return;$$(`.map-choice[data-name="${btn.dataset.name}"]`).forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');updateNav();save(false)});
  $$('.multi-choice').forEach(btn=>btn.onclick=e=>{if(review||window.getSelection().toString())return;let group=btn.closest('.group'),limit=Number(group?.dataset.limit||99),name=btn.dataset.name,selected=$$(`.multi-choice[data-name="${name}"].selected`);if(!btn.classList.contains('selected')&&selected.length>=limit)return;btn.classList.toggle('selected');updateNav();save(false)});
  $$('#nav [data-q]').forEach(n=>n.onclick=()=>scrollToQuestion(n.dataset.q));
}
function bindGlobal(){
  document.addEventListener('dragstart',e=>{let d=e.target.closest('.drag,.tag');if(!d||review)return;drag={value:d.dataset.value,text:d.textContent,from:d.closest('.slot')};});
  document.addEventListener('dragover',e=>{if(e.target.closest('.slot,.pool'))e.preventDefault()});
  document.addEventListener('drop',e=>{let slot=e.target.closest('.slot'),pool=e.target.closest('.pool');if(!drag||review)return;e.preventDefault();if(pool&&drag.from){drag.from.innerHTML='';refreshPool();updateNav();save(false);return}if(slot){if(drag.from)drag.from.innerHTML='';slot.innerHTML=`<span class="tag" draggable="true" data-value="${drag.value}">${esc(drag.text)}</span>`;refreshPool();updateNav();save(false)}});
  document.addEventListener('mouseup',handleSelection);
  $('#selbar').onclick=handleToolbar;
}
function scrollToQuestion(q){let first=q.split('-')[0];let target=$(`input[name="q${first}"], .slot[data-q="${first}"], .choice[data-name="q${first}"]`)||$(`input[name="q${q.replace('-','_')}"]`);target?.closest('.group')?.scrollIntoView({behavior:'smooth',block:'center'});}
function refreshPool(){$$('.group').forEach(g=>{let slots=[...g.querySelectorAll('.slot')],drags=[...g.querySelectorAll('.drag')],repeat=g.dataset.repeat==='true'||slots.length>drags.length,used=new Set(slots.map(s=>s.querySelector('.tag')?.dataset.value).filter(Boolean));drags.forEach(d=>d.classList.toggle('hidden',!repeat&&used.has(d.dataset.value)))})}
function restoreDragging(){drag=null;$$('.drag,.tag').forEach(d=>d.draggable=!review)}
function multipleGroupFor(q){let n=Number(q);return DATA.groups.find(g=>{if(g.type!=='multiple')return false;let [a,b]=g.id.split('-').map(Number);return n>=a&&n<=b})}
function multipleNameFor(q){let g=multipleGroupFor(q);return g?'q'+g.id.replace('-','_'):null}
function answered(q){let mn=multipleNameFor(q);if(mn)return $$(`.multi-choice[data-name="${mn}"].selected`).length>0;return !!($(`input[name="q${q}"]`)?.value?.trim()||$(`.single-choice[data-name="q${q}"].selected`)||$(`.map-choice[data-name="q${q}"].selected`)||$(`.slot[data-q="${q}"] .tag`))}

function questionInText(q,text){let n=Number(String(q).replace(/\D/g,""));if(!n||!text)return false;let raw=String(text).replace(/&nbsp;/g," ");let direct=new RegExp("(?:问题|Question|Q)\\s*0?"+n+"(?!\\d)|第\\s*0?"+n+"\\s*题|(?<!\\d)0?"+n+"\\s*题","i").test(raw)||new RegExp("(?:data-question=[\"']?|class=[\"'][^\"']*q)0?"+n+"(?!\\d)","i").test(raw);if(direct)return true;let re=/(?:问题|Question|Q|第)?\s*(\d+)\s*(?:-|–|—|至|到|和|and|to|&)\s*(\d+)\s*题?/gi,m;while((m=re.exec(raw))){let a=Number(m[1]),b=Number(m[2]);if(n>=Math.min(a,b)&&n<=Math.max(a,b))return true}return false}

function highlightTerms(){let terms=[];for(let item of DATA.transcriptHighlights||[]){let text=typeof item==='string'?item:item.text;if(text){terms.push(String(text));String(text).split(/\s+/).map(w=>w.replace(/[^A-Za-z0-9'-]/g,'')).filter(w=>w.length>=5&&!/^(which|three|answer|letter|about|their|there|would|could|should)$/i.test(w)).forEach(w=>terms.push(w))}}return [...new Set(terms.map(t=>t.trim()).filter(t=>t.length>1))].sort((a,b)=>b.length-a.length)}

function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}
function clearUserHighlights(){$$('.hl-brown,.hl-rose,.hl-blue').forEach(unwrap)}
function createNote(span){let id=span.dataset.hid;if($(`.note-card[data-hid="${id}"]`))return;let card=document.createElement('div');card.className='note-card';card.dataset.hid=id;card.innerHTML=`<div class="note-quote">${esc(span.textContent.slice(0,120))}</div><textarea placeholder="Write note here..."></textarea><button class="delete-note" type="button">Delete</button>`;$('#notesList').prepend(card);bindNoteDeletes()}
function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}
function removeNote(id){if(!id)return;$(`.note-card[data-hid="${id}"]`)?.remove()}
function drawTimer(){let m=Math.floor(secs/60),s=secs%60;$('#timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}
function adjustFontSize(delta){setFontSize(currentFontSize()+delta,true)}
function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}
function resetAppearance(persist=true){document.body.classList.remove('dark');setFontSize(DEFAULT_FONT_SIZE,false);updateSizeButtons();if(persist)save(false)}
function clearAllProgress(){localStorage.removeItem(storeKey)}
$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
const audio=$('#audio');$('#play').onclick=()=>audio.paused?audio.play():audio.pause();audio.onplay=()=>$('#play').textContent='⏸';audio.onpause=()=>$('#play').textContent='▶';audio.ontimeupdate=()=>{if(audio.duration)$('#fillbar').style.width=(audio.currentTime/audio.duration*100)+'%';$('#time').textContent=`${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${audio.duration?Math.floor(audio.duration/60):'00'}:${audio.duration?String(Math.floor(audio.duration%60)).padStart(2,'0'):'00'}`;maintainCueLoop()};$('#speed').onchange=e=>{slowCue=false;audio.playbackRate=+e.target.value;save(false)};$('#bar').onclick=e=>{if(audio.duration){let r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;save(false)}};
bindGlobal();render();
</script>
