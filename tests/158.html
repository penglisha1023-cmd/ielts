l":"First, you have some time to look at questions 11 to 15.","cn":"首先，你将有一些时间查看问题11到15。","analysis":""},{"time":"00:00:30,000 --> 00:00:53,840","html":"Hello. I'm delighted to welcome you to our mining community and very pleased that you're","cn":"你好。我很高兴欢迎大家来到我们的采矿社区，也很高兴你们","analysis":""},{"time":"00:00:53,840 --> 00:00:58,000","html":"interested in the oars and pits of this area. I think you'll be pleasantly surprised","cn":"对这个地区的矿石和矿坑感兴趣。我想你们会惊喜地发现","analysis":""},{"time":"00:00:58,000 --> 00:01:03,440","html":"with your special experience here. Now, let me start by giving you some warnings on safety rules","cn":"你们在这里的特别体验。现在，让我首先给你们一些安全规则","analysis":""},{"time":"00:01:03,440 --> 00:01:10,480","html":"and regulations. Rule number one, always wear safety equipment. There is a litany of safety equipment","cn":"和规定的警告。第一条规则，务必佩戴安全设备。有大量安全设备","analysis":""},{"time":"00:01:10,480 --> 00:01:16,160","html":"that mining workers use for their protection from helmets to safety glasses and gloves.","cn":"采矿工人用它们来保护自己，从头盔到安全眼镜和手套。","analysis":""},{"time":"00:01:16,160 --> 00:01:21,360","html":"It is essential that all workers wear the necessary safety equipment at all times.","cn":"所有工人必须始终佩戴必要的安全设备。","analysis":""},{"time":"00:01:21,360 --> 00:01:26,480","html":"There have been countless stories of workers being saved by helmets, which are the hard hats that","cn":"有无数工人因头盔（就是你们旁边架子上的安全帽）而获救的故事。","analysis":""},{"time":"00:01:26,480 --> 00:01:32,720","html":"you can see on the shelf beside you. So, visitors wearing helmets is mandatory in the mining","cn":"你们可以看到。所以，在采矿区游客佩戴头盔是强制性的，","analysis":""},{"time":"00:01:32,720 --> 00:01:37,920","html":"area, although <mark style=\"background-color: #fecaca;\">you are free to take them off when you're in the mining museum and picnic area<\/mark>.","cn":"尽管<mark style=\"background-color: #fecaca;\">在矿业博物馆和野餐区时，你们可以自由摘下<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题11的选项A是“它们必须在所有区域佩戴”。原文指出在采矿区强制佩戴，但<mark style=\"background-color: #fecaca;\">在矿业博物馆和野餐区可以摘下<\/mark>，因此选项A是错误的。"},{"time":"00:01:37,920 --> 00:01:42,400","html":"<mark style=\"background-color: #fecaca;\">You won't need to pay any deposit<\/mark>, though you should return them to the counter once you finish","cn":"<mark style=\"background-color: #fecaca;\">你们不需要支付任何押金<\/mark>，不过参观结束后需要将它们归还到柜台。","analysis":"<strong>答案解析：<\/strong> 问题11的选项B是“借用帽子需要押金”。原文明确指出<mark style=\"background-color: #fecaca;\">不需要支付任何押金<\/mark>，因此选项B是错误的。"},{"time":"00:01:42,400 --> 00:01:49,520","html":"The helmets are <mark style=\"background-color: #bbf7d0;\">offered in all sizes<\/mark>, so choose a suitable one. All right, our mining","cn":"头盔<mark style=\"background-color: #bbf7d0;\">提供所有尺寸<\/mark>，所以请选择合适的。好的，我们的采矿","analysis":"<strong>答案解析：<\/strong> 问题11的正确答案C是“它们有所有尺寸可供选择”。原文明确指出<mark style=\"background-color: #bbf7d0;\">头盔提供所有尺寸<\/mark>，这与选项C相符，因此C是正确答案。"},{"time":"00:01:49,520 --> 00:01:55,280","html":"community is currently being refurbished for some of the main area, so please make a note of that,","cn":"社区目前正在对一些主要区域进行翻新，请大家注意，","analysis":""},{"time":"00:01:55,280 --> 00:02:01,920","html":"and you'll know what to look out for. So, when you go in or out of the mine, please pay attention","cn":"这样你们就知道要注意什么了。所以，当你们进出矿井时，请注意","analysis":""},{"time":"00:02:01,920 --> 00:02:07,360","html":"to the road, for it has just been repaired because of the rough surface and can be really slippery <mark style=\"background-color: #bbf7d0;\">since it's still wet<\/mark>.","cn":"道路，因为它刚刚被修复，表面粗糙，而且<mark style=\"background-color: #bbf7d0;\">因为它仍然是湿的<\/mark>，所以可能会非常滑。","analysis":"<strong>答案解析：<\/strong> 问题12的正确答案A是“路面是湿的”。原文提到“道路……<mark style=\"background-color: #bbf7d0;\">因为它仍然是湿的<\/mark>，所以可能会非常滑”，这直接支持了选项A。"},{"time":"00:02:07,360 --> 00:02:13,920","html":"since it's still wet. The history and process of tin mining are complicated and involve a lot","cn":"因为它仍然是湿的。锡矿开采的历史和过程很复杂，涉及到很多","analysis":""},{"time":"00:02:13,920 --> 00:02:20,960","html":"of special words, but here you will see how it was and still is done. After a short 5 to 10 minute","cn":"专业术语，但在这里你们将看到它是如何进行以及仍然在进行的。经过5到10分钟的短途","analysis":""},{"time":"00:02:21,520 --> 00:02:27,600","html":"walk, visitors can track around a numbered route with clear explanations. Most of the tour is in","cn":"步行后，游客可以沿着有编号的路线进行，并配有清晰的解说。大部分游览在","analysis":""},{"time":"00:02:27,600 --> 00:02:34,720","html":"the open air, so nice weather helps. All areas are clearly posted with signs, but if you have problems","cn":"户外进行，所以好天气会有帮助。所有区域都清楚地标有指示牌，但如果你们在","analysis":""},{"time":"00:02:34,720 --> 00:02:40,400","html":"traveling around or climbing up and down, <mark style=\"background-color: #bbf7d0;\">you can turn to the staff here, and we are happy to help<\/mark>.","cn":"四处走动或上下攀爬时遇到问题，<mark style=\"background-color: #bbf7d0;\">可以向这里的工作人员求助，我们很乐意提供帮助<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题13的正确答案A是“可以寻求帮助”。原文明确指出“如果你们在四处走动或上下攀爬时遇到问题，<mark style=\"background-color: #bbf7d0;\">可以向这里的工作人员求助，我们很乐意提供帮助<\/mark>”，这与选项A相符。"},{"time":"00:02:40,400 --> 00:02:46,480","html":"If you're interested, Blue Hills Tin Stream is a working water-powered tin-streaming mill that","cn":"如果你感兴趣，蓝山锡流是一个正在运作的水力驱动锡流磨坊，它","analysis":""},{"time":"00:02:46,560 --> 00:02:51,920","html":"gives visitors a very clear idea of how difficult it is to get tin out of rock. I hope you'll enjoy","cn":"让游客非常清楚地了解从岩石中提取锡是多么困难。我希望你们会喜欢","analysis":""},{"time":"00:02:51,920 --> 00:02:58,000","html":"the informative indoor presentation and this self-guided tour, but you have to bear one thing in mind","cn":"这次内容丰富的室内讲解和自助游，但你们必须记住一件事，","analysis":""},{"time":"00:02:58,000 --> 00:03:03,680","html":"that <mark style=\"background-color: #bbf7d0;\">smoking is forbidden throughout the whole community<\/mark>. Though <mark style=\"background-color: #fecaca;\">you can take phones and of course<\/mark>","cn":"那就是<mark style=\"background-color: #bbf7d0;\">整个社区都禁止吸烟<\/mark>。尽管<mark style=\"background-color: #fecaca;\">你们可以携带手机并当然<\/mark>","analysis":"<strong>答案解析：<\/strong> 问题14的正确答案A是“吸烟”。原文明确指出“<mark style=\"background-color: #bbf7d0;\">整个社区都禁止吸烟<\/mark>”，这与选项A相符。 问题14的选项C是“使用手机”。原文提到“<mark style=\"background-color: #fecaca;\">你们可以携带手机并当然可以使用它们<\/mark>”，这与选项C（禁止使用手机）相矛盾，因此选项C是错误的。"},{"time":"00:03:03,680 --> 00:03:09,520","html":"<mark style=\"background-color: #fecaca;\">use them<\/mark>, you'll also be surprised that they will be more than just one place to go in the mine.","cn":"<mark style=\"background-color: #fecaca;\">可以使用它们<\/mark>，你们还会惊讶地发现矿井里不只一个地方可去。","analysis":"<strong>答案解析：<\/strong> 问题14的选项C是“使用手机”。原文提到“你们可以携带手机并当然<mark style=\"background-color: #fecaca;\">可以使用它们<\/mark>”，这与选项C（禁止使用手机）相矛盾，因此选项C是错误的。"},{"time":"00:03:10,080 --> 00:03:15,040","html":"The underground tunnel is now being refurbished and <mark style=\"background-color: #bbf7d0;\">only relevant workers can access it<\/mark>,","cn":"地下隧道目前正在翻新，<mark style=\"background-color: #bbf7d0;\">只有相关工人才能进入<\/mark>，","analysis":"<strong>答案解析：<\/strong> 问题15的正确答案B是“进入受限”。原文明确指出“<mark style=\"background-color: #bbf7d0;\">只有相关工人才能进入<\/mark>”地下隧道，这直接说明了进入是受限的，与选项B相符。"},{"time":"00:03:15,040 --> 00:03:20,560","html":"but it will soon be all finished and I believe it's a lovely place for you to explore around.","cn":"但它很快就会完工，我相信那是一个很棒的地方供你们探索。","analysis":""},{"time":"00:03:20,560 --> 00:03:24,000","html":"Don't forget to wear protective clothing. <mark style=\"background-color: #fecaca;\">It's mandatory<\/mark>.","cn":"不要忘记穿防护服。<mark style=\"background-color: #fecaca;\">这是强制性的<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题15的选项C是“防护服不必要”。原文强调“不要忘记穿防护服。<mark style=\"background-color: #fecaca;\">这是强制性的<\/mark>”，这与选项C完全相反，因此选项C是错误的。"},{"time":"00:03:26,720 --> 00:03:33,440","html":"Before you hear the rest of the talk, you have some time to look at questions 16 to 20.","cn":"在听讲座的其余部分之前，你有一些时间查看问题16到20。","analysis":""},{"time":"00:03:46,000 --> 00:03:57,200","html":"Now listen and answer questions 16 to 20.","cn":"现在请听并回答问题16到20。","analysis":""},{"time":"00:04:00,480 --> 00:04:06,720","html":"Now let's start by seeing where you can go. As you can see on our map in the brochure I've given you,","cn":"现在我们来看看你们可以去哪里。正如你们在我给你们的小册子地图上看到的，","analysis":""},{"time":"00:04:06,720 --> 00:04:13,040","html":"we are here at the reception block. We have a famous mill which is used for making and processing","cn":"我们现在在接待处。我们有一个著名的磨坊，用于制造和加工","analysis":""},{"time":"00:04:13,040 --> 00:04:19,600","html":"materials such as steel and coal. To visit it, just <mark style=\"background-color: #bbf7d0;\">go straight ahead, north along the path in<\/mark>","cn":"钢铁和煤炭等材料。要参观它，只需<mark style=\"background-color: #bbf7d0;\">径直向前走，沿着前面的小路向北<\/mark>","analysis":""},{"time":"00:04:19,600 --> 00:04:25,760","html":"<mark style=\"background-color: #bbf7d0;\">front of you and you'll find it at the end of the path<\/mark>. Now towards the east, go along the path","cn":"<mark style=\"background-color: #bbf7d0;\">走，在路尽头就能找到<\/mark>。现在向东，沿着小路走","analysis":"<strong>答案解析：<\/strong> 问题16的正确答案是Mill（磨坊）。原文明确指出“要参观它，只需<mark style=\"background-color: #bbf7d0;\">径直向前走，沿着前面的小路向北走，在路尽头就能找到<\/mark>”，这指示了磨坊（Mill）的位置。"},{"time":"00:04:25,760 --> 00:04:31,120","html":"from our starting point. Turn left to the corner and then turn right. There is a car park at the","cn":"从我们的起点出发。左转到拐角，然后右转。在小巷的东端有一个停车场。","analysis":""},{"time":"00:04:31,120 --> 00:04:38,000","html":"east end of the lane. <mark style=\"background-color: #bbf7d0;\">To the west, there is a museum. Pass the shop around the crossroads<\/mark>","cn":"小巷的东端。向西走，<mark style=\"background-color: #bbf7d0;\">有一个博物馆。穿过十字路口附近的商店<\/mark>","analysis":""},{"time":"00:04:38,000 --> 00:04:43,440","html":"<mark style=\"background-color: #bbf7d0;\">and it is just located at the west end of the road<\/mark>. By the way, the shop is specialised in","cn":"<mark style=\"background-color: #bbf7d0;\">它就位于路西尽头<\/mark>。顺便说一下，这家商店专门","analysis":"<strong>答案解析：<\/strong> 问题17的正确答案是Museum（博物馆）。原文明确  00:05:32,640","html":"Of course, if you want to spend some time in the fresh air, we have a perfect picnic area which","cn":"当然，如果你想在新鲜空气中度过一些时间，我们有一个完美的野餐区，它","analysis":""},{"time":"00:05:32,640 --> 00:05:39,120","html":"is just right and northeast of the reception block. Further east, there is a path leading to the","cn":"就在接待处的东北方向。再往东，有一条通往","analysis":""},{"time":"00:05:39,120 --> 00:05:45,920","html":"northern part of the park and <mark style=\"background-color: #bbf7d0;\">at the end of it is the toilet<\/mark>. Now most of the visitors would choose","cn":"公园北部的路，<mark style=\"background-color: #bbf7d0;\">路的尽头是厕所<\/mark>。现在大多数游客会选择","analysis":"<strong>答案解析：<\/strong> 问题20的正确答案是Toilet（厕所）。原文指出“再往东，有一条通往公园北部的路，<mark style=\"background-color: #bbf7d0;\">路的尽头是厕所<\/mark>”，这指示了厕所（Toilet）的位置。"},{"time":"00:05:45,920 --> 00:05:52,240","html":"to use the mailbox and send the beautiful postcards to their friends to reach it just.","cn":"使用邮箱并寄送漂亮的明信片给朋友。","analysis":""},{"time":"00:05:55,440 --> 00:06:01,840","html":"That is the end of section 2. You now have half a minute to check your answers.","cn":"第二部分到此结束。你现在有半分钟时间检查答案。","analysis":""}],"transcriptHighlights":[{"qid":"11","text":"They are available in all sizes.","answer":"C"},{"qid":"12","text":"The road is wet.","answer":"A"},{"qid":"13","text":"can ask for help.","answer":"A"},{"qid":"14","text":"smoking","answer":"A"},{"qid":"15","text":"The access is limited.","answer":"B"},{"qid":"16","text":"Mill","answer":"D"},{"qid":"17","text":"Museum","answer":"I"},{"qid":"18","text":"Laboratory","answer":"H"},{"qid":"19","text":"Café","answer":"G"},{"qid":"20","text":"Toilet","answer":"E"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

function groupHTML(g){if(g.type==='matching'&&g.layout==='flow')return `<section class="group"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="flow-layout"><div class="flow-steps">${g.questions.map((q,idx)=>`<div class="flow-step"><div class="flow-num">${q[0]}</div><div class="flow-text">${esc(q[1])}</div><span class="slot" data-q="${q[0]}"></span></div>${idx<g.questions.length-1?'<div class="flow-arrow">↓</div>':''}`).join('')}</div><div><strong>${esc(g.optionsTitle||'Options')}</strong><div class="pool">${g.options.map(o=>`<div class="drag" draggable="true" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</div></div></div></section>`;

function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify((DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',(g.questions||[]).map(q=>String(q.id||q[0]||''))]))}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}
function clearUserHighlights(){$$('.hl-brown,.hl-rose,.hl-blue').forEach(unwrap)}
function createNote(span){let id=span.dataset.hid;if($(`.note-card[data-hid="${id}"]`))return;let card=document.createElement('div');card.className='note-card';card.dataset.hid=id;card.innerHTML=`<div class="note-quote">${esc(span.textContent.slice(0,120))}</div><textarea placeholder="Write note here..."></textarea><button class="delete-note" type="button">Delete</button>`;$('#notesList').prepend(card);bindNoteDeletes()}
function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}
function removeNote(id){if(!id)return;$(`.note-card[data-hid="${id}"]`)?.remove()}
function drawTimer(){let m=Math.floor(secs/60),s=secs%60;$('#timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}
function adjustFontSize(delta){setFontSize(currentFontSize()+delta,true)}
function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}
function resetAppearance(persist=true){document.body.classList.remove('dark');setFontSize(DEFAULT_FONT_SIZE,false);updateSizeButtons();if(persist)save(false)}
function clearAllProgress(){localStorage.removeItem(storeKey)}
$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
const audio=$('#audio');$('#play').onclick=()=>audio.paused?audio.play():audio.pause();audio.onplay=()=>$('#play').textContent='⏸';audio.onpause=()=>$('#play').textContent='▶';audio.ontimeupdate=()=>{if(audio.duration)$('#fillbar').style.width=(audio.currentTime/audio.duration*100)+'%';$('#time').textContent=`${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${audio.duration?Math.floor(audio.duration/60):'00'}:${audio.duration?String(Math.floor(audio.duration%60)).padStart(2,'0'):'00'}`;maintainCueLoop()};$('#speed').onchange=e=>{slowCue=false;audio.playbackRate=+e.target.value;save(false)};$('#bar').onclick=e=>{if(audio.duration){let r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;save(false)}};
bindGlobal();render();
</script>
