true,"level":0}]},{"type":"multiple","title":"Questions 18–20","instruction":"Choose THREE letters, A–G.","id":"18-20","questionText":"Which THREE of the following features of the area in Spain does the speaker talk about?","limit":3,"options":[["A","altitude"],["B","coastline"],["C","economy"],["D","temperatures"],["E","vegetation"],["F","wildlife"]]}],"answerKey":{"text":{"q15":"socks","q16":"total block","q17":"plastic"},"single":{"q11":"C","q12":"B","q13":"A","q14":"B"},"multiple":{"q18_20":["A","E","F"]},"multipleMap":{"q18":"A","q19":"E","q20":"F"},"matching":{},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:11,720","html":"Section 2. You will hear a tour guide talking to some tourists who are going on a walking holiday","cn":"第2部分。你将听到一位导游对一些即将参加徒步假期的游客讲话，","analysis":""},{"time":"00:00:11,720 --> 00:00:13,080","html":"in Spain.","cn":"地点在西班牙。","analysis":""},{"time":"00:00:13,080 --> 00:00:19,360","html":"First, you have some time to look at questions 11-14 on page 3.","cn":"首先，你有一些时间查看第3页的问题11到14。","analysis":""},{"time":"00:00:30,000 --> 00:00:52,520","html":"Now, listen carefully and answer questions 11-14.","cn":"现在请仔细听，并回答问题11到14。","analysis":""},{"time":"00:00:52,520 --> 00:00:54,120","html":"Well good evening everyone.","cn":"大家晚上好。","analysis":""},{"time":"00:00:54,120 --> 00:00:59,040","html":"My name is Gary Payne and I'll be the leader for your walking holiday in Spain.","cn":"我叫 Gary Payne，将担任你们西班牙徒步假期的领队。","analysis":""},{"time":"00:00:59,040 --> 00:01:03,000","html":"The purpose of this evening's meeting is for us all to get to know each other in advance","cn":"今晚会议的目的是让我们提前互相认识，","analysis":""},{"time":"00:01:03,000 --> 00:01:06,840","html":"and for you to ask any questions you may have about the holiday.","cn":"也让你们提出任何关于这次假期的问题。","analysis":""},{"time":"00:01:06,840 --> 00:01:11,400","html":"So I'll begin by telling you a little bit about what to expect.","cn":"所以我先简单介绍一下你们可以期待些什么。","analysis":""},{"time":"00:01:11,400 --> 00:01:16,960","html":"Now the ferry crossing from England to Santander in Spain takes about 24 hours.","cn":"从英格兰乘渡轮到西班牙 Santander 大约需要24小时。","analysis":""},{"time":"00:01:16,960 --> 00:01:21,720","html":"We'll be sailing on the Prince Regent which was first launched in the 1980s as well as","cn":"我们将乘坐 Prince Regent 号，它最早于20世纪80年代下水，","analysis":""},{"time":"00:01:21,720 --> 00:01:29,200","html":"the crew of <mark style=\"background-color: #fecaca;\">160<\/mark>. It can accommodate about <mark style=\"background-color: #bbf7d0;\">2,000 people<\/mark> and <mark style=\"background-color: #fecaca;\">600 cars<\/mark>. And it sails at an","cn":"船上有<mark style=\"background-color: #fecaca;\">160名船员<\/mark>。它可以容纳大约<mark style=\"background-color: #bbf7d0;\">2000名乘客<\/mark>和<mark style=\"background-color: #fecaca;\">600辆汽车<\/mark>。它的航行","analysis":"<strong>答案解析：<\/strong>第11题问渡轮大约能容纳多少乘客。原文说 can accommodate about 2,000 people，160 是船员人数，600 是汽车数量，所以答案是 <strong>C. 2000<\/strong>。"},{"time":"00:01:29,200 --> 00:01:34,960","html":"average speed of 37 kilometres an hour. There'll be an on-board map on one of the decks which","cn":"平均速度是每小时37公里。船上某一层甲板会有一张地图，","analysis":""},{"time":"00:01:34,960 --> 00:01:38,320","html":"charts the ship's progress during the voyage.","cn":"显示船在航行过程中的位置进展。","analysis":""},{"time":"00:01:38,320 --> 00:01:42,800","html":"Although our minibus will be on one of the vehicle decks in the boat, access to these decks","cn":"虽然我们的小巴会停在船上的车辆甲板之一，但在航行期间，","analysis":""},{"time":"00:01:42,800 --> 00:01:47,120","html":"is prohibited during the crossing so when you leave our bus you'll have to take everything","cn":"这些甲板禁止进入，所以你们离开小巴时，必须带上所有","analysis":""},{"time":"00:01:47,120 --> 00:01:52,040","html":"that you're likely to need with you like toiletries or <mark style=\"background-color: #bbf7d0;\">books and magazines<\/mark>.","cn":"可能需要的东西，比如洗漱用品或<mark style=\"background-color: #bbf7d0;\">书和杂志<\/mark>。","analysis":""},{"time":"00:01:52,040 --> 00:01:57,080","html":"In fact it's probably a good idea to put these things in a separate bag beforehand.","cn":"事实上，最好提前把这些东西放在一个单独的包里。","analysis":"<strong>答案解析：<\/strong>第12题问游客应把哪些物品放在单独的包里。原文举例说 books and magazines，也就是阅读材料，所以答案是 <strong>B. reading material<\/strong>。"},{"time":"00:01:57,080 --> 00:02:02,280","html":"You shouldn't need <mark style=\"background-color: #fecaca;\">snacks<\/mark> on board as meals are provided and they're quite substantial.","cn":"你们不需要在船上准备<mark style=\"background-color: #fecaca;\">零食<\/mark>，因为船上提供餐食，而且份量很足。","analysis":""},{"time":"00:02:02,280 --> 00:02:06,800","html":"And if you don't feel well or get a headache you can get <mark style=\"background-color: #fecaca;\">tablets<\/mark> from me. I always carry","cn":"如果你们不舒服或头疼，可以从我这里拿<mark style=\"background-color: #fecaca;\">药片<\/mark>。我总是带着","analysis":""},{"time":"00:02:06,800 --> 00:02:09,120","html":"an adequate supply.","cn":"足够的药。","analysis":""},{"time":"00:02:09,120 --> 00:02:14,360","html":"Now once we're in Spain we'll be based at a hostel in a small village called La Vega de","cn":"到了西班牙后，我们会住在一个小村庄 La Vega de","analysis":""},{"time":"00:02:14,360 --> 00:02:20,800","html":"Liebana, about 120 kilometres from Santander. It's a very picturesque area that's retained","cn":"Liebana 的青年旅舍，距离 Santander 大约120公里。那里风景如画，保留了","analysis":""},{"time":"00:02:20,800 --> 00:02:24,240","html":"a lot of its traditional industry and culture.","cn":"许多传统产业和文化。","analysis":""},{"time":"00:02:24,240 --> 00:02:29,920","html":"The hostel accommodation's fairly simple. There are bunk beds and each room holds four to","cn":"旅舍住宿相当简单，有双层床，每个房间住四到","analysis":""},{"time":"00:02:29,920 --> 00:02:35,600","html":"eight people. But the <mark style=\"background-color: #bbf7d0;\">bathrooms and showers are of a high standard<\/mark>. The hostel residents","cn":"八个人。但是<mark style=\"background-color: #bbf7d0;\">浴室和淋浴设施标准很高<\/mark>。旅舍住客","analysis":"<strong>答案解析：<\/strong>第13题问 La Vega de Liebana 的旅舍有什么。原文说 bathrooms and showers are of a high standard，所以答案是 <strong>A. good washing facilities<\/strong>。"},{"time":"00:02:35,600 --> 00:02:40,760","html":"have the use of tennis courts nearby if you feel like a game. We'll be given breakfast","cn":"如果想打球，附近有网球场可供使用。我们会在旅舍吃早餐","analysis":""},{"time":"00:02:40,760 --> 00:02:43,840","html":"and an evening meal at the hostel.","cn":"和晚餐。","analysis":""},{"time":"00:02:43,840 --> 00:02:50,400","html":"In general the hostel is relaxed but there are a few rules which the owners enforce strictly.","cn":"总体来说，旅舍氛围轻松，但有几条规定，老板执行得很严格。","analysis":""},{"time":"00:02:50,400 --> 00:02:55,440","html":"Smoking is not allowed anywhere <mark style=\"background-color: #fecaca;\">inside the building<\/mark> and food and drink is banned in","cn":"楼内任何地方都禁止吸烟，宿舍里禁止饮食。","analysis":""},{"time":"00:02:55,440 --> 00:03:00,680","html":"the dormitories. Any chairs or tables which you take outside into the gardens must be","cn":"任何带到花园外面的椅子或桌子，必须","analysis":""},{"time":"00:03:00,680 --> 00:03:06,480","html":"returned every evening to their original place. And finally the <mark style=\"background-color: #bbf7d0;\">doors are locked after midnight<\/mark>","cn":"每天晚上放回原处。最后，<mark style=\"background-color: #bbf7d0;\">午夜后大门会上锁<\/mark>，","analysis":""},{"time":"00:03:06,480 --> 00:03:19,640","html":"out of consideration for other guests who are trying to sleep.","cn":"这是为了照顾正在睡觉的其他客人。","analysis":"<strong>答案解析：<\/strong>第14题问旅舍住客不允许做什么。原文说 doors are locked after midnight，所以午夜后不能进入旅舍，答案是 <strong>B. enter the hostel after a certain time<\/strong>。"},{"time":"00:03:19,640 --> 00:03:20,640","html":"On page 4","cn":"在第4页。","analysis":""},{"time":"00:03:36,480 --> 00:03:53,080","html":"Now listen and answer questions 15 to 20.","cn":"现在请听并回答问题15到20。","analysis":""},{"time":"00:03:53,080 --> 00:03:58,160","html":"Now that's enough about travel and accommodation. But before I move on I should say something","cn":"关于交通和住宿就说到这里。但在继续之前，我应该简单说一下","analysis":""},{"time":"00:03:58,160 --> 00:04:02,840","html":"briefly about equipment. There's a list in the guidebook you've been sent but I'll","cn":"装备。你们收到的指南里有一份清单，但我会","analysis":""},{"time":"00:04:02,840 --> 00:04:09,680","html":"just elaborate on one or two items. First boots. Make sure that the ones you bring","cn":"稍微详细讲一两个项目。首先是靴子。确保你带的靴子","analysis":""},{"time":"00:04:09,680 --> 00:04:15,320","html":"have thick soles that's the most important thing. Don't bring trainers for walking in","cn":"有厚鞋底，这是最重要的。不要穿运动鞋去徒步，","analysis":""},{"time":"00:04:15,320 --> 00:04:19,760","html":"apart from anything else they're dangerous because they slip. It's important to bring","cn":"别的不说，它们很危险，因为会打滑。带备用","analysis":""},{"time":"00:04:19,760 --> 00:04:26,360","html":"spare <mark style=\"background-color: #bbf7d0;\">socks<\/mark>. Then about waterproofs. I'd strongly advise you not to come with anything","cn":"<mark style=\"background-color: #bbf7d0;\">袜子<\/mark>也很重要。然后是防水衣物。我强烈建议你们不要带任何","analysis":"<strong>答案解析：<\/strong>第15题问需要带备用什么。原文说 bring spare socks，所以答案是 <strong>socks<\/strong>。"},{"time":"00:04:26,360 --> 00:04:31,800","html":"heavy you know with a thick lining. The ideal things are those lightweight ones because","cn":"厚衬里的重型防水衣。理想的是轻便款，因为","analysis":""},{"time":"00:04:31,800 --> 00:04:36,880","html":"they fold up small and although they do keep the wind out they don't make you too hot.","cn":"它们可以折得很小，虽然能挡风，但不会让你太热。","analysis":""},{"time":"00:04:36,880 --> 00:04:44,360","html":"Right? Next sun cream this is absolutely essential and regarding the strength make sure you","cn":"好吗？接下来是防晒霜，这绝对必不可少。至于强度，确保你们","analysis":""},{"time":"00:04:44,360 --> 00:04:50,720","html":"get what's known as <mark style=\"background-color: #bbf7d0;\">total block<\/mark>. Even factor 25 isn't good enough for those latitudes","cn":"买所谓的<mark style=\"background-color: #bbf7d0;\">全效防晒<\/mark>。即使是25倍防晒，在那个纬度","analysis":"<strong>答案解析：<\/strong>第16题问防晒霜强度应是什么。原文说 get what's known as total block，所以答案是 <strong>total block<\/strong>。"},{"time":"00:04:50,720 --> 00:04:57,360","html":"in July. Then let's see bring a folder to keep your map and other papers in you know one","cn":"的七月份也不够。然后，带一个文件夹来装地图和其他纸张，","analysis":""},{"time":"00:04:57,440 --> 00:05:03,120","html":"of those <mark style=\"background-color: #bbf7d0;\">plastic<\/mark> ones. It's not very likely to rain but if it does you'll find it soaks","cn":"就是那种<mark style=\"background-color: #bbf7d0;\">塑料<\/mark>文件夹。虽然不太可能下雨，但如果下雨，你会发现雨水会浸湿","analysis":"<strong>答案解析：<\/strong>第17题问地图等资料要放在什么文件夹里。原文说 one of those plastic ones，所以答案是 <strong>plastic<\/strong>。"},{"time":"00:05:03,120 --> 00:05:09,040","html":"everything. So that's the practicalities over. Now let me tell you a little bit about","cn":"一切。好了，实用事项就说到这里。现在让我给你们简单介绍一下","analysis":""},{"time":"00:05:09,040 --> 00:05:15,080","html":"the area in Spain where we'll be walking. The Picos de Europa. It's a very popular area","cn":"我们将在西班牙徒步的地区，Picos de Europa。这是一个非常受欢迎的地区，","analysis":""},{"time":"00:05:15,080 --> 00:05:20,240","html":"for tourists because of its spectacular peaks. Although there are only 25 kilometers from","cn":"因为那里有壮观的山峰。虽然它距离","analysis":""},{"time":"00:05:20,240 --> 00:05:27,920","html":"the sea the highest peaks are more than <mark style=\"background-color: #bbf7d0;\">2,600 meters high<\/mark> and have year round snow caps.","cn":"海边只有25公里，但最高峰超过<mark style=\"background-color: #bbf7d0;\">2600米<\/mark>，并且全年有积雪覆盖。","analysis":"<strong>答案解析：<\/strong>第18题问讲话者提到该地区的哪一项特征。原文说最高峰超过2600米，属于海拔/高度，所以答案包括 <strong>A. altitude<\/strong>。"},{"time":"00:05:27,920 --> 00:05:32,840","html":"On the highest peaks you've got <mark style=\"background-color: #bbf7d0;\">alpine plants<\/mark> that are only free of this snow cover for","cn":"在最高峰上，有<mark style=\"background-color: #bbf7d0;\">高山植物<\/mark>，一年中只有","analysis":""},{"time":"00:05:32,840 --> 00:05:38,400","html":"a few months a year. Then you've got meadows that are full of <mark style=\"background-color: #bbf7d0;\">wild flowers<\/mark> at certain times","cn":"几个月没有积雪覆盖。然后还有草地，在一年中的某些时候开满<mark style=\"background-color: #bbf7d0;\">野花<\/mark>。","analysis":"<strong>答案解析：<\/strong>第19题问讲话者提到该地区的哪一项特征。原文提到 alpine plants 和 wild flowers，属于植被，所以答案包括 <strong>E. vegetation<\/strong>。"},{"time":"00:05:38,400 --> 00:05:44,200","html":"of the year. Then the northern slopes are covered by woodlands giving homes to rare species","cn":"然后北坡覆盖着林地，为稀有物种提供栖息地，","analysis":""},{"time":"00:05:44,200 --> 00:05:49,120","html":"such as <mark style=\"background-color: #bbf7d0;\">wolves and bears<\/mark>. And because of the variety of plant life which","cn":"比如<mark style=\"background-color: #bbf7d0;\">狼和熊<\/mark>。而且由于那里保存着多样的植物生命，","analysis":"<strong>答案解析：<\/strong>第20题问讲话者提到该地区的哪一项特征。原文提到 wolves and bears，属于野生动物，所以答案包括 <strong>F. wildlife<\/strong>。"},{"time":"00:05:49,120 --> 00:05:56,720","html":"survives in that part of Europe due to the traditional way of life there.","cn":"这些植物生命之所以能在欧洲这一地区存活，是因为那里保留着传统生活方式。","analysis":""},{"time":"00:05:56,720 --> 00:06:02,280","html":"That is the end of section 2. You now have half a minute to check your answers.","cn":"第2部分到此结束。现在你有半分钟时间检查答案。","analysis":""},{"time":"00:06:19,120 --> 00:06:35,800","html":"Now turn to section 3 on page 5.","cn":"现在请翻到第5页第3部分。","analysis":""}],"transcriptHighlights":[{"qid":"11","text":"2000","answer":"C"},{"qid":"12","text":"reading material","answer":"B"},{"qid":"13","text":"good washing facilities.","answer":"A"},{"qid":"14","text":"enter the hostel after a certain time.","answer":"B"},{"qid":"15","text":"socks","answer":"socks"},{"qid":"16","text":"total block","answer":"total block"},{"qid":"17","text":"plastic","answer":"plastic"},{"qid":"18","text":"altitude","answer":"A"},{"qid":"19","text":"vegetation","answer":"E"},{"qid":"20","text":"wildlife","answer":"F"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',g.instruction||'',g.questionText||'',g.image||'',(g.options||[]),(g.questions||[]).map(q=>JSON.stringify(q))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}
function clearUserHighlights(){$$('.hl-brown,.hl-rose,.hl-blue').forEach(unwrap)}
function createNote(span){let id=span.dataset.hid;if($(`.note-card[data-hid="${id}"]`))return;let card=document.createElement('div');card.className='note-card';card.dataset.hid=id;card.innerHTML=`<div class="note-quote">${esc(span.textContent.slice(0,120))}</div><textarea placeholder="Write note here..."></textarea><button class="delete-note" type="button">Delete</button>`;$('#notesList').prepend(card);bindNoteDeletes()}
function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}
function removeNote(id){if(!id)return;$(`.note-card[data-hid="${id}"]`)?.remove()}
function drawTimer(){let m=Math.floor(secs/60),s=secs%60;$('#timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}
function adjustFontSize(delta){setFontSize(currentFontSize()+delta,true)}
function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}
function resetAppearance(persist=true){document.body.classList.remove('dark');setFontSize(DEFAULT_FONT_SIZE,false);updateSizeButtons();if(persist)save(false)}
function clearAllProgress(){localStorage.removeItem(storeKey)}
$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
const audio=$('#audio');$('#play').onclick=()=>audio.paused?audio.play():audio.pause();audio.onplay=()=>$('#play').textContent='⏸';audio.onpause=()=>$('#play').textContent='▶';audio.ontimeupdate=()=>{if(audio.duration)$('#fillbar').style.width=(audio.currentTime/audio.duration*100)+'%';$('#time').textContent=`${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${audio.duration?Math.floor(audio.duration/60):'00'}:${audio.duration?String(Math.floor(audio.duration%60)).padStart(2,'0'):'00'}`;maintainCueLoop()};$('#speed').onchange=e=>{slowCue=false;audio.playbackRate=+e.target.value;save(false)};$('#bar').onclick=e=>{if(audio.duration){let r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;save(false)}};
bindGlobal();render();
