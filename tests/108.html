,"multipleMap":{},"matching":{"q26":"G","q27":"D","q28":"A","q29":"H","q30":"F"},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:02,600","html":"Part 3.","cn":"第三部分。","analysis":""},{"time":"00:00:02,600 --> 00:00:09,440","html":"You will hear a discussion between a student called Mike and his tutor about Mike's proposed","cn":"你将听到一名叫 Mike 的学生和他的导师讨论 Mike 提议的","analysis":""},{"time":"00:00:09,440 --> 00:00:12,560","html":"project on oral history.","cn":"口述历史项目。","analysis":""},{"time":"00:00:12,560 --> 00:00:18,960","html":"First, you have some time to look at questions 21 to 25.","cn":"首先，你有一些时间浏览第21到25题。","analysis":""},{"time":"00:00:30,000 --> 00:00:59,800","html":"Now, listen carefully and answer questions 21 to 25.","cn":"现在请仔细听，并回答第21到25题。","analysis":""},{"time":"00:00:59,800 --> 00:01:05,400","html":"Tutor: Thanks, Mike, for dropping by.","cn":"Tutor：谢谢你过来，Mike。","analysis":""},{"time":"00:01:05,400 --> 00:01:10,000","html":"I've read the proposal for your project, which is an oral history of the local football","cn":"我已经读了你的项目提案，是关于当地足球队的口述历史，","analysis":""},{"time":"00:01:10,000 --> 00:01:16,760","html":"team, particularly the time around 1983 when they won the league championship.","cn":"尤其是他们在1983年前后赢得联赛冠军的那段时期。","analysis":""},{"time":"00:01:16,760 --> 00:01:20,640","html":"But first, how do you define oral history?","cn":"但首先，你如何定义口述历史？","analysis":""},{"time":"00:01:20,640 --> 00:01:25,880","html":"Mike: Well, in fact, I used the definition you gave us last year in our research methodology","cn":"Mike：嗯，事实上，我用了你去年在研究方法课上给我们的定义，","analysis":""},{"time":"00:01:25,880 --> 00:01:26,880","html":"class.","cn":"就是那门课上给的。","analysis":""},{"time":"00:01:26,880 --> 00:01:29,720","html":"I found the <mark style=\"background-color: #bbf7d0;\">handout<\/mark> in my file.","cn":"我在文件里找到了那份讲义。","analysis":"<strong>答案解析：<\/strong>第21题问 Mike 用什么来源作为定义。他说用了导师去年课上给的定义，并找到了 handout，所以答案是 C “a lecture handout”。"},{"time":"00:01:29,720 --> 00:01:35,600","html":"The definition says that oral histories are planned interviews or conversations about","cn":"这个定义说，口述历史是关于过去某方面的有计划访谈或谈话，","analysis":""},{"time":"00:01:35,600 --> 00:01:41,320","html":"some aspect of the past, which is considered historically or socially important.","cn":"这些内容被认为具有历史或社会重要性。","analysis":""},{"time":"00:01:41,320 --> 00:01:45,280","html":"The interviews are with people who took part in whatever it's about, so there'll be","cn":"访谈对象是参与过相关事情的人，因此会留下记录，","analysis":""},{"time":"00:01:45,280 --> 00:01:51,760","html":"a record which historians can use later for all those academic articles they write.","cn":"供历史学家以后写学术文章时使用。","analysis":""},{"time":"00:01:51,760 --> 00:01:57,280","html":"And although history textbooks are mostly about famous people and important events, oral","cn":"虽然历史教科书大多讲名人和重大事件，口述","analysis":""},{"time":"00:01:57,280 --> 00:02:01,720","html":"history can be about ordinary people doing ordinary things.","cn":"历史也可以关于普通人做普通事。","analysis":""},{"time":"00:02:01,720 --> 00:02:04,720","html":"Oral history really seems to have started in the States.","cn":"口述历史似乎确实起源于美国。","analysis":""},{"time":"00:02:04,720 --> 00:02:05,880","html":"Tutor: You're right.","cn":"Tutor: 你说得对。","analysis":""},{"time":"00:02:05,880 --> 00:02:11,880","html":"In fact, the first modern oral history interviews were done by a historian in New York.","cn":"事实上，最早的现代口述历史访谈是由纽约的一位历史学家完成的。","analysis":""},{"time":"00:02:11,880 --> 00:02:17,480","html":"By that time, audio technology had improved so much that it was fairly easy to record","cn":"到那时，音频技术已经有了很大改进，录制这些访谈已经相当容易，","analysis":""},{"time":"00:02:17,480 --> 00:02:18,800","html":"those interviews.","cn":"录制这些访谈。","analysis":""},{"time":"00:02:18,800 --> 00:02:23,280","html":"Mike: I was also interested in how the <mark style=\"background-color: #bbf7d0;\">internet<\/mark> is contributed to oral history studies.","cn":"Mike: 我也对互联网如何促进口述历史研究很感兴趣。","analysis":""},{"time":"00:02:23,280 --> 00:02:27,240","html":"Tutor: Yes, it means that lots of people can <mark style=\"background-color: #fecaca;\">access the material<\/mark>.","cn":"Tutor：是的，这意味着很多人可以访问这些材料。","analysis":""},{"time":"00:02:27,240 --> 00:02:28,880","html":"And that's great.","cn":"这很棒。","analysis":""},{"time":"00:02:28,880 --> 00:02:34,200","html":"Also, the interactive nature of the better websites means that more <mark style=\"background-color: #fecaca;\">students get interested<\/mark>","cn":"此外，更好的网站具有互动性，这意味着更多学生会对","analysis":""},{"time":"00:02:34,200 --> 00:02:35,840","html":"in oral history.","cn":"口述历史产生兴趣。","analysis":""},{"time":"00:02:35,840 --> 00:02:40,400","html":"Mike: But from what I've read, the real contribution of the internet is that the recording of","cn":"Mike：但根据我读到的内容，互联网真正的贡献是访谈录音","analysis":""},{"time":"00:02:40,400 --> 00:02:43,200","html":"the interviews will be <mark style=\"background-color: #bbf7d0;\">preserved forever<\/mark>.","cn":"可以被永久保存。","analysis":""},{"time":"00:02:43,200 --> 00:02:46,040","html":"In the old days, the tapes were just wear out.","cn":"过去，磁带会磨损。","analysis":""},{"time":"00:02:46,040 --> 00:02:49,400","html":"And after some years, you couldn't really use them, but not now.","cn":"几年后就不太能用了，但现在不会这样。","analysis":""},{"time":"00:02:49,400 --> 00:02:51,400","html":"Tutor: You're right, of course.","cn":"Tutor：当然，你说得对。","analysis":"<strong>答案解析：<\/strong>第22题问互联网对口述历史最重要的贡献。导师先提到公众访问和学生兴趣，但 Mike 强调 real contribution 是 recordings will be preserved forever，导师同意，所以答案是 A “the permanent preservation of recordings”。"},{"time":"00:02:51,400 --> 00:02:54,880","html":"Anyhow, let's move on to the subject of your project.","cn":"不管怎样，我们来谈谈你项目的主题。","analysis":""},{"time":"00:02:54,880 --> 00:02:57,600","html":"Why did you decide to study a sports team?","cn":"你为什么决定研究一支运动队？","analysis":""},{"time":"00:02:57,600 --> 00:03:01,000","html":"Mike: Well, actually, I <mark style=\"background-color: #fecaca;\">don't even like football very much<\/mark>.","cn":"Mike：嗯，实际上，我甚至不太喜欢足球。","analysis":""},{"time":"00:03:01,000 --> 00:03:04,480","html":"And some of my friends think I'm crazy to go for that subject.","cn":"我的一些朋友觉得我选这个主题很疯狂。","analysis":""},{"time":"00:03:04,480 --> 00:03:08,840","html":"But my <mark style=\"background-color: #bbf7d0;\">dad is a huge fan<\/mark>, and he might be able to help me.","cn":"但我爸爸是个超级球迷，他也许能帮我。","analysis":""},{"time":"00:03:08,840 --> 00:03:11,920","html":"Tutor: And how did you find out background about the team?","cn":"Tutor：那你是怎么了解这支球队背景资料的？","analysis":"<strong>答案解析：<\/strong>第23题问 Mike 为什么选择这个具体主题。他说自己不太喜欢足球，但爸爸是 huge fan，可能能帮他，对应 B “his father loves football”。朋友并没有鼓励他，而是觉得他疯了。"},{"time":"00:03:11,920 --> 00:03:14,320","html":"You talked to the team manager, I assume?","cn":"我猜你和球队经理谈过？","analysis":""},{"time":"00:03:14,320 --> 00:03:17,080","html":"Mike: Yes, I did manage to track him down.","cn":"Mike：是的，我确实设法找到了他。","analysis":""},{"time":"00:03:17,080 --> 00:03:22,040","html":"And I looked at all the old news stories about the team in the <mark style=\"background-color: #bbf7d0;\">town newspaper office<\/mark>.","cn":"我还在镇上的报社查阅了所有关于这支球队的旧新闻报道。","analysis":""},{"time":"00:03:22,040 --> 00:03:24,840","html":"That was where I got the <mark style=\"background-color: #bbf7d0;\">most helpful information<\/mark>.","cn":"那是我获得最有用信息的地方。","analysis":""},{"time":"00:03:24,840 --> 00:03:28,160","html":"I had high hopes that the <mark style=\"background-color: #fecaca;\">local library<\/mark> would have lots of stuff.","cn":"我原本很期待当地图书馆会有很多资料。","analysis":""},{"time":"00:03:28,160 --> 00:03:31,320","html":"But they don't keep many records for more than 10 years.","cn":"但他们不会保存很多超过十年的记录。","analysis":"<strong>答案解析：<\/strong>第24题问 Mike 关于球队最好的信息来源。他说在 town newspaper office 查旧新闻，并说那是 most helpful information，对应 A “doing research in the local newspaper archives”。球队经理和图书馆都不是最佳来源。"},{"time":"00:03:31,320 --> 00:03:36,000","html":"Tutor: I know that you managed to locate 10 of the original 18 members of the team","cn":"Tutor：我知道你成功找到了原来18名队员中的10名，","analysis":""},{"time":"00:03:36,000 --> 00:03:38,600","html":"using an old-fashioned method, didn't you?","cn":"用的是一种老式方法，对吧？","analysis":""},{"time":"00:03:38,600 --> 00:03:41,920","html":"Not a website or anything, just the <mark style=\"background-color: #bbf7d0;\">telephone directory<\/mark>.","cn":"不是网站之类的，只是电话簿。","analysis":""},{"time":"00:03:41,920 --> 00:03:44,920","html":"Mike: Yes, I didn't even need to use the <mark style=\"background-color: #fecaca;\">local team's records<\/mark>.","cn":"Mike：是的，我甚至不需要使用本地球队的记录。","analysis":"<strong>答案解析：<\/strong>第25题问 Mike 如何找到已安排采访的前球员。导师说不是网站，而是 telephone directory，对应 C “in the phone book”。team records 被明确说没有用。"},{"time":"00:03:48,280 --> 00:03:51,040","html":"Before you hear the rest of the discussion,","cn":"在你听讨论剩余部分之前，","analysis":""},{"time":"00:03:51,040 --> 00:03:55,200","html":"you have some time to look at questions 26 to 30.","cn":"你有一些时间浏览第26到30题。","analysis":""},{"time":"00:03:55,200 --> 00:04:25,000","html":"Now, listen and answer questions 26 to 30.","cn":"现在请听，并回答第26到30题。","analysis":""},{"time":"00:04:25,000 --> 00:04:31,400","html":"Tutor: OK, now I've read your proposal carefully.","cn":"Tutor：好的，现在我已经仔细读过你的提案了。","analysis":""},{"time":"00:04:31,400 --> 00:04:34,280","html":"Overall, your plan seemed excellent.","cn":"总体来说，你的计划看起来很棒。","analysis":""},{"time":"00:04:34,280 --> 00:04:37,040","html":"But I want to discuss how you might improve them.","cn":"但我想讨论一下你可以如何改进它。","analysis":""},{"time":"00:04:37,040 --> 00:04:38,040","html":"Mike: Great.","cn":"Mike：太好了。","analysis":""},{"time":"00:04:38,040 --> 00:04:40,400","html":"Tutor: I've read through the list of questions you've drafted.","cn":"Tutor：我已经看过你起草的问题清单。","analysis":""},{"time":"00:04:40,400 --> 00:04:46,040","html":"I felt most of them are rather <mark style=\"background-color: #bbf7d0;\">complex<\/mark> to be processed as oral questions.","cn":"我觉得其中大多数作为口头问题来说都相当复杂。","analysis":""},{"time":"00:04:46,040 --> 00:04:48,480","html":"You don't have too many, which is good.","cn":"问题数量不算太多，这很好。","analysis":""},{"time":"00:04:48,480 --> 00:04:51,480","html":"But you should try to do something about that problem.","cn":"但你应该设法解决这个问题。","analysis":""},{"time":"00:04:51,480 --> 00:04:53,320","html":"Mike: Right, I'll work on them.","cn":"Mike：好的，我会修改它们。","analysis":"<strong>答案解析：<\/strong>第26题是 Questions drafted 的问题。导师说问题作为口头问题来说 rather complex，所以答案是 G “too complicated”。"},{"time":"00:04:54,000 --> 00:04:57,000","html":"Tutor: And the time you've allotted for each interview.","cn":"Tutor：还有你为每次访谈分配的时间。","analysis":""},{"time":"00:04:57,000 --> 00:05:00,960","html":"Actually, I think you may have scheduled <mark style=\"background-color: #bbf7d0;\">too much time<\/mark> for each.","cn":"事实上，我认为你可能给每次访谈安排了太多时间。","analysis":""},{"time":"00:05:00,960 --> 00:05:03,920","html":"You want them to be tight, not going on and on.","cn":"你希望它们紧凑，而不是一直拖下去。","analysis":""},{"time":"00:05:03,920 --> 00:05:05,960","html":"That makes for better results.","cn":"这样结果会更好。","analysis":""},{"time":"00:05:05,960 --> 00:05:08,280","html":"Mike: I can change the schedule.","cn":"Mike：我可以修改时间安排。","analysis":"<strong>答案解析：<\/strong>第27题是 Time allotted 的问题。导师说 scheduled too much time，所以答案是 D “too long”。"},{"time":"00:05:08,280 --> 00:05:12,440","html":"One thing I'm nervous about is the <mark style=\"background-color: #bbf7d0;\">recording equipment<\/mark> I use.","cn":"我担心的一件事是我使用的录音设备。","analysis":""},{"time":"00:05:12,440 --> 00:05:14,560","html":"I've got an old recorder.","cn":"我有一台旧录音机。","analysis":""},{"time":"00:05:14,560 --> 00:05:17,880","html":"It runs without making too much <mark style=\"background-color: #fecaca;\">noise<\/mark>, and it isn't complicated.","cn":"它运行时不会产生太大噪音，也不复杂。","analysis":""},{"time":"00:05:17,880 --> 00:05:20,560","html":"But it sometimes just <mark style=\"background-color: #bbf7d0;\">doesn't seem to work<\/mark>.","cn":"但有时它似乎就是不能正常工作。","analysis":""},{"time":"00:05:20,560 --> 00:05:21,840","html":"It stopped during an interview.","cn":"它在一次采访中停了下来。","analysis":""},{"time":"00:05:21,840 --> 00:05:23,280","html":"I tried out with my dad.","cn":"那是我和我爸爸试录的时候。","analysis":""},{"time":"00:05:23,280 --> 00:05:26,880","html":"Tutor: Well, the important thing is just be ready if anything happens.","cn":"Tutor：嗯，重要的是如果发生什么情况，要做好准备。","analysis":""},{"time":"00:05:26,880 --> 00:05:31,240","html":"I'll take some spare batteries, or even an extra recorder.","cn":"我会带一些备用电池，甚至再带一台录音机。","analysis":"<strong>答案解析：<\/strong>第28题是 Recording equipment used 的问题。Mike 说旧录音机有时不工作，甚至采访中停了，说明设备太不可靠，对应 A “too unreliable”。他明确说不会太吵，所以 noisy 是干扰项。"},{"time":"00:05:31,240 --> 00:05:35,440","html":"Now, I'm a little concerned with the <mark style=\"background-color: #bbf7d0;\">subjects<\/mark> you've chosen to cover.","cn":"现在，我有点担心你选择要覆盖的主题。","analysis":""},{"time":"00:05:35,440 --> 00:05:39,720","html":"The topics seem quite <mark style=\"background-color: #bbf7d0;\">general<\/mark>, not very specific.","cn":"这些主题似乎相当笼统，不够具体。","analysis":""},{"time":"00:05:39,720 --> 00:05:44,080","html":"For example, why did they like playing for this team?","cn":"例如，他们为什么喜欢为这支球队效力？","analysis":""},{"time":"00:05:44,080 --> 00:05:48,280","html":"You need to talk about more exact things and feelings.","cn":"你需要谈论更具体的事情和感受。","analysis":""},{"time":"00:05:48,280 --> 00:05:50,760","html":"That way, your results will be more valuable.","cn":"这样你的结果会更有价值。","analysis":""},{"time":"00:05:50,760 --> 00:05:52,720","html":"Mike: I'll try to refine them.","cn":"Mike：我会尽量细化它们。","analysis":"<strong>答案解析：<\/strong>第29题是 Subjects chosen 的问题。导师说 topics quite general, not very specific，需要 more exact things and feelings，所以答案是 H “too vague”。"},{"time":"00:05:52,720 --> 00:05:56,440","html":"And you know, the plan for my <mark style=\"background-color: #bbf7d0;\">report<\/mark> seems to be just to report back","cn":"你知道，我的报告计划似乎只是复述","analysis":""},{"time":"00:05:56,440 --> 00:05:59,840","html":"more or less what the players say, what happened, when,","cn":"球员们说了什么、发生了什么、什么时候发生，","analysis":""},{"time":"00:05:59,840 --> 00:06:02,120","html":"what they each did, and so on.","cn":"他们各自做了什么，等等。","analysis":""},{"time":"00:06:02,120 --> 00:06:03,680","html":"But I'm not sure about that.","cn":"但我对此不太确定。","analysis":""},{"time":"00:06:03,680 --> 00:06:07,320","html":"Tutor: Yes, although your outline seems long enough,","cn":"Tutor：是的，虽然你的提纲看起来够长，","analysis":""},{"time":"00:06:07,320 --> 00:06:11,120","html":"change it to indicate that you plan to include your own <mark style=\"background-color: #bbf7d0;\">evaluation<\/mark>","cn":"但你要修改它，表明你计划加入自己的评价，","analysis":""},{"time":"00:06:11,120 --> 00:06:14,360","html":"of the data you get from your interviewees.","cn":"评价你从受访者那里获得的数据。","analysis":""},{"time":"00:06:14,360 --> 00:06:16,560","html":"Anyhow, best of luck on your project.","cn":"总之，祝你的项目顺利。","analysis":"<strong>答案解析：<\/strong>第30题是 Proposed report 的问题。Mike 说报告只是复述球员所说的事实，导师要求加入自己的 evaluation，说明原计划太事实罗列化，对应 F “too factual”。"},{"time":"00:06:16,560 --> 00:06:18,640","html":"I look forward to seeing the results.","cn":"我期待看到结果。","analysis":""},{"time":"00:06:18,640 --> 00:06:19,560","html":"Mike: Thanks for your help.","cn":"Mike：谢谢你的帮助。","analysis":""},{"time":"00:06:19,560 --> 00:06:26,800","html":"And that is the end of Part 3.","cn":"第三部分到此结束。","analysis":""},{"time":"00:06:26,800 --> 00:06:31,080","html":"You now have 30 seconds to check your answers to Part 3.","cn":"现在你有30秒时间检查第三部分的答案。","analysis":""},{"time":"00:06:46,560 --> 00:06:47,560","html":"Thank you very much.","cn":"非常感谢。","analysis":""},{"time":"00:06:47,560 --> 00:06:48,560","html":"Thank you.","cn":"谢谢。","analysis":""}],"transcriptHighlights":[{"qid":"21","text":"a lecture handout","answer":"C"},{"qid":"22","text":"the permanent preservation of recordings","answer":"A"},{"qid":"23","text":"his father loves football.","answer":"B"},{"qid":"24","text":"doing research in the local newspaper archives","answer":"A"},{"qid":"25","text":"in the phone book","answer":"C"},{"qid":"26","text":"too complicated","answer":"G"},{"qid":"27","text":"too long","answer":"D"},{"qid":"28","text":"too unreliable","answer":"A"},{"qid":"29","text":"too vague","answer":"H"},{"qid":"30","text":"too factual","answer":"F"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

function highlightTerms(){let terms=[];for(let item of DATA.transcriptHighlights||[]){let text=typeof item==='string'?item:item.text;if(text){terms.push(String(text));String(text).split(/\s+/).map(w=>w.replace(/[^A-Za-z0-9'-]/g,'')).filter(w=>w.length>=5&&!/^(which|three|answer|letter|about|their|there|would|could|should)$/i.test(w)).forEach(w=>terms.push(w))}}return [...new Set(terms.map(t=>t.trim()).filter(t=>t.length>1))].sort((a,b)=>b.length-a.length)}
function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',(g.questions||[]).map(q=>String(q.id||q[0]||''))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}

function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}

const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}

$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
