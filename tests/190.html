<script>

        const ANSWER_KEY = {

        function isTextAnswerCorrect(qNum, userAnswer) {
            if (!userAnswer) return false;
            const norm = userAnswer.trim().toLowerCase();
            const correct = ANSWER_KEY.text[`q${qNum}`];
            if (Array.isArray(correct)) {
                return correct.some(c => norm === c.toLowerCase());
            }
            return norm === correct.toLowerCase();
        }

        const STORAGE_KEY = "ielts_listening_section3_final_global";

        // 完整听力原文（带高亮答案，底部留足空隙）
        const FULL_TRANSCRIPT = `
            <p><strong>Section 3</strong></p>
            <p>Excuse me, Dr. Thompson, may I speak to you for a minute?<br>Of course, please come in.<br>I'm Alexandra Jones, I'm studying business here at the university. And for my assignment I have to carry out a survey of people who own their own organizations. I heard that you are the founder of your own company, and I was wondering if I could ask you some questions about it.<br>Yes of course, please, fire away.</p>
            <p>Okay great, we'll get started. Did you encounter any problems whilst you were starting your company?<br>Actually, it was not as hard as I anticipated. I started out with very clear objectives, so I knew exactly what I wanted my corporate identity to be. It was very difficult to find the correct premises as the property market in London is so competitive, but eventually I found the perfect site. <span class="answer-highlight">The hardest part was structuring the business, as I had no formal template</span>, so I had to create it myself.</p>
            <p>Yes, that is very impressive. Was it difficult dealing with staff?<br>It's always tricky trying to satisfy a group of people with varying interests. However, I didn't encounter many problems. I found it very important to make the staff feel appreciated, so I hosted a staff day where we could all introduce ourselves. I was also able to talk to them about the type of work that they would be doing and gave them the opportunity to share with me the issues they had with <span class="answer-highlight">the allocation of the work</span>.</p>
            <p>Okay, did you hire a management team or did you take on the role of the manager?<br>Oh no, I already had enough tasks to take care of. I employed someone else to take on the role of the manager. However, <span class="answer-highlight">he never consulted me before making decisions</span>, so I was forced to let him go and hire someone else.</p>
            <p>And what did the other staff think of the new manager?<br>They had a great deal of respect for him. It definitely helped that I consulted with them before hiring him. <span class="answer-highlight">They were surprised that he has been so successful</span> in his role at the company, despite the longer meeting hours.</p>
            <p>Since the company opened, has it had any great achievements?<br>There are many aspects of the company that I am pleased with. However, there is one achievement of which I am particularly proud. I wanted a mural painted to brighten up our entrance area, so I decided it would be a great idea to <span class="answer-highlight">invite the local primary school to create one for us</span>. The youngsters had a great time, and I know they were thrilled to be included.</p>
            <p><strong>Now listen and answer questions 26 to 30.</strong></p>
            <p>Have you encountered any major problems since you opened the company?<br>Yes, we are always encountering issues with employment, because it is very hard to find people who are qualified for the roles that we are offering. But unfortunately, <span class="answer-highlight">there is no solution</span> to this. One of our administrators also recently left to go on maternity leave, which put us in a tricky situation. However, we have managed to find a temporary replacement for her. It is also now approaching the period when we must carry out our financial training, so I need to find a venue with enough space to hold everyone.</p>
            <p>Organisation is a difficult thing to master, but it is also essential for success. Whilst I was learning how to stay organised, I realised that <span class="answer-highlight">the role of motivation</span> is essential. I also suggest that you visit the library, as there is <span class="answer-highlight">a section on culture</span> that will have some very valuable material on how to develop your organisation skills. They also have a collection of documentaries on the subject of personal organisation, and I suggest that you look up the <span class="answer-highlight">literature on management of change</span>. I personally found these sources incredibly useful. Articles are also a valuable resource, and we have a whole collection of them in our university library. I advise that you look at section 2, where you will find <span class="answer-highlight">articles on the nature of volunteering</span>.</p>
            <p>That's great. Thank you so much for your help.<br>No problem.<br>That is the end of section 3.</p>

        }

        function updateNavState() {
            if (isReviewing) return;
            for (let i = 21; i <= 30; i++) {
                const nav = document.querySelector(`.q-nav-item[data-q="${i}"]`);
                if (!nav) continue;
                let answered = false;
                if (i <= 25) answered = !!document.querySelector(`input[name="q${i}"]:checked`);
                else answered = !!document.querySelector(`input[name="q${i}"]`)?.value.trim();
                nav.classList.toggle('answered', answered);
                nav.classList.remove('correct', 'incorrect');
            }
        }

        function colorNavByResults() {
            for (let i = 21; i <= 30; i++) {
                const nav = document.querySelector(`.q-nav-item[data-q="${i}"]`);
                if (!nav) continue;
                let isCorrect = false;
                if (i <= 25) {
                    const user = document.querySelector(`input[name="q${i}"]:checked`)?.value;
                    isCorrect = (user === ANSWER_KEY.single[`q${i}`]);
                } else {
                    const user = document.querySelector(`input[name="q${i}"]`)?.value || '';
                    isCorrect = isTextAnswerCorrect(i, user);
                }
                nav.classList.remove('answered', 'correct', 'incorrect');
                nav.classList.add(isCorrect ? 'correct' : 'incorrect');
            }
        }

        // ***** 关键修改：只生成一个全局的答案表格，放在题目区域底部 *****
        function generateGlobalResultTable() {
            // 移除之前可能存在的全局表格
            const oldGlobal = document.getElementById('global-results-table');
            if (oldGlobal) oldGlobal.remove();

            // 收集所有题目的答案和正确性
            const rows = [];
            for (let q = 21; q <= 25; q++) {
                const user = document.querySelector(`input[name="q${q}"]:checked`)?.value || '—';
                const correct = ANSWER_KEY.single[`q${q}`];
                const isCorrect = (user === correct);
                rows.push(`<tr><td><b>${q}</b></td><td>${user}</td><td>${correct}</td><td class="${isCorrect ? 'result-correct' : 'result-incorrect'}">${isCorrect ? '✔ Correct' : '✖ Incorrect'}</td></tr>`);
            }
            for (let q = 26; q <= 30; q++) {
                const user = (document.querySelector(`input[name="q${q}"]`)?.value || '—').trim();
                let correctDisplay = ANSWER_KEY.text[`q${q}`];
                if (Array.isArray(correctDisplay)) correctDisplay = correctDisplay.join(' / ');
                const isCorrect = (q === 27) ? isTextAnswerCorrect(q, user) : (user.toLowerCase() === (Array.isArray(ANSWER_KEY.text[`q${q}`]) ? ANSWER_KEY.text[`q${q}`][0] : ANSWER_KEY.text[`q${q}`]).toLowerCase());
                rows.push(`<tr><td><b>${q}</b></td><td>${user || '—'}</td><td>${correctDisplay}</td><td class="${isCorrect ? 'result-correct' : 'result-incorrect'}">${isCorrect ? '✔ Correct' : '✖ Incorrect'}</td></tr>`);
            }

            const tableHTML = `
                <div id="global-results-table" class="global-results">
                    <h4>📊 Final Answer Review (All Questions)</h4>
                    <table class="results-table">
                        <thead><tr><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th></tr></thead>
                        <tbody>${rows.join('')}</tbody>
                    </table>
                </div>
            `;
            // 插入到 test-pages-container 末尾（所有题目之后）
            const container = document.getElementById('test-pages-container');
            container.insertAdjacentHTML('beforeend', tableHTML);
        }

        function enableDisableInputs(disabled) {
            document.querySelectorAll('input.blank, input[type="radio"]').forEach(inp => inp.disabled = disabled);
        }

        function buildTranscriptPane() {
            const rightPane = document.getElementById('transcript-content');
            rightPane.innerHTML = `<h4>📖 Listening Transcript (Answers Highlighted)</h4>${FULL_TRANSCRIPT}<button id="close-transcript-btn">✕</button>`;
            const closeBtn = document.getElementById('close-transcript-btn');
            if (closeBtn) closeBtn.onclick = () => document.getElementById('main-shell').classList.remove('split-view');
        }

        // Finish 切换：复习模式 / 做题模式
        function toggleFinishMode() {
            if (isReviewing) {
                // 返回做题模式，清除所有批改痕迹
                isReviewing = false;
                document.getElementById('finish-btn').innerText = 'Finish';
                document.getElementById('main-shell').classList.remove('split-view');
                enableDisableInputs(false);
                // 移除全局表格
                const globalTable = document.getElementById('global-results-table');
                if (globalTable) globalTable.remove();
                // 重置导航样式
                for (let i = 21; i <= 30; i++) {
                    const nav = document.querySelector(`.q-nav-item[data-q="${i}"]`);
                    if (nav) nav.classList.remove('correct', 'incorrect');
                }
                updateNavState();
                if (!timerInterval && timerSeconds >= 0) startTimer();
            } else {
                if (confirm('提交答案并进入复习模式（显示答案回顾及原文）？')) {
                    isReviewing = true;
                    document.getElementById('finish-btn').innerText = 'Return to Test';
                    document.getElementById('main-shell').classList.add('split-view');
                    buildTranscriptPane();
                    enableDisableInputs(true);
                    // 只生成一个全局答案表格（所有题型汇总）
                    generateGlobalResultTable();
                    colorNavByResults();
                    if (timerInterval) clearInterval(timerInterval);
                    timerInterval = null;
                }
            }
        }

        // 音频控件
        function initAudio() {
            const wrapper = document.querySelector('.audio-player-wrapper');
            wrapper.innerHTML = `
                <div class="audio-player"><button class="play-pause-btn">▶</button><div class="progress-container"><div class="progress-bar-wrapper"><div class="progress-bar"></div></div></div><div class="time-display">00:00 / 00:00</div><div class="speed-control"><select class="playback-speed"><option value="0.7">0.7x</option><option value="1.0" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.2">1.2x</option><option value="1.5">1.5x</option></select></div><audio class="listening-audio" src="https://qyccvyyigtjhzunumbqf.supabase.co/storage/v1/object/public/audio/190.mp3" preload="metadata"></audio></div>
            `;
            const audio = document.querySelector('.listening-audio');
            if (!audio) return;
            const playBtn = document.querySelector('.play-pause-btn');
            const progContainer = document.querySelector('.progress-container');
            const progressBar = document.querySelector('.progress-bar');
            const timeSpan = document.querySelector('.time-display');
            const speedSelect = document.querySelector('.playback-speed');
            let scrubbing = false;
            const update = () => {
                if (!scrubbing && audio.duration) progressBar.style.width = (audio.currentTime / audio.duration) * 100 + '%';
                timeSpan.innerText = `${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${Math.floor(audio.duration/60)}:${String(Math.floor(audio.duration%60)).padStart(2,'0')}`;
            };
            playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
            audio.onplay = () => playBtn.innerHTML = '⏸';
            audio.onpause = () => playBtn.innerHTML = '▶';
            audio.ontimeupdate = update;
            speedSelect.onchange = () => audio.playbackRate = parseFloat(speedSelect.value);
            progContainer.onmousedown = (e) => {
                scrubbing = true;
                const rect = progContainer.getBoundingClientRect();
                audio.currentTime = (Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width))) * audio.duration;
                update();
            };
            document.onmouseup = () => scrubbing = false;
            document.onmousemove = (e) => {
                if (scrubbing && audio.duration) {
                    const rect = progContainer.getBoundingClientRect();
                    audio.currentTime = (Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width))) * audio.duration;
                    update();
                }
            };
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => { timerSeconds++; updateTimerUI(); }, 1000);
        }
        function updateTimerUI() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            document.getElementById('timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        function saveAll(showToastMsg = true) {
            const answers = {};
            for (let i = 21; i <= 25; i++) answers[`q${i}`] = document.querySelector(`input[name="q${i}"]:checked`)?.value || '';
            for (let i = 26; i <= 30; i++) answers[`q${i}`] = document.querySelector(`input[name="q${i}"]`)?.value || '';
            const notesHTML = document.getElementById('notes-list').innerHTML;
            const testHTML = document.getElementById('test-pages-container').innerHTML;
            const data = { answers, timer: timerSeconds, notesHTML, testHTML, fontSize: document.documentElement.className, darkMode: document.body.classList.contains('dark-mode') };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            if (showToastMsg) { const toast = document.getElementById('toast'); toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 1500); }
        }

        function loadFromStorage() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            try {
                const data = JSON.parse(raw);
                if (data.testHTML) document.getElementById('test-pages-container').innerHTML = data.testHTML;
                if (data.notesHTML) document.getElementById('notes-list').innerHTML = data.notesHTML;
                if (data.timer !== undefined) timerSeconds = data.timer;
                updateTimerUI();
                if (data.fontSize) document.documentElement.className = data.fontSize;
                if (data.darkMode) document.body.classList.add('dark-mode');
                if (data.answers) {
                    for (let key in data.answers) {
                        const val = data.answers[key];
                        const el = document.querySelector(`input[name="${key}"]`);
                        if (el && el.type === 'radio') {
                            const radioToCheck = document.querySelector(`input[name="${key}"][value="${val}"]`);
                            if (radioToCheck) radioToCheck.checked = true;
                        } else if (el && el.type === 'text') el.value = val;
                    }
                }
                updateNavState();
            } catch(e) {}
        }

        function clearAll() {
            if (confirm('⚠️ 清除所有进度，包括答案、高亮和笔记？')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // 高亮 & 笔记
        function initHighlightAndNotes() {
            document.addEventListener('mouseup', (e) => {
                if (e.target.closest('#selbar, #notes, .bottom-bar')) return;
                const sel = window.getSelection();
                if (sel && !sel.isCollapsed) {
                    const bar = document.getElementById('selbar');
                    bar.targetElem = null;
                    bar.hidden = false;
                    const range = sel.getRangeAt(0).getBoundingClientRect();
                    bar.style.left = `${window.scrollX + range.left + range.width/2 - 70}px`;
                    bar.style.top = `${window.scrollY + range.top - 40}px`;
                } else document.getElementById('selbar').hidden = true;
            });
            document.getElementById('selbar')?.addEventListener('click', (ev) => {
                const act = ev.target.closest('button')?.dataset.act;
                const sel = window.getSelection();
                if (!act || sel.isCollapsed) return;
                const range = sel.getRangeAt(0);
                const span = document.createElement('span');
                if (act === 'hl') span.className = 'hl-brown';
                else if (act === 'note') span.className = 'hl-blue';
                else return;
                try {
                    range.surroundContents(span);
                    if (act === 'note') {
                        const hid = 'n_' + Date.now();
                        span.dataset.hid = hid;
                        const card = document.createElement('div');
                        card.className = 'note-card';
                        card.dataset.hid = hid;
                        card.innerHTML = `<div class="note-quote">${span.innerText.slice(0,80)}</div><textarea placeholder="Write note here..."></textarea><button class="del-note-btn">Delete</button>`;
                        card.querySelector('.del-note-btn').onclick = () => { span.outerHTML = span.innerText; card.remove(); };
                        document.getElementById('notes-list').prepend(card);
                        document.body.classList.add('notes-open');
                    }
                } catch(e) {}
                document.getElementById('selbar').hidden = true;
                sel.removeAllRanges();
                saveAll(false);
            });
        }

        function bindEvents() {
            document.getElementById('save-btn').addEventListener('click', () => saveAll(true));
            document.getElementById('clear-btn').addEventListener('click', clearAll);
            document.getElementById('finish-btn').addEventListener('click', toggleFinishMode);
            document.getElementById('toggle-notes-btn').addEventListener('click', () => document.body.classList.toggle('notes-open'));
            document.getElementById('notes-close').addEventListener('click', () => document.body.classList.remove('notes-open'));
            document.getElementById('toggle-transcript-btn').addEventListener('click', () => { document.getElementById('main-shell').classList.toggle('split-view'); buildTranscriptPane(); });
            const settingsBtn = document.getElementById('settings-btn'), settingsPanel = document.getElementById('settings-panel'), overlay = document.querySelector('.overlay');
            settingsBtn.onclick = (e) => { e.stopPropagation(); const visible = settingsPanel.style.display === 'block'; settingsPanel.style.display = visible ? 'none' : 'block'; overlay.style.display = visible ? 'none' : 'block'; };
            overlay.onclick = () => { settingsPanel.style.display = 'none'; overlay.style.display = 'none'; };
            document.querySelectorAll('.settings-option[data-size]').forEach(btn => btn.addEventListener('click', () => { document.documentElement.className = `font-${btn.dataset.size}`; saveAll(false); }));
            document.querySelectorAll('.settings-option[data-mode]').forEach(btn => btn.addEventListener('click', () => { document.body.classList.toggle('dark-mode', btn.dataset.mode === 'dark'); saveAll(false); }));
            document.addEventListener('input', () => { if (!isReviewing) updateNavState(); });
        }

        function initSplitter() {
            const splitter = document.getElementById('splitter');
            let dragging = false;
            splitter.addEventListener('mousedown', () => { dragging = true; document.body.style.cursor = 'col-resize'; });
            window.addEventListener('mouseup', () => { dragging = false; document.body.style.cursor = ''; });
            window.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                const left = document.getElementById('left-pane'), right = document.getElementById('right-pane');
                const total = left.parentElement.offsetWidth;
                let newLeft = e.clientX;
                if (newLeft > 200 && (total - newLeft - 6) > 200) {
                    left.style.flexBasis = `${newLeft}px`;
                    right.style.flexBasis = `${total - newLeft - 6}px`;
                }
            });
        }

        function init() {
            renderQuestions();
            buildNav();
            initAudio();
            bindEvents();
            initHighlightAndNotes();
            initSplitter();
            loadFromStorage();
            startTimer();
            updateNavState();
        }
        init();
    })();
</script>
