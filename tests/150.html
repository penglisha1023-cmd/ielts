,["D","an explanation of the development of modern Ife"],["E","more details of past activities of the Ife people"]]},{"type":"multiple","title":"Questions 29 and 30","instruction":"Choose TWO letters, A–E.","id":"29-30","questionText":"Which TWO features of his research in Nigeria will Terence discuss in his presentation?","limit":2,"options":[["A","the influence of the sculptures on western artists"],["B","the uncertainty over who made the sculptures"],["C","the sources of the materials used for the sculptures"],["D","the problems he faced in collecting information"],["E","the original discovery of the sculptures"]]}],"answerKey":{"text":{},"single":{"q21":"B","q22":"C","q23":"A","q24":"B"},"multiple":{"q25_26":["A","D"],"q27_28":["B","C"],"q29_30":["B","E"]},"multipleMap":{"q25":"A","q26":"D","q27":"B","q28":"C","q29":"B","q30":"E"},"matching":{},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:12,680","html":"You will hear a conversation between an art history student called Terrance and his","cn":"你将听到一位名叫 Terrance 的艺术史学生和他的","analysis":""},{"time":"00:00:12,680 --> 00:00:18,400","html":"tutor about the student's plan for a class presentation.","cn":"导师讨论这名学生课堂展示计划的对话。","analysis":""},{"time":"00:00:18,400 --> 00:00:22,320","html":"First you have some time to look at questions 21 to 24.","cn":"首先，你有一些时间浏览第21到24题。","analysis":""},{"time":"00:00:30,000 --> 00:00:56,760","html":"Now listen carefully and answer questions 21 to 24.","cn":"现在请仔细听，并回答第21到24题。","analysis":""},{"time":"00:00:56,760 --> 00:01:06,560","html":"Tutor: Okay Terrance, now I've looked through your preliminary outline and notes for the","cn":"Tutor：好的 Terrance，我已经看过你关于","analysis":""},{"time":"00:01:06,560 --> 00:01:10,960","html":"presentation on the art of the Efe region in Africa.","cn":"非洲 Efe 地区艺术展示的初步提纲和笔记了。","analysis":""},{"time":"00:01:10,960 --> 00:01:13,160","html":"That's in Nigeria right?","cn":"那是在尼日利亚，对吧？","analysis":""},{"time":"00:01:13,160 --> 00:01:14,160","html":"Terrance: Yes.","cn":"Terrance：是的。","analysis":""},{"time":"00:01:14,160 --> 00:01:19,360","html":"I'm concentrating on Efe sculptures from the 12th to the 15th century.","cn":"我主要研究12到15世纪的 Efe 雕塑。","analysis":""},{"time":"00:01:19,360 --> 00:01:22,760","html":"Tutor: How did you get interested in that?","cn":"Tutor：你是怎么对这个感兴趣的？","analysis":""},{"time":"00:01:22,760 --> 00:01:27,760","html":"I know there have been some recent articles in the journals about African sculpture.","cn":"我知道最近期刊上有一些关于非洲雕塑的文章。","analysis":""},{"time":"00:01:27,760 --> 00:01:33,560","html":"Terrance: Well, I've read most of those now, but initially I got my introduction to this at a special","cn":"Terrance：嗯，那些文章我现在大多读过了，但最初我是通过一次特别","analysis":""},{"time":"00:01:33,560 --> 00:01:36,640","html":"display at the <mark style=\"background-color: #bbf7d0;\">City Museum<\/mark> a few years ago.","cn":"展览了解这个主题的，那是几年前在市博物馆举办的。","analysis":""},{"time":"00:01:36,640 --> 00:01:41,760","html":"I just happened to be there and saw these works and thought they were fantastic.","cn":"我只是碰巧在那里，看到了这些作品，觉得它们非常棒。","analysis":""},{"time":"00:01:41,760 --> 00:01:45,640","html":"And I even went to <mark style=\"background-color: #fecaca;\">Nigeria<\/mark> last summer to see more of them.","cn":"我甚至去年夏天去了尼日利亚，想看更多这类作品。","analysis":"<strong>答案解析：<\/strong>第21题问最初是什么吸引 Terrance 研究 Ife 雕塑。他说 initially 是在 City Museum 的 special display 看到这些作品，对应 B “He attended an exhibition”。journal articles 是后来读的，Nigeria 是后来去的，都是干扰项。"},{"time":"00:01:45,640 --> 00:01:51,440","html":"Tutor: I've seen the photos for your presentation and I must say the sculptures are gorgeous","cn":"Tutor：我看过你展示用的照片，我必须说这些雕塑非常精美，","analysis":""},{"time":"00:01:51,440 --> 00:01:55,200","html":"portrayals of what appear to be <mark style=\"background-color: #bbf7d0;\">kings and queens<\/mark>.","cn":"它们似乎描绘的是国王和王后。","analysis":""},{"time":"00:01:55,200 --> 00:02:00,320","html":"Terrance: Yes, I decided to concentrate on those as they're the most typical.","cn":"Terrance：是的，我决定重点讲这些，因为它们最具代表性。","analysis":""},{"time":"00:02:00,320 --> 00:02:04,040","html":"They're interesting because they're so naturalistic.","cn":"它们很有趣，因为非常写实。","analysis":""},{"time":"00:02:04,040 --> 00:02:09,200","html":"Unlike the <mark style=\"background-color: #fecaca;\">abstract figures<\/mark> we often associate with African art, there's also a lovely sculpture","cn":"不同于我们常与非洲艺术联系在一起的抽象形象，还有一件可爱的雕塑，","analysis":""},{"time":"00:02:09,200 --> 00:02:15,440","html":"of a <mark style=\"background-color: #fecaca;\">mudfish<\/mark> and one of the <mark style=\"background-color: #fecaca;\">scaly crocodile<\/mark>, but I didn't get very good pictures of those","cn":"是一条泥鱼，还有一件鳞片状鳄鱼的雕塑，但我没有拍到这些作品的好照片，","analysis":""},{"time":"00:02:15,440 --> 00:02:17,480","html":"so I won't spend long on them.","cn":"所以我不会花太多时间讲它们。","analysis":"<strong>答案解析：<\/strong>第22题问 Terrance 的展示将重点关注哪类雕塑。他决定集中讲 kings and queens，也就是人物，对应 C “people”。abstract figures 是对比项，fish 和 crocodile 因照片不好不会重点讲。"},{"time":"00:02:17,480 --> 00:02:18,480","html":"Tutor: Right.","cn":"Tutor：明白了。","analysis":""},{"time":"00:02:18,480 --> 00:02:23,280","html":"So what was the city of Efe like when these works were made?","cn":"那么这些作品创作时，Efe 这座城市是什么样的？","analysis":""},{"time":"00:02:23,280 --> 00:02:25,240","html":"It's on the Niger River, isn't it?","cn":"它在尼日尔河边，对吧？","analysis":""},{"time":"00:02:25,240 --> 00:02:26,240","html":"Terrance: Yeah.","cn":"Terrance：是的。","analysis":""},{"time":"00:02:26,240 --> 00:02:31,600","html":"The boat traffic's what made it a centre of commerce then as it still is today, but nowadays","cn":"当时船运使它成为商业中心，现在依然如此，但如今","analysis":""},{"time":"00:02:31,600 --> 00:02:34,800","html":"it's better known as the home of a big university.","cn":"它更出名的是拥有一所大型大学。","analysis":""},{"time":"00:02:34,800 --> 00:02:39,080","html":"Tutor: Speaking of modern day, Efe, tell me about your trip.","cn":"Tutor：说到现代的 Efe，讲讲你的旅行吧。","analysis":""},{"time":"00:02:39,080 --> 00:02:42,880","html":"Terrance: I was incredibly lucky to be able to get enough money to go.","cn":"Terrance：我非常幸运，筹到了足够的钱去那里。","analysis":""},{"time":"00:02:42,880 --> 00:02:47,000","html":"My parents encouraged me, but they <mark style=\"background-color: #fecaca;\">couldn't afford to send me<\/mark>.","cn":"我父母鼓励我，但他们负担不起送我去的费用。","analysis":""},{"time":"00:02:47,000 --> 00:02:51,240","html":"I applied for a grant from the <mark style=\"background-color: #bbf7d0;\">Arts Council<\/mark> and in the end I got it.","cn":"我向艺术委员会申请了一笔资助，最后拿到了。","analysis":""},{"time":"00:02:51,240 --> 00:02:55,920","html":"I also wrote a series of articles about my trip for the local newspaper, but I <mark style=\"background-color: #fecaca;\">didn't<\/mark>","cn":"我还为当地报纸写了一系列关于这次旅行的文章，但我没有","analysis":""},{"time":"00:02:55,920 --> 00:02:57,520","html":"get any money for that.","cn":"因此拿到任何钱。","analysis":""},{"time":"00:02:57,520 --> 00:02:59,920","html":"I was just pleased to get them published.","cn":"我只是很高兴它们能发表。","analysis":"<strong>答案解析：<\/strong>第23题问 Terrance 如何资助去 Ife 的旅行。他说从 Arts Council 申请并获得了 grant，对应 A “He received money from an arts organisation”。父母只是鼓励但无法负担，报纸文章没有稿费。"},{"time":"00:02:59,920 --> 00:03:01,960","html":"Tutor: And the highlight of the trip?","cn":"Tutor：那这次旅行最精彩的部分是什么？","analysis":""},{"time":"00:03:01,960 --> 00:03:06,640","html":"Terrance: That had to be meeting a <mark style=\"background-color: #bbf7d0;\">professor<\/mark>, working on the site in Efe, who had been a young boy","cn":"Terrance：那一定是见到一位教授，他在 Efe 的遗址工作，小时候","analysis":""},{"time":"00:03:06,640 --> 00:03:12,720","html":"when they first discovered the sculptures by accident, to building site in 1938.","cn":"正好经历了1938年在建筑工地上偶然发现这些雕塑的时候。","analysis":""},{"time":"00:03:12,720 --> 00:03:15,160","html":"He had been working at the site.","cn":"他当时就在那个遗址工作。","analysis":""},{"time":"00:03:15,160 --> 00:03:20,280","html":"Of course, I also got to talk to lots of <mark style=\"background-color: #fecaca;\">artists<\/mark> who were working there today, and I got","cn":"当然，我也和许多如今在那里工作的艺术家交谈过，并且","analysis":""},{"time":"00:03:20,280 --> 00:03:26,760","html":"to try my hand at making a little sculpture myself.","cn":"亲手尝试制作了一件小雕塑。","analysis":"<strong>答案解析：<\/strong>第24题问旅行中最难忘的是什么。Terrance 回答 That had to be meeting a professor，对应 B “the professor he met”。artists 和自己尝试做雕塑是补充经历，不是 highlight。"},{"time":"00:03:26,760 --> 00:03:32,200","html":"Before you hear the rest of the discussion, you have some time to look at questions 25","cn":"在你听讨论剩余部分之前，你有一些时间浏览第25题","analysis":""},{"time":"00:03:32,200 --> 00:03:32,920","html":"to 30.","cn":"到第30题。","analysis":""},{"time":"00:03:45,160 --> 00:04:08,560","html":"Now, listen and answer questions 25 to 30.","cn":"现在请听，并回答第25到30题。","analysis":""},{"time":"00:04:08,560 --> 00:04:16,480","html":"Tutor: Well, let's see what you might do to improve what you're planning for your presentation.","cn":"Tutor：好，我们来看看你可以怎样改进你的展示计划。","analysis":""},{"time":"00:04:16,480 --> 00:04:21,760","html":"Terrance: About the sculptures themselves, I think I need to add as much as possible about the details","cn":"Terrance：关于雕塑本身，我觉得我需要尽可能多地补充它们","analysis":""},{"time":"00:04:21,760 --> 00:04:23,680","html":"of the <mark style=\"background-color: #bbf7d0;\">way they were made<\/mark>.","cn":"制作方式的细节。","analysis":""},{"time":"00:04:23,680 --> 00:04:28,760","html":"Of course, I can't add anything about the <mark style=\"background-color: #fecaca;\">artists who made them<\/mark>, because nobody really","cn":"当然，我没法补充关于创作者的信息，因为其实没有人真正","analysis":""},{"time":"00:04:28,760 --> 00:04:30,600","html":"knows anything about them.","cn":"了解他们。","analysis":""},{"time":"00:04:30,600 --> 00:04:32,320","html":"Tutor: All good points.","cn":"Tutor：这些点都不错。","analysis":""},{"time":"00:04:32,320 --> 00:04:37,480","html":"And you've certainly said enough about what the sculptures <mark style=\"background-color: #fecaca;\">depict<\/mark>, what the subjects","cn":"你已经充分讲了这些雕塑描绘的内容，也就是它们的主题，","analysis":""},{"time":"00:04:37,480 --> 00:04:38,480","html":"are.","cn":"是什么。","analysis":""},{"time":"00:04:38,480 --> 00:04:43,960","html":"That's well-covered, but I'd make some <mark style=\"background-color: #bbf7d0;\">bigger photos<\/mark> of them so you can clearly see the","cn":"这部分已经讲得很好了，但我会把它们的照片做大一些，这样你就能清楚看到","analysis":""},{"time":"00:04:43,960 --> 00:04:46,760","html":"fine detail, okay?","cn":"精细细节，好吗？","analysis":""},{"time":"00:04:46,760 --> 00:04:51,720","html":"And I would limit my <mark style=\"background-color: #fecaca;\">personal reactions<\/mark> to these works of art if I were you.","cn":"如果我是你，我会限制自己对这些艺术作品的个人感受。","analysis":""},{"time":"00:04:51,720 --> 00:04:54,560","html":"I know you think they're fantastic.","cn":"我知道你觉得它们很棒。","analysis":""},{"time":"00:04:54,560 --> 00:04:55,560","html":"Terrance: You're right.","cn":"Terrance：你说得对。","analysis":""},{"time":"00:04:55,560 --> 00:04:58,640","html":"I'll contain my enthusiasm.","cn":"我会控制我的热情。","analysis":"<strong>答案解析：<\/strong>第25和26题问 Terrance 会给雕塑部分增加哪两项内容。他自己说要增加 way they were made 的细节，对应 D “extra information about the techniques used”；导师建议 make some bigger photos，对应 A “enlarged pictures”。subjects 已经 well-covered，artists 无资料，personal reactions 要减少，都是干扰项。"},{"time":"00:04:58,640 --> 00:05:02,960","html":"What about the section of the presentation, which I call history?","cn":"那我称为“历史”的展示部分呢？","analysis":""},{"time":"00:05:02,960 --> 00:05:07,440","html":"I'd like to go into more depth about the history of that whole area, you know, in the","cn":"我想更深入地讲整个地区的历史，也就是","analysis":""},{"time":"00:05:07,440 --> 00:05:09,800","html":"countries around Nigeria.","cn":"尼日利亚周边国家的历史。","analysis":""},{"time":"00:05:09,800 --> 00:05:15,560","html":"Tutor: That would make the presentation stronger, but I think you've covered the situation regarding","cn":"Tutor：这会让展示更有力，不过我认为你已经很好地讲到了","analysis":""},{"time":"00:05:15,560 --> 00:05:20,800","html":"the <mark style=\"background-color: #fecaca;\">rulers<\/mark> of the country quite well, and you've got plenty already about what the","cn":"这个国家统治者的情况，而且你已经有很多关于","analysis":""},{"time":"00:05:20,800 --> 00:05:26,200","html":"ethay people were doing then and the way their <mark style=\"background-color: #fecaca;\">society was structured<\/mark>.","cn":"Efe 人当时在做什么，以及他们社会结构方式的内容。","analysis":""},{"time":"00:05:26,200 --> 00:05:31,120","html":"And in fact, I think you could cut out a bit about <mark style=\"background-color: #fecaca;\">modern Nigerian history<\/mark> because it's","cn":"事实上，我认为你可以删掉一些关于现代尼日利亚历史的内容，因为它","analysis":""},{"time":"00:05:31,120 --> 00:05:32,440","html":"not relevant.","cn":"不相关。","analysis":""},{"time":"00:05:32,440 --> 00:05:35,080","html":"Terrance: I agree, that doesn't fit.","cn":"Terrance：我同意，那部分不合适。","analysis":""},{"time":"00:05:35,080 --> 00:05:39,760","html":"But perhaps I should concentrate more on the <mark style=\"background-color: #bbf7d0;\">religious beliefs<\/mark> since all these sculptures","cn":"但也许我应该更多关注宗教信仰，因为这些雕塑","analysis":""},{"time":"00:05:39,760 --> 00:05:42,560","html":"do seem to have some kind of religious association.","cn":"似乎确实都有某种宗教关联。","analysis":""},{"time":"00:05:42,560 --> 00:05:43,560","html":"Tutor: Good.","cn":"Tutor：很好。","analysis":""},{"time":"00:05:43,560 --> 00:05:46,520","html":"I can lend you a book on that.","cn":"我可以借你一本关于这方面的书。","analysis":"<strong>答案解析：<\/strong>第27和28题问历史部分会增加哪两项内容。Terrance 想更深入讲 Nigeria 周边地区历史，对应 B “extra information about the surrounding region”；他还说应更多关注 religious beliefs，对应 C “examination of the beliefs of the Ife people”。rulers 和 past activities 已经 plenty/well-covered，modern Nigerian history 要删掉，都是干扰项。"},{"time":"00:05:46,520 --> 00:05:52,000","html":"Now probably the part the class will find most interesting is the report of your trip","cn":"现在，班上同学可能最感兴趣的部分是你去尼日利亚的旅行报告，","analysis":""},{"time":"00:05:52,000 --> 00:05:55,800","html":"to Nigeria and the research you did there.","cn":"以及你在那里做的研究。","analysis":""},{"time":"00:05:55,800 --> 00:05:59,760","html":"So I gather you managed to use the university library in ethay.","cn":"所以我了解到你成功使用了 Efe 的大学图书馆。","analysis":""},{"time":"00:05:59,760 --> 00:06:00,760","html":"Terrance: Yes.","cn":"Terrance：是的。","analysis":""},{"time":"00:06:00,760 --> 00:06:05,520","html":"As soon as I'd explained why I wanted the information, that was no problem.","cn":"我一解释为什么需要这些资料，就没有问题了。","analysis":""},{"time":"00:06:05,520 --> 00:06:07,800","html":"They couldn't have been more helpful.","cn":"他们非常乐于帮忙。","analysis":""},{"time":"00:06:07,800 --> 00:06:12,040","html":"There were some interesting accounts of how the <mark style=\"background-color: #bbf7d0;\">first sculptures were found<\/mark> and what","cn":"那里有一些有趣的记载，讲述最早的雕塑是如何被发现的，以及","analysis":""},{"time":"00:06:12,040 --> 00:06:15,480","html":"happened to them, which I want to include.","cn":"后来发生了什么，我想把这些内容包括进去。","analysis":""},{"time":"00:06:15,480 --> 00:06:20,640","html":"What struck me when I saw the sculptures in Nigeria is the extent to which <mark style=\"background-color: #fecaca;\">20th century<\/mark>","cn":"我在尼日利亚看到这些雕塑时，令我印象深刻的是它们在多大程度上影响了20世纪","analysis":""},{"time":"00:06:20,640 --> 00:06:26,200","html":"European artists were influenced by them, but that's beyond the scope of my presentation,","cn":"欧洲艺术家，但我认为这超出了我的展示范围，","analysis":""},{"time":"00:06:26,200 --> 00:06:27,200","html":"I think.","cn":"我觉得。","analysis":""},{"time":"00:06:27,200 --> 00:06:28,200","html":"Tutor: Yes.","cn":"Tutor：是的。","analysis":""},{"time":"00:06:28,200 --> 00:06:31,960","html":"What about the sources of the <mark style=\"background-color: #fecaca;\">materials<\/mark> they used?","cn":"那他们所用材料的来源呢？","analysis":""},{"time":"00:06:31,960 --> 00:06:33,880","html":"You don't mention that anywhere.","cn":"你没有在任何地方提到。","analysis":""},{"time":"00:06:33,880 --> 00:06:37,040","html":"Terrance: I didn't manage to find out much about that.","cn":"Terrance：我没能查到太多关于这方面的信息。","analysis":""},{"time":"00:06:37,040 --> 00:06:40,960","html":"I want to cover the <mark style=\"background-color: #bbf7d0;\">theories about who the original sculptors were<\/mark> though.","cn":"不过我想讲关于最初雕塑创作者身份的各种理论。","analysis":""},{"time":"00:06:40,960 --> 00:06:45,520","html":"Tutor: Yes, the idea that a lot of them may have been made by the same person.","cn":"Tutor：是的，比如很多作品可能是同一个人制作的这种观点。","analysis":""},{"time":"00:06:45,520 --> 00:06:46,520","html":"That's very interesting.","cn":"这很有意思。","analysis":""},{"time":"00:06:46,520 --> 00:06:48,200","html":"Terrance: It is, isn't it?","cn":"Terrance：确实是，对吧？","analysis":""},{"time":"00:06:48,200 --> 00:06:49,200","html":"Right.","cn":"好。","analysis":""},{"time":"00:06:49,200 --> 00:06:50,840","html":"Well, thanks for all the advice.","cn":"嗯，谢谢你的所有建议。","analysis":"<strong>答案解析：<\/strong>第29和30题问 Terrance 会在展示中讨论尼日利亚研究的哪两项内容。他说会包括 first sculptures were found 的记载，对应 E “the original discovery of the sculptures”；还想讲 theories about who the original sculptors were，对应 B “the uncertainty over who made the sculptures”。西方艺术家影响超出范围，材料来源没查到，收集信息也没有遇到问题。"},{"time":"00:06:50,840 --> 00:06:55,440","html":"No, I think I need to work.","cn":"不，我想我需要去修改了。","analysis":""},{"time":"00:06:55,440 --> 00:06:58,080","html":"That is the end of part three.","cn":"第三部分到此结束。","analysis":""},{"time":"00:06:58,080 --> 00:07:02,120","html":"You now have 30 seconds to check your answers to part three.","cn":"现在你有30秒时间检查第三部分的答案。","analysis":""}],"transcriptHighlights":[{"qid":"21","text":"He attended an exhibition.","answer":"B"},{"qid":"22","text":"people.","answer":"C"},{"qid":"23","text":"He received money from an arts organisation.","answer":"A"},{"qid":"24","text":"the professor he met","answer":"B"},{"qid":"25","text":"enlarged pictures of the sculptures","answer":"A"},{"qid":"26","text":"extra information about the techniques used","answer":"D"},{"qid":"27","text":"extra information about the surrounding region","answer":"B"},{"qid":"28","text":"examination of the beliefs of the Ife people","answer":"C"},{"qid":"29","text":"the uncertainty over who made the sculptures","answer":"B"},{"qid":"30","text":"the original discovery of the sculptures","answer":"E"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

function highlightTerms(){let terms=[];for(let item of DATA.transcriptHighlights||[]){let text=typeof item==='string'?item:item.text;if(text){terms.push(String(text));String(text).split(/\s+/).map(w=>w.replace(/[^A-Za-z0-9'-]/g,'')).filter(w=>w.length>=5&&!/^(which|three|answer|letter|about|their|there|would|could|should)$/i.test(w)).forEach(w=>terms.push(w))}}return [...new Set(terms.map(t=>t.trim()).filter(t=>t.length>1))].sort((a,b)=>b.length-a.length)}
function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',(g.questions||[]).map(q=>String(q.id||q[0]||''))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}

function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}

const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}

function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}

$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
