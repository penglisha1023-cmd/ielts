t":"To apply to Connections as a guest","list":false,"level":0},{"text":"The applicant makes an initial phone call to the 15. ________ department.","list":false,"level":0},{"text":"↓","list":false,"level":0},{"text":"The applicant sends in a reference to confirm his/her 16. ________.","list":false,"level":0},{"text":"↓","list":false,"level":0},{"text":"Following approval, an application form is emailed to the applicant.","list":false,"level":0},{"text":"↓","list":false,"level":0},{"text":"The applicant returns the completed form with two photographs (one for 17. ________ and one for the family).","list":false,"level":0},{"text":"↓","list":false,"level":0},{"text":"The applicant receives 18. ________ within seven days.","list":false,"level":0},{"text":"↓","list":false,"level":0},{"text":"The applicant has 19. ________ with a staff member.","list":false,"level":0},{"text":"↓","list":false,"level":0},{"text":"The applicant receives a final 20. ________ in writing.","list":false,"level":0}]}],"answerKey":{"text":{},"single":{"q11":"B","q12":"A","q13":"C","q14":"A"},"multiple":{},"multipleMap":{},"matching":{"q15":"H","q16":"C","q17":"F","q18":"A","q19":"D","q20":"B"},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:07,000","html":"Now listen carefully and answer questions 11 to 14.","cn":"现在请仔细听，并回答问题11到14。","analysis":""},{"time":"00:00:07,000 --> 00:00:11,000","html":"Hello.","cn":"大家好。","analysis":""},{"time":"00:00:11,000 --> 00:00:17,000","html":"Listeners to this programme will know that we're very keen to foster links within communities","cn":"本节目的听众都知道，我们非常希望促进社区内部的联系，","analysis":""},{"time":"00:00:17,000 --> 00:00:20,000","html":"and we think we've hit on a winning idea.","cn":"而且我们认为自己想到了一个很好的主意。","analysis":""},{"time":"00:00:20,000 --> 00:00:24,000","html":"I'm going to tell you about a scheme which has been set up as part of our","cn":"我将向大家介绍一个项目，它是我们","analysis":""},{"time":"00:00:24,000 --> 00:00:26,000","html":"Communities in Action programme.","cn":"“行动中的社区”计划的一部分。","analysis":""},{"time":"00:00:26,000 --> 00:00:31,000","html":"For those who'd like to be put in touch with people from different cultures and countries.","cn":"它面向那些希望与来自不同文化和国家的人建立联系的人。","analysis":""},{"time":"00:00:31,000 --> 00:00:36,000","html":"As the name Connections suggests, we're hoping that the scheme will introduce","cn":"正如 Connections 这个名字所暗示的，我们希望这个项目能够介绍","analysis":""},{"time":"00:00:36,000 --> 00:00:41,000","html":"people who live in this country, who will act as hosts to people who've","cn":"住在本国的人作为接待家庭，去接待那些","analysis":""},{"time":"00:00:41,000 --> 00:00:45,000","html":"recently arrived here to study or to work for a limited period of time,","cn":"最近来到这里学习或短期工作的人，","analysis":""},{"time":"00:00:45,000 --> 00:00:47,000","html":"who will be their guests.","cn":"这些人将成为他们的客人。","analysis":""},{"time":"00:00:47,000 --> 00:00:51,000","html":"Now, if you've got a spare room in your house or flat,","cn":"现在，如果你的房子或公寓里有一间空房，","analysis":""},{"time":"00:00:51,000 --> 00:00:56,000","html":"you might like to be a host and have someone stay for a weekend.","cn":"你也许可以成为接待家庭，让某个人来住一个周末。","analysis":""},{"time":"00:00:56,000 --> 00:01:02,000","html":"I should point out that no money is involved as <mark style=\"background-color: #bbf7d0;\">all our hosts are unpaid<\/mark>,","cn":"我应该指出，这里不涉及金钱，因为<mark style=\"background-color: #bbf7d0;\">所有接待家庭都是无偿的<\/mark>，","analysis":"<strong>答案解析：<\/strong>第11题问 Connections 的接待家庭会怎样。原文说 all our hosts are unpaid，所以答案是 <strong>B. do not receive payment<\/strong>。"},{"time":"00:01:02,000 --> 00:01:07,000","html":"but you should not have too much expense other than one more person joining you at","cn":"不过，除了多一个人和你们一起","analysis":""},{"time":"00:01:07,000 --> 00:01:09,000","html":"mealtimes.","cn":"吃饭之外，你不会有太多额外开销。","analysis":""},{"time":"00:01:09,000 --> 00:01:12,000","html":"In the course of their studies or work in this country,","cn":"在这些人在本国学习或工作的过程中，","analysis":""},{"time":"00:01:12,000 --> 00:01:16,000","html":"some people rarely get the opportunity to socialise.","cn":"有些人很少有机会社交。","analysis":""},{"time":"00:01:16,000 --> 00:01:20,000","html":"There may be language problems or feelings of shyness,","cn":"他们可能有语言问题，或感到害羞，","analysis":""},{"time":"00:01:20,000 --> 00:01:25,000","html":"which mean that whatever their age, people can become quite <mark style=\"background-color: #bbf7d0;\">lonely or isolated<\/mark>.","cn":"这意味着无论他们年龄多大，都可能变得相当<mark style=\"background-color: #bbf7d0;\">孤独或孤立<\/mark>。","analysis":"<strong>答案解析：<\/strong>第12题问 Connections 面向哪些来自其他国家的人。原文说他们很少有机会社交，可能会孤独或孤立，也就是交朋友有困难，所以答案是 <strong>A. have difficulty making friends<\/strong>。"},{"time":"00:01:25,000 --> 00:01:29,000","html":"If you are prepared to invite someone into your home,","cn":"如果你愿意邀请某人到你家中，","analysis":""},{"time":"00:01:29,000 --> 00:01:34,000","html":"you can rely on Connections for a personal introduction,","cn":"你可以依靠 Connections 为你做个人介绍，","analysis":""},{"time":"00:01:34,000 --> 00:01:37,000","html":"and the timing of the invitation will be to suit you.","cn":"而邀请的时间也会配合你的安排。","analysis":""},{"time":"00:01:37,000 --> 00:01:43,000","html":"As I said, the stay is always over a weekend for two or three nights,","cn":"正如我所说，住宿总是在周末，住两到三个晚上，","analysis":""},{"time":"00:01:43,000 --> 00:01:47,000","html":"and as the host, the arrangements you make for your visitor","cn":"作为接待家庭，你为访客所做的安排","analysis":""},{"time":"00:01:47,000 --> 00:01:50,000","html":"will depend on your other commitments.","cn":"将取决于你自己的其他安排。","analysis":""},{"time":"00:01:50,000 --> 00:01:52,000","html":"If you're listening to this programme,","cn":"如果你正在收听本节目，","analysis":""},{"time":"00:01:52,000 --> 00:01:56,000","html":"and you would like to take advantage of what Connections can offer a guest,","cn":"并且你希望利用 Connections 能为客人提供的机会，","analysis":""},{"time":"00:01:56,000 --> 00:02:00,000","html":"then what I'm going on to say will apply to you.","cn":"那么我接下来要说的内容就适用于你。","analysis":""},{"time":"00:02:00,000 --> 00:02:05,000","html":"So, what will you, the guest, get out of a visit?","cn":"那么，作为客人，你能从一次拜访中得到什么呢？","analysis":""},{"time":"00:02:05,000 --> 00:02:11,000","html":"You'll gain an insight into the customs and way of life of the country you're staying in,","cn":"你将深入了解所在国家的习俗和生活方式，","analysis":""},{"time":"00:02:11,000 --> 00:02:14,000","html":"and you'll enjoy home-cooked meals,","cn":"你还会享用家常饭菜，","analysis":""},{"time":"00:02:14,000 --> 00:02:18,000","html":"and be able to <mark style=\"background-color: #bbf7d0;\">ask questions about things which interest you<\/mark>,","cn":"并且能够<mark style=\"background-color: #bbf7d0;\">询问你感兴趣的事情<\/mark>，","analysis":""},{"time":"00:02:18,000 --> 00:02:20,000","html":"or perhaps even puzzle you.","cn":"或者询问那些让你感到困惑的事情。","analysis":"<strong>答案解析：<\/strong>第13题问客人在停留期间可以期待做什么。原文说客人可以询问自己感兴趣或困惑的事情，所以答案是 <strong>C. discuss matters of personal interest<\/strong>。"},{"time":"00:02:20,000 --> 00:02:24,000","html":"It's early days, but if a weekend stay goes well,","cn":"现在还处于早期阶段，但如果一次周末住宿进行得顺利，","analysis":""},{"time":"00:02:24,000 --> 00:02:27,000","html":"relationships might develop over time,","cn":"关系可能会随着时间发展，","analysis":""},{"time":"00:02:27,000 --> 00:02:31,000","html":"and turn into lasting and genuine friendships.","cn":"并变成持久而真诚的友谊。","analysis":""},{"time":"00:02:31,000 --> 00:02:35,000","html":"This would undoubtedly be of advantage to the whole community,","cn":"这无疑会对整个社区有益，","analysis":""},{"time":"00:02:35,000 --> 00:02:41,000","html":"as we all become more aware of <mark style=\"background-color: #bbf7d0;\">the ways in which people in different countries live their lives<\/mark>.","cn":"因为我们都会更加了解<mark style=\"background-color: #bbf7d0;\">不同国家的人们如何生活<\/mark>。","analysis":"<strong>答案解析：<\/strong>第14题问 Connections 项目的长期好处可能是什么。原文说这能让大家更了解不同国家人们的生活方式，即促进跨文化理解，所以答案是 <strong>A. an increased understanding between cultures<\/strong>。"},{"time":"00:02:41,000 --> 00:02:45,000","html":"It's also the possibility that when you return to your own country,","cn":"也有可能当你回到自己的国家后，","analysis":""},{"time":"00:02:45,000 --> 00:02:50,000","html":"you might one day want to invite your hosts to stay with you.","cn":"有一天你会想邀请你的接待家庭到你那里住。","analysis":""},{"time":"00:02:58,000 --> 00:03:00,000","html":"Before you hear the rest of the programme,","cn":"在你听节目剩余部分之前，","analysis":""},{"time":"00:03:00,000 --> 00:03:06,000","html":"you have some time to look at questions 15 to 20 on page 4.","cn":"你有一些时间查看第4页的问题15到20。","analysis":""},{"time":"00:03:11,000 --> 00:03:18,000","html":"Now, listen and answer questions 15 to 20.","cn":"现在请听并回答问题15到20。","analysis":""},{"time":"00:03:42,000 --> 00:03:49,000","html":"Right, I hope I've given you enough information on the scheme and what we're setting out to do.","cn":"好了，我希望我已经向你们充分介绍了这个项目以及我们的目标。","analysis":""},{"time":"00:03:49,000 --> 00:03:52,000","html":"I'll now deal with the process for applying,","cn":"现在我将说明申请流程，","analysis":""},{"time":"00:03:52,000 --> 00:03:55,000","html":"if you'd like to be involved from the point of view of a guest,","cn":"如果你希望以客人的身份参与，","analysis":""},{"time":"00:03:55,000 --> 00:04:00,000","html":"so have a pencil and some paper ready to jot down what you need to do.","cn":"请准备好铅笔和纸，记下你需要做的事情。","analysis":""},{"time":"00:04:00,000 --> 00:04:05,000","html":"Connections is broken up into various small sections,","cn":"Connections 被分成几个小部门，","analysis":""},{"time":"00:04:05,000 --> 00:04:09,000","html":"which will deal with your application through the different stages.","cn":"它们会在不同阶段处理你的申请。","analysis":""},{"time":"00:04:09,000 --> 00:04:14,000","html":"To begin with, we ask you to make a phone call to our <mark style=\"background-color: #bbf7d0;\">vetting<\/mark> people.","cn":"首先，我们要求你给我们的<mark style=\"background-color: #bbf7d0;\">审查<\/mark>人员打电话。","analysis":"<strong>答案解析：<\/strong>第15题问申请人最初要给哪个部门打电话。原文说 make a phone call to our vetting people，所以答案是 <strong>H. vetting<\/strong>。"},{"time":"00:04:14,000 --> 00:04:17,000","html":"We need to know some basic information about you,","cn":"我们需要了解你的一些基本信息，","analysis":""},{"time":"00:04:17,000 --> 00:04:20,000","html":"like how long you're intending to be in this country.","cn":"比如你打算在这个国家待多久。","analysis":""},{"time":"00:04:20,000 --> 00:04:23,000","html":"The minimum time limit is three months.","cn":"最低时间限制是三个月。","analysis":""},{"time":"00:04:23,000 --> 00:04:26,000","html":"Whether you're working or studying,","cn":"无论你是在工作还是学习，","analysis":""},{"time":"00:04:26,000 --> 00:04:28,000","html":"we require a reference,","cn":"我们都需要一份推荐证明，","analysis":""},{"time":"00:04:28,000 --> 00:04:33,000","html":"which must be from the person in authority who you're working with or studying under.","cn":"它必须来自与你一起工作或指导你学习的负责人。","analysis":""},{"time":"00:04:33,000 --> 00:04:37,000","html":"This will be used for an <mark style=\"background-color: #bbf7d0;\">identity<\/mark> check.","cn":"这将用于进行<mark style=\"background-color: #bbf7d0;\">身份<\/mark>核查。","analysis":"<strong>答案解析：<\/strong>第16题问推荐证明用于确认什么。原文说 reference 会用于 identity check，所以答案是 <strong>C. identity<\/strong>。"},{"time":"00:04:38,000 --> 00:04:41,000","html":"Once that's been sent to the authorities and approved,","cn":"一旦它被送到相关机构并获得批准，","analysis":""},{"time":"00:04:41,000 --> 00:04:46,000","html":"we'll email you an application form, which you can download.","cn":"我们会通过电子邮件发给你一份可以下载的申请表。","analysis":""},{"time":"00:04:46,000 --> 00:04:53,000","html":"You should complete this and return it with two recent passport-sized photographs of yourself.","cn":"你应该填写这份表格，并连同两张近期护照尺寸照片一起寄回。","analysis":""},{"time":"00:04:53,000 --> 00:04:56,000","html":"One photo will be held in our <mark style=\"background-color: #bbf7d0;\">records<\/mark>,","cn":"其中一张照片会保存在我们的<mark style=\"background-color: #bbf7d0;\">档案<\/mark>中，","analysis":"<strong>答案解析：<\/strong>第17题问其中一张照片用于哪里。原文说 one photo will be held in our records，所以答案是 <strong>F. records<\/strong>。"},{"time":"00:04:56,000 --> 00:05:02,000","html":"and the other will be sent to your host family prior to your first weekend visit.","cn":"另一张会在你第一次周末拜访前寄给接待家庭。","analysis":""},{"time":"00:05:02,000 --> 00:05:07,000","html":"Our centre manager will get back to you within a week of receiving your form","cn":"我们的中心经理会在收到你的表格后一周内回复你，","analysis":""},{"time":"00:05:07,000 --> 00:05:09,000","html":"to let you know that we have it,","cn":"告诉你我们已经收到表格，","analysis":"<strong>答案解析：<\/strong>第18题问申请人在七天内会收到什么。原文说经理会在一周内回复，告知表格已收到，所以答案是 <strong>A. acknowledgement<\/strong>。"},{"time":"00:05:09,000 --> 00:05:12,000","html":"and if we think there's a suitable match on our files,","cn":"如果我们认为档案中有合适的匹配对象，","analysis":""},{"time":"00:05:12,000 --> 00:05:18,000","html":"someone from our interview team will contact you for <mark style=\"background-color: #bbf7d0;\">a face-to-face meeting with a member of staff<\/mark>.","cn":"我们的面试团队会有人联系你，安排你与一名工作人员进行<mark style=\"background-color: #bbf7d0;\">面对面会面<\/mark>。","analysis":"<strong>答案解析：<\/strong>第19题问申请人会和工作人员进行什么。原文说 face-to-face meeting with a member of staff，也就是 interview，所以答案是 <strong>D. an interview<\/strong>。"},{"time":"00:05:18,000 --> 00:05:23,000","html":"At that point, you should have some idea of weekend dates when you're free,","cn":"到那时，你应该大致知道自己哪些周末有空，","analysis":""},{"time":"00:05:23,000 --> 00:05:25,000","html":"which we can put to the host family.","cn":"这样我们可以把这些日期提供给接待家庭。","analysis":""},{"time":"00:05:25,000 --> 00:05:29,000","html":"However, <mark style=\"background-color: #fecaca;\">decisions are not made at the meeting<\/mark>,","cn":"不过，<mark style=\"background-color: #fecaca;\">决定不会在会面时作出<\/mark>，","analysis":""},{"time":"00:05:29,000 --> 00:05:33,000","html":"but you can expect to hear <mark style=\"background-color: #bbf7d0;\">the result<\/mark> from us in a couple of days.","cn":"但你可以期待在几天内收到我们的<mark style=\"background-color: #bbf7d0;\">结果<\/mark>。","analysis":"<strong>答案解析：<\/strong>第20题问申请人最后会收到什么。原文说几天后会收到结果，也就是最终决定，所以答案是 <strong>B. decision<\/strong>。"},{"time":"00:05:33,000 --> 00:05:38,000","html":"Now, the process for those of you interested in welcoming someone.","cn":"现在，说说那些有兴趣接待他人的人的流程。","analysis":""},{"time":"00:05:41,000 --> 00:05:43,000","html":"That is the end of section two.","cn":"第2部分到此结束。","analysis":""},{"time":"00:05:43,000 --> 00:05:47,000","html":"You now have half a minute to check your answers.","cn":"现在你有半分钟时间检查答案。","analysis":""}],"transcriptHighlights":[{"qid":"11","text":"do not receive payment.","answer":"B"},{"qid":"12","text":"have difficulty making friends.","answer":"A"},{"qid":"13","text":"discuss matters of personal interest.","answer":"C"},{"qid":"14","text":"an increased understanding between cultures.","answer":"A"},{"qid":"15","text":"vetting","answer":"H"},{"qid":"16","text":"identity","answer":"C"},{"qid":"17","text":"records","answer":"F"},{"qid":"18","text":"acknowledgement","answer":"A"},{"qid":"19","text":"an interview","answer":"D"},{"qid":"20","text":"decision","answer":"B"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

const CONFIG_DATA={answerKey:DATA.answerKey,questionList:DATA.questionIds.map(q=>Number(q)||q),localStorageKey:storeKey};window.localStorageKey=storeKey;window.DATA=DATA;window.CONFIG_DATA=CONFIG_DATA;
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function matchingRepeatAttr(g){return (g.questions||[]).length>(g.options||[]).length?' data-repeat="true"':''}
function flowQuestionMap(g){let map={};(g.questions||[]).forEach(q=>map[q[0]]=q[1]);return map}
function renderFlowText(raw,qid){let html=esc(String(raw||'')).replace(new RegExp(`(?<!\\d)${qid}(?!\\d)`),`<span class="flow-num">${qid}</span>`);html=html.replace(/(?:_{2,}|…{2,}|\.{4,})/,`<span class="slot" data-q="${qid}"></span>`);if(!/<span class="slot"/.test(html))html+=` <span class="slot" data-q="${qid}"></span>`;return html}
function flowQidInText(raw,qmap){return Object.keys(qmap).find(id=>new RegExp(`(?<!\\d)${id}(?!\\d)`).test(raw))}
function renderFlowLine(line,qmap,used){let raw=String((typeof line==='object'&&line?line.text:line)||''),qid=flowQidInText(raw,qmap);if(qid){used.add(qid);return `<div class="flow-step flow-step-full"><div class="flow-text">${renderFlowText(raw,qid)}</div></div>`}return `<div class="flow-note">${esc(raw)}</div>`}

function highlightTerms(){let terms=[];for(let item of DATA.transcriptHighlights||[]){let text=typeof item==='string'?item:item.text;if(text){terms.push(String(text));String(text).split(/\s+/).map(w=>w.replace(/[^A-Za-z0-9'-]/g,'')).filter(w=>w.length>=5&&!/^(which|three|answer|letter|about|their|there|would|could|should)$/i.test(w)).forEach(w=>terms.push(w))}}return [...new Set(terms.map(t=>t.trim()).filter(t=>t.length>1))].sort((a,b)=>b.length-a.length)}
function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',g.instruction||'',g.questionText||'',g.image||'',(g.options||[]),(g.questions||[]).map(q=>JSON.stringify(q))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}

function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}

const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}

function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}

$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
