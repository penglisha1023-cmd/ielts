label{display:block;margin:9px 0}.blank{width:min(170px,48vw);border:0;border-bottom:2px solid #94a3b8;border-radius:0;padding:4px 8px;background:transparent;color:var(--text);font:inherit;line-height:1.4;vertical-align:baseline}.blank:focus{outline:2px solid rgba(37,99,235,.18);border-bottom-color:var(--accent)}.blank-q{font-weight:700;margin-right:6px}.fill-heading{font-weight:700;margin:18px 0 8px}.choice{display:block;margin:8px 0;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);padding:9px 12px;cursor:pointer;user-select:text}.choice.selected{background:#dbeafe;border-color:#60a5fa;color:#1e40af;font-weight:700}.doc-line{line-height:1.75;margin:10px 0}.doc-line.is-list{display:grid;grid-template-columns:16px minmax(0,1fr);column-gap:8px;align-items:baseline;margin:7px 0 7px calc(32px + var(--indent,0px))}.doc-bullet{font-weight:900;color:var(--text);line-height:1}.doc-line-content{min-width:0}
.matching{display:grid;grid-template-columns:minmax(300px,1fr) minmax(220px,.45fr);gap:clamp(12px,2.2vw,24px);align-items:start;max-width:1040px}.match-row{display:grid;grid-template-columns:42px minmax(150px,340px) auto;gap:10px;align-items:center;width:min(100%,520px);margin:12px 0}.slot{min-width:86px;max-width:min(260px,42vw);min-height:38px;border:2px dashed #94a3b8;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;justify-self:start;padding:5px 8px;background:var(--bg);overflow-wrap:anywhere}.flow-layout{display:grid;grid-template-columns:minmax(320px,1fr) minmax(220px,.42fr);gap:clamp(12px,2.2vw,24px);align-items:start;max-width:1040px}.flow-steps{display:flex;flex-direction:column;gap:8px}.flow-step{display:grid;grid-template-columns:42px minmax(280px,520px) auto;gap:12px;align-items:center;width:min(100%,740px);border:1px solid var(--border);background:var(--bg);border-radius:8px;padding:10px}.flow-step-full{grid-template-columns:1fr}.flow-step-full .slot{margin-left:10px;vertical-align:middle}.flow-note{width:min(100%,740px);font-weight:800;color:var(--text);padding:6px 2px 2px}.flow-num{font-weight:800;color:var(--accent)}.flow-text{line-height:1.55;min-width:0}.flow-arrow{width:min(100%,740px);color:var(--muted);font-weight:800;text-align:center}

.fill-table-wrap{overflow:auto;margin:12px 0 18px}.fill-table{width:100%;border-collapse:collapse;min-width:680px}.fill-table th,.fill-table td{border:1px solid var(--border);padding:10px 12px;vertical-align:top;line-height:1.45}.fill-table th{background:var(--bg);font-weight:800;text-align:left}.fill-table-line{margin:0 0 7px}.fill-table-line:last-child{margin-bottom:0}.fill-table .doc-line{margin:0}.fill-table .blank{width:min(150px,100%)}
.pool{border:1px solid var(--border);border-radius:8px;background:var(--bg);padding:14px;display:flex;flex-direction:column;gap:10px}.drag,.tag{border:1px solid var(--border);background:var(--panel);border-radius:999px;padding:7px 11px;cursor:grab}.tag{background:var(--accent);color:#fff}.hidden{display:none}

.meta{font-size:13px;color:var(--muted);margin-top:4px}.answer-highlight{background:var(--answer-hl);color:#0f172a;border-radius:4px;padding:1px 3px}.cue{display:block;padding:10px 0;border-bottom:1px solid var(--border)}.cue.has-hit{background:linear-gradient(90deg,rgba(37,99,235,.08),rgba(255,255,255,0))}.cue-time{display:block;color:var(--muted);font-size:12px;line-height:1.35;white-space:normal;overflow-wrap:anywhere;margin:0 0 5px}.cue p{margin:0;line-height:1.55}.cue-cn{margin-top:4px;color:var(--muted);font-size:13px}.cue-analysis{margin-top:8px;padding:8px 10px;border-left:3px solid var(--accent);background:var(--bg);color:var(--text);font-size:13px;line-height:1.55}mark{padding:2px 4px;border-radius:4px;color:#111827;box-shadow:inset 0 -1px 0 rgba(0,0,0,.16)}.q-label{display:inline-flex;margin-left:6px;padding:1px 5px;border-radius:999px;background:#e5e7eb;color:#374151;font-size:11px;font-weight:700;vertical-align:middle}.q21{background:#fde68a}.q22{background:#bfdbfe}.q23{background:#c7d2fe}.q24{background:#bbf7d0}.q25{background:#fecaca}.q26{background:#fed7aa}.q27{background:#ddd6fe}.q28{background:#a7f3d0}.q29{background:#fbcfe8}.q30{background:#bae6fd}

#selbar{position:absolute;z-index:60;background:var(--panel);border:1px solid var(--border);box-shadow:0 10px 24px rgba(15,23,42,.18);border-radius:999px;padding:6px;display:inline-flex;gap:6px}#selbar[hidden]{display:none}#selbar button{border:0;border-radius:999px;background:var(--bg);color:var(--text);padding:6px 10px;cursor:pointer}

#toast{position:fixed;right:24px;bottom:86px;z-index:70;background:#10b981;color:#fff;border-radius:999px;padding:10px 16px;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}#toast.show{opacity:1;transform:translateY(0)}
@media(max-width:980px){.map-layout,.flow-layout{grid-template-columns:1fr}.map-image img{max-height:min(72vh,760px)}.map-row{grid-template-columns:minmax(90px,.55fr) minmax(306px,1fr);align-items:center}.map-grid{overflow-x:auto}.map-options{grid-template-columns:repeat(9,minmax(30px,1fr))}}@media(max-width:820px){.matching{grid-template-columns:1fr}.match-row,.flow-step{grid-template-columns:42px minmax(0,1fr)}.match-row .slot,.flow-step .slot{grid-column:2;justify-self:start}.map-row{grid-template-columns:1fr}.bottom-bar{height:auto;min-height:82px;align-items:flex-start;gap:10px;flex-direction:column;padding:10px 16px}.content{padding-bottom:130px}.split .right{display:none}}
</style>

swer questions 11-14.","cn":"现在，请仔细听并回答第11-14题。","analysis":""},{"time":"00:00:56,160 --> 00:01:01,280","html":"Thank you for all volunteering to help us with the Bridge to Brisbane Fun Run. The purpose","cn":"感谢大家自愿帮助我们举办“布里斯班大桥趣味跑”。本次会议的目的是","analysis":""},{"time":"00:01:01,280 --> 00:01:06,560","html":"of this meeting is to give you some information about your duties on race day. Some of you","cn":"向大家介绍比赛当天的职责。你们有些人","analysis":""},{"time":"00:01:06,560 --> 00:01:11,520","html":"are asking about where you can park on the day. Unfortunately, some of the usual places,","cn":"在询问当天可以把车停在哪里。不幸的是，一些常去的地方，","analysis":""},{"time":"00:01:11,520 --> 00:01:15,840","html":"<mark style=\"background-color: #fecaca;\">down by the river<\/mark>, for example, will be out of bounds because we will need extra space","cn":"例如，<mark style=\"background-color: #fecaca;\">河边<\/mark>，将无法停车，因为我们需要额外的空间","analysis":"<strong>答案解析：<\/strong> 问题11询问比赛当天建议的停车地点。<mark style=\"background-color: #fecaca;\">\"down by the river\"<\/mark>（河边）被明确指出“将无法停车 (will be out of bounds)”，因此是错误选项B的依据。"},{"time":"00:01:15,840 --> 00:01:21,760","html":"for emergency vehicles. <mark style=\"background-color: #bbf7d0;\">Probably the best option is the Jack Gray Sports Field in Barker Street<\/mark>.","cn":"用于停放紧急车辆。<mark style=\"background-color: #bbf7d0;\">最好的选择可能是巴克街的杰克·格雷体育场<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题11询问比赛当天建议的停车地点。文中明确指出 <mark style=\"background-color: #bbf7d0;\">\"Probably the best option is the Jack Gray Sports Field in Barker Street.\"<\/mark>（最好的选择可能是巴克街的杰克·格雷体育场），这与选项A“在体育场 (in the sports ground)”相符，因此是正确答案。"},{"time":"00:01:22,480 --> 00:01:27,440","html":"Although the closest parking lot is the Metro shopping complex, I would advise you not to park","cn":"虽然最近的停车场是地铁购物中心，但我建议您不要把车停在那里，因为","analysis":""},{"time":"00:01:27,440 --> 00:01:33,040","html":"<mark style=\"background-color: #fecaca;\">there as they tend to tell away people who aren't customers<\/mark>. At the start line, most of you will","cn":"<mark style=\"background-color: #fecaca;\">他们倾向于驱逐非顾客<\/mark>。在起跑线，你们大多数人将","analysis":"<strong>答案解析：<\/strong> 问题11询问比赛当天建议的停车地点。虽然提到了地铁购物中心，但说话者明确 <mark style=\"background-color: #fecaca;\">\"advise you not to park there as they tend to tell away people who aren't customers.\"<\/mark>（建议不要停在那里，因为他们倾向于驱逐非顾客），这与选项C“在购物中心 (in the shopping centre)”相悖，因此是错误选项C的依据。"},{"time":"00:01:33,040 --> 00:01:37,520","html":"be checking that runners have the necessary gear, especially their electronic timing chip,","cn":"检查跑者是否携带了必要的装备，特别是他们的电子计时芯片，","analysis":""},{"time":"00:01:37,520 --> 00:01:42,960","html":"the race number and the identity wristband. Make sure that the number is attached to the front","cn":"比赛号码和身份腕带。确保号码牌系在","analysis":""},{"time":"00:01:42,960 --> 00:01:48,960","html":"<mark style=\"background-color: #fecaca;\">of the running shirt or single it, not the back<\/mark>. The timing chip, which records the runner's time,","cn":"<mark style=\"background-color: #fecaca;\">跑衫或背心的前面，而不是后面<\/mark>。计时芯片用于记录跑者的时间，","analysis":"<strong>答案解析：<\/strong> 问题12询问计时芯片应附着在哪里。原文指出 <mark style=\"background-color: #fecaca;\">\"Make sure that the number is attached to the front of the running shirt or single it, not the back.\"<\/mark>（确保号码牌系在跑衫或背心的前面，而不是后面），这里说的是“号码牌”而非“计时芯片”，因此是错误选项A的依据。"},{"time":"00:01:48,960 --> 00:01:53,280","html":"needs to be <mark style=\"background-color: #bbf7d0;\">clipped onto one of their shoes<\/mark> and check that they are wearing their <mark style=\"background-color: #fecaca;\">wristband<\/mark>.","cn":"需要 <mark style=\"background-color: #bbf7d0;\">夹在他们的一只鞋子上<\/mark>，并检查他们是否佩戴了 <mark style=\"background-color: #fecaca;\">腕带<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题12询问计时芯片应附着在哪里。原文明确说明计时芯片 <mark style=\"background-color: #bbf7d0;\">\"needs to be clipped onto one of their shoes\"<\/mark>（需要夹在他们的一只鞋子上），这与选项B“鞋子 (a shoe)”相符，因此是正确答案。同时，原文提到 <mark style=\"background-color: #fecaca;\">\"check that they are wearing their wristband\"<\/mark>（检查他们是否佩戴了腕带），说明腕带是佩戴的，并非计时芯片的附着点，因此是错误选项C的依据。"},{"time":"00:01:54,800 --> 00:01:59,440","html":"Some of you will be responsible for organising the starting groups. It's very important that","cn":"你们中的一些人将负责组织起跑小组。这非常重要，因为","analysis":""},{"time":"00:01:59,440 --> 00:02:05,600","html":"runners start in a particular order. There is a system of colour codes. The <mark style=\"background-color: #fecaca;\">red group are walkers<\/mark>","cn":"跑者必须按照特定的顺序出发。有一个颜色编码系统。<mark style=\"background-color: #fecaca;\">红色组是步行者<\/mark>","analysis":"<strong>答案解析：<\/strong> 问题13询问哪个小组将首先出发。原文指出 <mark style=\"background-color: #fecaca;\">\"The red group are walkers and people with baby strollers.\"<\/mark>（红色组是步行者和推婴儿车的人），并在后面提到他们将在最后出发。因此，选项B“红色 (red)”是错误选项的依据。"},{"time":"00:02:05,600 --> 00:02:10,320","html":"and people with baby strollers. The <mark style=\"background-color: #fecaca;\">purple group are runners that expect to finish in at less<\/mark>","cn":"和推婴儿车的人。<mark style=\"background-color: #fecaca;\">紫色组是预计在一小时内完成比赛的跑者<\/mark>","analysis":"<strong>答案解析：<\/strong> 问题13询问哪个小组将首先出发。原文提到 <mark style=\"background-color: #fecaca;\">\"The purple group are runners that expect to finish in at less than one hour\"<\/mark>（紫色组是预计在一小时内完成比赛的跑者），并在后面指出黄色组先出发，其他组随后，因此紫色组不是第一个出发的，是错误选项C的依据。"},{"time":"00:02:10,320 --> 00:02:16,480","html":"than one hour and the <mark style=\"background-color: #bbf7d0;\">yellow group are our elite athletes. We'd like them to start the race<\/mark>","cn":"一小时以内，而 <mark style=\"background-color: #bbf7d0;\">黄色组是我们的精英运动员。我们希望他们首先开始比赛<\/mark>","analysis":"<strong>答案解析：<\/strong> 问题13询问哪个小组将首先出发。原文明确指出 <mark style=\"background-color: #bbf7d0;\">\"the yellow group are our elite athletes. We'd like them to start the race\"<\/mark>（黄色组是我们的精英运动员。我们希望他们首先开始比赛），这与选项A“黄色 (yellow)”相符，因此是正确答案。"},{"time":"00:02:16,480 --> 00:02:20,880","html":"and we'd like the other groups to follow after that, with the <mark style=\"background-color: #fecaca;\">red group and the strollers at the<\/mark>","cn":"我们希望其他小组随后跟进，而 <mark style=\"background-color: #fecaca;\">红色组和推婴儿车的人在<\/mark>","analysis":""},{"time":"00:02:20,880 --> 00:02:27,600","html":"<mark style=\"background-color: #fecaca;\">very back<\/mark>. This is for their own safety. Now, we are still short on volunteers for the race date,","cn":"<mark style=\"background-color: #fecaca;\">最后面<\/mark>。这是为了他们的安全。现在，比赛当天我们仍然缺少志愿者，","analysis":"<strong>答案解析：<\/strong> 问题13询问哪个小组将首先出发。原文指出 <mark style=\"background-color: #fecaca;\">\"with the red group and the strollers at the very back\"<\/mark>（红色组和推婴儿车的人在最后面），这进一步证实了选项B是错误选项。"},{"time":"00:02:27,600 --> 00:02:31,920","html":"so if you have any friends or family members who might be interested, please let us know.","cn":"所以如果您有任何可能感兴趣的朋友或家人，请告诉我们。","analysis":""},{"time":"00:02:32,560 --> 00:02:36,960","html":"We're probably okay for people to help with <mark style=\"background-color: #fecaca;\">the start<\/mark>, but we'll still desperately need","cn":"我们可能不缺帮助 <mark style=\"background-color: #fecaca;\">起跑<\/mark> 的人手，但我们仍然急需","analysis":"<strong>答案解析：<\/strong> 问题14询问比赛组织者仍然需要志愿者帮助哪些方面。原文提到 <mark style=\"background-color: #fecaca;\">\"We're probably okay for people to help with the start\"<\/mark>（我们可能不缺帮助起跑的人手），这表明起跑方面不缺人，因此选项C“开始比赛 (starting the race)”是错误选项的依据。"},{"time":"00:02:36,960 --> 00:02:42,400","html":"<mark style=\"background-color: #bbf7d0;\">volunteers along the race course to distribute water bottles to the runners<\/mark>. A few of you have","cn":"<mark style=\"background-color: #bbf7d0;\">赛道沿线的志愿者向跑者分发水瓶<\/mark>。你们中的一些人","analysis":"<strong>答案解析：<\/strong> 问题14询问比赛组织者仍然需要志愿者帮助哪些方面。原文明确指出 <mark style=\"background-color: #bbf7d0;\">\"we'll still desperately need volunteers along the race course to distribute water bottles to the runners.\"<\/mark>（我们仍然急需赛道沿线的志愿者向跑者分发水瓶），这与选项B“分发水 (handing out water)”相符，因此是正确答案。"},{"time":"00:02:42,400 --> 00:02:46,800","html":"<mark style=\"background-color: #fecaca;\">offered to help with first aid, but the good people of St John's ambulance have donated their<\/mark>","cn":"<mark style=\"background-color: #fecaca;\">提出帮助急救，但圣约翰救护队的好心人已经捐赠了他们的<\/mark>","analysis":""},{"time":"00:02:46,800 --> 00:02:55,600","html":"<mark style=\"background-color: #fecaca;\">services, so that won't be necessary<\/mark>. Before you hear the rest of the talk, you have some time","cn":"<mark style=\"background-color: #fecaca;\">服务，所以那将没有必要<\/mark>。在您听到谈话的其余部分之前，您有一些时间","analysis":"<strong>答案解析：<\/strong> 问题14询问比赛组织者仍然需要志愿者帮助哪些方面。原文指出 <mark style=\"background-color: #fecaca;\">\"A few of you have offered to help with first aid, but the good people of St John's ambulance have donated their services, so that won't be necessary.\"<\/mark>（你们中的一些人提出帮助急救，但圣约翰救护队的好心人已经捐赠了他们的服务，所以那将没有必要），这表明急救方面不需要志愿者，因此选项A“提供急救 (giving first aid)”是错误选项的依据。"},{"time":"00:02:55,600 --> 00:02:59,520","html":"to look at questions 15 to 20 on page 4.","cn":"查看第4页的第15至20题。","analysis":""},{"time":"00:03:12,400 --> 00:03:33,920","html":"Now listen and answer questions 15 to 20.","cn":"现在请听并回答第15至20题。","analysis":""},{"time":"00:03:34,880 --> 00:03:42,800","html":"Now, I'll show you the layout of the race village, which is where the race ends. Can you all see","cn":"现在，我将向大家展示比赛村的布局，这是比赛的终点。大家能看到吗","analysis":""},{"time":"00:03:42,800 --> 00:03:48,400","html":"them up? If you look at the bottom right hand side, you'll see where the runners enter the village","cn":"地图？如果看右下角，你会看到跑者进入村庄的地方","analysis":""},{"time":"00:03:48,400 --> 00:03:54,240","html":"next to the corporate catering section. As you continue along the course, you'll see <mark style=\"background-color: #bbf7d0;\">the stage on<\/mark>","cn":"在企业餐饮区旁边。沿着路线继续走，你会看到 <mark style=\"background-color: #bbf7d0;\">舞台在<\/mark>","analysis":""},{"time":"00:03:54,240 --> 00:04:00,480","html":"<mark style=\"background-color: #bbf7d0;\">the right<\/mark>. That's where the winners will receive their medals. Now, can you all see the finish line","cn":"<mark style=\"background-color: #bbf7d0;\">右边<\/mark>。那是获胜者领奖牌的地方。现在，大家能看到终点线吗","analysis":"<strong>答案解析：<\/strong> 问题15询问舞台 (Stage) 的位置。原文描述 <mark style=\"background-color: #bbf7d0;\">\"As you continue along the course, you'll see the stage on the right.\"<\/mark>（沿着路线继续走，你会看到舞台在右边），这是舞台的描述。"},{"time":"00:04:00,480 --> 00:04:05,760","html":"near the centre? After they finish the race, the runners can take one of two paths. It doesn't","cn":"在中心附近？跑者完成比赛后，可以走两条路中的一条。没关系","analysis":""},{"time":"00:04:05,760 --> 00:04:11,280","html":"matter which one to get their finishes t-shirts from <mark style=\"background-color: #bbf7d0;\">the t-shirt stand at the end of those paths<\/mark>.","cn":"哪条路都可以，从 <mark style=\"background-color: #bbf7d0;\">那些路径尽头的T恤摊位<\/mark> 领取他们的完赛T恤。","analysis":"<strong>答案解析：<\/strong> 问题16询问T恤摊位 (T-shirt Stand) 的位置。原文描述 <mark style=\"background-color: #bbf7d0;\">\"the runners can take one of two paths. It doesn't matter which one to get their finishes t-shirts from the t-shirt stand at the end of those paths.\"<\/mark>（跑者可以走两条路中的一条。没关系哪条路都可以，从那些路径尽头的T恤摊位领取他们的完赛T恤），这是T恤摊位的描述。"},{"time":"00:04:12,160 --> 00:04:17,440","html":"Many of you will be stationed at the end of the race. After they finish, the runners will also","cn":"你们中的许多人将在比赛终点值守。跑者结束后，还将","analysis":""},{"time":"00:04:17,440 --> 00:04:22,320","html":"want their belongings and <mark style=\"background-color: #bbf7d0;\">all bags are kept in the building on Bowen Road<\/mark>. It's quite close to","cn":"需要他们的物品，<mark style=\"background-color: #bbf7d0;\">所有包都存放在鲍恩路上的那栋楼里<\/mark>。它离","analysis":""},{"time":"00:04:22,320 --> 00:04:28,400","html":"the exit in the top left hand corner of your map. Now, some of you will have an important role","cn":"地图左上角的出口很近。现在，你们中的一些人将扮演重要角色","analysis":"<strong>答案解析：<\/strong> 问题17询问行李领取区 (Bag Collection Area) 的位置。原文描述 <mark style=\"background-color: #bbf7d0;\">\"all bags are kept in the building on Bowen Road.\"<\/mark>（所有包都存放在鲍恩路上的那栋楼里），这是行李领取区的描述。"}, 0:05:01,600","html":"<mark style=\"background-color: #bbf7d0;\">exit through to Gregory Terrace. Can you see it there to the left of the corporate catering area?<\/mark>","cn":"<mark style=\"background-color: #bbf7d0;\">通往格雷戈里台地的出口旁边。你能在企业餐饮区的左边看到它吗？<\/mark>","analysis":"<strong>答案解析：<\/strong> 问题20询问供水站 (Water station) 的位置。原文描述 <mark style=\"background-color: #bbf7d0;\">\"the main water station in the village is just beside the third exit through to Gregory Terrace. Can you see it there to the left of the corporate catering area?\"<\/mark>（村里的主要供水站就在第三个通往格雷戈里台地的出口旁边。你能在企业餐饮区的左边看到它吗？），这是供水站的描述。"},{"time":"00:05:02,560 --> 00:05:06,000","html":"So everyone, please direct the race finishes there to get their free bottle water.","cn":"所以各位，请引导完赛者到那里领取他们的免费瓶装水。","analysis":""},{"time":"00:05:09,440 --> 00:05:15,520","html":"That is the end of section two. You now have half a minute to check your answers.","cn":"第二部分到此结束。您现在有半分钟时间检查您的答案。","analysis":""},{"time":"00:05:26,720 --> 00:05:49,120","html":"Now turn to section three on page five.","cn":"现在翻到第五页的第三部分。","analysis":""}],"transcriptHighlights":[{"qid":"11","text":"in the sports ground.","answer":"A"},{"qid":"12","text":"a shoe.","answer":"B"},{"qid":"13","text":"yellow","answer":"A"},{"qid":"14","text":"handing out water.","answer":"B"},{"qid":"15","text":"Stage","answer":"F"},{"qid":"16","text":"T-shirt Stand","answer":"A"},{"qid":"17","text":"Bag Collection Area","answer":"B"},{"qid":"18","text":"Information Centre","answer":"H"},{"qid":"19","text":"Prize Draw Box","answer":"G"},{"qid":"20","text":"Water station","answer":"I"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',(g.questions||[]).map(q=>String(q.id||q[0]||''))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}
function clearUserHighlights(){$$('.hl-brown,.hl-rose,.hl-blue').forEach(unwrap)}
function createNote(span){let id=span.dataset.hid;if($(`.note-card[data-hid="${id}"]`))return;let card=document.createElement('div');card.className='note-card';card.dataset.hid=id;card.innerHTML=`<div class="note-quote">${esc(span.textContent.slice(0,120))}</div><textarea placeholder="Write note here..."></textarea><button class="delete-note" type="button">Delete</button>`;$('#notesList').prepend(card);bindNoteDeletes()}
function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}
function removeNote(id){if(!id)return;$(`.note-card[data-hid="${id}"]`)?.remove()}
function drawTimer(){let m=Math.floor(secs/60),s=secs%60;$('#timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}
function adjustFontSize(delta){setFontSize(currentFontSize()+delta,true)}
function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}
function resetAppearance(persist=true){document.body.classList.remove('dark');setFontSize(DEFAULT_FONT_SIZE,false);updateSizeButtons();if(persist)save(false)}
function clearAllProgress(){localStorage.removeItem(storeKey)}
$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
const audio=$('#audio');$('#play').onclick=()=>audio.paused?audio.play():audio.pause();audio.onplay=()=>$('#play').textContent='⏸';audio.onpause=()=>$('#play').textContent='▶';audio.ontimeupdate=()=>{if(audio.duration)$('#fillbar').style.width=(audio.currentTime/audio.duration*100)+'%';$('#time').textContent=`${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${audio.duration?Math.floor(audio.duration/60):'00'}:${audio.duration?String(Math.floor(audio.duration%60)).padStart(2,'0'):'00'}`;maintainCueLoop()};$('#speed').onchange=e=>{slowCue=false;audio.playbackRate=+e.target.value;save(false)};$('#bar').onclick=e=>{if(audio.duration){let r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;save(false)}};
bindGlobal();render();
