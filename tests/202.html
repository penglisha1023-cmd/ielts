    <script>
        (function(){
            // ---------- 答案库 ----------
            const ANSWER_KEY = {
                "31": "tide",
                "32": "ears/hearing",
                "33": "plants",
                "34": "feeding",
                "35": "noises",
                "36": "healthy",
                "37": "group",
                "38": "social",
                "39": "leader",
                "40": "networks"
            };
            function normalize(s) { let v = (s || "").trim().toLowerCase(); if (v === "ears" || v === "hearing") return "ears/hearing"; return v; }
            function isCorrect(q, user) { return normalize(user) === normalize(ANSWER_KEY[q]); }

            // ---------- 完整Transcript (底部留白) ----------
            const FULL_TRANSCRIPT = `
                <h4>🎧 Listening Transcript (Answers Highlighted)</h4>
                <p>Good afternoon everyone. Well with some of you about to go out on field work, it's timely that in this afternoon session I'll be sharing some ideas about the reasons why groups of whales and dolphins sometimes swim ashore from the sea right onto the beach and, most often, die in what are known as mass strandings.</p>
                <p>Unfortunately, this type of event is a frequent occurrence in some of the locations that you'll be travelling to, where sometimes the <span class="answer-highlight">tide</span> goes out suddenly, confusing the animals.</p>
                <p>However, there are many other theories about the causes of mass strandings. The first is that the behaviour is linked to parasites. It's often found that stranded animals were infested with large numbers of parasites. For instance, a type of worm is commonly found in the <span class="answer-highlight">ears</span> of dead whales. Since marine animals rely heavily on their hearing to navigate, this type of infestation has the potential to be very harmful.</p>
                <p>Another theory is related to toxins or poisons. These have also been found to contribute to the death of many marine animals. Many toxins, as I'm sure you're aware, originate from <span class="answer-highlight">plants</span> or animals. The whale ingests these toxins in its normal feeding behaviour, but whether these poisons directly or indirectly lead to stranding and death, seems to depend upon the toxin involved.</p>
                <p>In 1988, for example, 14 humpback whales examined after stranding along the beaches of Cape Cod were found to have been poisoned after eating tuna that contained saxitoxin, the same toxin that can be fatal in humans.</p>
                <p>Alternatively, it has also been suggested that some animals strand accidentally by following their prey ashore in the confusion of the chase. In 1995, David Thurston monitored pilot whales that beached after following squid ashore. However, this idea does not seem to hold true for the majority of mass strandings, because examination of the animal's stomach contents revealed that most had not been <span class="answer-highlight">feeding</span> as they stranded.</p>
                <p>There are also some new theories which link strandings to humans. A growing concern is that loud <span class="answer-highlight">noises</span> in the ocean cause strandings. Noises such as those caused by military exercises are of particular concern, and have been pinpointed as the cause of some strandings of late.</p>
                <p>One of these, a mass stranding of whales in 2000 in the Bahamas, coincided closely with experiments using a new submarine detection system. There were several factors that made this stranding stand out as different from previous strandings. This led researchers to look for a new cause. For one, all the stranded animals were <span class="answer-highlight">healthy</span>. In addition, the animals were spread out along 38 kilometers of coast, whereas it's more common for the animals to be found in a <span class="answer-highlight">group</span> when mass strandings occur.</p>
                <p>A final theory is related to group behaviour, and suggests that sea mammals cannot distinguish between sick and healthy leaders, and will follow sick leaders, even to an inevitable death. This is a particularly interesting theory, since the whales that are thought to be most <span class="answer-highlight">social</span>, the toothed whales, are the group that strand the most frequently. The theory is also supported by evidence from a dolphin stranding in 1994. Examination of the dead animals revealed that, apart from the <span class="answer-highlight">leader</span>, all the others had been healthy at the time of their death.</p>
                <p>Without one consistent theory, however, it is very hard for us to do anything about this phenomenon, except to assist animals where and when we can. Stranding <span class="answer-highlight">networks</span> have been established around the world, to aid in rescuing animals and collecting samples from those that could not be helped. I recommend John Connor's Marine Mammals Ashore, as an excellent starting point if you're interested in finding out more about these networks, or establishing one yourself.</p>
                <div style="height: 60px;"></div>
                <p style="margin-top:12px; font-style:italic;">— End of Section 4 —</p>
                <div style="height: 80px;"></div>
            `;

            }
            function updateNavState() {
                for(let i=31;i<=40;i++) {
                    const nav = qNavContainer.querySelector(`.q-nav-item[data-q="${i}"]`);
                    if(!nav) continue;
                    const inp = document.querySelector(`input.blank[data-qnum="${i}"]`);
                    const hasVal = inp && inp.value.trim() !== '';
                    nav.classList.toggle('answered', hasVal);
                    if(!isReviewing) nav.classList.remove('correct','incorrect');
                }
            }
            function gradeNavColors() {
                for(let i=31;i<=40;i++) {
                    const nav = qNavContainer.querySelector(`.q-nav-item[data-q="${i}"]`);
                    if(!nav) continue;
                    const inp = document.querySelector(`input.blank[data-qnum="${i}"]`);
                    const user = inp ? inp.value : '';
                    const correct = isCorrect(i.toString(), user);
                    nav.classList.remove('answered','correct','incorrect');
                    if(correct) nav.classList.add('correct');
                    else nav.classList.add('incorrect');
                }
            }
            function generateResultTable() {
                const old = document.querySelector('.group-results');
                if(old) old.remove();
                const firstSection = document.querySelector('.notes-section');
                if(!firstSection) return;
                let html = `<div class="group-results"><h5>📊 Answer Review</h5><table class="results-table"><thead><tr><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th></tr></thead><tbody>`;
                for(let i=31;i<=40;i++) {
                    const inp = document.querySelector(`input.blank[data-qnum="${i}"]`);
                    let user = inp ? inp.value.trim() : '—';
                    if(user === '') user = '—';
                    let correctVal = ANSWER_KEY[i.toString()];
                    if(i===32) correctVal = "ears / hearing";
                    const ok = isCorrect(i.toString(), user);
                    html += `<tr><td><b>${i}</b></td><td>${user}</td><td>${correctVal}</td><td class="${ok ? 'result-correct' : 'result-incorrect'}">${ok ? '✔ Correct' : '✖ Incorrect'}</td></tr>`;
                }
                html += `</tbody></table></div>`;
                document.getElementById('test-pages-container').insertAdjacentHTML('beforeend', html);
            }
            function setInputsEnabled(enabled) {
                document.querySelectorAll('input.blank').forEach(inp => inp.disabled = !enabled);
            }
            function enterReviewMode() {
                isReviewing = true;
                finishBtn.innerText = 'Return to Test';
                mainShell.classList.add('split-view');
                document.getElementById('transcript-content').innerHTML = FULL_TRANSCRIPT;
                setInputsEnabled(false);
                generateResultTable();
                gradeNavColors();
                if(timerInterval) clearInterval(timerInterval);
            }
            function returnToTestMode() {
                isReviewing = false;
                finishBtn.innerText = 'Finish';
                mainShell.classList.remove('split-view');
                setInputsEnabled(true);
                const existing = document.querySelector('.group-results');
                if(existing) existing.remove();
                updateNavState();
                startTimer();
            }
            function toggleFinishMode() {
                if(isReviewing) returnToTestMode();
                else if(confirm('Submit answers and enter review mode?')) enterReviewMode();
            }

            function startTimer() {
                if(timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    let m = Math.floor(timerSeconds/60), s = timerSeconds%60;
                    timerSpan.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            }
            function saveAll(showMsg=true) {
                const testContainer = document.getElementById('test-pages-container').innerHTML;
                const notesHTML = notesList.innerHTML;
                const data = {
                    testHTML: testContainer,
                    notesHTML: notesHTML,
                    timerSec: timerSeconds,
                    fontSize: document.documentElement.className,
                    darkMode: document.body.classList.contains('dark-mode')
                };
                localStorage.setItem('ielts_listening_mass', JSON.stringify(data));
                if(showMsg) showToast('Progress saved!');
            }
            function loadFromStorage() {
                const raw = localStorage.getItem('ielts_listening_mass');
                if(!raw) return;
                try{
                    const data = JSON.parse(raw);
                    if(data.testHTML) document.getElementById('test-pages-container').innerHTML = data.testHTML;
                    if(data.notesHTML) notesList.innerHTML = data.notesHTML;
                    if(data.timerSec !== undefined) timerSeconds = data.timerSec;
                    if(data.fontSize) document.documentElement.className = data.fontSize;
                    if(data.darkMode) document.body.classList.toggle('dark-mode', data.darkMode);
                    let mins = Math.floor(timerSeconds/60), secs = timerSeconds%60;
                    timerSpan.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                    document.querySelectorAll('input.blank').forEach(inp => inp.addEventListener('input', () => updateNavState()));
                    updateNavState();
                } catch(e) {}
            }
            function clearAll() {
                if(confirm('Clear all progress (answers, highlights, notes)?')) {
                    localStorage.removeItem('ielts_listening_mass');
                    location.reload();
                }
            }
            function showToast(msg) { toastDiv.innerText=msg; toastDiv.classList.add('show'); setTimeout(()=>toastDiv.classList.remove('show'),1500); }

            // ---------- 高亮核心逻辑：第一次高亮棕色，第二次同一元素变为玫红色 (hl-brown → hl-rose) ----------
            function initHighlight() {
                document.addEventListener('mouseup', (e) => handleSelection(e));
                document.getElementById('selbar')?.addEventListener('click', (e) => handleToolbar(e));
            }
            function handleSelection(e) {
    if (e.target.closest('#selbar, #notes, .bottom-bar')) return;
    
    const sel = window.getSelection();
    const bar = document.getElementById('selbar');
    // 检查点击的是不是已经存在的 span
    const clickedHL = e.target.closest('.hl-brown, .hl-rose, .hl-blue');

    if (clickedHL) {
        // 如果点的是已有高亮（不管有没有选中文字），都把它设为 target
        bar.targetElem = clickedHL;
        bar.hidden = false;
        const rect = clickedHL.getBoundingClientRect();
        bar.style.left = `${window.scrollX + rect.left + rect.width / 2 - 70}px`;
        bar.style.top = `${window.scrollY + rect.top - 40}px`;
    } else if (sel && !sel.isCollapsed) {
        // 如果点的是普通文字且有选区，则是新高亮
        bar.targetElem = null;
        bar.hidden = false;
        const range = sel.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        bar.style.left = `${window.scrollX + rect.left + rect.width / 2 - 70}px`;
        bar.style.top = `${window.scrollY + rect.top - 40}px`;
    } else {
        bar.hidden = true;
    }
}
            function wrapSelection(className) {
                const sel = window.getSelection();
                if(sel.isCollapsed) return null;
                const range = sel.getRangeAt(0);
                const span = document.createElement('span');
                span.className = className;
                try { range.surroundContents(span); } catch(e) {
                    span.appendChild(range.extractContents());
                    range.insertNode(span);
                }
                return span;
            }
            function createNoteCard(span) {
                const hid = span.dataset.hid || Date.now().toString();
                span.dataset.hid = hid;
                if(document.querySelector(`.note-card[data-hid="${hid}"]`)) return;
                const card = document.createElement('div');
                card.className = 'note-card';
                card.dataset.hid = hid;
                card.innerHTML = `<div class="note-quote">${span.innerText.slice(0,120)}</div><textarea placeholder="Write note here..."></textarea><div class="note-actions"><button class="del-note-btn">Delete</button></div>`;
                card.querySelector('.del-note-btn').onclick = () => {
                    if(span.parentNode) span.outerHTML = span.innerText;
                    card.remove();
                };
                notesList.prepend(card);
                document.body.classList.add('notes-open');
            }
            function deleteNoteByHid(hid) {
                const noteCard = document.querySelector(`.note-card[data-hid="${hid}"]`);
                if(noteCard) noteCard.remove();
            }
            function handleToolbar(e) {
    const act = e.target.closest('button')?.dataset.act;
    let bar = document.getElementById('selbar');
    let target = bar.targetElem; // handleSelection 中捕捉到的已有 span
    const sel = window.getSelection();

    if (act === 'hl') {
        if (target) {
            // 情况 A: 点击的是已经存在的高亮元素 -> 切换颜色
            if (target.classList.contains('hl-brown')) {
                target.className = 'hl-rose';
            } else {
                target.className = 'hl-brown';
            }
        } else if (!sel.isCollapsed) {
            // 情况 B: 选中的是纯文本 -> 创建新的棕色高亮
            wrapSelection('hl-brown');
        }
    } else if (act === 'note') {
        if (target) {
            target.className = 'hl-blue';
            createNoteCard(target);
        } else if (!sel.isCollapsed) {
            const newSpan = wrapSelection('hl-blue');
            if (newSpan) createNoteCard(newSpan);
        }
    } else if (act === 'del' && target) {
        if (target.parentNode) target.outerHTML = target.innerText;
    }

    // 操作完成后隐藏工具栏并清除选区
    bar.hidden = true;
    window.getSelection().removeAllRanges();
}
            // 音频初始化
            function initAudio() {
                const wrapper = document.querySelector('.audio-player-wrapper');
                wrapper.innerHTML = `<div class="audio-player"><button class="play-pause-btn">▶</button><div class="progress-container"><div class="progress-bar-wrapper"><div class="progress-bar"></div></div></div><div class="time-display">00:00 / 00:00</div><div class="speed-control"><select class="playback-speed"><option value="0.7">0.7x</option><option value="1.0" selected>1.0x</option><option value="1.1">1.1x</option><option value="1.2">1.2x</option><option value="1.5">1.5x</option></select></div><audio class="listening-audio" src="https://qyccvyyigtjhzunumbqf.supabase.co/storage/v1/object/public/audio/202.mp3" preload="metadata"></audio></div>`;
                const audio = document.querySelector('.listening-audio');
                if(!audio) return;
                const playBtn = wrapper.querySelector('.play-pause-btn');
                const progContainer = wrapper.querySelector('.progress-container');
                const progBar = wrapper.querySelector('.progress-bar');
                const timeSpan = wrapper.querySelector('.time-display');
                const speedSelect = wrapper.querySelector('.playback-speed');
                audio.ontimeupdate = () => {
                    if(audio.duration) progBar.style.width = (audio.currentTime/audio.duration)*100+'%';
                    timeSpan.innerText = `${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${Math.floor(audio.duration/60)}:${String(Math.floor(audio.duration%60)).padStart(2,'0')}`;
                };
                playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
                audio.onplay = () => playBtn.innerText = '⏸';
                audio.onpause = () => playBtn.innerText = '▶';
                speedSelect.onchange = () => audio.playbackRate = parseFloat(speedSelect.value);
                let scrubbing = false;
                progContainer.onmousedown = (e) => { scrubbing=true; const rect=progContainer.getBoundingClientRect(); audio.currentTime = ((e.clientX-rect.left)/rect.width)*audio.duration; };
                window.onmouseup = () => scrubbing=false;
                window.onmousemove = (e) => { if(scrubbing && audio.duration) { const rect=progContainer.getBoundingClientRect(); audio.currentTime = ((e.clientX-rect.left)/rect.width)*audio.duration; } };
            }
            function initSplitter() {
                let drag = false;
                splitter.addEventListener('mousedown', () => { drag=true; document.body.style.cursor='col-resize'; });
                window.addEventListener('mouseup', () => { drag=false; document.body.style.cursor=''; });
                window.addEventListener('mousemove', (e) => {
                    if(!drag) return;
                    const left = document.getElementById('left-pane');
                    const right = document.getElementById('right-pane');
                    const total = left.parentElement.offsetWidth;
                    let newLeft = e.clientX;
                    let newRight = total - newLeft - splitter.offsetWidth;
                    if(newLeft>200 && newRight>200) { left.style.flexBasis=`${newLeft}px`; right.style.flexBasis=`${newRight}px`; }
                });
            }
            function bindSettings() {
                const settingsBtn = document.getElementById('settings-btn');
                const panel = document.getElementById('settings-panel');
                const overlay = document.querySelector('.overlay');
                settingsBtn.onclick = (e) => { e.stopPropagation(); settingsOpen=!settingsOpen; panel.style.display=settingsOpen?'block':'none'; overlay.style.display=settingsOpen?'block':'none'; };
                overlay.onclick = () => { settingsOpen=false; panel.style.display='none'; overlay.style.display='none'; };
                document.querySelectorAll('[data-size]').forEach(btn => btn.onclick = () => { document.documentElement.className = `font-${btn.dataset.size}`; saveAll(false); });
                document.querySelectorAll('[data-mode]').forEach(btn => btn.onclick = () => { document.body.classList.toggle('dark-mode', btn.dataset.mode==='dark'); saveAll(false); });
            }

            function init() {
                document.getElementById('test-pages-container').innerHTML = buildQuestionsLayout();
                buildNav();
                initAudio();
                initSplitter();
                loadFromStorage();
                startTimer();
                initHighlight();
                bindSettings();
                finishBtn.addEventListener('click', toggleFinishMode);
                saveBtn.addEventListener('click', () => saveAll(true));
                clearBtn.addEventListener('click', clearAll);
                toggleNotes.addEventListener('click', () => document.body.classList.toggle('notes-open'));
                notesClose.addEventListener('click', () => document.body.classList.remove('notes-open'));
                toggleTranscript.addEventListener('click', () => { if(!isReviewing) mainShell.classList.toggle('split-view'); else showToast('Exit review mode first.'); });
                updateNavState();
            }
            init();
        })();
    </script>
