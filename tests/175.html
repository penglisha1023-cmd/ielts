nfident Voice Delivery"]]}],"answerKey":{"text":{},"single":{"q21":"B","q22":"A","q23":"C","q24":"C","q25":"A","q26":"C"},"multiple":{},"multipleMap":{},"matching":{"q27":"E","q28":"B","q29":"G","q30":"D"},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:10,600","html":"You will hear a discussion between Fiona, who is the head of a college drama department","cn":"你将听到 Fiona 和 Ed 之间的一段讨论，Fiona 是一所学院戏剧系的负责人，","analysis":""},{"time":"00:00:10,600 --> 00:00:16,060","html":"and a new tutor called Ed, who is preparing to run a voice coaching workshop for drama","cn":"Ed 是一位新导师，他正准备为戏剧学生开设一个声音训练工作坊，","analysis":""},{"time":"00:00:16,060 --> 00:00:17,060","html":"students.","cn":"对象是戏剧专业学生。","analysis":""},{"time":"00:00:17,060 --> 00:00:22,800","html":"First, you have some time to look at questions 21 to 26.","cn":"首先，你有一些时间阅读第 21 到 26 题。","analysis":""},{"time":"00:01:00,000 --> 00:01:14,000","html":"Now, listen carefully and answer questions 21 to 26.","cn":"现在请仔细听，并回答第 21 到 26 题。","analysis":""},{"time":"00:01:14,000 --> 00:01:18,000","html":"Fiona: Right, Ed.","cn":"Fiona：好的，Ed。","analysis":""},{"time":"00:01:18,000 --> 00:01:21,000","html":"Well, I'm delighted that you've joined the drama department.","cn":"很高兴你加入戏剧系。","analysis":""},{"time":"00:01:21,000 --> 00:01:26,000","html":"Now, part of my job is to support you during your probationary year.","cn":"现在，我工作的一部分是在你的试用年期间支持你。","analysis":""},{"time":"00:01:26,000 --> 00:01:30,720","html":"So, let's ensure that you're clear about what you'll be doing in the first voice coaching","cn":"所以，我们来确认一下你是否清楚下周第一次声音训练","analysis":""},{"time":"00:01:30,720 --> 00:01:32,720","html":"workshop you run next week.","cn":"工作坊中要做什么。","analysis":""},{"time":"00:01:32,720 --> 00:01:33,720","html":"Ed: OK.","cn":"Ed：好的。","analysis":""},{"time":"00:01:33,720 --> 00:01:38,800","html":"Fiona: I'll be observing you working with the students as you show them how to project their voices","cn":"Fiona：我会观察你和学生一起工作，看你如何教他们在舞台上把声音","analysis":""},{"time":"00:01:38,800 --> 00:01:39,800","html":"on stage.","cn":"传出去。","analysis":""},{"time":"00:01:39,800 --> 00:01:46,440","html":"I'll be evaluating how you cope with the practical activities as well as the theory.","cn":"我会评估你如何处理实践活动以及理论部分。","analysis":""},{"time":"00:01:46,440 --> 00:01:52,120","html":"And if all goes well, you'll then have finished the final stage of your <mark style=\"background-color: #bbf7d0;\">voice coach diploma<\/mark>.","cn":"如果一切顺利，你就完成了<mark style=\"background-color: #bbf7d0;\">声音教练文凭<\/mark>的最后阶段。","analysis":"<strong>答案解析：<\/strong>第21题问 Ed 举办声音训练工作坊是为了获得什么。原文说这是 “voice coach diploma” 的最后阶段，说明是为了获得资格证书，所以答案是 <strong>B<\/strong>。"},{"time":"00:01:52,120 --> 00:01:53,840","html":"Ed: That'd be great, Fiona.","cn":"Ed：那太好了，Fiona。","analysis":""},{"time":"00:01:53,840 --> 00:01:58,920","html":"Anyway, I've thought through the workshop and I've done a plan to highlight the key areas","cn":"总之，我已经仔细考虑了这个工作坊，并做了一个计划，突出我打算涵盖的关键领域。","analysis":""},{"time":"00:01:58,920 --> 00:02:00,200","html":"I intend to cover.","cn":"我打算讲这些内容。","analysis":""},{"time":"00:02:00,200 --> 00:02:01,200","html":"Fiona: Good.","cn":"Fiona：很好。","analysis":""},{"time":"00:02:01,200 --> 00:02:02,680","html":"Let's look at your plan.","cn":"我们来看看你的计划。","analysis":""},{"time":"00:02:02,680 --> 00:02:03,680","html":"Ed: OK.","cn":"Ed：好的。","analysis":""},{"time":"00:02:03,680 --> 00:02:05,720","html":"Fiona: So, let's see.","cn":"Fiona：那么，我们来看一下。","analysis":""},{"time":"00:02:05,720 --> 00:02:08,960","html":"I'm glad you've thought about seating patterns.","cn":"我很高兴你考虑到了座位排列方式。","analysis":""},{"time":"00:02:08,960 --> 00:02:13,920","html":"You say you want to begin with the student sitting in star-shaped patterns.","cn":"你说你想一开始让学生按星形排列坐下。","analysis":""},{"time":"00:02:13,920 --> 00:02:15,440","html":"That's fine.","cn":"这可以。","analysis":""},{"time":"00:02:15,440 --> 00:02:19,160","html":"There are various seating patterns you can use at this stage.","cn":"在这个阶段，你可以使用多种座位排列方式。","analysis":""},{"time":"00:02:19,160 --> 00:02:25,400","html":"I like trainees sitting cross-legged in a circle, other people like students in rows.","cn":"我喜欢让学员盘腿围成一圈坐，其他人喜欢让学生成排坐。","analysis":""},{"time":"00:02:25,400 --> 00:02:30,080","html":"But actually, <mark style=\"background-color: #bbf7d0;\">all these can be represented diagrammatically<\/mark>, which would be clearer","cn":"但实际上，<mark style=\"background-color: #bbf7d0;\">这些都可以用图示表示<\/mark>，这样会更清楚，","analysis":""},{"time":"00:02:30,080 --> 00:02:34,000","html":"than going into lots of detailed explanations like you've done here.","cn":"比你这里写的大量详细解释更清楚。","analysis":"<strong>答案解析：<\/strong>第22题问 Fiona 对 Ed 选择的座位排列怎么看。她提到可以用图示更清楚，所以答案是 <strong>A<\/strong>。"},{"time":"00:02:34,000 --> 00:02:35,000","html":"Ed: Oh, OK.","cn":"Ed：哦，好的。","analysis":""},{"time":"00:02:35,000 --> 00:02:38,840","html":"But it doesn't matter which one I use at the beginning of a workshop.","cn":"但工作坊一开始用哪一种排列方式并不重要，对吧？","analysis":""},{"time":"00:02:38,840 --> 00:02:41,360","html":"Fiona: It's whatever you feel comfortable with.","cn":"Fiona：用你觉得舒服的方式就可以。","analysis":""},{"time":"00:02:41,360 --> 00:02:42,360","html":"Ed: Fine.","cn":"Ed：好。","analysis":""},{"time":"00:02:42,360 --> 00:02:46,400","html":"So, in the initial phase, I explain the objectives of the session.","cn":"那么，在初始阶段，我会解释本节课的目标。","analysis":""},{"time":"00:02:46,400 --> 00:02:47,400","html":"Fiona: OK.","cn":"Fiona：好的。","analysis":""},{"time":"00:02:47,480 --> 00:02:54,960","html":"Then, in the first activity you say they should quickly rise, walk briskly around the room,","cn":"然后，在第一个活动中，你说他们应该快速起身，在房间里快步走动，","analysis":""},{"time":"00:02:54,960 --> 00:02:57,240","html":"weaving in and out to avoid each other.","cn":"穿梭移动以避免碰到彼此。","analysis":""},{"time":"00:02:57,240 --> 00:02:58,240","html":"Ed: Yes.","cn":"Ed：是的。","analysis":""},{"time":"00:02:58,240 --> 00:03:01,960","html":"I think it's important that they don't get in each other's way and that they learn to","cn":"我认为重要的是他们不要互相挡路，并且要学会","analysis":""},{"time":"00:03:01,960 --> 00:03:07,760","html":"move within a confined space, aware of other people, but primarily <mark style=\"background-color: #bbf7d0;\">concentrating on their<\/mark>","cn":"在有限空间内移动，意识到其他人的存在，但主要还是<mark style=\"background-color: #bbf7d0;\">集中于他们<\/mark>","analysis":""},{"time":"00:03:07,760 --> 00:03:09,080","html":"<mark style=\"background-color: #bbf7d0;\">own thoughts<\/mark>.","cn":"<mark style=\"background-color: #bbf7d0;\">自己的想法<\/mark>。","analysis":""},{"time":"00:03:09,080 --> 00:03:10,080","html":"Fiona: Absolutely.","cn":"Fiona：完全正确。","analysis":"<strong>答案解析：<\/strong>第23题问第一项活动中学生应该怎样。原文说学生主要要 “concentrating on their own thoughts”，Fiona 表示同意，所以答案是 <strong>C<\/strong>。"},{"time":"00:03:10,080 --> 00:03:15,000","html":"But in your plan, you've omitted to mention that in the second activity, you will get","cn":"但是在你的计划中，你漏掉了第二项活动中要让","analysis":""},{"time":"00:03:15,000 --> 00:03:17,120","html":"the students to pair off.","cn":"学生两两配对这一点。","analysis":""},{"time":"00:03:17,120 --> 00:03:22,640","html":"So you need to rethink that section and include reasons why it's essential for them to listen","cn":"所以你需要重新考虑这一部分，并说明为什么让他们听彼此","analysis":""},{"time":"00:03:22,640 --> 00:03:23,880","html":"to each other talking.","cn":"说话是很重要的。","analysis":""},{"time":"00:03:23,880 --> 00:03:26,840","html":"It doesn't matter what they actually say.","cn":"他们实际说什么并不重要。","analysis":""},{"time":"00:03:26,840 --> 00:03:31,280","html":"And at the same time, get them to think about their posture because that governs their","cn":"同时，让他们思考自己的姿势，因为姿势会影响他们的","analysis":""},{"time":"00:03:31,280 --> 00:03:34,920","html":"lung capacity and most crucially, their <mark style=\"background-color: #bbf7d0;\">breathing<\/mark>.","cn":"肺活量，最关键的是影响他们的<mark style=\"background-color: #bbf7d0;\">呼吸<\/mark>。","analysis":"<strong>答案解析：<\/strong>第24题问第二项活动中 Ed 应该加入什么重点。原文说姿势会影响肺活量，最重要的是 breathing，所以应关注呼吸控制，答案是 <strong>C<\/strong>。"},{"time":"00:03:34,920 --> 00:03:35,920","html":"Ed: Right.","cn":"Ed：好的。","analysis":""},{"time":"00:03:35,920 --> 00:03:36,920","html":"We'll do.","cn":"我会这么做。","analysis":""},{"time":"00:03:36,920 --> 00:03:37,920","html":"Fiona: OK.","cn":"Fiona：好的。","analysis":""},{"time":"00:03:37,920 --> 00:03:42,920","html":"Of course, a common issue in the UK is that we rehearse in small rooms, then transfer to","cn":"当然，在英国一个常见问题是，我们在小房间里排练，然后转到","analysis":""},{"time":"00:03:42,920 --> 00:03:44,600","html":"a larger stage.","cn":"更大的舞台上。","analysis":""},{"time":"00:03:44,600 --> 00:03:50,120","html":"So bearing in mind that voice projection is <mark style=\"background-color: #fecaca;\">not shouting<\/mark>, later in the course, you'll","cn":"所以要记住，声音投射<mark style=\"background-color: #fecaca;\">不是喊叫<\/mark>，在课程后期，你需要","analysis":""},{"time":"00:03:50,120 --> 00:03:52,720","html":"need to work in a much bigger space.","cn":"在一个大得多的空间里进行训练。","analysis":""},{"time":"00:03:52,720 --> 00:03:55,320","html":"Ed: Does it have to be an enclosed space?","cn":"Ed：一定要是封闭空间吗？","analysis":""},{"time":"00:03:55,320 --> 00:03:59,560","html":"I suppose it does because ultimately they're going to work in a theatre.","cn":"我想应该是吧，因为他们最终会在剧院里工作。","analysis":""},{"time":"00:03:59,560 --> 00:04:05,640","html":"Fiona: Ideally an enclosed space, but there's no reason why you couldn't go somewhere <mark style=\"background-color: #bbf7d0;\">outdoors<\/mark>.","cn":"Fiona：理想情况下是封闭空间，但也没有理由不能去<mark style=\"background-color: #bbf7d0;\">室外<\/mark>某个地方。","analysis":""},{"time":"00:04:05,640 --> 00:04:09,840","html":"Although I'd avoid a very public space like a <mark style=\"background-color: #fecaca;\">park<\/mark>.","cn":"不过我会避免像<mark style=\"background-color: #fecaca;\">公园<\/mark>这样非常公共的空间。","analysis":"<strong>答案解析：<\/strong>第25题问 Fiona 对在大空间训练有什么建议。原文说理想是室内封闭空间，但也可以去户外，所以答案是 <strong>A<\/strong>。"},{"time":"00:04:09,840 --> 00:04:10,840","html":"Ed: Right.","cn":"Ed：明白。","analysis":""},{"time":"00:04:10,840 --> 00:04:11,840","html":"Thanks.","cn":"谢谢。","analysis":""},{"time":"00:04:11,840 --> 00:04:18,120","html":"Fiona: Well, your next activity on how to convey emotion on stage is fine, but your selection","cn":"Fiona：好，你下一项关于如何在舞台上传达情感的活动本身不错，但是你选择的","analysis":""},{"time":"00:04:18,120 --> 00:04:24,800","html":"of texts for the students to experience emotional depth leaves a little to be desired.","cn":"文本用来让学生体验情感深度，这方面还有些不足。","analysis":""},{"time":"00:04:24,800 --> 00:04:29,320","html":"It's not enough to include a few extracts that you find enjoyable.","cn":"只选几段你自己觉得有趣的摘录是不够的。","analysis":""},{"time":"00:04:29,320 --> 00:04:34,320","html":"You need to consider the <mark style=\"background-color: #bbf7d0;\">different kind of emotion<\/mark> that each extract should present","cn":"你需要考虑每段摘录应呈现的<mark style=\"background-color: #bbf7d0;\">不同种类的情感<\/mark>，","analysis":""},{"time":"00:04:34,320 --> 00:04:37,200","html":"from sorrow through to ecstasy.","cn":"从悲伤一直到狂喜。","analysis":""},{"time":"00:04:37,200 --> 00:04:42,280","html":"And classical stuff is all well and good, but include many more <mark style=\"background-color: #fecaca;\">contemporary sources<\/mark>.","cn":"古典材料当然很好，但也要加入更多<mark style=\"background-color: #fecaca;\">当代来源<\/mark>。","analysis":"<strong>答案解析：<\/strong>第26题问 Fiona 如何评价 Ed 选择的文本。原文说要包含不同种类的情感，从悲伤到狂喜，说明需要覆盖更广范围，所以答案是 <strong>C<\/strong>。"},{"time":"00:04:42,280 --> 00:04:48,560","html":"Ed: I understand.","cn":"Ed：我明白了。","analysis":""},{"time":"00:04:48,560 --> 00:04:54,320","html":"Before you hear the rest of the discussion, you have some time to look at questions 27","cn":"在听讨论的剩余部分之前，你有一些时间阅读第 27","analysis":""},{"time":"00:04:54,320 --> 00:04:55,080","html":"to 30.","cn":"到 30 题。","analysis":""},{"time":"00:05:07,200 --> 00:05:23,200","html":"Now listen and answer questions 27 to 30.","cn":"现在请听并回答第 27 到 30 题。","analysis":""},{"time":"00:05:23,200 --> 00:05:28,800","html":"Fiona: Now out of the 20 books you list, some are more useful than others, and I think you","cn":"Fiona：你列出的 20 本书中，有些比另一些更有用，我认为你","analysis":""},{"time":"00:05:28,800 --> 00:05:34,040","html":"should flag up the disadvantages so that people don't waste money buying them.","cn":"应该指出它们的缺点，这样人们就不会浪费钱去买。","analysis":""},{"time":"00:05:34,040 --> 00:05:35,800","html":"Take vocal instruction.","cn":"比如 Vocal Instruction。","analysis":""},{"time":"00:05:35,800 --> 00:05:41,240","html":"I know I recommended it for you to read for its historical perspective, but bear in mind","cn":"我知道我推荐你读它，是因为它有历史视角，但要记住，","analysis":""},{"time":"00:05:41,240 --> 00:05:46,640","html":"it was written <mark style=\"background-color: #bbf7d0;\">30 years ago<\/mark>, and it shows, yeah, agreed.","cn":"它是<mark style=\"background-color: #bbf7d0;\">30 年前<\/mark>写的，而且这一点看得出来。是的，同意。","analysis":"<strong>答案解析：<\/strong>第27题问 Vocal Instruction 的缺点。原文说它写于 30 年前，说明内容过时，所以答案是 <strong>E<\/strong>。"},{"time":"00:05:46,640 --> 00:05:52,280","html":"Ed: I thought improve your accent was interesting, but it's very <mark style=\"background-color: #bbf7d0;\">narrow in its outlook<\/mark>, don't","cn":"Ed：我觉得 Improve Your Accent 很有意思，但它的视角非常<mark style=\"background-color: #bbf7d0;\">狭窄<\/mark>，你不觉得吗？","analysis":""},{"time":"00:05:52,280 --> 00:05:53,280","html":"you think?","cn":"你觉得呢？","analysis":"<strong>答案解析：<\/strong>第28题问 Improve Your Accent 的缺点。原文说它 “very narrow in its outlook”，对应 too limited，所以答案是 <strong>B<\/strong>。"},{"time":"00:05:53,280 --> 00:05:56,040","html":"Fiona: Well, I'm not sure it's interesting.","cn":"Fiona：嗯，我不确定它是否有意思。","analysis":""},{"time":"00:05:56,040 --> 00:06:00,480","html":"And another one you need to warn people about is the actors handbook.","cn":"另一本你需要提醒大家注意的是 Actors' Handbook。","analysis":""},{"time":"00:06:00,480 --> 00:06:05,320","html":"It's an <mark style=\"background-color: #fecaca;\">expensive<\/mark> book, very useful, but according to the publishers, they're going to","cn":"这是一本<mark style=\"background-color: #fecaca;\">昂贵<\/mark>的书，也很有用，但根据出版社的说法，他们将会","analysis":""},{"time":"00:06:05,320 --> 00:06:10,600","html":"reissue it with new colour photos, and at the moment it's <mark style=\"background-color: #bbf7d0;\">out of print<\/mark>.","cn":"用新的彩色照片重新出版它，而目前它已经<mark style=\"background-color: #bbf7d0;\">绝版<\/mark>。","analysis":""},{"time":"00:06:10,600 --> 00:06:15,040","html":"There aren't any second-hand copies out there, so tell them not to waste time looking for","cn":"市面上也没有二手本，所以告诉他们不要浪费时间去找","analysis":""},{"time":"00:06:15,040 --> 00:06:16,040","html":"it.","cn":"这本书。","analysis":"<strong>答案解析：<\/strong>第29题问 Actors' Handbook 的缺点。原文虽然提到 expensive，但重点是 “out of print” 且没有二手本，不要浪费时间找，说明买不到，所以答案是 <strong>G<\/strong>。"},{"time":"00:06:16,040 --> 00:06:17,040","html":"Ed: Oh, right.","cn":"Ed：哦，好的。","analysis":""},{"time":"00:06:17,040 --> 00:06:19,120","html":"I didn't know that.","cn":"我不知道这一点。","analysis":""},{"time":"00:06:19,120 --> 00:06:24,440","html":"Fiona: There's one more that I want to mention, and that's confident voice delivery.","cn":"Fiona：还有一本我想提一下，那就是 Confident Voice Delivery。","analysis":""},{"time":"00:06:24,440 --> 00:06:30,000","html":"It <mark style=\"background-color: #bbf7d0;\">exaggerates its claims<\/mark> on how to be successful to such an extent that I think it is positively","cn":"它对如何成功的说法<mark style=\"background-color: #bbf7d0;\">夸大其词<\/mark>，夸张到我认为它确实是","analysis":""},{"time":"00:06:30,000 --> 00:06:31,000","html":"<mark style=\"background-color: #bbf7d0;\">misleading<\/mark>.","cn":"<mark style=\"background-color: #bbf7d0;\">误导性的<\/mark>。","analysis":"<strong>答案解析：<\/strong>第30题问 Confident Voice Delivery 的缺点。原文说它夸大成功方法并且 misleading，说明不现实，所以答案是 <strong>D<\/strong>。"},{"time":"00:06:31,000 --> 00:06:33,480","html":"But, maybe unbiased.","cn":"不过，也许它没有偏见。","analysis":""},{"time":"00:06:34,200 --> 00:06:37,360","html":"Ed: Okay, I'll make a note of that, thanks.","cn":"Ed：好的，我会记下来，谢谢。","analysis":""},{"time":"00:06:37,360 --> 00:06:41,960","html":"Soot the other.","cn":"那么其他的呢。","analysis":""},{"time":"00:06:41,960 --> 00:06:44,400","html":"That is the end of part three.","cn":"第三部分到此结束。","analysis":""},{"time":"00:06:44,400 --> 00:06:48,560","html":"You now have 30 seconds to check your answers to part three.","cn":"你现在有 30 秒时间检查第三部分的答案。","analysis":""}],"transcriptHighlights":[{"qid":"21","text":"a qualification.","answer":"B"},{"qid":"22","text":"should be illustrated visually.","answer":"A"},{"qid":"23","text":"must focus on themselves.","answer":"C"},{"qid":"24","text":"include a focus on breath control.","answer":"C"},{"qid":"25","text":"It could be outside or inside.","answer":"A"},{"qid":"26","text":"It has to cover a wider range.","answer":"C"},{"qid":"27","text":"out of date","answer":"E"},{"qid":"28","text":"too limited","answer":"B"},{"qid":"29","text":"unavailable","answer":"G"},{"qid":"30","text":"unrealistic","answer":"D"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

function norm(s){return String(s).normalize('NFKC').trim().replace(/[А]/g,'A').replace(/[В]/g,'B').replace(/[Е]/g,'E').replace(/[Н]/g,'H').replace(/[К]/g,'K').replace(/[М]/g,'M').replace(/[О]/g,'O').replace(/[Р]/g,'P').replace(/[С]/g,'C').replace(/[Т]/g,'T').replace(/[Х]/g,'X').replace(/[а]/g,'a').replace(/[е]/g,'e').replace(/[о]/g,'o').replace(/[р]/g,'p').replace(/[с]/g,'c').replace(/[х]/g,'x').toLowerCase().replace(/[‘’`´]/g,"'").replace(/'/g,'').replace(/\s+/g,' ')}function answerVariants(s){return String(s||'').split(/\s*\/\s*/).map(x=>x.trim()).filter(Boolean)}function rangeIds(id){let [a,b]=id.split('-').map(Number),out=[];for(let n=a;n<=b;n++)out.push(String(n));return out}function multipleCorrectSetFor(q){let g=multipleGroupFor(q);if(!g)return null;let vals=DATA.answerKey.multiple?.['q'+g.id.replace('-','_')]||[];return new Set(vals.flatMap(v=>answerVariants(v)).map(v=>norm(v)).filter(Boolean))}function isCorrect(q){let user=norm(getAnswer(q));let multiSet=multipleCorrectSetFor(q);if(multiSet)return !!user&&multiSet.has(user);return answerVariants(correctAnswer(q)).some(ans=>user===norm(ans))}

function questionInText(q,text){let n=Number(String(q).replace(/\D/g,""));if(!n||!text)return false;let raw=String(text).replace(/&nbsp;/g," ");let direct=new RegExp("(?:问题|Question|Q)\\s*0?"+n+"(?!\\d)|第\\s*0?"+n+"\\s*题|(?<!\\d)0?"+n+"\\s*题","i").test(raw)||new RegExp("(?:data-question=[\"']?|class=[\"'][^\"']*q)0?"+n+"(?!\\d)","i").test(raw);if(direct)return true;let re=/(?:问题|Question|Q|第)?\s*(\d+)\s*(?:-|–|—|至|到|和|and|to|&)\s*(\d+)\s*题?/gi,m;while((m=re.exec(raw))){let a=Number(m[1]),b=Number(m[2]);if(n>=Math.min(a,b)&&n<=Math.max(a,b))return true}return false}

window.finishTest=function(){if(!review)finish()};window.toggleFinishMode=finish;window.resetTest=function(){review=false;currentCue=-1;dictationMode=false;showOriginal=true;showCn=true;showAnalysis=true;dictationAnswers={};$('#finish').textContent='Finish';$('#main').classList.remove('split');document.body.classList.remove('notes-open');$$('.review').forEach(r=>r.remove());$$('.choice').forEach(c=>c.classList.remove('selected','disabled'));$$('input').forEach(i=>{i.disabled=false;i.value='';i.defaultValue=''});$$('.slot').forEach(s=>s.innerHTML='');$$('#nav [data-q]').forEach(n=>n.className='');clearUserHighlights();$('#notesList').innerHTML='';resetAppearance(false);if(audio){audio.pause();audio.currentTime=0;$('#fillbar').style.width='0%';$('#time').textContent='00:00 / 00:00'}secs=0;drawTimer();clearInterval(timer);timer=setInterval(()=>{secs++;drawTimer();if(secs%5===0)save(false)},1000);refreshPool();restoreDragging();updateNav();clearAllProgress()};window.App={state:{get isReviewing(){return review},get review(){return review}},config:{answerKey:CONFIG_DATA.answerKey,questionList:CONFIG_DATA.questionList},finishTest:window.finishTest,toggleFinishMode:window.toggleFinishMode,resetTest:window.resetTest,generateResultsTable};
function highlightTerms(){let terms=[];for(let item of DATA.transcriptHighlights||[]){let text=typeof item==='string'?item:item.text;if(text){terms.push(String(text));String(text).split(/\s+/).map(w=>w.replace(/[^A-Za-z0-9'-]/g,'')).filter(w=>w.length>=5&&!/^(which|three|answer|letter|about|their|there|would|could|should)$/i.test(w)).forEach(w=>terms.push(w))}}return [...new Set(terms.map(t=>t.trim()).filter(t=>t.length>1))].sort((a,b)=>b.length-a.length)}
function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',g.instruction||'',g.questionText||'',g.image||'',(g.options||[]),(g.questions||[]).map(q=>JSON.stringify(q))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}

function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}

const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}
function adjustFontSize(delta){setFontSize(currentFontSize()+delta,true)}
function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}
function resetAppearance(persist=true){document.body.classList.remove('dark');setFontSize(DEFAULT_FONT_SIZE,false);updateSizeButtons();if(persist)save(false)}

$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
