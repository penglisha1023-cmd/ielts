  const FULL_TRANSCRIPT = `Section 4. You will hear a part of lecture about history of extreme sport.
First, you have some time to look at questions 31 to 40.
Section 4. You have some time to look at questions 31 to 40.
Section 4. You have some time to look at questions 31 to 40.
Extreme sports are non-traditional sports and activities that require participants to combine athletic scale with pronounced risk.
It is difficult to determine exactly when the term extreme sports came to refer to certain modern sports.
While many extreme sports such as deep diving and surfing have usually been part of human history, so many extreme sports are often called lifestyle sports.
The often involved speed, height, physical commitment, the practice of extreme sports can involve some risks, injuries and even death if the athlete made a serious mistake.
Technology who advances have brought more reliable equipment which making various sports are safer activity.
The worldwide spread of extreme sports is attributed to the media.
Television and the movies have been responsible for gaining a widespread participation in extreme sports.
In the 19th century, the acceptance by workforce extended.
For those men with lower leisure preference, Sundays were generally free from labor.
One extreme sport was studied by workers from a company in its free time.
Employers commonly believe this leisure activity increased the productivity and most importantly increased workers' loyalty to the company.
The 19th century is considered by many to be the period when a truly modern game emerged.
The change that primarily spawned this modernization were to be the equipment of the game.
Other sports such as golf was popularized and regularly attended by upper classes and nobility.
Early golf clubs were made of materials similar to today's club, wood and iron.
However, the biggest difference between the old golf clubs and modern ones was the use.
In the 20th century, you may be wondering, what is it that attracts people's extreme sports in comparison to many traditional sports like football or basketball?
One of the few things that coaches, players and fans of nearly every competitive team sports seem to agree on these days is that there are too many regulations for these games.
Secondly, most of the people involved in extreme sports do not feel the need for constant training and physical conditioning of their body.
This leads to the stage where people love extreme sports, do not take part in those games as they grow old.
Finally, participants described how extreme sports experiencing, controlling and overcome fear made them positively change everyday life.
A mountain climber described the dealing with fear as empowering and feeling the very at peace afterwards.
A base jumper described the pursuit as ultimate metaphor for jumping into the life rather than standing on the edge quivering.
In assessing the use of taxpayers of fans in, bidding for major event or building a new stadium or even trying to skewer a new license for sports team,
young sports participants clearly want government to put their emphasis on entertainment sports.
Everyone can participate, everyone will have fun and everyone can be involved.
Individual competition, limitations, requirements and other concerns simply aren't part of the equation.
Young people dealt with self-existence to find authorities which are responsible for sport.
Combating racism in sport forced to everyone, including public authorities, young people's responses to the changing world and their unique way is building their own community.
Extreme sports are huge craze today, the psychology behind this popularity seems to be human nature to take risk of thrill.
And the adventure continues to attract masses.`;

  // 生成高亮 transcript: 将答案关键词进行标记
  function buildHighlightedTranscript() {
    let text = FULL_TRANSCRIPT;
    const entries = Object.entries(ANSWER_KEY);
    for (let [_, word] of entries) {

        toggleNotes: document.getElementById('toggle-notes-btn'),
        toggleTranscript: document.getElementById('toggle-transcript-btn'),
        notes: document.getElementById('notes'),
        notesList: document.getElementById('notes-list'),
        notesClose: document.getElementById('notes-close'),
        timerSpan: document.getElementById('timer'),
        qNav: document.getElementById('q-nav-container'),
        transcriptPane: document.getElementById('right-pane'),
        settingsBtn: document.getElementById('settings-btn'),
        settingsPanel: document.getElementById('settings-panel'),
        overlay: document.querySelector('.overlay'),
        toast: document.getElementById('toast')
      };
    },
    bindEvents() {
      this.el.finishBtn.addEventListener('click', () => this.toggleFinishMode());
      this.el.saveBtn.addEventListener('click', () => this.saveAll(true));
      this.el.clearBtn.addEventListener('click', () => { if(confirm('⚠️ 清除所有答案、高亮和笔记？无法撤销。')){ localStorage.removeItem('ielts_listening_p4_layout'); location.reload(); } });
      this.el.toggleNotes.addEventListener('click', () => document.body.classList.toggle('notes-open'));
      this.el.notesClose.addEventListener('click', () => document.body.classList.remove('notes-open'));
      this.el.toggleTranscript.addEventListener('click', () => { this.el.mainShell.classList.toggle('split-view'); this.ensureTranscriptReady(); });
      document.addEventListener('mouseup', e => this.handleSelection(e));
      document.getElementById('selbar')?.addEventListener('click', e => this.handleToolbar(e));
      this.el.settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); this.toggleSettings(); });
      this.el.overlay.addEventListener('click', () => this.toggleSettings(false));
      document.addEventListener('click', (e) => { if(this.state.settingsOpen && !this.el.settingsPanel.contains(e.target) && e.target !== this.el.settingsBtn) this.toggleSettings(false); });
      document.querySelectorAll('.settings-option[data-size]').forEach(btn => btn.addEventListener('click',()=>{ document.documentElement.className=`font-${btn.dataset.size}`; this.saveAll(false); }));
      document.querySelectorAll('.settings-option[data-mode]').forEach(btn => btn.addEventListener('click',()=>{ document.body.classList.toggle('dark-mode', btn.dataset.mode==='dark'); this.saveAll(false); }));
    },
    ensureTranscriptReady() {
      const container = document.getElementById('transcript-content');
      if(!container.innerHTML.includes('完整听力原文') && !container.querySelector('.answer-highlight')) {
        container.innerHTML = buildHighlightedTranscript();
        const closeBtn = document.getElementById('close-transcript-btn');
        if(closeBtn) closeBtn.addEventListener('click', () => this.el.mainShell.classList.remove('split-view'));
      }
    },
    handleSelection(e) {
      if(e.target.closest('#selbar, #notes, .bottom-bar')) return;
      const sel = window.getSelection();
      const clickedHL = e.target.closest('.hl-brown, .hl-rose, .hl-blue');
      const bar = document.getElementById('selbar');
      if(clickedHL && sel.isCollapsed){
        bar.targetElem = clickedHL; bar.hidden=false;
        const rect=clickedHL.getBoundingClientRect(); bar.style.left=`${window.scrollX+rect.left+rect.width/2-70}px`; bar.style.top=`${window.scrollY+rect.top-40}px`;
      } else if(sel && !sel.isCollapsed){
        const rect=sel.getRangeAt(0).getBoundingClientRect(); bar.targetElem=null; bar.hidden=false;
        bar.style.left=`${window.scrollX+rect.left+rect.width/2-70}px`; bar.style.top=`${window.scrollY+rect.top-40}px`;
      } else bar.hidden=true;
    },
    handleToolbar(e) {
      const act = e.target.closest('button')?.dataset.act; const bar=document.getElementById('selbar'); 
      let targetSpan = bar.targetElem; const sel = window.getSelection();
      if (!targetSpan && !sel.isCollapsed) {
        const range = sel.getRangeAt(0); let node = range.commonAncestorContainer;
        if (node.nodeType === 3) node = node.parentElement;
        const parentSpan = node.closest?.('.hl-brown, .hl-rose, .hl-blue');
        if (parentSpan && range.toString() === parentSpan.innerText) targetSpan = parentSpan;
      }
      if(act === 'hl'){
        if(targetSpan){
          if(targetSpan.classList.contains('hl-brown')) targetSpan.className = 'hl-rose';
          else if(targetSpan.classList.contains('hl-rose')) {}
          else if(targetSpan.classList.contains('hl-blue')) targetSpan.className = 'hl-brown';
          else targetSpan.className = 'hl-brown';
        } else if(!sel.isCollapsed) this.wrapSelection('hl-brown');
      } else if(act === 'note'){
        if(targetSpan){ targetSpan.className = 'hl-blue'; if(!targetSpan.dataset.hid) targetSpan.dataset.hid = `n_${Date.now()}`; this.createNoteCard(targetSpan); }
        else { const newSpan = this.wrapSelection('hl-blue'); if(newSpan){ newSpan.dataset.hid = `n_${Date.now()}`; this.createNoteCard(newSpan); } }
      } else if(act === 'del' && targetSpan) this.unwrapHighlight(targetSpan);
      bar.hidden=true; window.getSelection().removeAllRanges();
      this.saveAll(false);
    },
    wrapSelection(className){ const s=window.getSelection(); if(s.isCollapsed) return null; const r=s.getRangeAt(0); const span=document.createElement('span'); span.className=className; try{ r.surroundContents(span); } catch(e){ span.appendChild(r.extractContents()); r.insertNode(span); } return span; },
    unwrapHighlight(el){ if(el && el.parentNode){ const parent=el.parentNode; while(el.firstChild) parent.insertBefore(el.firstChild, el); parent.removeChild(el); parent.normalize(); } this.saveAll(false); },
    createNoteCard(span){ const hid=span.dataset.hid; if(document.querySelector(`.note-card[data-hid="${hid}"]`)) return;
      const card=document.createElement('div'); card.className='note-card'; card.dataset.hid=hid;
      card.innerHTML=`<div class="note-quote">${span.innerText.slice(0,100)}</div><textarea placeholder="Write note here..."></textarea><div class="note-actions"><button class="del-note-btn">Delete</button></div>`;
      card.querySelector('.del-note-btn').onclick=()=>{ this.unwrapHighlight(span); card.remove(); this.saveAll(false); };
      this.el.notesList.prepend(card); document.body.classList.add('notes-open'); this.saveAll(false);
    },
    buildNav(){ for(let i=31;i<=40;i++){ const btn=document.createElement('div'); btn.className='q-nav-item'; btn.innerText=i; btn.dataset.q=i; btn.onclick=()=>{ const inp=document.querySelector(`input[name="q${i}"]`); if(inp) inp.closest('.group')?.scrollIntoView({behavior:'smooth',block:'center'}); }; this.el.qNav.appendChild(btn); } },
    updateNavState(){ for(let i=31;i<=40;i++){ const nav=this.el.qNav.querySelector(`[data-q="${i}"]`); if(nav){ const val=document.querySelector(`input[name="q${i}"]`)?.value.trim(); nav.classList.toggle('answered',!!val); } } },
    saveAll(showToast=true){ const data={ answers:{}, timer:this.state.timerSecs, settings:{ fontSize:document.documentElement.className, darkMode:document.body.classList.contains('dark-mode') }, notesHTML:this.el.notesList.innerHTML, testHTML:document.getElementById('test-pages-container').innerHTML }; for(let i=31;i<=40;i++) data.answers[i]=document.querySelector(`input[name="q${i}"]`)?.value||''; localStorage.setItem('ielts_listening_p4_layout',JSON.stringify(data)); if(showToast) this.showToast('Progress saved!'); },
    loadFromStorage(){ const raw=localStorage.getItem('ielts_listening_p4_layout'); if(!raw) return; try{ const d=JSON.parse(raw); if(d.testHTML) document.getElementById('test-pages-container').innerHTML=d.testHTML; if(d.answers) for(let i=31;i<=40;i++){ const inp=document.querySelector(`input[name="q${i}"]`); if(inp && d.answers[i]) inp.value=d.answers[i]; } if(d.notesHTML) this.el.notesList.innerHTML=d.notesHTML; if(d.timer) this.state.timerSecs=d.timer; this.updateTimerUI(); if(d.settings){ document.documentElement.className=d.settings.fontSize||'font-regular'; document.body.classList.toggle('dark-mode',d.settings.darkMode); } this.updateNavState(); }catch(e){} },
    toggleFinishMode(){ if(this.state.isReviewing) this.returnToTestMode(); else if(confirm('提交答案并进入复习模式？')) this.enterReviewMode(); },
    enterReviewMode(){ this.state.isReviewing=true; this.el.finishBtn.innerText='Return to Test'; this.el.mainShell.classList.add('split-view'); this.ensureTranscriptReady(); this.disableAllInputs(true); this.generateResultTables(); this.gradeAndMarkNav(); if(this.state.timerInterval) clearInterval(this.state.timerInterval); },
    returnToTestMode(){ this.state.isReviewing=false; this.el.finishBtn.innerText='Finish'; this.el.mainShell.classList.remove('split-view'); this.disableAllInputs(false); document.querySelectorAll('.group-results').forEach(el=>el.remove()); this.startTimer(); this.updateNavState(); this.el.qNav.querySelectorAll('.q-nav-item').forEach(i=>i.classList.remove('correct','incorrect')); },
    disableAllInputs(disabled){ document.querySelectorAll('input.blank').forEach(i=>i.disabled=disabled); },
    generateResultTables(){ document.querySelectorAll('.group-results').forEach(el=>el.remove()); const group=document.querySelector('.group'); if(!group) return; let tableHTML=`<div class="group-results"><h5>📊 答案回顾 (Q31-40)</h5><table class="results-table"><thead><th>题号</th><th>你的答案</th><th>正确答案</th><th>结果</th></thead><tbody>`;
      for(let i=31;i<=40;i++){ const user=document.querySelector(`input[name="q${i}"]`)?.value.trim().toLowerCase()||''; const correct=ANSWER_KEY[i]; const isCorrect=user===correct; tableHTML+=`<tr><td><b>${i}</b></td><td>${user||'—'}</td><td>${correct}</td><td class="${isCorrect?'result-correct':'result-incorrect'}">${isCorrect?'✔ 正确':'✖ 错误'}</td></tr>`; }
      tableHTML+=`</tbody></table></div>`; group.insertAdjacentHTML('beforeend',tableHTML);
    },
    gradeAndMarkNav(){ for(let i=31;i<=40;i++){ const user=document.querySelector(`input[name="q${i}"]`)?.value.trim().toLowerCase()||''; const correct=ANSWER_KEY[i]; const isCorrect=user===correct; const nav=this.el.qNav.querySelector(`[data-q="${i}"]`); if(nav){ nav.classList.remove('answered'); nav.classList.add(isCorrect?'correct':'incorrect'); } } },
    initAudio(){ const audio=document.querySelector('.listening-audio'); if(!audio) return; const playBtn=document.querySelector('.play-pause-btn'), prog=document.querySelector('.progress-container'), bar=document.querySelector('.progress-bar'), timeSpan=document.querySelector('.time-display'), speed=document.querySelector('.playback-speed'); audio.src='https://qyccvyyigtjhzunumbqf.supabase.co/storage/v1/object/public/audio/203.mp3'; let scrubbing=false; const update=()=>{ if(!scrubbing&&audio.duration) bar.style.width=(audio.currentTime/audio.duration)*100+'%'; timeSpan.innerText=`${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${Math.floor(audio.duration/60)}:${String(Math.floor(audio.duration%60)).padStart(2,'0')}`; }; playBtn.onclick=()=>audio.paused?audio.play():audio.pause(); audio.onplay=()=>playBtn.innerHTML='⏸'; audio.onpause=()=>playBtn.innerHTML='▶'; audio.ontimeupdate=update; speed.onchange=()=>audio.playbackRate=+speed.value; prog.onmousedown=e=>{ scrubbing=true; const rect=prog.getBoundingClientRect(); audio.currentTime=(Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width)))*audio.duration; update(); }; document.onmouseup=()=>scrubbing=false; document.onmousemove=e=>{ if(scrubbing&&audio.duration){ const rect=prog.getBoundingClientRect(); audio.currentTime=(Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width)))*audio.duration; update(); } }; },
    initSplitter(){ const splitter=document.getElementById('splitter'); let drag=false; splitter.addEventListener('mousedown',()=>{ drag=true; document.body.style.cursor='col-resize'; }); window.addEventListener('mouseup',()=>{ drag=false; document.body.style.cursor=''; }); window.addEventListener('mousemove',e=>{ if(!drag) return; const left=document.getElementById('left-pane'), total=left.parentElement.offsetWidth, newLeft=e.clientX, newRight=total-newLeft-splitter.offsetWidth; if(newLeft>200&&newRight>200){ left.style.flexBasis=`${newLeft}px`; document.getElementById('right-pane').style.flexBasis=`${newRight}px`; } }); },
    startTimer(){ if(this.state.timerInterval) clearInterval(this.state.timerInterval); this.state.timerInterval=setInterval(()=>{ this.state.timerSecs++; this.updateTimerUI(); },1000); },
    updateTimerUI(){ let m=Math.floor(this.state.timerSecs/60), s=this.state.timerSecs%60; this.el.timerSpan.innerText=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; },
    toggleSettings(force){ const open=force===undefined?!this.state.settingsOpen:force; this.state.settingsOpen=open; this.el.settingsPanel.style.display=open?'block':'none'; this.el.overlay.style.display=open?'block':'none'; },
    showToast(msg){ this.el.toast.innerText=msg; this.el.toast.classList.add('show'); setTimeout(()=>this.el.toast.classList.remove('show'),1500); }
  };
  document.addEventListener('DOMContentLoaded',()=>App.init());
})();
</script>
