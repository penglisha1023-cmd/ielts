professors"],["C","local residents"],["D","companies"],["E","university students"]]},{"type":"single","title":"Questions 26-30","instruction":"Choose the correct letter, A, B, or C.","questions":[{"id":"26","text":"What does Syria think about renewable energy?","options":[["A","Most people know very little about renewable energy."],["B","The general public can distinguish different kinds of renewable energy."],["C","The majority of people feel the need to replace fossil fuels with renewable energy."]]},{"id":"27","text":"What do the speakers say about modem windmills?","options":[["A","They can be used to pump water from wells."],["B","The location to build them should be carefully chosen."],["C","Farmers use them to grind grain."]]},{"id":"28","text":"What aspect of traditional fuels are they going to address?","options":[["A","how to avoid fossil fuels from being depleted"],["B","the possible future of traditional resources"],["C","how to prevent pollution of traditional resources"]]},{"id":"29","text":"What does Greg say about nuclear plants?","options":[["A","They are cleaner and less expensive than fossil fuel."],["B","It is the best way to fight climate change."],["C","Few people think they are safe"]]},{"id":"30","text":"What does Syria think of hydrogen fuel?","options":[["A","The price of it will drop eventually."],["B","It entails environmental problems."],["C","The benefits of it overweigh its high cost."]]}]}],"answerKey":{"text":{"q21":"weather","q22":"electricity","q23":"explode"},"single":{"q26":"A","q27":"B","q28":"B","q29":"C","q30":"A"},"multiple":{"q24_25":["C","E"]},"multipleMap":{"q24":"C","q25":"E"},"matching":{},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:12,400","html":"Section 3. You will hear two students called Syria and Greg talking about some research","cn":"第三部分。你将听到两名学生 Syria 和 Greg 讨论一些关于","analysis":""},{"time":"00:00:12,400 --> 00:00:19,320","html":"on renewable energy. First, you have some time to look at questions 21 to 23.","cn":"可再生能源的研究。首先，你有一些时间浏览第21到23题。","analysis":""},{"time":"00:00:30,000 --> 00:00:55,480","html":"Now, listen carefully and answer questions 21 to 23.","cn":"现在请仔细听，并回答第21到23题。","analysis":""},{"time":"00:00:56,480 --> 00:01:03,480","html":"Syria: Hi, Greg. How did it go with the research on renewable energy? Have you found anything?","cn":"Syria：嗨，Greg。可再生能源的研究进展怎么样？你找到什么了吗？","analysis":""},{"time":"00:01:03,480 --> 00:01:09,480","html":"Greg: Yes, but I think it's about time we exchange our findings and discuss our next move.","cn":"Greg：找到了，但我觉得我们该交流一下发现，并讨论下一步了。","analysis":""},{"time":"00:01:09,480 --> 00:01:16,480","html":"Syria: You read my mind. Right, I'll start first. Germany is the very first country I dug into","cn":"Syria：你正说到我心里去了。好，我先开始。我首先研究的国家是德国，","analysis":""},{"time":"00:01:16,480 --> 00:01:22,480","html":"in order to find innovative means of creating clean energy because 15 percent of its","cn":"目的是寻找创造清洁能源的创新方法，因为德国15%的","analysis":""},{"time":"00:01:22,480 --> 00:01:29,480","html":"national electricity supply comes from renewable sources. I found that apart from the traditional fossil fuel industry,","cn":"全国电力供应来自可再生资源。我发现，除了传统化石燃料产业之外，","analysis":""},{"time":"00:01:29,480 --> 00:01:35,480","html":"there's a German firm that has initiated a project using <mark style=\"background-color: #bbf7d0;\">kites<\/mark> to generate power.","cn":"有一家德国公司启动了一个利用风筝发电的项目。","analysis":""},{"time":"00:01:35,480 --> 00:01:39,480","html":"Greg: Really? I've never heard of it before. How does it work?","cn":"Greg：真的吗？我以前从没听说过。它是怎么工作的？","analysis":""},{"time":"00:01:39,480 --> 00:01:45,480","html":"Syria: As a substitution for traditional fossil fuels that release toxic gas into the atmosphere,","cn":"Syria：作为释放有毒气体的传统化石燃料的替代品，","analysis":""},{"time":"00:01:45,480 --> 00:01:51,480","html":"the power generating kites can function in any <mark style=\"background-color: #bbf7d0;\">weather<\/mark> compared to conventional wind turbines,","cn":"与传统风力涡轮机相比，这种发电风筝可以在任何天气条件下运行，","analysis":""},{"time":"00:01:51,480 --> 00:01:58,480","html":"such kites can produce twice as much energy because the overall power density is proportional to altitude.","cn":"这种风筝能产生两倍的能量，因为总体功率密度与高度成正比。","analysis":"<strong>答案解析：<\/strong>第21题填德国风筝发电可在不同什么条件下使用。文中说 can function in any weather，所以答案是 weather。"},{"time":"00:01:58,480 --> 00:02:04,480","html":"Greg: Sounds like an efficient way of producing power. Okay, now let me tell you what I have found.","cn":"Greg：听起来是一种高效发电方式。好，现在让我说说我找到的内容。","analysis":""},{"time":"00:02:04,480 --> 00:02:11,480","html":"There is an American company manufacturing school buses and city buses depending solely on <mark style=\"background-color: #bbf7d0;\">electricity<\/mark>","cn":"有一家美国公司生产校车和城市公交车，它们完全依靠电力运行，","analysis":""},{"time":"00:02:11,480 --> 00:02:18,480","html":"instead of gasoline. The all electric vehicles can save up to 20 gallons of fuel on a daily basis.","cn":"而不是汽油。全电动车每天最多可以节省20加仑燃料。","analysis":""},{"time":"00:02:18,480 --> 00:02:25,480","html":"This could reduce transport budgets by over $10,000 each year, not to mention maintenance savings.","cn":"这每年可减少超过一万美元的交通预算，更不用说维护方面的节省了。","analysis":"<strong>答案解析：<\/strong>第22题填美国车辆由什么驱动。文中说 buses depending solely on electricity instead of gasoline，所以答案是 electricity。"},{"time":"00:02:25,480 --> 00:02:30,480","html":"Syria: Wow, impressive. If only there were more of these electric vehicles around.","cn":"Syria：哇，真厉害。要是周围有更多这种电动车就好了。","analysis":""},{"time":"00:02:30,480 --> 00:02:37,480","html":"Greg: Well, over the years, South Africa has attached great importance to clean energy.","cn":"Greg: 这些年来，南非非常重视清洁能源。","analysis":""},{"time":"00:02:37,480 --> 00:02:44,480","html":"The nation encourages using propane gas which can either be extracted from natural deposits","cn":"该国鼓励使用丙烷气，它既可以从天然矿藏中提取，","analysis":""},{"time":"00:02:44,480 --> 00:02:51,480","html":"or be produced organically. It is normally stored in gas canisters as a type of cooking gas.","cn":"也可以有机生产。它通常作为一种烹饪燃气储存在燃气罐中。","analysis":""},{"time":"00:02:51,480 --> 00:02:59,480","html":"To reduce the number of kitchen accidents, a new type of composite gas canister made of fiber was introduced.","cn":"为了减少厨房事故，一种由纤维制成的新型复合燃气罐被引入。","analysis":""},{"time":"00:02:59,480 --> 00:03:06,480","html":"It is much safer and less likely to <mark style=\"background-color: #bbf7d0;\">explode<\/mark> even when engulfed in fire.","cn":"它安全得多，即使被火吞没，也不太可能爆炸。","analysis":"<strong>答案解析：<\/strong>第23题填南非燃气罐发明是为了减少其什么可能性。文中说 less likely to explode，所以答案是 explode。"},{"time":"00:03:07,480 --> 00:03:16,480","html":"Before you hear the rest of the talk, you have some time to look at questions 24-30.","cn":"在你听接下来的内容之前，你有一些时间浏览第24到30题。","analysis":""},{"time":"00:03:16,480 --> 00:03:40,480","html":"Now, listen and answer questions 24-30.","cn":"现在请听，并回答第24到30题。","analysis":""},{"time":"00:03:41,480 --> 00:03:48,480","html":"Greg: Now, about the survey, do you have any clues as to what kind of interviewees we should include?","cn":"Greg：现在说到调查，你觉得我们应该包括哪类受访者？","analysis":""},{"time":"00:03:48,480 --> 00:03:53,480","html":"Syria: How about local companies doing business on clean energy products?","cn":"Syria：做清洁能源产品业务的本地公司怎么样？","analysis":""},{"time":"00:03:53,480 --> 00:04:00,480","html":"Greg: Probably not the best choice of respondents. Remember the last time we asked corporate employees to do the questionnaire,","cn":"Greg：可能不是最佳受访者选择。还记得上次我们让公司员工做问卷吗，","analysis":""},{"time":"00:04:00,480 --> 00:04:04,480","html":"only about 5% of them were actually willing to participate.","cn":"实际上只有大约5%的人愿意参加。","analysis":""},{"time":"00:04:05,480 --> 00:04:09,480","html":"Syria: That wouldn't be enough then. It seems we have to drop that idea.","cn":"Syria：那样人数就不够了。看来我们得放弃这个想法。","analysis":""},{"time":"00:04:09,480 --> 00:04:14,480","html":"Then maybe we can ask the <mark style=\"background-color: #fecaca;\">professors and administrative staff<\/mark> here to help us.","cn":"那也许我们可以请这里的教授和行政人员帮忙。","analysis":""},{"time":"00:04:14,480 --> 00:04:19,480","html":"They could provide their insights and understanding on energy production.","cn":"他们可以提供关于能源生产的见解和理解。","analysis":""},{"time":"00:04:19,480 --> 00:04:26,480","html":"Greg: It would be ideal if they would, but I'm afraid most of them are too busy to respond to the list of questions we've prepared.","cn":"Greg：如果他们愿意当然理想，但恐怕他们大多数太忙，没时间回答我们准备的问题清单。","analysis":""},{"time":"00:04:26,480 --> 00:04:31,480","html":"I guess the <mark style=\"background-color: #bbf7d0;\">students here at the university<\/mark> would be more suitable.","cn":"我想本校大学生会更合适。","analysis":""},{"time":"00:04:31,480 --> 00:04:35,480","html":"Syria: You're right, and it is a much bigger sample pool too.","cn":"Syria：你说得对，而且这也是一个大得多的样本池。","analysis":""},{"time":"00:04:35,480 --> 00:04:38,480","html":"Also, I think we should include the <mark style=\"background-color: #bbf7d0;\">locals<\/mark>.","cn":"另外，我认为我们也应该包括当地居民。","analysis":""},{"time":"00:04:38,480 --> 00:04:43,480","html":"Their opinion is key to the promotion of renewable energy here in the town.","cn":"他们的意见对本镇推广可再生能源很关键。","analysis":""},{"time":"00:04:43,480 --> 00:04:46,480","html":"Greg: But wouldn't it be difficult to collect data?","cn":"Greg：但收集数据不会很困难吗？","analysis":""},{"time":"00:04:46,480 --> 00:04:51,480","html":"There's no way the two of us could go from door to door to interview all the residents.","cn":"我们两个不可能挨家挨户采访所有居民。","analysis":""},{"time":"00:04:51,480 --> 00:04:59,480","html":"Syria: There's no need to worry about that. We'll make it telephone interviews. That way we'll have enough time to get sufficient data.","cn":"Syria：不用担心。我们可以做电话采访。这样我们就有足够时间获得充分数据。","analysis":"<strong>答案解析：<\/strong>第24和25题问 Greg 和 Syria 选择哪两类受访者。公司员工参与率太低，教授和行政人员太忙，最终选择 university students 和 locals，对应 E 和 C。"},{"time":"00:04:59,480 --> 00:05:02,480","html":"Greg: Good idea. What should we present in our speech?","cn":"Greg：好主意。我们展示中应该讲什么？","analysis":""},{"time":"00:05:02,480 --> 00:05:09,480","html":"Syria: Due to lack of media coverage, the majority of people actually have a <mark style=\"background-color: #bbf7d0;\">limited understanding<\/mark> on renewable energy.","cn":"Syria：由于媒体报道不足，大多数人实际上对可再生能源了解有限。","analysis":""},{"time":"00:05:09,480 --> 00:05:14,480","html":"Most of them aren't able to identify various types of renewable sources.","cn":"他们大多数无法识别不同类型的可再生能源。","analysis":""},{"time":"00:05:14,480 --> 00:05:21,480","html":"So I feel we could start by clarifying what it is and the benefit of it compared to fossil fuels.","cn":"所以我觉得我们可以从澄清它是什么，以及它相比化石燃料的好处开始。","analysis":"<strong>答案解析：<\/strong>第26题问 Syria 对可再生能源的看法。她说大多数人 limited understanding，且不能识别各种可再生能源类型，对应 A “Most people know very little about renewable energy”。"},{"time":"00:05:21,480 --> 00:05:25,480","html":"Greg: That makes sense. We could start with wind energy.","cn":"Greg：有道理。我们可以从风能开始。","analysis":""},{"time":"00:05:25,480 --> 00:05:28,480","html":"The centuries wind has been used to do work.","cn":"几个世纪以来，风一直被用来做功。","analysis":""},{"time":"00:05:28,480 --> 00:05:37,480","html":"With the help of windmills, farmers used to <mark style=\"background-color: #fecaca;\">pump water from wells<\/mark> or turn large grinding stones to <mark style=\"background-color: #fecaca;\">grind wheat or corn<\/mark>.","cn":"借助风车，农民过去用它从井中抽水，或转动大型磨石来磨小麦或玉米。","analysis":""},{"time":"00:05:37,480 --> 00:05:44,480","html":"The windmills today generate electricity. The only problem is that it might not be windy all the time.","cn":"如今的风车用于发电。唯一的问题是，并不是一直都有风。","analysis":""},{"time":"00:05:44,480 --> 00:05:48,480","html":"So it is crucial to choose the <mark style=\"background-color: #bbf7d0;\">appropriate site<\/mark> for wind farms.","cn":"所以为风电场选择合适地点非常关键。","analysis":"<strong>答案解析：<\/strong>第27题问说话人如何评价现代风车。文中说现代风车发电，但风并非总有，因此选择合适地点非常重要，对应 B。抽水和磨谷物是过去的用途，是干扰项。"},{"time":"00:05:48,480 --> 00:05:57,480","html":"Syria: Well, I think we can also include comparisons between clean energy and traditional energy resources like coal, oil and natural gas.","cn":"Syria：嗯，我认为我们也可以加入清洁能源与煤、石油和天然气等传统能源之间的比较。","analysis":""},{"time":"00:05:57,480 --> 00:06:02,480","html":"Greg: Maybe we can look into the <mark style=\"background-color: #bbf7d0;\">prospect of these conventional sources of energy<\/mark>.","cn":"Greg: 也许我们可以研究这些传统能源的前景。","analysis":""},{"time":"00:06:02,480 --> 00:06:08,480","html":"The rising cost of fossil fuels and the threat of climate change is a concern to many.","cn":"化石燃料成本上升和气候变化威胁令许多人担忧。","analysis":""},{"time":"00:06:08,480 --> 00:06:12,480","html":"Syria: Totally, these traditional resources will <mark style=\"background-color: #bbf7d0;\">deplete eventually<\/mark>.","cn":"Syria: 完全同意，这些传统资源最终会耗尽。","analysis":""},{"time":"00:06:12,480 --> 00:06:18,480","html":"Renewable energy currently makes up less than 2% of the world's primary energy supply.","cn":"目前可再生能源占世界一次能源供应不到2%。","analysis":""},{"time":"00:06:18,480 --> 00:06:23,480","html":"And although growing very rapidly, it is not on course to fill the fossil fuel gap.","cn":"尽管增长非常迅速，但它还不足以填补化石燃料的缺口。","analysis":"<strong>答案解析：<\/strong>第28题问他们要讨论传统燃料的哪个方面。Greg说要研究 conventional sources of energy 的 prospect，Syria: 补充传统资源最终会耗尽，对应 B “the possible future of traditional resources”。"},{"time":"00:06:23,480 --> 00:06:28,480","html":"Greg：Nuclear energy is another type of energy we ought to mention.","cn":"Greg：核能也是我们应该提到的一种能源。","analysis":""},{"time":"00:06:28,480 --> 00:06:37,480","html":"Nuclear power plants can produce dependent power constantly and release far less greenhouse gases than other traditional power plants.","cn":"核电站可以持续稳定地发电，并且比其他传统电厂排放少得多的温室气体。","analysis":""},{"time":"00:06:37,480 --> 00:06:48,480","html":"But most people feel that this type of energy is <mark style=\"background-color: #bbf7d0;\">unsafe<\/mark> because radiation isn't easily dealt with, especially in nuclear waste and maintenance materials.","cn":"但大多数人认为这种能源不安全，因为辐射不容易处理，尤其是核废料和维护材料中的辐射。","analysis":"<strong>答案解析：<\/strong>第29题问 Greg 对核电站说了什么。他说虽然核电排放少，但大多数人认为 unsafe，对应 C “Few people think they are safe”。"},{"time":"00:06:48,480 --> 00:06:50,480","html":"Syria: What should we end the speech with?","cn":"Syria：我们应该用什么结束展示？","analysis":""},{"time":"00:06:50,480 --> 00:06:55,480","html":"Greg: Have you heard about a new type of energy called hydrogen fuel?","cn":"Greg：你听说过一种叫氢燃料的新型能源吗？","analysis":""},{"time":"00:06:55,480 --> 00:07:01,480","html":"It is an infinitely renewable fuel that doesn't have detrimental environmental effects.","cn":"它是一种无限可再生的燃料，没有有害的环境影响。","analysis":""},{"time":"00:07:01,480 --> 00:07:07,480","html":"The only problem is that it is so <mark style=\"background-color: #fecaca;\">expensive<\/mark> that only wealthy individuals can afford it.","cn":"唯一的问题是它太昂贵，只有富人负担得起。","analysis":""},{"time":"00:07:07,480 --> 00:07:12,480","html":"But I think overall, the <mark style=\"background-color: #fecaca;\">benefits overshadow its high cost<\/mark>.","cn":"但我认为总体而言，它的好处超过了高成本。","analysis":""},{"time":"00:07:12,480 --> 00:07:22,480","html":"Syria: I think that even though this new type of renewable energy is too expensive to use at the moment, in the long run, its <mark style=\"background-color: #bbf7d0;\">price will go down<\/mark> and become more accessible.","cn":"Syria：我认为，尽管这种新型可再生能源目前使用起来太昂贵，但从长远来看，它的价格会下降，并变得更容易获得。","analysis":"<strong>答案解析：<\/strong>第30题问 Syria 对氢燃料的看法。Greg 认为 benefits overshadow high cost，但 Syria 的观点是长期来看 price will go down，对应 A。环境问题被否定，因为氢燃料没有有害环境影响。"},{"time":"00:07:25,480 --> 00:07:28,480","html":"That is the end of section 3.","cn":"第三部分到此结束。","analysis":""},{"time":"00:07:28,480 --> 00:07:32,480","html":"You now have half a minute to check your answers.","cn":"现在你有半分钟时间检查答案。","analysis":""},{"time":"00:07:58,480 --> 00:08:04,480","html":"Now turn to section 4.","cn":"现在请翻到第四部分。","analysis":""}],"transcriptHighlights":[{"qid":"21","text":"weather","answer":"weather"},{"qid":"22","text":"electricity","answer":"electricity"},{"qid":"23","text":"explode","answer":"explode"},{"qid":"24","text":"local residents","answer":"C"},{"qid":"25","text":"university students","answer":"E"},{"qid":"26","text":"Most people know very little about renewable energy.","answer":"A"},{"qid":"27","text":"The location to build them should be carefully chosen.","answer":"B"},{"qid":"28","text":"the possible future of traditional resources","answer":"B"},{"qid":"29","text":"Few people think they are safe","answer":"C"},{"qid":"30","text":"The price of it will drop eventually.","answer":"A"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>

let secs=0,review=false,timer=setInterval(()=>{secs++;drawTimer();if(secs%5===0)save(false)},1000),drag=null,currentCue=-1,loopCue=false,slowCue=false,showCn=true,showAnalysis=true,dictationMode=false,showOriginal=true,dictationAnswers={};const storeKey='ielts_v4_'+DATA.title.replace(/\W+/g,'_');

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function flowQuestionMap(g){let map={};(g.questions||[]).forEach(q=>map[q[0]]=q[1]);return map}

function highlightTerms(){let terms=[];for(let item of DATA.transcriptHighlights||[]){let text=typeof item==='string'?item:item.text;if(text){terms.push(String(text));String(text).split(/\s+/).map(w=>w.replace(/[^A-Za-z0-9'-]/g,'')).filter(w=>w.length>=5&&!/^(which|three|answer|letter|about|their|there|would|could|should)$/i.test(w)).forEach(w=>terms.push(w))}}return [...new Set(terms.map(t=>t.trim()).filter(t=>t.length>1))].sort((a,b)=>b.length-a.length)}
function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',(g.questions||[]).map(q=>String(q.id||q[0]||''))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}
function clearUserHighlights(){$$('.hl-brown,.hl-rose,.hl-blue').forEach(unwrap)}
function createNote(span){let id=span.dataset.hid;if($(`.note-card[data-hid="${id}"]`))return;let card=document.createElement('div');card.className='note-card';card.dataset.hid=id;card.innerHTML=`<div class="note-quote">${esc(span.textContent.slice(0,120))}</div><textarea placeholder="Write note here..."></textarea><button class="delete-note" type="button">Delete</button>`;$('#notesList').prepend(card);bindNoteDeletes()}
function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}
function removeNote(id){if(!id)return;$(`.note-card[data-hid="${id}"]`)?.remove()}
function drawTimer(){let m=Math.floor(secs/60),s=secs%60;$('#timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;
function currentFontSize(){return Number.parseInt(document.documentElement.style.fontSize,10)||DEFAULT_FONT_SIZE}
function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}
function adjustFontSize(delta){setFontSize(currentFontSize()+delta,true)}
function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}
function resetAppearance(persist=true){document.body.classList.remove('dark');setFontSize(DEFAULT_FONT_SIZE,false);updateSizeButtons();if(persist)save(false)}
function clearAllProgress(){localStorage.removeItem(storeKey)}
$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
const audio=$('#audio');$('#play').onclick=()=>audio.paused?audio.play():audio.pause();audio.onplay=()=>$('#play').textContent='⏸';audio.onpause=()=>$('#play').textContent='▶';audio.ontimeupdate=()=>{if(audio.duration)$('#fillbar').style.width=(audio.currentTime/audio.duration*100)+'%';$('#time').textContent=`${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${audio.duration?Math.floor(audio.duration/60):'00'}:${audio.duration?String(Math.floor(audio.duration%60)).padStart(2,'0'):'00'}`;maintainCueLoop()};$('#speed').onchange=e=>{slowCue=false;audio.playbackRate=+e.target.value;save(false)};$('#bar').onclick=e=>{if(audio.duration){let r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;save(false)}};
bindGlobal();render();
