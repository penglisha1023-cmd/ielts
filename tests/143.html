e":"00:00:00,000 --> 00:00:02,540","html":"Part 3.","cn":"第3部分。","analysis":""},{"time":"00:00:02,540 --> 00:00:08,520","html":"You will hear two graduate students called Jen and Bill discussing the write-up of their","cn":"你将听到两名研究生 Jen 和 Bill 讨论他们","analysis":""},{"time":"00:00:08,520 --> 00:00:11,520","html":"group project.","cn":"小组项目的写作部分。","analysis":""},{"time":"00:00:11,520 --> 00:00:15,440","html":"First you have some time to look at questions 21 to 25.","cn":"首先，你有一些时间查看问题21到25。","analysis":""},{"time":"00:00:30,000 --> 00:00:58,520","html":"Now listen carefully and answer questions 21 to 25.","cn":"现在请仔细听，并回答问题21到25。","analysis":""},{"time":"00:00:58,520 --> 00:00:59,520","html":"Bill: What's up, Jen?","cn":"Bill：怎么了，Jen？","analysis":""},{"time":"00:00:59,520 --> 00:01:00,520","html":"How are you?","cn":"你怎么样？","analysis":""},{"time":"00:01:00,520 --> 00:01:01,520","html":"Jen: Oh.","cn":"Jen：哦。","analysis":""},{"time":"00:01:01,520 --> 00:01:02,520","html":"Hey, Bill.","cn":"嘿，Bill。","analysis":""},{"time":"00:01:02,520 --> 00:01:03,520","html":"Bill: Where's everybody else?","cn":"Bill: 其他人在哪儿？","analysis":""},{"time":"00:01:03,520 --> 00:01:04,520","html":"Jen: I don't know.","cn":"Jen：我不知道。","analysis":""},{"time":"00:01:04,520 --> 00:01:05,520","html":"You're the first to get here.","cn":"你是第一个到的。","analysis":""},{"time":"00:01:05,520 --> 00:01:07,520","html":"Bill: Well, I hope they don't take too long.","cn":"Bill：嗯，我希望他们别太久。","analysis":""},{"time":"00:01:07,520 --> 00:01:09,200","html":"I have a class at noon.","cn":"我中午有课。","analysis":""},{"time":"00:01:09,200 --> 00:01:13,080","html":"Jen: Why don't we at least discuss what we've completed and what's left to do?","cn":"Jen: 不如我们至少先讨论一下已经完成了什么，还有什么没做？","analysis":""},{"time":"00:01:13,080 --> 00:01:14,240","html":"Bill: Sounds like a plan.","cn":"Bill：听起来不错。","analysis":""},{"time":"00:01:14,240 --> 00:01:16,280","html":"Have you heard anything from Irene?","cn":"你有 Irene 的消息吗？","analysis":""},{"time":"00:01:16,280 --> 00:01:17,280","html":"Jen: Yeah.","cn":"Jen：有。","analysis":""},{"time":"00:01:17,280 --> 00:01:20,760","html":"Irene told me the experiment is just about done.","cn":"Irene 告诉我实验差不多完成了。","analysis":""},{"time":"00:01:20,760 --> 00:01:23,920","html":"<mark style=\"background-color: #bbf7d0;\">She's been practically living in the lab the past week.<\/mark>","cn":"<mark style=\"background-color: #bbf7d0;\">过去一周她几乎一直待在实验室里。<\/mark>","analysis":"<strong>答案解析：<\/strong>第21题问 Jen 说 Irene 最近做了什么。原文说她过去一周几乎住在实验室里，说明她在实验室花了很多时间，所以答案是 <strong>C<\/strong>。"},{"time":"00:01:23,920 --> 00:01:24,920","html":"Bill: Wow.","cn":"Bill：哇。","analysis":""},{"time":"00:01:24,920 --> 00:01:26,640","html":"We owe her a favor, don't we?","cn":"我们欠她一个人情，对吧？","analysis":""},{"time":"00:01:26,640 --> 00:01:28,440","html":"Jen: You can say that again.","cn":"Jen：完全同意。","analysis":""},{"time":"00:01:28,440 --> 00:01:29,800","html":"Bill: Has Kim been helping her?","cn":"Bill：Kim 有帮她吗？","analysis":""},{"time":"00:01:29,800 --> 00:01:32,400","html":"I thought the lab work was not her style.","cn":"我以为实验室工作不是她的风格。","analysis":""},{"time":"00:01:32,400 --> 00:01:38,160","html":"Jen: Well, not so much in the lab, but she has started compiling the data for the analysis.","cn":"Jen：嗯，不太是在实验室帮忙，但她已经开始整理用于分析的数据了。","analysis":""},{"time":"00:01:38,160 --> 00:01:39,480","html":"Bill: <mark style=\"background-color: #bbf7d0;\">Kim is terrific.<\/mark>","cn":"Bill：<mark style=\"background-color: #bbf7d0;\">Kim 太棒了。<\/mark>","analysis":"<strong>答案解析：<\/strong>第22题问 Bill 对 Kim 的态度。Bill 说 Kim 很棒，后面也说没有 Irene 和 Kim 他们会有麻烦，说明他很感激 Kim 的贡献，所以答案是 <strong>A<\/strong>。"},{"time":"00:01:39,480 --> 00:01:41,440","html":"I hate doing stats.","cn":"我讨厌做统计。","analysis":""},{"time":"00:01:41,440 --> 00:01:43,200","html":"I've always been bad at math.","cn":"我数学一直不好。","analysis":""},{"time":"00:01:43,200 --> 00:01:47,480","html":"Jen: I always thought there wasn't anything to that <mark style=\"background-color: #fecaca;\">boys are good at math<\/mark> theory.","cn":"Jen：我一直觉得所谓<mark style=\"background-color: #fecaca;\">男生擅长数学<\/mark>的理论没什么道理。","analysis":""},{"time":"00:01:47,480 --> 00:01:50,000","html":"Bill: Yes, and I'm proof.","cn":"Bill：是啊，我就是证明。","analysis":""},{"time":"00:01:50,000 --> 00:01:55,160","html":"Jen: Anyway, Kim hasn't actually run the stats for the project yet, since she still has to","cn":"Jen: 不过，Kim 还没有真正开始做项目的统计分析，因为她还得","analysis":""},{"time":"00:01:55,160 --> 00:01:57,960","html":"wait for the rest of the experiment data.","cn":"等剩下的实验数据。","analysis":""},{"time":"00:01:57,960 --> 00:02:01,640","html":"But she's ready to get started when we get the experiment done.","cn":"但等实验完成后，她就可以开始了。","analysis":""},{"time":"00:02:01,640 --> 00:02:05,280","html":"<mark style=\"background-color: #bbf7d0;\">Seriously, without Irene and Kim, we'd be in trouble.<\/mark>","cn":"<mark style=\"background-color: #bbf7d0;\">说真的，没有 Irene 和 Kim，我们就麻烦了。<\/mark>","analysis":"<strong>答案解析：<\/strong>第23题问 Jen 对项目的看法。原文说没有 Irene 和 Kim，他们会陷入麻烦，说明项目离不开她们的投入，所以答案是 <strong>B<\/strong>。"},{"time":"00:02:05,280 --> 00:02:07,440","html":"Bill: Yeah, you're right about that.","cn":"Bill：是的，这点你说得对。","analysis":""},{"time":"00:02:07,440 --> 00:02:09,560","html":"So what about Linda?","cn":"那 Linda 呢？","analysis":""},{"time":"00:02:09,560 --> 00:02:10,720","html":"What's she been up to?","cn":"她最近在忙什么？","analysis":""},{"time":"00:02:10,720 --> 00:02:11,720","html":"Jen: Who knows?","cn":"Jen：谁知道呢？","analysis":""},{"time":"00:02:11,720 --> 00:02:14,640","html":"All she ever talks about is her fiance.","cn":"她一直只谈她的未婚夫。","analysis":""},{"time":"00:02:14,640 --> 00:02:17,320","html":"<mark style=\"background-color: #bbf7d0;\">I haven't seen or heard from her all week.<\/mark>","cn":"<mark style=\"background-color: #bbf7d0;\">我整整一周都没见过她，也没收到她的消息。<\/mark>","analysis":"<strong>答案解析：<\/strong>第24题问 Bill 和 Jen 为什么对 Linda 不满。原文说 Jen 一周都没有见到 Linda，也没有收到她的消息，说明 Linda 联系不够，所以答案是 <strong>B<\/strong>。"},{"time":"00:02:17,320 --> 00:02:19,200","html":"Bill: Well, I hope she turns up soon.","cn":"Bill：嗯，希望她快点出现。","analysis":""},{"time":"00:02:19,200 --> 00:02:22,240","html":"We'll need everyone if we're going to get this done on time.","cn":"如果要按时完成，我们需要每个人都参与。","analysis":""},{"time":"00:02:22,240 --> 00:02:23,240","html":"Jen: Yeah.","cn":"Jen：是啊。","analysis":""},{"time":"00:02:23,240 --> 00:02:26,880","html":"And she knows that Professor Cooper is a hard grader of projects.","cn":"而且她知道 Cooper 教授给项目打分很严格。","analysis":""},{"time":"00:02:26,880 --> 00:02:31,600","html":"I'm worried that Professor Cooper is not going to give us a passing grade.","cn":"我担心 Cooper 教授不会给我们及格分。","analysis":""},{"time":"00:02:31,600 --> 00:02:34,920","html":"Anyway, we haven't talked about the introduction yet.","cn":"不管怎样，我们还没谈引言部分。","analysis":""},{"time":"00:02:34,920 --> 00:02:38,200","html":"Have you finished reading those articles Professor Cooper gave us?","cn":"Cooper 教授给我们的那些文章你读完了吗？","analysis":""},{"time":"00:02:38,200 --> 00:02:41,600","html":"Bill, she gave us those two weeks ago.","cn":"Bill，她两周前就给我们了。","analysis":""},{"time":"00:02:41,600 --> 00:02:43,720","html":"Bill: Hey, I've been busy.","cn":"Bill：嘿，我一直很忙。","analysis":""},{"time":"00:02:43,720 --> 00:02:45,120","html":"Jen: And I haven't.","cn":"Jen：难道我就不忙吗？","analysis":""},{"time":"00:02:45,120 --> 00:02:46,600","html":"Come on, Bill.","cn":"算了吧，Bill。","analysis":""},{"time":"00:02:46,600 --> 00:02:49,920","html":"Bill: Jen, you know we all depend on you for that.","cn":"Bill: Jen，你知道我们都指望你做这个。","analysis":""},{"time":"00:02:49,920 --> 00:02:54,840","html":"You're the only person I know that reads every assignment from beginning to end.","cn":"你是我认识的人里面唯一一个会从头到尾读完每项作业的人。","analysis":""},{"time":"00:02:54,840 --> 00:02:58,760","html":"You and Professor Cooper often have <mark style=\"background-color: #bbf7d0;\">private discussions about readings<\/mark> in the middle","cn":"你和 Cooper 教授经常在课堂中间<mark style=\"background-color: #bbf7d0;\">私下讨论阅读材料<\/mark>","analysis":""},{"time":"00:02:58,760 --> 00:02:59,760","html":"of class. 。","cn":"","analysis":"<strong>答案解析：<\/strong>第25题问 Jen 为什么被邀请加入团队。原文强调她经常和教授私下讨论阅读材料，因此团队看重她这方面的能力，所以答案是 <strong>C<\/strong>。"},{"time":"00:02:59,760 --> 00:03:02,080","html":"Hey, I'm not complaining.","cn":"嘿，我不是在抱怨。","analysis":""},{"time":"00:03:02,080 --> 00:03:04,800","html":"That's why all the rest of us asked you to be on our team.","cn":"这就是我们其他人都邀请你加入我们团队的原因。","analysis":""},{"time":"00:03:04,800 --> 00:03:07,000","html":"Jen: Oh, so that's why.","cn":"Jen：哦，原来是因为这个。","analysis":""},{"time":"00:03:07,000 --> 00:03:09,400","html":"So it wasn't because I'm popular, huh?","cn":"所以不是因为我受欢迎，对吧？","analysis":""},{"time":"00:03:09,400 --> 00:03:11,240","html":"Bill: Hey, you're the best.","cn":"Bill：嘿，你是最棒的。","analysis":""},{"time":"00:03:11,240 --> 00:03:12,480","html":"No one's going to argue that.","cn":"没人会反驳这一点。","analysis":""},{"time":"00:03:12,480 --> 00:03:13,880","html":"Jen: Hey, I'm thirsty.","cn":"Jen: 嘿，我渴了。","analysis":""},{"time":"00:03:13,880 --> 00:03:15,400","html":"You want something to drink?","cn":"你想喝点什么吗？","analysis":""},{"time":"00:03:15,400 --> 00:03:16,640","html":"Bill: No, I'm good.","cn":"Bill：不用，我没事。","analysis":""},{"time":"00:03:16,640 --> 00:03:21,920","html":"Jen: Okay, I'll be right back.","cn":"Jen：好，我马上回来。","analysis":""},{"time":"00:03:21,920 --> 00:03:27,960","html":"Before you hear the rest of the discussion, you have some time to look at questions 26-30.","cn":"在你听剩下的讨论之前，你有一些时间查看问题26到30。","analysis":""},{"time":"00:03:51,920 --> 00:04:00,400","html":"Now, listen and answer questions 26-30.","cn":"现在请听并回答问题26到30。","analysis":""},{"time":"00:04:00,400 --> 00:04:01,880","html":"Jen: They're still not here?","cn":"Jen：他们还没来？","analysis":""},{"time":"00:04:01,880 --> 00:04:02,880","html":"Bill: Nope.","cn":"Bill：没有。","analysis":""},{"time":"00:04:02,880 --> 00:04:04,720","html":"And I've got a class I've got to get to.","cn":"而且我还得去上课。","analysis":""},{"time":"00:04:04,720 --> 00:04:10,200","html":"Jen: Well, let's divide up responsibilities like who's responsible for each section.","cn":"Jen：那我们来分配一下责任吧，比如谁负责每个部分。","analysis":""},{"time":"00:04:10,200 --> 00:04:14,920","html":"It only makes sense that Irene writes up all the materials and methods since she spent","cn":"让 Irene 写材料和方法部分是合理的，因为她在这方面花了","analysis":""},{"time":"00:04:14,920 --> 00:04:16,200","html":"the most time with that.","cn":"最多时间。","analysis":""},{"time":"00:04:16,200 --> 00:04:17,200","html":"Bill: Oh, that's easy.","cn":"Bill：哦，那太简单了。","analysis":""},{"time":"00:04:17,200 --> 00:04:19,840","html":"Jen: Hey, didn't you just say we owe her one?","cn":"Jen: 嘿，你刚才不是说我们欠她一个人情吗？","analysis":""},{"time":"00:04:19,840 --> 00:04:21,400","html":"Bill: Yeah, yeah, you're right.","cn":"Bill：是，是，你说得对。","analysis":""},{"time":"00:04:21,400 --> 00:04:24,320","html":"<mark style=\"background-color: #bbf7d0;\">Irene can do the methodology section.<\/mark>","cn":"<mark style=\"background-color: #bbf7d0;\">Irene 可以写方法部分。<\/mark>","analysis":"<strong>答案解析：<\/strong>第26题问 Irene 负责哪个部分。原文明确说 Irene can do the methodology section，所以答案是 <strong>F. Methodology<\/strong>。"},{"time":"00:04:24,320 --> 00:04:25,720","html":"Jen: Do you want to do the results?","cn":"Jen: 你想写结果部分吗？","analysis":""},{"time":"00:04:25,720 --> 00:04:26,720","html":"Bill: Not at all.","cn":"Bill：一点也不想。","analysis":""},{"time":"00:04:26,720 --> 00:04:28,520","html":"I thought Kim would do that.","cn":"我以为 Kim 会写那个。","analysis":""},{"time":"00:04:28,520 --> 00:04:32,600","html":"Jen: Just because she is good at stats doesn't mean she'll be good at writing it up.","cn":"Jen：她擅长统计，不代表她也擅长把它写出来。","analysis":""},{"time":"00:04:32,600 --> 00:04:35,480","html":"And besides you are the one good at copy editing.","cn":"而且你才是擅长文字编辑的人。","analysis":""},{"time":"00:04:35,480 --> 00:04:36,960","html":"Bill: Well, all the same.","cn":"Bill：嗯，不过还是一样。","analysis":""},{"time":"00:04:36,960 --> 00:04:41,560","html":"I think it'll be easiest if <mark style=\"background-color: #bbf7d0;\">she does the result section<\/mark>, I'll edit the whole report.","cn":"我觉得最简单的安排是<mark style=\"background-color: #bbf7d0;\">她写结果部分<\/mark>，我来编辑整篇报告。","analysis":"<strong>答案解析：<\/strong>第27题问 Kim 负责哪个部分。原文说 Kim 写 result section，所以答案是 <strong>G. Results<\/strong>。"},{"time":"00:04:41,560 --> 00:04:42,560","html":"Jen: Come on.","cn":"Jen：别这样。","analysis":""},{"time":"00:04:42,560 --> 00:04:44,480","html":"That's asking a lot of you.","cn":"这对你要求太多了。","analysis":""},{"time":"00:04:44,480 --> 00:04:46,760","html":"Bill: Well, what part are you going to do, Jen?","cn":"Bill: 那你要写哪一部分，Jen？","analysis":""},{"time":"00:04:46,760 --> 00:04:48,200","html":"Jen: Isn't that obvious?","cn":"Jen：这还不明显吗？","analysis":""},{"time":"00:04:48,200 --> 00:04:50,400","html":"Since I'm the one who does all the reading.","cn":"既然我是那个读完所有材料的人。","analysis":""},{"time":"00:04:50,440 --> 00:04:53,480","html":"Bill: I'm sure you'll give us the best <mark style=\"background-color: #bbf7d0;\">literature review<\/mark>, Jen.","cn":"Bill：我相信你会给我们写出最好的<mark style=\"background-color: #bbf7d0;\">文献综述<\/mark>，Jen。","analysis":"<strong>答案解析：<\/strong>第28题问 Jen 负责哪个部分。原文说她会写最好的 literature review，所以答案是 <strong>E. Literature review<\/strong>。"},{"time":"00:04:53,480 --> 00:04:55,200","html":"We're all counting on you for that.","cn":"我们都指望你写这个。","analysis":""},{"time":"00:04:55,200 --> 00:04:58,760","html":"Jen: I guess that leaves the discussion section and the bibliography.","cn":"Jen：我想剩下的就是讨论部分和参考书目了。","analysis":""},{"time":"00:04:58,760 --> 00:04:59,760","html":"Bill: Yeah.","cn":"Bill：是的。","analysis":""},{"time":"00:04:59,760 --> 00:05:01,240","html":"Can you make suggestions on these?","cn":"你能给这两个部分提点建议吗？","analysis":""},{"time":"00:05:01,240 --> 00:05:02,240","html":"Jen: OK.","cn":"Jen：好。","analysis":""},{"time":"00:05:02,240 --> 00:05:06,400","html":"But seriously, wouldn't it make more sense if you do the list of references?","cn":"但说真的，如果你来做参考文献列表，不是更合理吗？","analysis":""},{"time":"00:05:06,400 --> 00:05:11,240","html":"There are enough commas, capital letters, and parentheses to keep you happy in there.","cn":"里面有足够多的逗号、大写字母和括号，可以让你开心。","analysis":""},{"time":"00:05:11,240 --> 00:05:12,240","html":"Bill: Yeah.","cn":"Bill：是啊。","analysis":""},{"time":"00:05:12,240 --> 00:05:13,240","html":"You got a point.","cn":"你说得有道理。","analysis":""},{"time":"00:05:13,240 --> 00:05:16,760","html":"<mark style=\"background-color: #bbf7d0;\">It sure does make sense that I do the bibliography.<\/mark>","cn":"<mark style=\"background-color: #bbf7d0;\">确实，我来做参考书目很合理。<\/mark>","analysis":"<strong>答案解析：<\/strong>第29题问 Bill 负责哪个部分。原文说 Bill 做 bibliography 很合理，所以答案是 <strong>C. Bibliography<\/strong>。"},{"time":"00:05:16,760 --> 00:05:21,440","html":"Jen: I guess Linda could handle the discussion section, even if she hasn't been around much.","cn":"Jen: 我想 Linda 可以负责讨论部分，虽然她最近不怎么出现。","analysis":""},{"time":"00:05:21,440 --> 00:05:24,520","html":"Bill: Yeah, but isn't that like the most important section?","cn":"Bill：是啊，但那不就是最重要的部分吗？","analysis":""},{"time":"00:05:24,520 --> 00:05:26,720","html":"Jen: Well, what else is she going to do?","cn":"Jen：那她还能做什么？","analysis":""},{"time":"00:05:26,720 --> 00:05:28,040","html":"Bill: The whole paper.","cn":"Bill：整篇论文。","analysis":""},{"time":"00:05:28,040 --> 00:05:29,520","html":"It'll serve her right.","cn":"这才是她活该。","analysis":""},{"time":"00:05:29,520 --> 00:05:30,920","html":"Jen: Then we'd all fail.","cn":"Jen：那我们都会不及格。","analysis":""},{"time":"00:05:30,920 --> 00:05:31,920","html":"Bill: OK.","cn":"Bill：好吧。","analysis":""},{"time":"00:05:31,920 --> 00:05:35,440","html":"But I think we all should start messaging her to make sure she gets busy.","cn":"但我觉得我们都应该开始给她发消息，确保她开始忙起来。","analysis":""},{"time":"00:05:35,440 --> 00:05:37,920","html":"The <mark style=\"background-color: #bbf7d0;\">discussion section<\/mark> can be long.","cn":"<mark style=\"background-color: #bbf7d0;\">讨论部分<\/mark>可能会很长。","analysis":"<strong>答案解析：<\/strong>第30题问 Linda 负责哪个部分。原文说 Linda could handle the discussion section，后面也说 discussion section 可能很长，所以答案是 <strong>D. Discussion<\/strong>。"},{"time":"00:05:37,920 --> 00:05:39,600","html":"Jen: What about the abstract?","cn":"Jen：那摘要呢？","analysis":""},{"time":"00:05:39,600 --> 00:05:42,520","html":"Bill: You really don't want me to do the <mark style=\"background-color: #fecaca;\">abstract<\/mark>, do you?","cn":"Bill：你真的不想让我写<mark style=\"background-color: #fecaca;\">摘要<\/mark>，对吧？","analysis":""},{"time":"00:05:42,520 --> 00:05:44,360","html":"Jen: That's not the point.","cn":"Jen：重点不是这个。","analysis":""},{"time":"00:05:44,360 --> 00:05:48,040","html":"I just think that the abstract should be for whoever finishes first.","cn":"我只是觉得摘要应该由谁先完成就谁来写。","analysis":""},{"time":"00:05:48,040 --> 00:05:49,040","html":"Bill: Right.","cn":"Bill：好吧。","analysis":""},{"time":"00:05:51,840 --> 00:05:54,520","html":"That is the end of part three.","cn":"第3部分到此结束。","analysis":""},{"time":"00:05:54,520 --> 00:05:58,600","html":"You now have 30 seconds to check your answers to part three.","cn":"现在你有30秒时间检查第3部分的答案。","analysis":""}],"transcriptHighlights":[{"qid":"21","text":"spent a lot of time in the laboratory.","answer":"C"},{"qid":"22","text":"He is grateful for her contribution.","answer":"A"},{"qid":"23","text":"would fail without Kim and Irene's input.","answer":"B"},{"qid":"24","text":"she fails to keep in touch enough.","answer":"B"},{"qid":"25","text":"has private conversations with the professor.","answer":"C"},{"qid":"26","text":"Methodology","answer":"F"},{"qid":"27","text":"Results","answer":"G"},{"qid":"28","text":"Literature review","answer":"E"},{"qid":"29","text":"Bibliography","answer":"C"},{"qid":"30","text":"Discussion","answer":"D"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点 function norm(s){return String(s).normalize('NFKC').trim().toLowerCase().replace(/[‘’`´]/g,"'").replace(/'/g,'').replace(/\s+/g,' ')}function answerVariants(s){return String(s||'').split(/\s*\/\s*/).map(x=>x.trim()).filter(Boolean)}function rangeIds(id){let [a,b]=id.split('-').map(Number),out=[];for(let n=a;n<=b;n++)out.push(String(n));return out}function isCorrect(q){let user=norm(getAnswer(q));return answerVariants(correctAnswer(q)).some(ans=>user===norm(ans))}

function bestCueNearAnalyses(q,predicate){let lines=studyLines(),analysisIdxs=[];lines.forEach((x,i)=>{if(questionInText(q,String(x.analysis||'')))analysisIdxs.push(i)});let best={idx:-1,score:-1e9};for(let a of analysisIdxs){let prev=a-1;while(prev>=0&&!lines[prev].analysis)prev--;let next=a+1;while(next<lines.length&&!lines[next].analysis)next++;let from=Math.max(0,prev+1),to=Math.min(lines.length-1,next-1);for(let i=from;i<=to;i++){if(predicate(lines[i])){let score=evidenceScore(q,i,a);if(score>best.score)best={idx:i,score}}}}return best.idx}

window.finishTest=function(){if(!review)finish()};window.toggleFinishMode=finish;window.resetTest=function(){review=false;currentCue=-1;dictationMode=false;showOriginal=true;showCn=true;showAnalysis=true;dictationAnswers={};$('#finish').textContent='Finish';$('#main').classList.remove('split');document.body.classList.remove('notes-open');$$('.review').forEach(r=>r.remove());$$('.choice').forEach(c=>c.classList.remove('selected','disabled'));$$('input').forEach(i=>{i.disabled=false;i.value='';i.defaultValue=''});$$('.slot').forEach(s=>s.innerHTML='');$$('#nav [data-q]').forEach(n=>n.className='');clearUserHighlights();$('#notesList').innerHTML='';resetAppearance(false);if(audio){audio.pause();audio.currentTime=0;$('#fillbar').style.width='0%';$('#time').textContent='00:00 / 00:00'}secs=0;drawTimer();clearInterval(timer);timer=setInterval(()=>{secs++;drawTimer();if(secs%5===0)save(false)},1000);refreshPool();restoreDragging();updateNav();clearAllProgress()};window.App={state:{get isReviewing(){return review},get review(){return review}},config:{answerKey:CONFIG_DATA.answerKey,questionList:CONFIG_DATA.questionList},finishTest:window.finishTest,toggleFinishMode:window.toggleFinishMode,resetTest:window.resetTest,generateResultsTable};
function highlightTerms(){let terms=[];for(let item of DATA.transcriptHighlights||[]){let text=typeof item==='string'?item:item.text;if(text){terms.push(String(text));String(text).split(/\s+/).map(w=>w.replace(/[^A-Za-z0-9'-]/g,'')).filter(w=>w.length>=5&&!/^(which|three|answer|letter|about|their|there|would|could|should)$/i.test(w)).forEach(w=>terms.push(w))}}return [...new Set(terms.map(t=>t.trim()).filter(t=>t.length>1))].sort((a,b)=>b.length-a.length)}
function markTranscript(text){let raw=String(text??''),lower=raw.toLowerCase(),ranges=[];for(let term of highlightTerms()){let needle=term.toLowerCase(),start=0;while(needle&&start<lower.length){let idx=lower.indexOf(needle,start);if(idx<0)break;let end=idx+needle.length,before=idx===0?' ':lower[idx-1],after=end>=lower.length?' ':lower[end];let bounded=!/[a-z0-9]/i.test(before)&&!/[a-z0-9]/i.test(after);if(bounded&&!ranges.some(r=>idx<r.end&&end>r.start))ranges.push({start:idx,end});start=end}}ranges.sort((a,b)=>a.start-b.start);let out='',pos=0;for(let r of ranges){out+=esc(raw.slice(pos,r.start));out+=`<span class="answer-highlight">${esc(raw.slice(r.start,r.end))}</span>`;pos=r.end}return out+esc(raw.slice(pos))}
function markStyle(el){let m=String(el.getAttribute('style')||'').match(/background-color\s*:\s*(#[0-9a-fA-F]{3,8})/);return m?`background-color: ${m[1]};`:''}
function sanitizeTranscriptHtml(html){let t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('*').forEach(el=>{let tag=el.tagName.toLowerCase();if(tag!=='mark'&&tag!=='span'&&tag!=='strong'){el.replaceWith(document.createTextNode(el.textContent));return}let cls=[...el.classList].filter(c=>c==='hl'||/^q\\d+$/.test(c)||c==='answer-highlight'||c==='q-label').join(' '),style=tag==='mark'?markStyle(el):'';[...el.attributes].forEach(a=>el.removeAttribute(a.name));if(tag==='mark'&&!cls&&!style)cls='answer-highlight';if(cls)el.setAttribute('class',cls);if(style)el.setAttribute('style',style)});return t.innerHTML}
function formatCueTime(time){return String(time||'').replace(/,000\b/g,'')}
function parseStamp(t){let m=String(t||'').match(/(?:(\d{1,3}):)?(\d{2}):(\d{2})[,:.](\d{1,3})/);return m?+(m[1]||0)*3600+ +m[2]*60+ +m[3]+ +(m[4]||0)/1000:0}
function cueRange(x){let parts=String(x?.time||'').split(/\s*-->\s*/);return {start:parseStamp(parts[0]),end:parseStamp(parts[1])}}
function transcriptLineHTML(x){if(x&&typeof x==='object'&&x.html!==undefined){let html=sanitizeTranscriptHtml(x.html),hit=/<mark\b|class="[^"]*(hl|answer-highlight)/.test(html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'';return `<section class="cue ${hit?'has-hit':''}"><div class="cue-time">${esc(formatCueTime(x.time))}</div><div><p>${html}</p>${cn}${analysis}</div></section>`}return `<p>${markTranscript(Array.isArray(x)?(x[2]||x.join(' ')):x)}</p>`}
function buildTranscript(){let lines=DATA.transcriptLines||[];$('#transcript').classList.remove('hide-cn','hide-analysis');$('#transcript').innerHTML=lines.length?`<h3>Listening Transcript</h3>${lines.map(transcriptLineHTML).join('')}<p>&nbsp;</p>`:'<h3>Listening Transcript</h3><p>No transcript was provided in the source file.</p><p>&nbsp;</p>'}
function studyLines(){return (DATA.transcriptLines||[]).filter(x=>x&&typeof x==='object'&&x.html!==undefined)}
function studyCueHTML(x,i){let html=sanitizeTranscriptHtml(x.html),cn=x.cn?`<div class="cue-cn">${sanitizeTranscriptHtml(x.cn)}</div>`:'',analysis=x.analysis?`<div class="cue-analysis">${sanitizeTranscriptHtml(x.analysis)}</div>`:'',saved=esc(dictationAnswers[i]||''),box=dictationMode?`<textarea class="dictation-box" data-idx="${i}" placeholder="输入你听到的内容..." onclick="event.stopPropagation()">${saved}</textarea>`:'';return `<button class="study-cue" type="button" data-idx="${i}"><span class="cue-time">${esc(formatCueTime(x.time))}</span><p>${html}</p>${cn}${analysis}${box}</button>`}
function buildIntensive(){let lines=studyLines(),panel=$('#transcript');panel.classList.toggle('hide-cn',!showCn);panel.classList.toggle('hide-analysis',!showAnalysis);panel.classList.toggle('dictation-mode',dictationMode);panel.classList.toggle('show-original',showOriginal);panel.innerHTML=lines.length?`<div class="study-head"><h3>原文和精听</h3><div class="study-controls"><button id="prevCue" type="button">上一句</button><button id="playCue" type="button">播放 / 暂停</button><button id="nextCue" type="button">下一句</button><button id="loopCue" type="button" class="${loopCue?'active':''}">循环当前句</button><button id="slowCue" type="button" class="${slowCue?'active':''}">0.8x 慢速</button></div><div class="study-controls"><button id="dictationCue" type="button" class="${dictationMode?'active':''}">听写模式</button><button id="originalCue" type="button" class="${showOriginal?'active':''}">显示原文</button><button id="cnCue" type="button" class="${showCn?'active':''}">显示中文</button><button id="analysisCue" type="button" class="${showAnalysis?'active':''}">显示解析</button></div></div><div class="study-list">${lines.map(studyCueHTML).join('')}</div><p>&nbsp;</p>`:'<h3>原文和精听</h3><p>No timed transcript was provided.</p><p>&nbsp;</p>';bindStudyControls();setActiveCue(currentCue)}
function toggleIntensive(){let main=$('#main');if(main.classList.contains('split')&&$('#transcript .study-head')){main.classList.remove('split');return}main.classList.add('split');buildIntensive()}
function bindStudyControls(){let panel=$('#transcript');panel.querySelectorAll('.study-cue').forEach(btn=>btn.onclick=e=>{if(e.target.closest('.dictation-box'))return;playCue(Number(btn.dataset.idx))});panel.querySelectorAll('.dictation-box').forEach(box=>{box.oninput=()=>{dictationAnswers[box.dataset.idx]=box.value;save(false)}});$('#prevCue')?.addEventListener('click',()=>playCue(Math.max(0,(currentCue<0?0:currentCue-1))));$('#nextCue')?.addEventListener('click',()=>playCue(Math.min(studyLines().length-1,(currentCue<0?0:currentCue+1))));$('#playCue')?.addEventListener('click',()=>audio.paused?audio.play():audio.pause());$('#loopCue')?.addEventListener('click',()=>{loopCue=!loopCue;buildIntensive();save(false)});$('#slowCue')?.addEventListener('click',()=>{slowCue=!slowCue;audio.playbackRate=slowCue ? 0.8 : +$('#speed').value;buildIntensive();save(false)});$('#cnCue')?.addEventListener('click',()=>{showCn=!showCn;buildIntensive();save(false)});$('#analysisCue')?.addEventListener('click',()=>{showAnalysis=!showAnalysis;buildIntensive();save(false)});$('#dictationCue')?.addEventListener('click',()=>{dictationMode=!dictationMode;if(dictationMode){showOriginal=false;showCn=false;showAnalysis=false}else{showOriginal=true;showCn=true;showAnalysis=true}buildIntensive();save(false)});$('#originalCue')?.addEventListener('click',()=>{showOriginal=!showOriginal;buildIntensive();save(false)})}
function playCue(i){let lines=studyLines();if(!lines.length)return;currentCue=Math.max(0,Math.min(i,lines.length-1));let r=cueRange(lines[currentCue]);audio.currentTime=r.start||0;if(slowCue)audio.playbackRate=.8;audio.play();setActiveCue(currentCue);save(false)}
function setActiveCue(i){$$('.study-cue').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.idx)===i));let active=$(`.study-cue[data-idx="${i}"]`);active?.scrollIntoView({block:'nearest'})}
function maintainCueLoop(){if(currentCue<0||!loopCue)return;let line=studyLines()[currentCue],r=cueRange(line);if(r.end&&audio.currentTime>=r.end-.05){audio.currentTime=r.start||0;audio.play()}}
function showToast(msg='Progress saved!'){$('#toast').textContent=msg;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1400)}
function collectAnswers(){let answers={text:{},single:{},multiple:{},matching:{},map:{}};$$('#content input[name^="q"]').forEach(i=>answers.text[i.name]=i.value);$$('.single-choice.selected').forEach(c=>answers.single[c.dataset.name]=c.dataset.value);$$('.map-choice.selected').forEach(c=>answers.map[c.dataset.name]=c.dataset.value);let names=[...new Set($$('.multi-choice').map(c=>c.dataset.name))];names.forEach(name=>answers.multiple[name]=$$(`.multi-choice[data-name="${name}"].selected`).map(c=>c.dataset.value));$$('.slot').forEach(s=>{let tag=s.querySelector('.tag');if(tag)answers.matching[s.dataset.q]=tag.dataset.value});return answers}
function restoreAnswers(a={}){hardResetAnswers();Object.entries(a.text||{}).forEach(([name,val])=>{let el=$(`input[name="${name}"]`);if(el)el.value=val});Object.entries(a.single||{}).forEach(([name,val])=>{let el=$(`.single-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.map||{}).forEach(([name,val])=>{let el=$(`.map-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')});Object.entries(a.multiple||{}).forEach(([name,vals])=>(vals||[]).forEach(val=>{let el=$(`.multi-choice[data-name="${name}"][data-value="${val}"]`);if(el)el.classList.add('selected')}));Object.entries(a.matching||{}).forEach(([qid,val])=>{let opt=$(`.drag[data-value="${val}"]`),slot=$(`.slot[data-q="${qid}"]`);if(opt&&slot)slot.innerHTML=`<span class="tag" draggable="true" data-value="${val}">${esc(opt.textContent)}</span>`});refreshPool();restoreDragging();updateNav()}
function contentSnapshot(){let clone=$('#content').cloneNode(true);clone.querySelectorAll('.review').forEach(r=>r.remove());clone.querySelectorAll('input').forEach(i=>{i.setAttribute('value',i.value);i.removeAttribute('disabled')});clone.querySelectorAll('.choice').forEach(c=>c.classList.remove('disabled'));return clone.innerHTML}
function notesSnapshot(){$$('#notesList textarea').forEach(t=>{t.textContent=t.value;t.setAttribute('data-value',t.value)});return $('#notesList').innerHTML}
function layoutSignature(){return JSON.stringify([RENDER_VERSION,(DATA.groups||[]).map(g=>[g.type,g.layout||'',g.id||'',g.title||'',g.instruction||'',g.questionText||'',(g.options||[]),(g.questions||[]).map(q=>JSON.stringify(q))])])}
function save(show=false){let data={secs,answers:collectAnswers(),contentHtml:contentSnapshot(),layoutSignature:layoutSignature(),notes:notesSnapshot(),dark:document.body.classList.contains('dark'),font:document.documentElement.style.fontSize,dictationAnswers,studyState:{currentCue,loopCue,slowCue,showCn,showAnalysis,dictationMode,showOriginal},audioTime:audio?.currentTime||0};localStorage.setItem(storeKey,JSON.stringify(data));if(show)showToast()}
function load(){let raw=localStorage.getItem(storeKey);if(!raw)return;let d;try{d=JSON.parse(raw)}catch(err){console.warn('Saved progress could not be read.',err);return}secs=d.secs||0;if(d.contentHtml&&d.layoutSignature===layoutSignature()){try{$('#content').innerHTML=d.contentHtml;bindDynamic()}catch(err){console.warn('Saved question view could not be restored.',err)}}if(d.answers){try{restoreAnswers(d.answers)}catch(err){console.warn('Saved answers could not be restored.',err)}}if(d.dictationAnswers)dictationAnswers=d.dictationAnswers;if(d.studyState)try{({currentCue=currentCue,loopCue=loopCue,slowCue=slowCue,showCn=showCn,showAnalysis=showAnalysis,dictationMode=dictationMode,showOriginal=showOriginal}=d.studyState)}catch(err){console.warn('Study state could not be restored.',err)}if(d.notes){try{$('#notesList').innerHTML=d.notes;$$('#notesList textarea').forEach(t=>{t.value=t.dataset.value||t.textContent||''})}catch(err){console.warn('Saved notes could not be restored.',err)}}if(d.dark)document.body.classList.add('dark');setFontSize(d.font||DEFAULT_FONT_SIZE,false);if(d.audioTime)audio.addEventListener('loadedmetadata',()=>{audio.currentTime=d.audioTime},{once:true});bindNoteDeletes();drawTimer()}
function handleSelection(e){if(e.target.closest('#selbar,#notes,.bottom-bar'))return;let sel=window.getSelection();let hl=e.target.closest?.('.hl-brown,.hl-rose,.hl-blue');let bar=$('#selbar');if(hl&&sel.isCollapsed){bar.targetElem=hl;placeBar(bar,hl.getBoundingClientRect())}else if(sel&&!sel.isCollapsed&&$('#content').contains(sel.anchorNode)){bar.targetElem=null;placeBar(bar,sel.getRangeAt(0).getBoundingClientRect())}else{bar.hidden=true}}
function placeBar(bar,rect){bar.hidden=false;bar.style.left=Math.max(8,window.scrollX+rect.left+rect.width/2-95)+'px';bar.style.top=Math.max(8,window.scrollY+rect.top-46)+'px'}
function highlightedFromSelection(){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let node=sel.anchorNode?.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;return node?.closest?.('.hl-brown,.hl-rose,.hl-blue')||null}
function handleToolbar(e){let act=e.target.closest('button')?.dataset.act;if(!act)return;let bar=$('#selbar'),target=bar.targetElem||highlightedFromSelection(),sel=window.getSelection();if(act==='del'&&target){unwrap(target);removeNote(target.dataset.hid)}else if(act==='hl'){if(target){if(target.classList.contains('hl-brown'))target.className='hl-rose';else if(target.classList.contains('hl-rose'))target.className='hl-rose';else target.className='hl-brown'}else{let span=wrapSelection('hl-brown');if(span)span.dataset.hid='h_'+Date.now()}}else if(act==='note'){let span=target||wrapSelection('hl-blue');if(span){span.className='hl-blue';if(!span.dataset.hid)span.dataset.hid='n_'+Date.now();createNote(span);document.body.classList.add('notes-open')}}bar.hidden=true;sel.removeAllRanges();save(false)}
function wrapSelection(cls){let sel=window.getSelection();if(!sel||sel.isCollapsed)return null;let range=sel.getRangeAt(0);if(!$('#content').contains(range.commonAncestorContainer))return null;let span=document.createElement('span');span.className=cls;try{range.surroundContents(span)}catch{span.appendChild(range.extractContents());range.insertNode(span)}return span}
function unwrap(el){let p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);p.normalize()}

function bindNoteDeletes(){$$('#notesList textarea').forEach(t=>t.oninput=()=>save(false));$$('.delete-note').forEach(btn=>btn.onclick=()=>{let card=btn.closest('.note-card'),id=card.dataset.hid,span=$(`[data-hid="${id}"]`);if(span)unwrap(span);card.remove();save(false)})}

const DEFAULT_FONT_SIZE=16,MIN_FONT_SIZE=14,MAX_FONT_SIZE=22;

function setFontSize(size,persist=true){let n=Math.max(MIN_FONT_SIZE,Math.min(MAX_FONT_SIZE,Number(size)||DEFAULT_FONT_SIZE));document.documentElement.style.fontSize=n===DEFAULT_FONT_SIZE?'':n+'px';updateSizeButtons();if(persist)save(false)}
function adjustFontSize(delta){setFontSize(currentFontSize()+delta,true)}
function updateSizeButtons(){let size=currentFontSize(),dark=document.body.classList.contains('dark');$('#fontMinus')?.toggleAttribute('disabled',size<=MIN_FONT_SIZE);$('#fontPlus')?.toggleAttribute('disabled',size>=MAX_FONT_SIZE);$('#fontDefault')?.classList.toggle('active',size===DEFAULT_FONT_SIZE);$('#lightBtn')?.classList.toggle('active',!dark);$('#darkBtn')?.classList.toggle('active',dark)}

$('#finish').onclick=finish;$('#save').onclick=()=>save(true);$('#clear').onclick=()=>{if(confirm('Clear all progress?')){window.resetTest();showToast('Clear complete')}};$('#toggleNotes').onclick=()=>{document.body.classList.toggle('notes-open');save(false)};$('#closeNotes').onclick=()=>{document.body.classList.remove('notes-open');save(false)};$('#toggleIntensive').onclick=()=>{toggleIntensive();save(false)};$('#settingsBtn').onclick=()=>{$('#settings').classList.toggle('open');updateSizeButtons()};$('#lightBtn').onclick=()=>{document.body.classList.remove('dark');updateSizeButtons();save(false)};$('#darkBtn').onclick=()=>{document.body.classList.add('dark');updateSizeButtons();save(false)};$('#appearanceReset').onclick=()=>resetAppearance(true);$('#fontMinus').onclick=()=>adjustFontSize(-1);$('#fontPlus').onclick=()=>adjustFontSize(1);$('#fontDefault').onclick=()=>setFontSize(DEFAULT_FONT_SIZE,true);$('#settings').addEventListener('wheel',e=>{e.preventDefault();adjustFontSize(e.deltaY>0?-1:1)},{passive:false});document.addEventListener('keydown',e=>{if(!e.ctrlKey&&!e.metaKey)return;let key=e.key;if(key==='+'||key==='='){e.preventDefault();adjustFontSize(1)}else if(key==='-'||key==='_'){e.preventDefault();adjustFontSize(-1)}else if(key==='0'){e.preventDefault();resetAppearance(true)}});
