g with children as a 1. __________","list":true,"level":0},{"text":"Specialist counsellors could use skills in:","list":true,"level":0},{"text":"Sports, e.g. 2. __________","list":true,"level":1},{"text":"Art","list":true,"level":1},{"text":"Job in summer camp lasts for 3. __________ weeks with the chance to travel afterwards","list":true,"level":0},{"text":"Job starts in 4. __________","list":true,"level":0},{"text":"First week of job is used for 5. __________","list":true,"level":0},{"text":"Officially, counsellors must be at least 6. __________ years old","list":true,"level":0},{"text":"Salary: 7. __________ US $","list":true,"level":0},{"text":"Must pay for","list":false,"level":0},{"text":"Own 8. __________ (£138)","list":true,"level":0},{"text":"A 9. __________ check in UK (£36)","list":true,"level":0},{"text":"Can get a 10. __________ on travel in America after camp","list":false,"level":0}]}],"answerKey":{"text":{"q1":"Leader","q2":"Tennis","q3":"8/eight","q4":"June","q5":"Training","q6":"19/nineteen","q7":"985","q8":"Insurance","q9":"Police","q10":"Discount"},"single":{},"multiple":{},"multipleMap":{},"matching":{},"map":{}},"transcriptLines":[{"time":"00:00:00,000 --> 00:00:07,000","html":"[Narrator]: You will hear a number of different recordings, and you will have to answer questions on what","cn":"[旁白]: 你将听到几段不同的录音，你需要回答关于所听到的内容的问题","analysis":""},{"time":"00:00:07,000 --> 00:00:08,000","html":"you hear.","cn":"你所听到的。","analysis":""},{"time":"00:00:08,000 --> 00:00:13,560","html":"There will be time for you to read the instructions and questions, and you will have a chance to","cn":"你将有时间阅读说明和问题，并且你将有机会","analysis":""},{"time":"00:00:13,560 --> 00:00:15,960","html":"check your work.","cn":"检查你的答案。","analysis":""},{"time":"00:00:15,960 --> 00:00:20,480","html":"All the recordings will be played once only.","cn":"所有录音都只播放一次。","analysis":""},{"time":"00:00:20,480 --> 00:00:24,120","html":"The test is in four parts.","cn":"测试分为四个部分。","analysis":""},{"time":"00:00:24,120 --> 00:00:28,360","html":"Write all your answers in the listening question booklet.","cn":"请将所有答案写在听力试题册上。","analysis":""},{"time":"00:00:28,360 --> 00:00:33,240","html":"At the end of the test, you will be given ten minutes to transfer your answers to an","cn":"测试结束时，你将有十分钟时间将答案誊写到","analysis":""},{"time":"00:00:33,240 --> 00:00:36,240","html":"answer sheet.","cn":"答题卡上。","analysis":""},{"time":"00:00:36,240 --> 00:00:45,240","html":"Now turn to part one on page two of your question booklet.","cn":"现在请翻到试题册第二页的第一部分。","analysis":""},{"time":"00:00:45,240 --> 00:00:47,240","html":"Part one","cn":"第一部分","analysis":""},{"time":"00:00:47,240 --> 00:00:52,360","html":"You will hear a telephone conversation between a young man who wants to get a summer job in","cn":"你将听到一个年轻人和一位中介的电话对话，这个年轻人想在美国找一份暑期工作。","analysis":""},{"time":"00:00:52,360 --> 00:00:55,160","html":"the USA and an agent.","cn":"这个年轻人想在美国找一份暑期工作。","analysis":""},{"time":"00:00:55,160 --> 00:01:00,160","html":"First, you have some time to look at questions one to five.","cn":"首先，你有一些时间查看问题一到五。","analysis":""},{"time":"00:01:25,160 --> 00:01:32,160","html":"Now listen carefully and answer questions one to five.","cn":"现在请仔细听并回答问题一到五。","analysis":""},{"time":"00:01:32,160 --> 00:01:36,160","html":"[Nicholas]: Hi, USA Summer Camps, Nicholas speaking.","cn":"[尼古拉斯]: 您好，这里是美国夏令营，我是尼古拉斯。","analysis":""},{"time":"00:01:36,160 --> 00:01:38,160","html":"How can I help you?","cn":"有什么可以帮您的吗？","analysis":""},{"time":"00:01:38,160 --> 00:01:44,960","html":"[Man]: I want to get a job in the USA this summer, and I saw an advert on your website, and it said","cn":"[男士]: 我想今年夏天在美国找份工作，我在你们网站上看到一个广告，上面说如果想了解更多信息，应该打这个电话。","analysis":""},{"time":"00:01:44,960 --> 00:01:48,160","html":"I should call this number if I wanted more information.","cn":"我应该打这个电话。","analysis":""},{"time":"00:01:48,160 --> 00:01:49,160","html":"[Nicholas]: Right.","cn":"[尼古拉斯]: 好的。","analysis":""},{"time":"00:01:49,160 --> 00:01:52,160","html":"So, you're interested in working in a summer camp?","cn":"那么，你对在夏令营工作感兴趣？","analysis":""},{"time":"00:01:52,160 --> 00:01:54,160","html":"[Man]: That's working with children, is it?","cn":"[男士]: 那是和孩子们一起工作，对吗？","analysis":""},{"time":"00:01:55,160 --> 00:01:56,160","html":"[Nicholas]: Yes.","cn":"[尼古拉斯]: 是的。","analysis":""},{"time":"00:01:56,160 --> 00:02:01,160","html":"Lots of children go away to summer camp in the USA, and the jobs we're advertising are","cn":"很多孩子去美国参加夏令营，我们正在招聘的职位是","analysis":""},{"time":"00:02:01,160 --> 00:02:03,160","html":"for what are called counselors.","cn":"所谓的“辅导员”。","analysis":""},{"time":"00:02:03,160 --> 00:02:07,160","html":"That means you're with the children the whole day, 24 hours.","cn":"这意味着你将全天候，24小时与孩子们在一起。","analysis":""},{"time":"00:02:07,160 --> 00:02:09,160","html":"[Man]: Right.","cn":"[男士]: 好的。","analysis":""},{"time":"00:02:09,160 --> 00:02:12,160","html":"So, what did I be doing exactly?","cn":"那么，我具体要做些什么呢？","analysis":""},{"time":"00:02:12,160 --> 00:02:13,160","html":"[Nicholas]: Everything.","cn":"[尼古拉斯]: 所有事情。","analysis":""},{"time":"00:02:13,160 --> 00:02:18,160","html":"You'd be working with them, playing with them, teaching them everything.","cn":"你将和他们一起工作，一起玩耍，教他们所有东西。","analysis":""},{"time":"00:02:18,160 --> 00:02:23,160","html":"[Man]: Your ad said there were different sorts of positions, general and specialists.","cn":"[男士]: 你们的广告说有不同类型的职位，普通和专业的。","analysis":""},{"time":"00:02:23,160 --> 00:02:24,160","html":"[Nicholas]: Yes.","cn":"[尼古拉斯]: 是的。","analysis":""},{"time":"00:02:24,160 --> 00:02:30,160","html":"For the general counselors, they're asking for people who have experience of working with children,","cn":"对于普通辅导员，他们要求有与儿童工作经验的人，","analysis":""},{"time":"00:02:30,160 --> 00:02:34,160","html":"but it has to be as a <mark style=\"background-color: #bbf7d0;\">leader<\/mark> of some sort.","cn":"但必须是某种形式的<mark style=\"background-color: #bbf7d0;\">领导者<\/mark>经验。","analysis":"<strong>答案解析：<\/strong> 问题1询问普通辅导员需要作为什么身份与儿童打交道的经验。文本中明确提到“it has to be as a leader of some sort.”，因此“leader”是正确答案。"},{"time":"00:02:34,160 --> 00:02:39,160","html":"[Man]: I'm not sure what I'm really interested in is sports.","cn":"[男士]: 我不确定我真正感兴趣的是体育。","analysis":""},{"time":"00:02:39,160 --> 00:02:43,160","html":"[Nicholas]: You might be more interested in being a specialist counselor then.","cn":"[尼古拉斯]: 那么你可能对成为一名专业辅导员更感兴趣。","analysis":""},{"time":"00:02:43,160 --> 00:02:46,160","html":"They focus on one particular area.","cn":"他们专注于一个特定领域。","analysis":""},{"time":"00:02:46,160 --> 00:02:49,160","html":"It doesn't have to be a sport, but mostly it is.","cn":"不一定是体育，但大多数情况下是。","analysis":""},{"time":"00:02:49,160 --> 00:02:52,160","html":"[Man]: Would <mark style=\"background-color: #bbf7d0;\">tennis<\/mark> be okay for that?","cn":"[男士]: <mark style=\"background-color: #bbf7d0;\">网球<\/mark>可以吗？","analysis":"<strong>答案解析：<\/strong> 问题2询问专业辅导员可以在哪些体育技能上有所专长。男士询问“Would tennis be okay for that?”，尼古拉斯回答“Absolutely.”，表明网球是符合要求的体育技能，因此“tennis”是正确答案。"},{"time":"00:02:52,160 --> 00:02:53,160","html":"[Nicholas]: Absolutely.","cn":"[尼古拉斯]: 当然可以。","analysis":""},{"time":"00:02:53,160 --> 00:02:57,160","html":"You might find yourself coaching other sports as well though.","cn":"不过你可能也会发现自己要指导其他运动。","analysis":""},{"time":"00:02:57,160 --> 00:02:59,160","html":"They do a big range usually.","cn":"他们通常会涉及很多种类。","analysis":""},{"time":"00:02:59,160 --> 00:03:05,160","html":"That's what most of the kids are interested in, and of course, a lot of it's outdoor stuff.","cn":"这是大多数孩子感兴趣的，当然，很多都是户外活动。","analysis":""},{"time":"00:03:05,160 --> 00:03:09,160","html":"[Man]: So, they wouldn't be so interested in something like art?","cn":"[男士]: 那么，他们对艺术之类的就不那么感兴趣了吗？","analysis":""},{"time":"00:03:09,160 --> 00:03:10,160","html":"[Nicholas]: Oh, yes.","cn":"[尼古拉斯]: 哦，不。","analysis":""},{"time":"00:03:10,160 --> 00:03:11,160","html":"They would be.","cn":"他们会感兴趣的。","analysis":""},{"time":"00:03:11,160 --> 00:03:15,160","html":"Anything you're enthusiastic about can help younger kids with.","cn":"任何你热情投入并能帮助小孩子的事情都可以。","analysis":""},{"time":"00:03:15,160 --> 00:03:16,160","html":"[Man]: Okay.","cn":"[男士]: 好的。","analysis":""},{"time":"00:03:16,160 --> 00:03:21,160","html":"Well, I'd be really interested in working with kids in both those areas.","cn":"嗯，我对在这两个领域与孩子们一起工作真的很有兴趣。","analysis":""},{"time":"00:03:21,160 --> 00:03:26,160","html":"Now, about times, the ad said the job was for <mark style=\"background-color: #fecaca;\">12 weeks<\/mark>.","cn":"现在，关于时间，广告说这份工作是<mark style=\"background-color: #fecaca;\">12周<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题3询问夏令营工作持续多长时间。男士提到“the ad said the job was for 12 weeks”，这是广告上的信息，但尼古拉斯随后纠正了，因此“12 weeks”是干扰项。"},{"time":"00:03:26,160 --> 00:03:28,160","html":"[Nicholas]: <mark style=\"background-color: #bbf7d0;\">Eight<\/mark>, actually.","cn":"[尼古拉斯]: 实际上是<mark style=\"background-color: #bbf7d0;\">八周<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题3询问夏令营工作持续多长时间。尼古拉斯明确指出“Eight, actually.”，因此“Eight”是正确答案。"},{"time":"00:03:28,160 --> 00:03:33,160","html":"But most people stay on in the US for another three or four weeks and go traveling.","cn":"但大多数人会再在美国待三到四周去旅行。","analysis":""},{"time":"00:03:33,160 --> 00:03:34,160","html":"[Man]: Yeah.","cn":"[男士]: 是的。","analysis":""},{"time":"00:03:34,160 --> 00:03:36,160","html":"I'd really like to do that.","cn":"我真的很想那样做。","analysis":""},{"time":"00:03:36,160 --> 00:03:39,160","html":"There are lots of places I'd like to see in America.","cn":"美国有很多地方我想去看看。","analysis":""},{"time":"00:03:39,160 --> 00:03:41,160","html":"So, when would I need to be there?","cn":"那么，我什么时候需要去那里？","analysis":""},{"time":"00:03:41,160 --> 00:03:42,160","html":"[Nicholas]: <mark style=\"background-color: #bbf7d0;\">June<\/mark>.","cn":"[尼古拉斯]: <mark style=\"background-color: #bbf7d0;\">六月<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题4询问工作开始的月份。尼古拉斯明确回答“June.”，因此“June”是正确答案。"},{"time":"00:03:42,160 --> 00:03:46,160","html":"Then you carry on to August and do your traveling after that.","cn":"然后你一直工作到八月，之后就可以去旅行了。","analysis":""},{"time":"00:03:46,160 --> 00:03:48,160","html":"So, you're back home in September.","cn":"所以你九月就回家了。","analysis":""},{"time":"00:03:48,160 --> 00:03:49,160","html":"[Man]: That's perfect.","cn":"[男士]: 太完美了。","analysis":""},{"time":"00:03:49,160 --> 00:03:51,160","html":"Well, that all sounds great.","cn":"嗯，这听起来都很棒。","analysis":""},{"time":"00:03:51,160 --> 00:03:53,160","html":"But about the job.","cn":"但关于这份工作。","analysis":""},{"time":"00:03:53,160 --> 00:03:55,160","html":"Do I just pick it up as I go along?","cn":"我是边做边学吗？","analysis":""},{"time":"00:03:55,160 --> 00:03:56,160","html":"[Nicholas]: No.","cn":"[尼古拉斯]: 不。","analysis":""},{"time":"00:03:56,160 --> 00:04:01,160","html":"You get there a week before the kids arrive, and that time spent on <mark style=\"background-color: #bbf7d0;\">training<\/mark>.","cn":"孩子们来之前你会提前一周到达，这段时间用于<mark style=\"background-color: #bbf7d0;\">培训<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题5询问工作的第一周是做什么用的。尼古拉斯解释说“You get there a week before the kids arrive, and that time spent on training.”，因此“training”是正确答案。"},{"time":"00:04:01,160 --> 00:04:06,160","html":"So, you'll learn all about the camp and working with American children and dealing with homesickness.","cn":"所以，你将学习所有关于夏令营、与美国儿童相处以及处理思乡情绪的知识。","analysis":""},{"time":"00:04:06,160 --> 00:04:07,160","html":"All that kind of thing.","cn":"所有这些事情。","analysis":""},{"time":"00:04:07,160 --> 00:04:08,160","html":"[Man]: Right.","cn":"[男士]: 好的。","analysis":""},{"time":"00:04:11,160 --> 00:04:18,160","html":"[Narrator]: Before you hear the rest of the conversation, you have some time to look at questions 6 to 10.","cn":"[旁白]: 在你听对话的其余部分之前，你有一些时间查看问题6到10。","analysis":""},{"time":"00:04:19,160 --> 00:04:47,160","html":"Now listen and answer questions 6 to 10.","cn":"现在请听并回答问题6到10。","analysis":""},{"time":"00:04:48,160 --> 00:04:53,160","html":"[Man]: And I presume I'd be okay as far as my age goes.","cn":"[男士]: 我想我的年龄应该没问题吧。","analysis":""},{"time":"00:04:53,160 --> 00:04:55,160","html":"I'll be <mark style=\"background-color: #bbf7d0;\">19<\/mark> by then.","cn":"到那时我就<mark style=\"background-color: #bbf7d0;\">19岁<\/mark>了。","analysis":"<strong>答案解析：<\/strong> 问题6询问辅导员的最低官方年龄。男士提到“I'll be 19 by then.”，尼古拉斯随后确认“That's the minimum age officially.”，因此“19”是正确答案。"},{"time":"00:04:55,160 --> 00:04:57,160","html":"[Nicholas]: That's the minimum age officially.","cn":"[尼古拉斯]: 那是官方规定的最低年龄。","analysis":""},{"time":"00:04:57,160 --> 00:05:03,160","html":"Though they do occasionally accept people of <mark style=\"background-color: #fecaca;\">18<\/mark> if they have special skills that are in demand.","cn":"虽然如果他们有特殊技能且这些技能很抢手的话，他们偶尔也会接受<mark style=\"background-color: #fecaca;\">18岁<\/mark>的人。","analysis":"<strong>答案解析：<\/strong> 问题6询问辅导员的最低官方年龄。虽然文本提到“they do occasionally accept people of 18”，但这只是特殊情况下的例外，不是官方最低年龄，因此“18”是干扰项。"},{"time":"00:05:03,160 --> 00:05:05,160","html":"[Man]: And how much would I actually get paid?","cn":"[男士]: 我实际能拿到多少工资呢？","analysis":""},{"time":"00:05:05,160 --> 00:05:09,160","html":"[Nicholas]: You get a total of <mark style=\"background-color: #bbf7d0;\">$985<\/mark> US dollars.","cn":"[尼古拉斯]: 你总共会得到<mark style=\"background-color: #bbf7d0;\">985美元<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题7询问工资数额。尼古拉斯明确回答“You get a total of $985 US dollars.”，因此“985”是正确答案。"},{"time":"00:05:09,160 --> 00:05:13,160","html":"You get a couple of hundred dollars more if you're over <mark style=\"background-color: #fecaca;\">21<\/mark>.","cn":"如果你超过<mark style=\"background-color: #fecaca;\">21岁<\/mark>，你会多拿到几百美元。","analysis":"<strong>答案解析：<\/strong> 问题7询问工资数额。文本提到“You get a couple of hundred dollars more if you're over 21.”，但这指的是额外津贴，而不是基本工资，而且男士是19岁，不符合这个条件，因此“21”是干扰项。"},{"time":"00:05:13,160 --> 00:05:15,160","html":"But that won't apply to you.","cn":"但这不适用于你。","analysis":""},{"time":"00:05:15,160 --> 00:05:20,160","html":"So you should end up with quite a bit of money to go traveling with when you finished.","cn":"所以当你完成工作后，你应该会有相当一笔钱可以用来旅行。","analysis":""},{"time":"00:05:20,160 --> 00:05:21,160","html":"[Man]: Great.","cn":"[男士]: 太棒了。","analysis":""},{"time":"00:05:21,160 --> 00:05:23,160","html":"That's tons I want to see.","cn":"有很多我想看的东西。","analysis":""},{"time":"00:05:23,160 --> 00:05:26,160","html":"New York, San Francisco, the Grand Canyon.","cn":"纽约、旧金山、大峡谷。","analysis":""},{"time":"00:05:26,160 --> 00:05:30,160","html":"[Nicholas]: But you do have to pay for your own <mark style=\"background-color: #bbf7d0;\">insurance<\/mark> before you start out.","cn":"[尼古拉斯]: 但你必须在出发前支付你自己的<mark style=\"background-color: #bbf7d0;\">保险费<\/mark>。","analysis":""},{"time":"00:05:30,160 --> 00:05:33,160","html":"That costs <mark style=\"background-color: #bbf7d0;\">138 pounds sterling<\/mark>.","cn":"那费用是<mark style=\"background-color: #bbf7d0;\">138英镑<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题8询问需要自费购买的项目，并给出了价格（138英镑）。文本中尼古拉斯提到“you do have to pay for your own insurance before you start out. That costs 138 pounds sterling.”，因此“insurance”是正确答案。"},{"time":"00:05:33,160 --> 00:05:35,160","html":"[Man]: That's in case I get ill or anything.","cn":"[男士]: 那是为了以防我生病或其他情况吗？","analysis":""},{"time":"00:05:35,160 --> 00:05:36,160","html":"[Nicholas]: Yes.","cn":"[尼古拉斯]: 是的。","analysis":""},{"time":"00:05:36,160 --> 00:05:40,160","html":"Or you lose your luggage or have to cancel.","cn":"或者你行李丢失，或者不得不取消行程。","analysis":""},{"time":"00:05:40,160 --> 00:05:41,160","html":"[Man]: Right.","cn":"[男士]: 好的。","analysis":""},{"time":"00:05:41,160 --> 00:05:45,160","html":"And there was something in the ad about a check of some kind.","cn":"广告里还有关于某种检查的内容。","analysis":""},{"time":"00:05:45,160 --> 00:05:47,160","html":"Because I'd be working with children.","cn":"因为我将和孩子们一起工作。","analysis":""},{"time":"00:05:47,160 --> 00:05:48,160","html":"[Nicholas]: Yes, that's right.","cn":"[尼古拉斯]: 是的，没错。","analysis":""},{"time":"00:05:48,160 --> 00:05:51,160","html":"I forgot to mention that and it's very important.","cn":"我忘了提那个，而且它非常重要。","analysis":""},{"time":"00:05:51,160 --> 00:05:54,160","html":"You have to be checked by the <mark style=\"background-color: #bbf7d0;\">police<\/mark> here in the UK.","cn":"你必须在英国接受<mark style=\"background-color: #bbf7d0;\">警方<\/mark>的检查。","analysis":""},{"time":"00:05:54,160 --> 00:05:56,160","html":"And that costs <mark style=\"background-color: #bbf7d0;\">36 pounds<\/mark>.","cn":"那费用是<mark style=\"background-color: #bbf7d0;\">36英镑<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题9询问需要自费支付的检查类型，并给出了价格（36英镑）。文本中尼古拉斯提到“You have to be checked by the police here in the UK. And that costs 36 pounds.”，因此“police”是正确答案。"},{"time":"00:05:56,160 --> 00:05:58,160","html":"[Man]: That's okay.","cn":"[男士]: 没关系。","analysis":""},{"time":"00:05:58,160 --> 00:06:01,160","html":"Is there anything else I should know as far as money goes?","cn":"关于钱方面还有什么我应该知道的吗？","analysis":""},{"time":"00:06:01,160 --> 00:06:05,160","html":"[Nicholas]: Well, just that if you register with us to work on the summer camp,","cn":"[尼古拉斯]: 嗯，只是如果你在我们这里注册参加夏令营工作，","analysis":""},{"time":"00:06:05,160 --> 00:06:08,160","html":"you can go on and discover America tour afterwards.","cn":"你之后可以参加“探索美国”之旅。","analysis":""},{"time":"00:06:08,160 --> 00:06:10,160","html":"A lot of camp counselors do that.","cn":"很多夏令营辅导员都会这样做。","analysis":""},{"time":"00:06:10,160 --> 00:06:12,160","html":"And we can offer you a <mark style=\"background-color: #bbf7d0;\">discount<\/mark> on that.","cn":"我们可以为你提供<mark style=\"background-color: #bbf7d0;\">折扣<\/mark>。","analysis":"<strong>答案解析：<\/strong> 问题10询问夏令营结束后在美国旅行可以获得什么优惠。尼古拉斯明确表示“And we can offer you a discount on that.”，因此“discount”是正确答案。"},{"time":"00:06:12,160 --> 00:06:14,160","html":"And of course, you're bound to make lots of friends","cn":"当然，你肯定会交到很多朋友","analysis":""},{"time":"00:06:14,160 --> 00:06:16,160","html":"so you'll have people to travel with.","cn":"所以你会有人一起旅行。","analysis":""},{"time":"00:06:16,160 --> 00:06:17,160","html":"[Man]: Right.","cn":"[男士]: 好的。","analysis":""},{"time":"00:06:17,160 --> 00:06:20,160","html":"Well, I'm definitely interested in the whole thing.","cn":"嗯，我对整个事情都非常感兴趣。","analysis":""},{"time":"00:06:20,160 --> 00:06:22,160","html":"So what should I do next?","cn":"那么接下来我该做什么呢？","analysis":""},{"time":"00:06:22,160 --> 00:06:24,160","html":"[Nicholas]: Well, I'll give you our website address","cn":"[尼古拉斯]: 嗯，我会给你我们的网站地址","analysis":""},{"time":"00:06:24,160 --> 00:06:27,160","html":"and you can fill in the application form.","cn":"你可以填写申请表。","analysis":""},{"time":"00:06:27,160 --> 00:06:29,160","html":"You can fill it in online.","cn":"你可以在线填写。","analysis":""},{"time":"00:06:32,160 --> 00:06:34,160","html":"[Narrator]: That is the end of part one.","cn":"[旁白]: 第一部分到此结束。","analysis":""},{"time":"00:06:34,160 --> 00:06:39,160","html":"You now have one minute to check your answers to part one.","cn":"现在你有一分钟时间检查第一部分的答案。","analysis":""},{"time":"00:06:40,160 --> 00:06:42,160","html":"[Man]: Thank you very much.","cn":"[男士]: 非常感谢。","analysis":""},{"time":"00:07:10,160 --> 00:07:12,160","html":"[Narrator]: Thank you.","cn":"[旁白]: 谢谢。","analysis":""},{"time":"00:07:40,160 --> 00:07:42,160","html":"Thank you.","cn":"谢谢。","analysis":""},{"time":"00:08:10,160 --> 00:08:12,160","html":"Thank you.","cn":"谢谢。","analysis":""},{"time":"00:08:40,160 --> 00:08:42,160","html":"Thank you.","cn":"谢谢。","analysis":""}],"transcriptHighlights":[{"qid":"1","text":"Leader","answer":"Leader"},{"qid":"2","text":"Tennis","answer":"Tennis"},{"qid":"3","text":"8","answer":"8/eight"},{"qid":"3","text":"eight","answer":"8/eight"},{"qid":"4","text":"June","answer":"June"},{"qid":"5","text":"Training","answer":"Training"},{"qid":"6","text":"19","answer":"19/nineteen"},{"qid":"6","text":"nineteen","answer":"19/nineteen"},{"qid":"7","text":"985","answer":"985"},{"qid":"8","text":"Insurance","answer":"Insurance"},{"qid":"9","text":"Police","answer":"Police"},{"qid":"10","text":"Discount","answer":"Discount"}],"ownerInfo":"此内容由🍠@Listening 永不虾滑整理，仅作为分享供个人使用；禁止商用、倒卖和引流。有问题请先仔细看🍠这个账号的置顶和分享贴。没有团队，不是机构，纯个人分享。督学和其他相关课程请咨询主页另一个号@心情有点虾滑（不回任何机经相关消息）。"}</script>
<script>
const DATA=JSON.parse(document.getElementById('test-data').textContent);const $=s=>document.querySelector(s);const $$=s=>[...document.querySelectorAll(s)];const RENDER_VERSION=4;
let secs=0,review=false,timer=setInterval(()=>{secs++;drawTimer();if(secs%5===0)save(false)},1000),drag=null,currentCue=-1,loopCue=false,slowCue=false,showCn=true,showAnalysis=true,dictationMode=false,showOriginal=true,dictationAnswers={};const storeKey='ielts_v4_'+DATA.title.replace(/\W+/g,'_');
const CONFIG_DATA={answerKey:DATA.answerKey,questionList:DATA.questionIds.map(q=>Number(q)||q),localStorageKey:storeKey};window.localStorageKey=storeKey;window.DATA=DATA;window.CONFIG_DATA=CONFIG_DATA;
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function matchingRepeatAttr(g){return (g.questions||[]).length>(g.options||[]).length?' data-repeat="true"':''}
function groupHTML(g){if(g.type==='matching'&&g.layout==='flow')return `<section class="group"${matchingRepeatAttr(g)}><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="flow-layout"><div class="flow-steps">${g.questions.map((q,idx)=>`<div class="flow-step"><div class="flow-num">${q[0]}</div><div class="flow-text">${esc(q[1])}</div><span class="slot" data-q="${q[0]}"></span></div>${idx<g.questions.length-1?'<div class="flow-arrow">↓</div>':''}`).join('')}</div><div><strong>${esc(g.optionsTitle||'Options')}</strong><div class="pool">${g.options.map(o=>`<div class="drag" draggable="true" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</div></div></div></section>`;
if(g.type==='matching')return `<section class="group"${matchingRepeatAttr(g)}><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="matching"><div>${g.questions.map(q=>`<div class="match-row"><strong>${q[0]}</strong><span>${esc(q[1])}</span><span class="slot" data-q="${q[0]}"></span></div>`).join('')}</div><div><strong>${esc(g.optionsTitle||'Options')}</strong><div class="pool">${g.options.map(o=>`<div class="drag" draggable="true" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</div></div></div></section>`;
if(g.type==='map')return `<section class="group"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><div class="map-layout"><div class="map-image"><img src="${esc(g.image||'map.png')}" alt="Map"></div><div class="map-grid"><div class="map-answer-list">${g.questions.map(q=>`<div class="map-row"><div class="map-row-label"><strong>${q[0]}</strong> ${esc(q[1]||'')}</div><div class="map-options">${(g.options||['A','B','C','D','E','F','G','H','I']).map(o=>`<div class="choice map-choice" data-name="q${q[0]}" data-value="${o}">${o}</div>`).join('')}</div></div>`).join('')}</div></div></div></section>`;
if(g.type==='single')return `<section class="group"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div>${g.questions.map(q=>`<p><strong>${q.id}</strong> ${esc(q.text)}</p>${q.options.map(o=>`<div class="choice single-choice" data-name="q${q.id}" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}`).join('')}</section>`;
if(g.type==='multiple')return `<section class="group" data-limit="${g.limit}" data-id="${g.id}"><h3>${esc(g.title)}</h3><div class="instruction">${esc(g.instruction)}</div><p><strong>${esc(g.id)}</strong> ${esc(g.questionText)}</p>${g.options.map(o=>`<div class="choice multi-choice" data-name="q${g.id.replace('-','_')}" data-value="${o[0]}">${o[0]} ${esc(o[1])}</div>`).join('')}</section>`;
return `<section class="group"><h3>${esc(g.title)}</h3>${renderFillGroup(g)}</section>`}
function renderFillGroup(g){let qids=(g.questions||[]).map(q=>String(q.id));let used=new Set();let lines=(g.bodyLines&&g.bodyLines.length?g.bodyLines:g.questions.map(q=>`${q.id} ${q.text} _____`));let html='',i=0;while(i<lines.length){let meta=typeof lines[i]==='object'&&lines[i]?lines[i]:{};if(meta.table){let table=meta.table,chunk=[];while(i<lines.length){let m=typeof lines[i]==='object'&&lines[i]?lines[i]:{};if(m.table!==table)break;chunk.push(lines[i++])}html+=renderFillTable(chunk,qids,used);continue}html+=renderFillLine(lines[i++],qids,used)}return html||`<div class="instruction">${esc(g.instruction||'Complete the notes below.')}</div>`}
function renderFillTable(lines,qids,used){let rows=[];lines.forEach(line=>{let meta=typeof line==='object'&&line?line:{},row=Number(meta.row)||0,col=Number(meta.col)||0;if(!rows[row])rows[row]=[];rows[row][col]=renderFillLine(line,qids,used,true)});return `<div class="fill-table-wrap"><table class="fill-table">${rows.map((cells,idx)=>`<tr>${(cells||[]).map(cell=>idx===0?`<th>${cell}</th>`:`<td>${cell}</td>`).join('')}</tr>`).join('')}</table></div>`}
function fillInput(qid,lead=''){return `<span class="blank-q">${esc(qid)}</span>${esc(lead)}<input class="blank" name="q${esc(qid)}" type="text" autocomplete="off" inputmode="text">`}
function fillLineAttrs(meta,isHeading){let cls=['doc-line'];if(isHeading)cls.push('fill-heading');if(meta.list)cls.push('is-list');let rawLevel=Math.max(0,Math.min(6,Number(meta.level)||0)),level=rawLevel>0?rawLevel+1:rawLevel;let style=meta.list?` style="--indent:${level*30}px"`:'';return `class="${cls.join(' ')}"${style}`}
function fillLineContent(meta,body){let level=Math.max(0,Number(meta.level)||0),bullet=level>0?'◦':'•';return meta.list?`<span class="doc-bullet">${bullet}</span><span class="doc-line-content">${body}</span>`:body}
function isFillHeading(raw,meta,hit){return !hit&&!meta.list&&!/(?:_{2,}|…{2,}|\.{4,})/.test(raw)&&!/^\d+\.?\s+/.test(raw)&&!/^(?:Complete|Write|Choose)\b/i.test(raw)}
function renderFillLine(line,qids,used,inner=false){let meta=typeof line==='object'&&line?line:{},raw=String(meta.text??line),html=esc(raw),hit=false;html=html.replace(/(^|[^\d])(\d{1,2})\.?\s*((?:£\s*)?)(?:_{2,}|…{2,}|\.{4,})/g,(m,prefix,qid,lead)=>{if(!qids.includes(qid))return m;used.add(qid);hit=true;return prefix+fillInput(qid,lead)});let m=raw.match(/^(\d+)\.?\s+(.+)$/);if(!hit&&m&&qids.includes(m[1])){used.add(m[1]);let body=esc(m[2]);let input=fillInput(m[1]);body=/(?:_+|…{2,}|\.{4,})/.test(body)?body.replace(/(?:_+|…{2,}|\.{4,})/,input):`${body} ${input}`;return inner?fillLineContent(meta,body):`<p ${fillLineAttrs(meta,false)}>${fillLineContent(meta,body)}</p>`}return inner?html:`<p ${fillLineAttrs(meta,isFillHeading(raw,meta,hit))}>${fillLineContent(meta,html)}</p>`}
function hardResetAnswers(){$$('input').forEach(i=>{i.value='';i.defaultValue=''});$$('.choice').forEach(c=>c.classList.remove('selected'));$$('.slot').forEach(s=>s.innerHTML='');refreshPool();updateNav()}
function render(){document.title=DATA.title;$('#ownerMeta').textContent=DATA.ownerInfo||'';$('#audio').src=DATA.audio||'https://qyccvyyigtjhzunumbqf.supabase.co/storage/v1/object/public/audio/179.mp3';$('#content').innerHTML=DATA.groups.map(groupHTML).join('');$('#nav').innerHTML=DATA.questionIds.map(q=>`<div data-q="${q}">${q}</div>`).join('');bindDynamic();hardResetAnswers();load();updateNav()}
function bindDynamic(){
  $$('#content input').forEach(i=>{i.oninput=()=>{updateNav();save(false)};i.onchange=()=>{updateNav();save(false)}});
  $$('.single-choice').forEach(btn=>btn.onclick=e=>{if(review||window.getSelection().toString())return;$$(`.single-choice[data-name="${btn.dataset.name}"]`).forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');updateNav();save(false)});
  $$('.map-choice').forEach(btn=>btn.onclick=e=>{if(review||window.getSelection().toString())return;$$(`.map-choice[data-name="${btn.dataset.name}"]`).forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');updateNav();save(false)});
  $$('.multi-choice').forEach(btn=>btn.onclick=e=>{if(review||window.getSelection().toString())return;let group=btn.closest('.group'),limit=Number(group?.dataset.limit||99),name=btn.dataset.name,selected=$$(`.multi-choice[data-name="${name}"].selected`);if(!btn.classList.contains('selected')&&selected.length>=limit)return;btn.classList.toggle('selected');updateNav();save(false)});
  $$('#nav [data-q]').forEach(n=>n.onclick=()=>scrollToQuestion(n.dataset.q));
}
function bindGlobal(){
  document.addEventListener('dragstart',e=>{let d=e.target.closest('.drag,.tag');if(!d||review)return;drag={value:d.dataset.value,text:d.textContent,from:d.closest('.slot')};});
  document.addEventListener('dragover',e=>{if(e.target.closest('.slot,.pool'))e.preventDefault()});
  document.addEventListener('drop',e=>{let slot=e.target.closest('.slot'),pool=e.target.closest('.pool');if(!drag||review)return;e.preventDefault();if(pool&&drag.from){drag.from.innerHTML='';refreshPool();updateNav();save(false);return}if(slot){if(drag.from)drag.from.innerHTML='';slot.innerHTML=`<span class="tag" draggable="true" data-value="${drag.value}">${esc(drag.text)}</span>`;refreshPool();updateNav();save(false)}});
  document.addEventListener('mouseup',handleSelection);
  $('#selbar').onclick=handleToolbar;
}
function scrollToQuestion(q){let first=q.split('-')[0];let target=$(`input[name="q${first}"], .slot[data-q="${first}"], .choice[data-name="q${first}"]`)||$(`input[name="q${q.replace('-','_')}"]`);target?.closest('.group')?.scrollIntoView({behavior:'smooth',block:'center'});}
function refreshPool(){$$('.group').forEach(g=>{let slots=[...g.querySelectorAll('.slot')],drags=[...g.querySelectorAll('.drag')],repeat=g.dataset.repeat==='true'||slots.length>drags.length,used=new Set(slots.map(s=>s.querySelector('.tag')?.dataset.value).filter(Boolean));drags.forEach(d=>d.classList.toggle('hidden',!repeat&&used.has(d.dataset.value)))})}
function restoreDragging(){drag=null;$$('.drag,.tag').forEach(d=>d.draggable=!review)}
function multipleGroupFor(q){let n=Number(q);return DATA.groups.find(g=>{if(g.type!=='multiple')return false;let [a,b]=g.id.split('-').map(Number);return n>=a&&n<=b})}
function multipleNameFor(q){let g=multipleGroupFor(q);return g?'q'+g.id.replace('-','_'):null}
function answered(q){let mn=multipleNameFor(q);if(mn)return $$(`.multi-choice[data-name="${mn}"].selected`).length>0;return !!($(`input[name="q${q}"]`)?.value?.trim()||$(`.single-choice[data-name="q${q}"].selected`)||$(`.map-choice[data-name="q${q}"].selected`)||$(`.slot[data-q="${q}"] .tag`))}
function updateNav(){DATA.questionIds.forEach(q=>{$(`#nav [data-q="${q}"]`)?.classList.toggle('answered',answered(q))})}
function getAnswer(q){let mn=multipleNameFor(q);if(mn){let g=multipleGroupFor(q),ids=rangeIds(g.id),checked=$$(`.multi-choice[data-name="${mn}"].selected`).map(i=>i.dataset.value).sort(),idx=ids.indexOf(String(q));return checked[idx]||''}return $(`input[name="q${q}"]`)?.value||$(`.single-choice[data-name="q${q}"].selected`)?.dataset.value||$(`.map-choice[data-name="q${q}"].selected`)?.dataset.value||$(`.slot[data-q="${q}"] .tag`)?.dataset.value||''}
function correctAnswer(q){return DATA.answerKey.multipleMap?.['q'+q]||DATA.answerKey.text['q'+q]||DATA.answerKey.single['q'+q]||DATA.answerKey.map?.['q'+q]||DATA.answerKey.matching['q'+q]||''}
function norm(s){return String(s).trim().toLowerCase()}function answerVariants(s){return String(s||'').split(/\s*\/\s*/).map(x=>x.trim()).filter(Boolean)}function rangeIds(id){let [a,b]=id.split('-').map(Number),out=[];for(let n=a;n<=b;n++)out.push(String(n));return out}function isCorrect(q){let user=norm(getAnswer(q));return answerVariants(correctAnswer(q)).some(ans=>user===norm(ans))}
function optionTextForQuestion(q){let ans=String(correctAnswer(q)||'');for(let g of DATA.groups||[]){if((g.type==='single'||g.type==='map')&&g.questions){let item=g.questions.find(x=>String(x.id||x[0])===String(q));if(item&&g.type==='single'){let opt=(item.options||[]).find(o=>o[0]===ans);return opt?opt[1]:''}if(item&&g.type==='map')return item[1]||''}if(g.type==='multiple'){let ids=rangeIds(g.id);if(ids.includes(String(q))){let opt=(g.options||[]).find(o=>o[0]===ans);return opt?opt[1]:''}}if(g.type==='matching'){let opt=(g.options||[]).find(o=>o[0]===ans);return opt?opt[1]:''}}return ''}
function keywordScoreForQuestion(q,html){let text=String(html||'').replace(/<[^>]+>/g,' ').toLowerCase(),source=String(optionTextForQuestion(q)||correctAnswer(q)||'').toLowerCase();let words=source.split(/[^a-z0-9]+/).filter(w=>w.length>=4&&!/^(which|about|their|there|with|from|this|that|will|they|more|less)$/i.test(w));let score=0;for(let w of words){if(text.includes(w))score+=15}return score}
function answerRevealCell(q){return `<div class="answer-cell"><span class="answer-value is-hidden" data-answer="${esc(correctAnswer(q))}">Hidden</span><button class="answer-toggle" type="button">查看答案</button></div>`}
function resultStatusCell(q,ok){return `<div class="result-wrap"><span>${ok?"√ Correct":"× Incorrect"}</span><button class="analysis-jump" type="button" data-q="${q}">查看解析</button></div>`}
function resultRows(){return DATA.questionIds.map(q=>{let ok=isCorrect(q);return `<tr><td>${q}</td><td>${esc(getAnswer(q))||"--"}</td><td>${answerRevealCell(q)}</td><td class="${ok?"result-correct":"result-incorrect"}">${resultStatusCell(q,ok)}</td></tr>`}).join("")}
function generateResultsTable(){return `<table class="review-table results-table"><thead><tr><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th></tr></thead><tbody>${resultRows()}</tbody></table>`}
function renderReviewTable(){return `<section class="group review"><div class="review-head"><h3>Answer Review</h3><button class="show-all-answers" type="button">一键显示答案</button></div>${generateResultsTable()}</section>`}
function setAnswerVisible(btn,visible){let cell=btn.closest(".answer-cell"),value=cell?.querySelector(".answer-value");if(!value)return;value.textContent=visible?(value.dataset.answer||""):"Hidden";value.classList.toggle("is-hidden",!visible);btn.textContent=visible?"隐藏答案":"查看答案";btn.dataset.visible=visible?"1":"0"}

const audio=$('#audio');$('#play').onclick=()=>audio.paused?audio.play():audio.pause();audio.onplay=()=>$('#play').textContent='⏸';audio.onpause=()=>$('#play').textContent='▶';audio.ontimeupdate=()=>{if(audio.duration)$('#fillbar').style.width=(audio.currentTime/audio.duration*100)+'%';$('#time').textContent=`${Math.floor(audio.currentTime/60)}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')} / ${audio.duration?Math.floor(audio.duration/60):'00'}:${audio.duration?String(Math.floor(audio.duration%60)).padStart(2,'0'):'00'}`;maintainCueLoop()};$('#speed').onchange=e=>{slowCue=false;audio.playbackRate=+e.target.value;save(false)};$('#bar').onclick=e=>{if(audio.duration){let r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;save(false)}};
