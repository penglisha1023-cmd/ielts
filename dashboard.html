<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>我的成绩 — IELTS Listening</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    /* Morandi palette — muted, warm, low-saturation */
    --bg: #ebe4d9;
    --panel: #f7f1e7;
    --text: #3d362e;
    --muted: #8c8175;
    --border: #d7cdbe;
    --accent: #8fa394;
    --good: #7d9282;
    --bad: #b58575;
    --shadow: 0 4px 16px rgba(60,52,44,.07);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: var(--panel); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 { margin: 0; font-size: 1.15em; font-weight: 600; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .header-actions .who { color: var(--muted); font-size: .9em; }
  .btn {
    background: var(--accent); color: #fff; border: 0; padding: 8px 14px; border-radius: 8px;
    cursor: pointer; font-size: .9em; font-weight: 500; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn.ghost:hover { background: var(--bg); }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--panel); padding: 16px; border-radius: 12px; box-shadow: var(--shadow);
  }
  .stat-card .label { font-size: .8em; color: var(--muted); margin-bottom: 6px; }
  .stat-card .value { font-size: 1.6em; font-weight: 600; }
  .stat-card .sub   { font-size: .75em; color: var(--muted); margin-top: 4px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 14px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 16px; background: transparent; border: 0; cursor: pointer;
    color: var(--muted); font-weight: 500; border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  table.list {
    width: 100%; border-collapse: collapse; background: var(--panel);
    border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);
  }
  table.list th, table.list td { padding: 12px 14px; text-align: left; font-size: .92em; }
  table.list thead { background: var(--bg); }
  table.list th { font-weight: 500; color: var(--muted); font-size: .85em; }
  table.list tbody tr { border-top: 1px solid var(--border); cursor: pointer; }
  table.list tbody tr:hover { background: var(--bg); }
  table.list .test-id { color: var(--muted); font-variant-numeric: tabular-nums; }
  table.list .score-cell { font-weight: 600; }
  table.list .score-cell.good { color: var(--good); }
  table.list .score-cell.bad  { color: var(--bad); }
  table.list .badge {
    font-size: .72em; padding: 2px 8px; border-radius: 999px;
    background: var(--bg); color: var(--muted); border: 1px solid var(--border);
  }
  table.list .badge.high { background: #d8c1ac; color: #6b4a36; border-color: transparent; }

  .notes-list {
    display: grid; gap: 10px;
  }
  .note-item {
    background: var(--panel); border-radius: 12px; padding: 14px 16px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .note-item .meta {
    display: flex; gap: 8px; font-size: .78em; color: var(--muted); margin-bottom: 8px; align-items: center;
  }
  .note-item .quote {
    background: #d8c1ac; color: #6b4a36; padding: 6px 10px; border-radius: 6px; font-size: .95em;
    margin-bottom: 8px; display: inline-block;
  }
  .note-item .text { font-size: .92em; line-height: 1.5; white-space: pre-wrap; }
  .note-item .text:empty::before { content: '(无文字笔记)'; color: var(--muted); font-style: italic; }

  .empty { text-align: center; padding: 48px; color: var(--muted); }
  .loading { padding: 24px; color: var(--muted); text-align: center; }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    table.list .col-time { display: none; }
    .container { padding: 14px; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>我的成绩</h1>
  <div class="header-actions">
    <span class="who" id="who"></span>
    <a href="/index.html" class="btn ghost">← 题库</a>
    <button class="btn ghost" id="btn-signout">退出</button>
  </div>
</header>

<div class="container">
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="label">已完成</div><div class="value" id="stat-done">—</div><div class="sub">/ 88 篇</div></div>
    <div class="stat-card"><div class="label">平均正确率</div><div class="value" id="stat-avg">—</div><div class="sub">所有完成测试</div></div>
    <div class="stat-card"><div class="label">总用时</div><div class="value" id="stat-time">—</div><div class="sub">累计</div></div>
    <div class="stat-card"><div class="label">笔记数</div><div class="value" id="stat-notes">—</div><div class="sub">条</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="scores">成绩记录</button>
    <button class="tab" data-tab="notes">笔记</button>
  </div>

  <div id="tab-scores">
    <div class="loading">加载中…</div>
  </div>
  <div id="tab-notes" style="display:none">
    <div class="loading">加载中…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/lib/config.js"></script>
<script src="/lib/catalog.js"></script>
<script src="/lib/supabase.js"></script>
<script>
const $ = s => document.querySelector(s);
const catalogById = Object.fromEntries(TEST_CATALOG.map(t => [t.id, t]));

function fmtTime(secs) {
  if (!secs) return '0m';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h ? `${h}h ${m}m` : `${m}m`;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  $('#tab-scores').style.display = t.dataset.tab === 'scores' ? '' : 'none';
  $('#tab-notes').style.display  = t.dataset.tab === 'notes'  ? '' : 'none';
}));

$('#btn-signout').addEventListener('click', () => IELTS.signOut());

(async function () {
  const user = await IELTS.requireAuth();
  if (!user) return;
  const { data: profile } = await IELTS.getProfile(user.id);
  $('#who').textContent = profile?.display_name ? `Hi, ${profile.display_name}` : user.email;

  const [{ data: scores }, { data: notes }] = await Promise.all([
    sb.from('scores').select('*').order('finished_at', { ascending: false }),
    sb.from('notes').select('*').order('updated_at', { ascending: false })
  ]);

  renderStats(scores || [], notes || []);
  renderScores(scores || []);
  renderNotes(notes || []);
})();

function renderStats(scores, notes) {
  // best per test
  const bestByTest = {};
  scores.forEach(s => {
    if (!bestByTest[s.test_id] || s.score > bestByTest[s.test_id].score) bestByTest[s.test_id] = s;
  });
  const completed = Object.keys(bestByTest).length;
  const totalTime = scores.reduce((sum, s) => sum + (s.duration_secs || 0), 0);
  const totalCorrect = Object.values(bestByTest).reduce((sum, s) => sum + s.score, 0);
  const totalQs = Object.values(bestByTest).reduce((sum, s) => sum + s.total, 0);
  const avg = totalQs ? Math.round((totalCorrect / totalQs) * 100) : 0;

  $('#stat-done').textContent = completed;
  $('#stat-avg').textContent  = totalQs ? `${avg}%` : '—';
  $('#stat-time').textContent = fmtTime(totalTime);
  $('#stat-notes').textContent = notes.length;
}

function renderScores(scores) {
  const root = $('#tab-scores');
  if (scores.length === 0) {
    root.innerHTML = '<div class="empty">还没有完成任何测试。<br><br><a href="/index.html" class="btn">去题库 →</a></div>';
    return;
  }
  // group: best per test, with attempts count
  const byTest = {};
  scores.forEach(s => {
    if (!byTest[s.test_id]) byTest[s.test_id] = { best: s, attempts: 0, totalTime: 0, all: [] };
    const g = byTest[s.test_id];
    g.attempts++;
    g.totalTime += s.duration_secs || 0;
    g.all.push(s);
    if (s.score > g.best.score) g.best = s;
  });
  const rows = Object.values(byTest).sort((a, b) =>
    new Date(b.best.finished_at) - new Date(a.best.finished_at)
  );

  let html = `<table class="list"><thead><tr>
    <th>编号</th><th>题目</th><th>分组</th><th>最佳成绩</th><th>正确率</th><th>次数</th><th class="col-time">最近提交</th>
  </tr></thead><tbody>`;

  for (const r of rows) {
    const t = catalogById[r.best.test_id] || { title: '(未知)', section: '', frequency: '' };
    const pct = Math.round((r.best.score / r.best.total) * 100);
    const cls = pct >= 60 ? 'good' : 'bad';
    html += `<tr data-test-id="${r.best.test_id}">
      <td class="test-id">${r.best.test_id}</td>
      <td>${escapeHtml(t.title)}</td>
      <td><span class="badge ${t.frequency === 'high' ? 'high' : ''}">${t.section} ${t.frequency === 'high' ? '高频' : '非高频'}</span></td>
      <td class="score-cell ${cls}">${r.best.score}/${r.best.total}</td>
      <td class="score-cell ${cls}">${pct}%</td>
      <td>${r.attempts}</td>
      <td class="col-time">${fmtDate(r.best.finished_at)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  root.innerHTML = html;
  root.querySelectorAll('tbody tr').forEach(tr => {
    tr.addEventListener('click', () => {
      location.href = `/index.html#test=${tr.dataset.testId}`;
    });
  });
}

function renderNotes(notes) {
  const root = $('#tab-notes');
  if (notes.length === 0) {
    root.innerHTML = '<div class="empty">还没有任何笔记。在做题页选中文字 → Note 即可保存。</div>';
    return;
  }
  // group by test
  const byTest = {};
  notes.forEach(n => { (byTest[n.test_id] = byTest[n.test_id] || []).push(n); });
  let html = '<div class="notes-list">';
  Object.keys(byTest).map(Number).sort((a, b) => a - b).forEach(tid => {
    const t = catalogById[tid] || { title: '(未知)', section: '', frequency: '' };
    html += `<div style="margin-top:14px;font-weight:600;font-size:.95em;color:var(--muted)">
      ${tid}. ${t.section} · ${escapeHtml(t.title)}
    </div>`;
    byTest[tid].forEach(n => {
      html += `<div class="note-item">
        <div class="meta">
          <span>${fmtDate(n.updated_at)}</span>
        </div>
        <div class="quote">${escapeHtml(n.quote)}</div>
        <div class="text">${escapeHtml(n.note_text)}</div>
      </div>`;
    });
  });
  html += '</div>';
  root.innerHTML = html;
}
</script>
</body>
</html>
